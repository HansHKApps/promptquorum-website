name: Weekly Sitemap Validation

on:
  schedule:
    # Every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  validate-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Validate sitemap completeness
        run: |
          set -e

          echo "🔍 Validating sitemap completeness..."

          # Count PE articles in slugs.ts
          PE_SLUGS=$(grep -c "^  '[^']*':" src/lib/prompt-engineering/slugs.ts || echo "0")
          echo "✓ Found $PE_SLUGS PE article slugs in slugs.ts"

          # Count blog articles in blogSlugs.ts
          BLOG_SLUGS=$(grep -c "^  '" src/lib/blogSlugs.ts || echo "0")
          echo "✓ Found $BLOG_SLUGS blog article slugs in blogSlugs.ts"

          # Verify imports
          if grep -q "import { PE_SLUG_TO_KEY }" src/app/sitemap.ts; then
            echo "✓ PE_SLUG_TO_KEY imported in sitemap.ts"
          else
            echo "❌ ERROR: PE_SLUG_TO_KEY not imported in sitemap.ts!"
            exit 1
          fi

          if grep -q "import { SLUG_TO_POST_ID }" src/app/sitemap.ts; then
            echo "✓ SLUG_TO_POST_ID imported in sitemap.ts"
          else
            echo "❌ ERROR: SLUG_TO_POST_ID not imported in sitemap.ts!"
            exit 1
          fi

          # Verify hreflang utility exists
          if [ -f "src/lib/hreflang.ts" ]; then
            echo "✓ hreflang utility exists for language alternates"
          else
            echo "❌ ERROR: hreflang.ts utility missing!"
            exit 1
          fi

          # Verify alternates in metadata
          if grep -q "alternates.*languages" src/app/layout.tsx; then
            echo "✓ Language alternates configured in root layout"
          else
            echo "❌ ERROR: Language alternates not in root layout!"
            exit 1
          fi

          # Build to verify no errors
          echo "🔨 Building to verify no errors..."
          npm run build > /dev/null 2>&1

          echo ""
          echo "✨ Sitemap validation passed!"
          echo "   • PE articles: $PE_SLUGS (dynamically included in sitemap × 5 languages = $((PE_SLUGS * 5)) URLs)"
          echo "   • Blog articles: $BLOG_SLUGS (dynamically included in sitemap × 5 languages = $((BLOG_SLUGS * 5)) URLs)"
          echo "   • hreflang tags: ✓ Configured for all language variants"

      - name: Notify on failure
        if: failure()
        run: |
          echo "⚠️ Sitemap validation failed!"
          echo "Check the logs above and update sitemap.ts to include all article types."
          exit 1
