name: Daily IndexNow Submission

on:
  schedule:
    # Run every day at 2 AM UTC (10 PM EST / 7 PM PST)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  submit-all-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Submit all pages to Bing IndexNow
        run: |
          # Fetch sitemap and extract all URLs
          echo "📥 Fetching sitemap from https://www.promptquorum.com/sitemap.xml..."
          SITEMAP=$(curl -s https://www.promptquorum.com/sitemap.xml)

          # Extract all <loc> URLs and build JSON array
          URLS=$(echo "$SITEMAP" | grep -oP '(?<=<loc>)[^<]+' | jq -R . | jq -s .)
          TOTAL_URLS=$(echo "$URLS" | jq 'length')

          echo "📢 Submitting $TOTAL_URLS URLs to Bing IndexNow..."

          # Submit to IndexNow API
          curl -X POST https://www.promptquorum.com/api/indexnow \
            -H "Content-Type: application/json" \
            -d "{\"urls\": $URLS}" \
            -w "\nStatus: %{http_code}\n"

      - name: Notify on failure
        if: failure()
        run: echo "⚠️ IndexNow submission failed. Check logs above."
