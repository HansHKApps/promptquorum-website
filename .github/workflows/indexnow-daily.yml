name: Daily IndexNow Submission

on:
  schedule:
    # Run every day at 2 AM UTC (10 PM EST / 7 PM PST)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  submit-all-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Submit all pages to Bing IndexNow
        run: |
          # Static pages
          STATIC_PAGES=(
            "https://www.promptquorum.com"
            "https://www.promptquorum.com/features"
            "https://www.promptquorum.com/features/optimization"
            "https://www.promptquorum.com/features/quorum"
            "https://www.promptquorum.com/compare"
            "https://www.promptquorum.com/how-it-works"
            "https://www.promptquorum.com/faq"
            "https://www.promptquorum.com/about"
            "https://www.promptquorum.com/privacy"
            "https://www.promptquorum.com/download"
            "https://www.promptquorum.com/prompt-engineering"
            "https://www.promptquorum.com/blog"
            "https://www.promptquorum.com/frameworks"
          )

          # PE Articles
          PE_ARTICLES=(
            "what-is-prompt-engineering"
            "how-prompt-engineering-evolved"
            "5-building-blocks-every-prompt-needs"
            "ai-hallucinations-why-ai-makes-things-up"
            "faster-ai-answers-how-to-prompt-for-speed"
            "temperature-and-top-p-control-ai-creativity"
            "context-windows-explained-why-ai-forgets"
            "beyond-text-how-to-prompt-with-images"
            "tokens-costs-limits-economics-of-ai-prompting"
            "system-prompt-vs-user-prompt-whats-the-difference"
            "gpt-claude-or-gemini-how-to-pick-the-right-model"
            "which-prompt-framework-should-you-use"
            "the-single-step-prompt-method"
            "ape-framework"
            "craft-framework"
            "co-star-framework"
            "specs-framework"
            "risen-framework"
            "trace-framework"
            "googles-prompting-guide"
            "rtf-framework"
            "build-your-own-prompt-framework"
            "zero-shot-vs-few-shot"
            "constrained-prompting"
            "chain-of-thought-prompting"
            "persona-prompting"
            "prompt-chaining"
            "negative-prompting"
            "self-consistency-prompting"
            "tree-of-thought-and-react"
            "rag-explained"
            "structured-output-and-json-mode"
            "write-better-code-with-ai"
            "ai-powered-research"
            "seo-meets-ai"
            "teaching-with-ai"
            "extract-and-summarise"
            "ai-code-review"
            "prompting-across-languages"
            "control-the-output"
            "build-quality-checks"
            "your-brand-voice-ai"
            "build-a-prompt-library"
          )

          # Blog Articles
          BLOG_ARTICLES=(
            "prompt-frameworks"
            "local-ai-vs-cloud"
            "ai-model-comparison"
            "quorum"
            "prompt-optimization"
            "enterprise-data-privacy"
            "research-prompt-optimization-impact"
            "ai-consensus-scoring"
            "promptquorum-vs-askquorum"
            "what-is-ai-consensus-scoring"
          )

          # Build URL arrays
          URLS="["
          for page in "${STATIC_PAGES[@]}"; do
            URLS="$URLS\"$page\","
          done
          for slug in "${PE_ARTICLES[@]}"; do
            URLS="$URLS\"https://www.promptquorum.com/prompt-engineering/$slug\","
          done
          for slug in "${BLOG_ARTICLES[@]}"; do
            URLS="$URLS\"https://www.promptquorum.com/blog/$slug\","
          done
          # Remove trailing comma and close
          URLS="${URLS%,}]"

          TOTAL_URLS=$((${#STATIC_PAGES[@]} + ${#PE_ARTICLES[@]} + ${#BLOG_ARTICLES[@]}))
          echo "📢 Submitting $TOTAL_URLS URLs to Bing IndexNow..."

          # Submit to IndexNow API
          curl -X POST https://www.promptquorum.com/api/indexnow \
            -H "Content-Type: application/json" \
            -d "{\"urls\": $URLS}" \
            -w "\nStatus: %{http_code}\n"

      - name: Notify on failure
        if: failure()
        run: echo "⚠️ IndexNow submission failed. Check logs above."
