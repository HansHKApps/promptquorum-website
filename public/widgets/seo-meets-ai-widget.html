      const group = document.createElement('div');
      group.className = 'question-section';

        <h3>${q.q}</h3>
        <div class="question-item">

      `;

    document.getElementById('compliance-note').innerHTML = `

    function calculateScore() {
      let totalScore = 0;
      const form = document.getElementById('widget-form');
      const formData = new FormData(form);

      data.questions.forEach((q, idx) => {
        const answer = formData.get(`q_${idx}`);
        if (answer === 'yes') {
          totalScore += q.points;
        }
      });

      const score = Math.min(10, totalScore);
      const range = data.scoreRanges.find(r => score >= r.min && score <= r.max);

      document.getElementById('final-score').textContent = score.toFixed(1);
      document.getElementById('score-label').textContent = range.label;
      document.getElementById('score-action').textContent = range.action;

      // Update score display color
      const scoreDisplay = document.querySelector('.score-display');
      scoreDisplay.style.borderLeft = `4px solid ${range.color}`;

      // Render recommendations
      const recsContainer = document.getElementById('recommendations-container');
      recsContainer.innerHTML = data.recommendations
        .filter(r => score >= r.score)
        .sort((a, b) => {
          const priorityOrder = { 'High': 0, 'Élevé': 0, 'Hoch': 0, '高': 0, 'Medium': 1, 'Moyen': 1, 'Mittel': 1, '中': 1, 'Low': 2, 'Faible': 2, 'Niedrig': 2, '低': 2 };
          return (priorityOrder[a.priority] || 0) - (priorityOrder[b.priority] || 0);
        })
        .map(r => `
          <div class="recommendation-item">
            <strong>${r.priority}: ${r.text}</strong>
            <div class="effort">Effort: ${r.effort}</div>
          </div>
        `)
        .join('');

      document.getElementById('results-container').style.display = 'block';
      document.getElementById('results-container').scrollIntoView({ behavior: 'smooth' });
    }

    function downloadPlan(format) {
      const score = document.getElementById('final-score').textContent;
      const recommendations = data.recommendations.filter(r => score >= r.score);

      let content = '';
      if (format === 'txt') {
        content = `PromptQuorum GEO Audit Action Plan
${data.title}
Date: ${new Date().toLocaleDateString()}
Language: ${currentLang}

Your Score: ${score}/10

${data.resultsTitles.complianceTitle}:
${data.compliance.note}

${data.resultsTitles.recTitle}:
${recommendations.map(r => `- [${r.priority}] ${r.text} (${r.effort})`).join('\n')}

Next Steps:
1. Implement highest-priority items
2. Re-audit in 30 days
3. Monitor AI citations across ChatGPT, Perplexity, Google AI Overviews`;
      } else if (format === 'csv') {
        content = `Priority,Recommendation,Effort Estimate,Score Threshold\n`;
        content += recommendations.map(r => `"${r.priority}","${r.text.replace(/"/g, '""')}","${r.effort}","${r.score}+"`).join('\n');
      }

      const blob = new Blob([content], { type: format === 'txt' ? 'text/plain' : 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `geo-audit-${currentLang}-${new Date().toISOString().split('T')[0]}.${format === 'txt' ? 'txt' : 'csv'}`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // Update progress on input change
    document.getElementById('widget-form').addEventListener('change', () => {
      const form = document.getElementById('widget-form');
      const formData = new FormData(form);
      let answered = 0;
      data.questions.forEach((q, idx) => {
        if (formData.get(`q_${idx}`)) answered++;
      });
      const progress = (answered / data.questions.length) * 100;
      document.getElementById('progress').style.width = progress + '%';
    });
  </script>
