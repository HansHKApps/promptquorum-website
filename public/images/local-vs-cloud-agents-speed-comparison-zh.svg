<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#FFFFFF"/>
  <text x="400" y="28" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, sans-serif">速度对比：云端 vs 本地 AI 代理 (2026年4月)</text>

  <!-- Left Panel: Cloud Agents (Fast) -->
  <rect x="28" y="55" width="340" height="260" rx="6" fill="#FFFFFF" stroke="#34A853" stroke-width="2"/>
  <rect x="28" y="55" width="340" height="4" rx="0" fill="#34A853"/>

  <text x="198" y="80" font-size="16" font-weight="700" fill="#34A853" text-anchor="middle" font-family="system-ui, sans-serif">云端代理 (快速)</text>
  <text x="48" y="110" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">每步耗时:</text>
  <text x="48" y="130" font-family="'SF Mono', Monaco, monospace" font-size="14" font-weight="700" fill="#34A853">100–300 ms</text>

  <text x="48" y="160" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">推理循环:</text>
  <text x="48" y="180" font-family="'SF Mono', Monaco, monospace" font-size="14" font-weight="700" fill="#34A853">1–2 秒</text>

  <text x="48" y="210" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">可扩展性:</text>
  <text x="48" y="230" font-size="12" fill="#49454F" font-family="system-ui, sans-serif">无限制 (供应商)</text>

  <text x="48" y="260" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">成本:</text>
  <text x="48" y="280" font-family="'SF Mono', Monaco, monospace" font-size="12" font-weight="600" fill="#1C1B1F">$20/100万令牌</text>

  <!-- Right Panel: Local Agents (Slower) -->
  <rect x="432" y="55" width="340" height="260" rx="6" fill="#FFFFFF" stroke="#EA4335" stroke-width="2"/>
  <rect x="432" y="55" width="340" height="4" rx="0" fill="#EA4335"/>

  <text x="602" y="80" font-size="16" font-weight="700" fill="#EA4335" text-anchor="middle" font-family="system-ui, sans-serif">本地代理 (较慢)</text>
  <text x="452" y="110" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">每步耗时:</text>
  <text x="452" y="130" font-family="'SF Mono', Monaco, monospace" font-size="14" font-weight="700" fill="#EA4335">2–5 秒</text>

  <text x="452" y="160" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">推理循环:</text>
  <text x="452" y="180" font-family="'SF Mono', Monaco, monospace" font-size="14" font-weight="700" fill="#EA4335">6–15 秒</text>

  <text x="452" y="210" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">可扩展性:</text>
  <text x="452" y="230" font-size="12" fill="#49454F" font-family="system-ui, sans-serif">受硬件限制</text>

  <text x="452" y="260" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">成本:</text>
  <text x="452" y="280" font-family="'SF Mono', Monaco, monospace" font-size="12" font-weight="600" fill="#1C1B1F">$0 每令牌</text>

  <line x1="18" y1="320" x2="782" y2="320" stroke="#E8DEF8" stroke-width="1"/>
  <text x="400" y="340" font-size="11" fill="#79747E" text-anchor="middle" font-family="system-ui, sans-serif">云端对交互式使用感觉即时。本地适用于自动化和批处理。</text>
</svg>