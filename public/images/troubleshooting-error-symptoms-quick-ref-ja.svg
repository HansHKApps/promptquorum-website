<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <rect width="800" height="420" fill="#FFFFFF"/>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/></filter>
  </defs>

  <text x="400" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="19" font-weight="700" fill="#1C1B1F" text-anchor="middle">10個の最も一般的なローカルLLMエラー — クイックリファレンス</text>

  <line x1="18" y1="40" x2="782" y2="40" stroke="#E8DEF8" stroke-width="1.5"/>

  <!-- Header row -->
  <text x="40" y="65" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#79747E">#</text>
  <text x="90" y="65" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#79747E">エラー</text>
  <text x="280" y="65" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#79747E">症状</text>
  <text x="550" y="65" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#79747E">解決方法</text>

  <line x1="18" y1="72" x2="782" y2="72" stroke="#E8DEF8" stroke-width="1.5"/>

  <!-- Row 1: メモリ不足 -->
  <circle cx="40" cy="95" r="12" fill="#6750A4"/>
  <text x="40" y="99" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="90" y="99" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">メモリ不足</text>
  <text x="280" y="99" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">"GGML_ASSERT"クラッシュ</text>
  <text x="550" y="99" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">小さいモデルまたはQ4_K_M</text>
  <line x1="18" y1="108" x2="782" y2="108" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 2: GPU未検出 -->
  <circle cx="40" cy="131" r="12" fill="#6750A4"/>
  <text x="40" y="135" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="90" y="135" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">GPU未検出</text>
  <text x="280" y="135" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">&lt;5 tok/s、100% CPU</text>
  <text x="550" y="135" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">OLLAMA_GPU_LAYERS=35</text>
  <line x1="18" y1="144" x2="782" y2="144" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 3: 推論遅延 -->
  <circle cx="40" cy="167" r="12" fill="#6750A4"/>
  <text x="40" y="171" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="90" y="171" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">推論遅延</text>
  <text x="280" y="171" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">GPU上で&lt;10 tok/s</text>
  <text x="550" y="171" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">num_ctx削減、VRAM解放</text>
  <line x1="18" y1="180" x2="782" y2="180" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 4: 接続拒否 -->
  <circle cx="40" cy="203" r="12" fill="#6750A4"/>
  <text x="40" y="207" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="90" y="207" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">接続拒否</text>
  <text x="280" y="207" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">curl: (7)エラー</text>
  <text x="550" y="207" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">ollama serve実行</text>
  <line x1="18" y1="216" x2="782" y2="216" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 5: モデル見つからず -->
  <circle cx="40" cy="239" r="12" fill="#6750A4"/>
  <text x="40" y="243" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text>
  <text x="90" y="243" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">モデル見つからず</text>
  <text x="280" y="243" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">"error: model not found"</text>
  <text x="550" y="243" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">ollama pull llama3.2:3b</text>
  <line x1="18" y1="252" x2="782" y2="252" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 6: ファイル破損 -->
  <circle cx="40" cy="275" r="12" fill="#6750A4"/>
  <text x="40" y="279" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">6</text>
  <text x="90" y="279" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">ファイル破損</text>
  <text x="280" y="279" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">JSONデコードエラー</text>
  <text x="550" y="279" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">ollama rm + 再取得</text>
  <line x1="18" y1="288" x2="782" y2="288" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 7: CUDAエラー -->
  <circle cx="40" cy="311" r="12" fill="#6750A4"/>
  <text x="40" y="315" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">7</text>
  <text x="90" y="315" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">CUDAエラー</text>
  <text x="280" y="315" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">"device-side assert"</text>
  <text x="550" y="315" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">CUDAドライバ確認</text>
  <line x1="18" y1="324" x2="782" y2="324" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 8: 文字化け出力 -->
  <circle cx="40" cy="347" r="12" fill="#6750A4"/>
  <text x="40" y="351" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">8</text>
  <text x="90" y="351" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">文字化け出力</text>
  <text x="280" y="351" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">繰り返し/無意味</text>
  <text x="550" y="351" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">量子化レベル低下</text>
  <line x1="18" y1="360" x2="782" y2="360" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 9: ポート衝突 -->
  <circle cx="40" cy="383" r="12" fill="#6750A4"/>
  <text x="40" y="387" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">9</text>
  <text x="90" y="387" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">ポート衝突</text>
  <text x="280" y="387" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">"Address already in use"</text>
  <text x="550" y="387" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">ポート11434終了</text>

  <line x1="18" y1="396" x2="782" y2="396" stroke="#E8DEF8" stroke-width="1.5"/>

  <!-- Row 10: 途中で停止 -->
  <circle cx="40" cy="410" r="12" fill="#6750A4"/>
  <text x="40" y="414" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">10</text>
  <text x="95" y="414" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1C1B1F">途中で停止</text>
  <text x="330" y="414" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F">制限で中断</text>
  <text x="550" y="414" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">num_ctx増加</text>
<text x="792" y="415" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>
