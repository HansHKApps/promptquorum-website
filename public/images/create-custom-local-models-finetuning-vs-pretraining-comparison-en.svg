<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="32" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui">
    Fine-Tuning vs Pre-Training
  </text>

  <!-- Left Panel: Fine-Tuning (Success) -->
  <rect x="28" y="55" width="340" height="280" rx="6" fill="#FFFFFF" stroke="#34A853" stroke-width="2" filter="url(#shadow)"/>
  <rect x="28" y="55" width="340" height="4" rx="0" fill="#34A853"/>

  <text x="198" y="82" font-size="15" font-weight="700" fill="#34A853" text-anchor="middle" font-family="system-ui">Fine-Tuning (Recommended)</text>

  <text x="48" y="110" font-weight="700" fill="#1C1B1F" font-family="system-ui" font-size="12">Training Time:</text>
  <text x="48" y="128" font-family="'SF Mono', Monaco" font-size="13" font-weight="600" fill="#34A853">1–4 hours</text>

  <text x="48" y="150" font-weight="700" fill="#1C1B1F" font-family="system-ui" font-size="12">VRAM Required:</text>
  <text x="48" y="168" font-family="'SF Mono', Monaco" font-size="13" font-weight="600" fill="#34A853">8 GB</text>

  <text x="48" y="190" font-weight="700" fill="#1C1B1F" font-family="system-ui" font-size="12">Data Needed:</text>
  <text x="48" y="208" font-family="'SF Mono', Monaco" font-size="13" font-weight="600" fill="#34A853">500–5,000 examples</text>

  <text x="48" y="230" font-weight="700" fill="#1C1B1F" font-family="system-ui" font-size="12">Cost:</text>
  <text x="48" y="248" font-family="'SF Mono', Monaco" font-size="13" font-weight="600" fill="#34A853">$100–500</text>

  <text x="48" y="280" font-weight="700" fill="#1C1B1F" font-family="system-ui" font-size="12">Use Case:</text>
  <text x="48" y="298" font-family="system-ui" font-size="11" fill="#49454F">Domain-specific accuracy</text>
  <text x="48" y="312" font-family="system-ui" font-size="11" fill="#49454F">99% of projects</text>

  <!-- Right Panel: Pre-Training (Caution) -->
  <rect x="432" y="55" width="340" height="280" rx="6" fill="#FFFFFF" stroke="#F4B400" stroke-width="2" filter="url(#shadow)"/>
  <rect x="432" y="55" width="340" height="4" rx="0" fill="#F4B400"/>

  <text x="602" y="82" font-size="15" font-weight="700" fill="#F4B400" text-anchor="middle" font-family="system-ui">Pre-Training (Rare)</text>

  <text x="452" y="110" font-weight="700" fill="#1C1B1F" font-family="system-ui" font-size="12">Training Time:</text>
  <text x="452" y="128" font-family="'SF Mono', Monaco" font-size="13" font-weight="600" fill="#F4B400">Weeks–Months</text>

  <text x="452" y="150" font-weight="700" fill="#1C1B1F" font-family="system-ui" font-size="12">VRAM Required:</text>
  <text x="452" y="168" font-family="'SF Mono', Monaco" font-size="13" font-weight="600" fill="#F4B400">100+ GB</text>

  <text x="452" y="190" font-weight="700" fill="#1C1B1F" font-family="system-ui" font-size="12">Data Needed:</text>
  <text x="452" y="208" font-family="'SF Mono', Monaco" font-size="13" font-weight="600" fill="#F4B400">100B+ tokens</text>

  <text x="452" y="230" font-weight="700" fill="#1C1B1F" font-family="system-ui" font-size="12">Cost:</text>
  <text x="452" y="248" font-family="'SF Mono', Monaco" font-size="13" font-weight="600" fill="#F4B400">$50K–500K</text>

  <text x="452" y="280" font-weight="700" fill="#1C1B1F" font-family="system-ui" font-size="12">Use Case:</text>
  <text x="452" y="298" font-family="system-ui" font-size="11" fill="#49454F">Proprietary models with</text>
  <text x="452" y="312" font-family="system-ui" font-size="11" fill="#49454F">massive budgets</text>
<text x="792" y="345" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>