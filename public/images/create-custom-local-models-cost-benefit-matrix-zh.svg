<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <defs><filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/></filter></defs>
  <rect width="800" height="350" fill="#FFFFFF"/>
  <text x="400" y="32" font-size="18" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, 'Noto Sans CJK SC'">何时使用微调 vs 预训练 vs RAG</text>
  <rect x="28" y="55" width="220" height="270" rx="6" fill="#FFFFFF" stroke="#7D5260" stroke-width="2" filter="url(#shadow)"/>
  <rect x="28" y="55" width="220" height="4" rx="0" fill="#7D5260"/>
  <text x="138" y="82" font-size="12" font-weight="700" fill="#7D5260" text-anchor="middle" font-family="system-ui, 'Noto Sans CJK SC'">RAG（免费）</text>
  <text x="48" y="105" font-size="10" font-weight="600" fill="#1C1B1F" font-family="system-ui, 'Noto Sans CJK SC'">何时 :</text>
  <text x="48" y="120" font-size="10" fill="#49454F" font-family="system-ui, 'Noto Sans CJK SC'">• 没有训练数据</text>
  <text x="48" y="135" font-size="10" fill="#49454F" font-family="system-ui, 'Noto Sans CJK SC'">• 需要快速迭代</text>
  <text x="48" y="150" font-size="10" fill="#49454F" font-family="system-ui, 'Noto Sans CJK SC'">• 资源有限</text>
  <text x="48" y="170" font-size="10" font-weight="600" fill="#1C1B1F" font-family="system-ui, 'Noto Sans CJK SC'">成本 : $0</text>
  <text x="48" y="187" font-size="10" font-weight="600" fill="#1C1B1F" font-family="system-ui, 'Noto Sans CJK SC'">速度 : 即时</text>
  <text x="48" y="204" font-size="10" font-weight="600" fill="#1C1B1F" font-family="system-ui, 'Noto Sans CJK SC'">限制 :</text>
  <text x="48" y="219" font-size="10" fill="#49454F" font-family="system-ui, 'Noto Sans CJK SC'">无学习、仅</text>
  <text x="48" y="234" font-size="10" fill="#49454F" font-family="system-ui, 'Noto Sans CJK SC'">检索现有</text>
  <text x="48" y="249" font-size="10" fill="#49454F" font-family="system-ui, 'Noto Sans CJK SC'">数据</text>
  <rect x="270" y="55" width="220" height="270" rx="6" fill="#FFFFFF" stroke="#34A853" stroke-width="2" filter="url(#shadow)"/>
  <rect x="270" y="55" width="220" height="4" rx="0" fill="#34A853"/>
  <text x="380" y="82" font-size="12" font-weight="700" fill="#34A853" text-anchor="middle" font-family="system-ui, 'Noto Sans CJK SC'">微调 ⭐</text>
  <text x="290" y="105" font-size="10" font-weight="600" fill="#1C1B1F" font-family="system-ui, 'Noto Sans CJK SC'">何时 :</text>
  <text x="290" y="120" font-size="10" fill="#49454F" font-family="system-ui, 'Noto Sans CJK SC'">• 500+ 个样本</text>
  <text x="290" y="135" font-size="10" fill="#49454F" font-family="system-ui, 'Noto Sans CJK SC'">• 领域专业知识</text>
  <text x="290" y="150" font-size="10" fill="#49454F" font-family="system-ui, 'Noto Sans CJK SC'">• 预算 <$500</text>
  <text x="290" y="170" font-size="10" font-weight="600" fill="#1C1B1F" font-family="system-ui, 'Noto Sans CJK SC'">成本 : $100–500</text>
  <text x="290" y="187" font-size="10" font-weight="600" fill="#1C1B1F" font-family="system-ui, 'Noto Sans CJK SC'">速度 : 1–4 小时</text>
  <text x="290" y="204" font-size="10" font-weight="600" fill="#1C1B1F" font-family="system-ui, 'Noto Sans CJK SC'">成功率 :</text>
  <text x="290" y="219" font-size="10" fill="#49454F" font-family="system-ui, 'Noto Sans CJK SC'">+5–15% 精度</text>
  <text x="290" y="234" font-size="10" fill="#49454F" font-family="system-ui, 'Noto Sans CJK SC'">领域特定</text>
  <text x="290" y="249" font-size="10" fill="#49454F" font-family="system-ui, 'Noto Sans CJK SC'">任务</text>
  <rect x="512" y="55" width="260" height="270" rx="6" fill="#FFFFFF" stroke="#F4B400" stroke-width="2" filter="url(#shadow)"/>
  <rect x="512" y="55" width="260" height="4" rx="0" fill="#F4B400"/>
  <text x="642" y="82" font-size="12" font-weight="700" fill="#F4B400" text-anchor="middle" font-family="system-ui, 'Noto Sans CJK SC'">预训练（罕见）</text>
  <text x="532" y="105" font-size="10" font-weight="600" fill="#1C1B1F" font-family="system-ui, 'Noto Sans CJK SC'">何时 :</text>
  <text x="532" y="120" font-size="10" fill="#49454F" font-family="system-ui, 'Noto Sans CJK SC'">• 100B+ 令牌</text>
  <text x="532" y="135" font-size="10" fill="#49454F" font-family="system-ui, 'Noto Sans CJK SC'">• 预算 >$50K</text>
  <text x="532" y="150" font-size="10" fill="#49454F" font-family="system-ui, 'Noto Sans CJK SC'">• 专有企业模型</text>
  <text x="532" y="170" font-size="10" font-weight="600" fill="#1C1B1F" font-family="system-ui, 'Noto Sans CJK SC'">成本 : $50K–500K</text>
  <text x="532" y="187" font-size="10" font-weight="600" fill="#1C1B1F" font-family="system-ui, 'Noto Sans CJK SC'">速度 : 周–月</text>
  <text x="532" y="204" font-size="10" font-weight="600" fill="#1C1B1F" font-family="system-ui, 'Noto Sans CJK SC'">最适合 :</text>
  <text x="532" y="219" font-size="10" fill="#49454F" font-family="system-ui, 'Noto Sans CJK SC'">竞争优势、</text>
  <text x="532" y="234" font-size="10" fill="#49454F" font-family="system-ui, 'Noto Sans CJK SC'">大型企业、</text>
  <text x="532" y="249" font-size="10" fill="#49454F" font-family="system-ui, 'Noto Sans CJK SC'">VC 融资</text>
  <text x="400" y="330" font-size="9" font-weight="600" fill="#79747E" text-anchor="middle" font-family="system-ui, 'Noto Sans CJK SC'">建议 : 从微调 (1–4 小时) 开始。如果精度不足，考虑预训练。</text>
<text x="792" y="345" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>
