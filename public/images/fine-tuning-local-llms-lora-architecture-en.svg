<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="28" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">LoRA Architecture: Adapters + Frozen Weights</text>

  <!-- Left section: Base Model -->
  <text x="120" y="70" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#49454F" text-anchor="middle">Base Model (Frozen)</text>
  <rect x="40" y="85" width="160" height="200" rx="6" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1.5"/>

  <!-- Base model layers -->
  <rect x="55" y="100" width="130" height="25" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1"/>
  <text x="120" y="118" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Layer 1</text>

  <rect x="55" y="135" width="130" height="25" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1"/>
  <text x="120" y="153" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Layer 2</text>

  <rect x="55" y="170" width="130" height="25" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1"/>
  <text x="120" y="188" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">...</text>

  <rect x="55" y="205" width="130" height="25" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1"/>
  <text x="120" y="223" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Layer N</text>

  <text x="120" y="280" font-family="system-ui, sans-serif" font-size="10" fill="#79747E" text-anchor="middle">13B parameters</text>
  <text x="120" y="295" font-family="system-ui, sans-serif" font-size="10" fill="#79747E" text-anchor="middle">(frozen, no training)</text>

  <!-- Center: Plus symbol -->
  <text x="400" y="200" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#6750A4" text-anchor="middle">+</text>

  <!-- Right section: LoRA Adapters -->
  <text x="680" y="70" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6750A4" text-anchor="middle">LoRA Adapters (Trainable)</text>
  <rect x="600" y="85" width="160" height="200" rx="6" fill="#E8DEF8" stroke="#6750A4" stroke-width="2"/>

  <!-- Adapter layers -->
  <rect x="615" y="100" width="130" height="25" fill="#6750A4" stroke="none"/>
  <text x="680" y="118" font-family="system-ui, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="600">Adapter 1</text>

  <rect x="615" y="135" width="130" height="25" fill="#6750A4" stroke="none"/>
  <text x="680" y="153" font-family="system-ui, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="600">Adapter 2</text>

  <rect x="615" y="170" width="130" height="25" fill="#6750A4" stroke="none"/>
  <text x="680" y="188" font-family="system-ui, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="600">...</text>

  <rect x="615" y="205" width="130" height="25" fill="#6750A4" stroke="none"/>
  <text x="680" y="223" font-family="system-ui, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="600">Adapter N</text>

  <text x="680" y="280" font-family="system-ui, sans-serif" font-size="10" fill="#6750A4" text-anchor="middle" font-weight="600">50M parameters</text>
  <text x="680" y="295" font-family="system-ui, sans-serif" font-size="10" fill="#6750A4" text-anchor="middle" font-weight="600">(0.4% of base)</text>

  <!-- Equals and Result -->
  <text x="400" y="330" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F" text-anchor="middle">= Fine-tuned model (merged at inference)</text>
</svg>