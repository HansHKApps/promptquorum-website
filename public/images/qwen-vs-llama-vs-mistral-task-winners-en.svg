<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="800" height="340" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="28" font-size="19" font-weight="700" fill="#1C1B1F" text-anchor="middle">Which Model Family Wins by Task?</text>

  <!-- Header row background -->
  <rect x="20" y="38" width="760" height="24" rx="4" fill="#F7F2FA"/>

  <!-- Header labels -->
  <text x="30" y="54" font-size="12" font-weight="700" fill="#6750A4">TASK</text>
  <text x="430" y="54" font-size="12" font-weight="700" fill="#6750A4" text-anchor="middle">WINNER</text>
  <text x="570" y="54" font-size="12" font-weight="700" fill="#6750A4">WHY</text>

  <!-- Divider after header -->
  <line x1="20" y1="62" x2="780" y2="62" stroke="#E8DEF8" stroke-width="1.5"/>

  <!-- Row 1: Python / JS Coding | Qwen2.5 (violet) -->
  <text x="30" y="86" font-size="13" font-weight="600" fill="#1C1B1F">Python / JS Coding</text>
  <rect x="365" y="70" width="130" height="22" rx="11" fill="#E8DEF8" stroke="#6750A4" stroke-width="1.5"/>
  <text x="430" y="85" font-size="12" font-weight="700" fill="#6750A4" text-anchor="middle">Qwen2.5</text>
  <text x="520" y="86" font-size="12" fill="#49454F">87% HumanEval at 72B — best at every size</text>
  <line x1="20" y1="99" x2="780" y2="99" stroke="#E8DEF8" stroke-width="0.5"/>

  <!-- Row 2: General Q&A (English) | Tied: Llama / Qwen (rose) -->
  <text x="30" y="122" font-size="13" font-weight="600" fill="#1C1B1F">General Q&amp;A (English)</text>
  <rect x="365" y="106" width="130" height="22" rx="11" fill="#F7EDEF" stroke="#7D5260" stroke-width="1.5"/>
  <text x="430" y="121" font-size="12" font-weight="700" fill="#7D5260" text-anchor="middle">Tied: Llama / Qwen</text>
  <text x="520" y="122" font-size="12" fill="#49454F">Both score 82–84% MMLU at 70B</text>
  <line x1="20" y1="135" x2="780" y2="135" stroke="#E8DEF8" stroke-width="0.5"/>

  <!-- Row 3: Mathematical Reasoning | Qwen2.5 (violet) -->
  <text x="30" y="158" font-size="13" font-weight="600" fill="#1C1B1F">Mathematical Reasoning</text>
  <rect x="365" y="142" width="130" height="22" rx="11" fill="#E8DEF8" stroke="#6750A4" stroke-width="1.5"/>
  <text x="430" y="157" font-size="12" font-weight="700" fill="#6750A4" text-anchor="middle">Qwen2.5</text>
  <text x="520" y="158" font-size="12" fill="#49454F">83% MATH vs 77% Llama 3.3 70B</text>
  <line x1="20" y1="171" x2="780" y2="171" stroke="#E8DEF8" stroke-width="0.5"/>

  <!-- Row 4: Non-English Languages | Qwen2.5 (violet) -->
  <text x="30" y="194" font-size="13" font-weight="600" fill="#1C1B1F">Non-English Languages</text>
  <rect x="365" y="178" width="130" height="22" rx="11" fill="#E8DEF8" stroke="#6750A4" stroke-width="1.5"/>
  <text x="430" y="193" font-size="12" font-weight="700" fill="#6750A4" text-anchor="middle">Qwen2.5</text>
  <text x="520" y="194" font-size="12" fill="#49454F">29 native languages; others English-primary</text>
  <line x1="20" y1="207" x2="780" y2="207" stroke="#E8DEF8" stroke-width="0.5"/>

  <!-- Row 5: Creative Writing (English) | Llama 3.x (rose) -->
  <text x="30" y="230" font-size="13" font-weight="600" fill="#1C1B1F">Creative Writing (English)</text>
  <rect x="365" y="214" width="130" height="22" rx="11" fill="#F7EDEF" stroke="#7D5260" stroke-width="1.5"/>
  <text x="430" y="229" font-size="12" font-weight="700" fill="#7D5260" text-anchor="middle">Llama 3.x</text>
  <text x="520" y="230" font-size="12" fill="#49454F">More natural English generation style</text>
  <line x1="20" y1="243" x2="780" y2="243" stroke="#E8DEF8" stroke-width="0.5"/>

  <!-- Row 6: Quality on 16 GB RAM | Mistral Small 3.1 (muted) -->
  <text x="30" y="266" font-size="13" font-weight="600" fill="#1C1B1F">Quality on 16 GB RAM</text>
  <rect x="365" y="250" width="130" height="22" rx="11" fill="#F4F4F4" stroke="#79747E" stroke-width="1.5"/>
  <text x="430" y="265" font-size="12" font-weight="700" fill="#79747E" text-anchor="middle">Mistral Small 3.1</text>
  <text x="520" y="266" font-size="12" fill="#49454F">79% MMLU at only 14 GB RAM</text>
  <line x1="20" y1="279" x2="780" y2="279" stroke="#E8DEF8" stroke-width="0.5"/>

  <!-- Row 7: First Beginner Model | Llama 3.2 3B (rose) -->
  <text x="30" y="302" font-size="13" font-weight="600" fill="#1C1B1F">First Beginner Model</text>
  <rect x="365" y="286" width="130" height="22" rx="11" fill="#F7EDEF" stroke="#7D5260" stroke-width="1.5"/>
  <text x="430" y="301" font-size="12" font-weight="700" fill="#7D5260" text-anchor="middle">Llama 3.2 3B</text>
  <text x="520" y="302" font-size="12" fill="#49454F">Best documented, widest community support</text>
  <line x1="20" y1="315" x2="780" y2="315" stroke="#E8DEF8" stroke-width="0.5"/>

  <!-- Footer -->
  <text x="400" y="330" font-size="11" fill="#79747E" text-anchor="middle">Benchmark data: April 2026 | All models run locally via Ollama</text>
</svg>
