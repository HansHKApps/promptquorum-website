<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 310" width="800" height="310">
  <rect width="800" height="310" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="28" font-size="19" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, sans-serif">Mehrsprachige Unterstützung: Qwen2.5 vs. Llama vs. Mistral</text>
  <!-- Subtitle -->
  <text x="400" y="50" font-size="13" fill="#49454F" text-anchor="middle" font-family="system-ui, sans-serif">Wählen Sie Qwen2.5 für nicht-englische Workloads; Llama oder Mistral für englischsprachige Anwendungsfälle</text>

  <!-- Left box -->
  <rect x="20" y="65" width="370" height="215" rx="10" fill="#F7F2FA" stroke="#6750A4" stroke-width="2"/>

  <!-- Left header badge -->
  <rect x="30" y="75" width="200" height="26" rx="13" fill="#6750A4"/>
  <text x="130" y="93" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700" font-family="system-ui, sans-serif">Qwen2.5</text>

  <!-- Big number -->
  <text x="110" y="160" font-size="52" font-weight="700" fill="#6750A4" text-anchor="middle" font-family="system-ui, sans-serif">29</text>
  <!-- Label -->
  <text x="110" y="182" font-size="13" fill="#49454F" text-anchor="middle" font-family="system-ui, sans-serif">native Sprachen</text>

  <!-- Language examples -->
  <text x="30" y="205" font-size="12" fill="#49454F" font-family="system-ui, sans-serif">Chinesisch, Japanisch, Koreanisch, Arabisch,</text>
  <text x="30" y="222" font-size="12" fill="#49454F" font-family="system-ui, sans-serif">Deutsch, Französisch, Spanisch, Russisch,</text>
  <text x="30" y="239" font-size="12" fill="#49454F" font-family="system-ui, sans-serif">Hindi, Portugiesisch + 19 weitere</text>

  <!-- Left bottom note -->
  <text x="30" y="265" font-size="11" fill="#79747E" font-family="system-ui, sans-serif">Apache 2.0 Lizenz · 128K Kontext · JSON-Modus</text>

  <!-- Right box -->
  <rect x="410" y="65" width="370" height="215" rx="10" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="2"/>

  <!-- Right header badge -->
  <rect x="420" y="75" width="200" height="26" rx="13" fill="#E8DEF8" stroke="#79747E" stroke-width="1"/>
  <text x="520" y="93" text-anchor="middle" fill="#49454F" font-size="13" font-weight="700" font-family="system-ui, sans-serif">Llama 3.x + Mistral</text>

  <!-- English-Primary label -->
  <text x="595" y="135" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, sans-serif">Englisch-Primär</text>

  <!-- Description lines -->
  <text x="420" y="162" font-size="12" fill="#49454F" font-family="system-ui, sans-serif">Llama 3.x: Starkes englisches Reasoning, kreatives</text>
  <text x="420" y="182" font-size="12" fill="#49454F" font-family="system-ui, sans-serif">Schreiben, Instruktions-Befolgung</text>
  <text x="420" y="208" font-size="12" fill="#49454F" font-family="system-ui, sans-serif">Mistral: Bestes Qualitäts/RAM-Verhältnis, DSGVO-konform</text>
  <text x="420" y="228" font-size="12" fill="#49454F" font-family="system-ui, sans-serif">(Europäisches Unternehmen)</text>

  <!-- Right bottom note -->
  <text x="420" y="265" font-size="11" fill="#79747E" font-family="system-ui, sans-serif">Nicht-Englisch: nur Basisunterstützung, nicht nativ</text>

  <!-- Footer -->
  <text x="400" y="296" font-size="11" fill="#79747E" text-anchor="middle" font-family="system-ui, sans-serif">Qwen2.5 Sprachenliste: Alibaba Model Card (April 2026)</text>
</svg>
