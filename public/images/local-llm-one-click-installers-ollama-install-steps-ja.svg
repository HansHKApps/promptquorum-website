<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
<rect width="800" height="300" fill="#FFFFFF"/>
<text x="400" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1C1B1F" text-anchor="middle">Ollamaのインストール — 3ステップ</text>
<line x1="18" y1="42" x2="782" y2="42" stroke="#E8DEF8" stroke-width="1.5"/>
<text x="280" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#6750A4" text-anchor="middle">→</text>
<text x="520" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#6750A4" text-anchor="middle">→</text>
<circle cx="160" cy="100" r="28" fill="#6750A4"/>
<text x="160" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
<text x="160" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">ollama.comへアクセス</text>
<text x="160" y="173" font-family="'SF Mono', Monaco, monospace" font-size="11" font-weight="700" fill="#6750A4" text-anchor="middle">ollama.com/download</text>
<text x="160" y="189" font-family="'SF Mono', Monaco, monospace" font-size="10" font-weight="700" fill="#79747E" text-anchor="middle">.pkg / .exeをダウンロード</text>
<circle cx="400" cy="100" r="28" fill="#6750A4"/>
<text x="400" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
<text x="400" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">インストーラー実行</text>
<text x="400" y="173" font-family="'SF Mono', Monaco, monospace" font-size="11" font-weight="700" fill="#6750A4" text-anchor="middle">インストーラーをダブルクリック</text>
<text x="400" y="189" font-family="'SF Mono', Monaco, monospace" font-size="10" font-weight="700" fill="#79747E" text-anchor="middle">依存関係は不要</text>
<circle cx="640" cy="100" r="28" fill="#6750A4"/>
<text x="640" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
<text x="640" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">モデルを実行</text>
<text x="640" y="173" font-family="'SF Mono', Monaco, monospace" font-size="11" font-weight="700" fill="#6750A4" text-anchor="middle">ollama run llama3.2</text>
<text x="640" y="189" font-family="'SF Mono', Monaco, monospace" font-size="10" font-weight="700" fill="#79747E" text-anchor="middle">ターミナル / PowerShell</text>
<rect x="18" y="220" width="764" height="36" rx="6" fill="#F7F2FA"/>
<text x="400" y="243" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#49454F" text-anchor="middle">Ollamaはバックグラウンドサービスとしてインストール。GUI不要。localhost:11434でAPI提供。</text>
<text x="792" y="295" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>
