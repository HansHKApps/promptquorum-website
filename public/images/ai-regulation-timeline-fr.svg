<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="480" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="450" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Chronologie de la Régulation IA: 2022–2026
  </text>

  <!-- Center timeline line -->
  <line x1="80" y1="280" x2="870" y2="280" stroke="#E8DEF8" stroke-width="3"/>

  <!-- Year markers -->
  <text x="130" y="320" font-family="system-ui, sans-serif" font-size="14" fill="#49454F" text-anchor="middle" font-weight="700">2022</text>
  <circle cx="130" cy="280" r="6" fill="#6750A4"/>

  <text x="260" y="320" font-family="system-ui, sans-serif" font-size="14" fill="#49454F" text-anchor="middle" font-weight="700">2023</text>
  <circle cx="260" cy="280" r="6" fill="#6750A4"/>

  <text x="390" y="320" font-family="system-ui, sans-serif" font-size="14" fill="#49454F" text-anchor="middle" font-weight="700">2024</text>
  <circle cx="390" cy="280" r="6" fill="#6750A4"/>

  <text x="520" y="320" font-family="system-ui, sans-serif" font-size="14" fill="#49454F" text-anchor="middle" font-weight="700">2025</text>
  <circle cx="520" cy="280" r="6" fill="#6750A4"/>

  <text x="650" y="320" font-family="system-ui, sans-serif" font-size="14" fill="#49454F" text-anchor="middle" font-weight="700">2026</text>
  <circle cx="650" cy="280" r="6" fill="#6750A4"/>

  <!-- 2022 Events -->
  <!-- EU -->
  <g>
    <line x1="130" y1="280" x2="100" y2="180" stroke="#6750A4" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="20" y="90" width="160" height="85" rx="6" fill="#EDE7F6" stroke="#6750A4" stroke-width="1.5"/>
    <text x="100" y="110" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" text-anchor="middle" font-weight="700">Loi UE sur l'IA</text>
    <text x="100" y="127" font-family="system-ui, sans-serif" font-size="10" fill="#1C1B1F" text-anchor="middle" font-weight="600">Proposée</text>
    <text x="100" y="141" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle" font-weight="500">Cadre basé sur</text>
    <text x="100" y="153" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle" font-weight="500">le risque</text>
  </g>

  <!-- US -->
  <g>
    <line x1="130" y1="280" x2="160" y2="380" stroke="#6750A4" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="100" y="385" width="120" height="80" rx="6" fill="#EDE7F6" stroke="#6750A4" stroke-width="1.5"/>
    <text x="160" y="403" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" text-anchor="middle" font-weight="700">Décret Biden</text>
    <text x="160" y="420" font-family="system-ui, sans-serif" font-size="10" fill="#1C1B1F" text-anchor="middle" font-weight="600">Décret exécutif</text>
    <text x="160" y="435" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle" font-weight="500">sur la sécurité IA</text>
  </g>

  <!-- 2023 Events -->
  <!-- EU -->
  <g>
    <line x1="260" y1="280" x2="230" y2="180" stroke="#6750A4" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="150" y="90" width="160" height="85" rx="6" fill="#EDE7F6" stroke="#6750A4" stroke-width="1.5"/>
    <text x="230" y="110" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" text-anchor="middle" font-weight="700">Loi IA</text>
    <text x="230" y="127" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" text-anchor="middle" font-weight="700">Négociée</text>
    <text x="230" y="141" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle" font-weight="500">Accord final sur</text>
    <text x="230" y="153" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle" font-weight="500">les règles</text>
  </g>

  <!-- China -->
  <g>
    <line x1="260" y1="280" x2="290" y2="380" stroke="#7D5260" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="230" y="385" width="120" height="80" rx="6" fill="#F7F2FA" stroke="#7D5260" stroke-width="1.5"/>
    <text x="290" y="403" font-family="system-ui, sans-serif" font-size="12" fill="#7D5260" text-anchor="middle" font-weight="700">Règles CAC</text>
    <text x="290" y="420" font-family="system-ui, sans-serif" font-size="10" fill="#1C1B1F" text-anchor="middle" font-weight="600">Régulation des</text>
    <text x="290" y="435" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle" font-weight="500">algorithmes</text>
  </g>

  <!-- 2024 Events -->
  <!-- EU -->
  <g>
    <line x1="390" y1="280" x2="360" y2="180" stroke="#6750A4" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="280" y="90" width="160" height="85" rx="6" fill="#E8DEF8" stroke="#6750A4" stroke-width="2.5"/>
    <text x="360" y="110" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" text-anchor="middle" font-weight="700">🎯 Loi IA UE</text>
    <text x="360" y="127" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" text-anchor="middle" font-weight="700">Officiellement adoptée</text>
    <text x="360" y="141" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle" font-weight="500">Application débute</text>
    <text x="360" y="153" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle" font-weight="500">janv 2025+</text>
  </g>

  <!-- US -->
  <g>
    <line x1="390" y1="280" x2="420" y2="380" stroke="#6750A4" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="360" y="385" width="120" height="80" rx="6" fill="#EDE7F6" stroke="#6750A4" stroke-width="1.5"/>
    <text x="420" y="403" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" text-anchor="middle" font-weight="700">NIST RMF</text>
    <text x="420" y="420" font-family="system-ui, sans-serif" font-size="10" fill="#1C1B1F" text-anchor="middle" font-weight="600">Version 1.1 Sortie</text>
    <text x="420" y="435" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle" font-weight="500">Cadre volontaire</text>
  </g>

  <!-- 2025 Events -->
  <!-- EU -->
  <g>
    <line x1="520" y1="280" x2="490" y2="180" stroke="#6750A4" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="410" y="90" width="160" height="85" rx="6" fill="#E8DEF8" stroke="#6750A4" stroke-width="2.5"/>
    <text x="490" y="110" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" text-anchor="middle" font-weight="700">🎯 Application</text>
    <text x="490" y="127" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" text-anchor="middle" font-weight="700">Phase-in débute</text>
    <text x="490" y="141" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle" font-weight="500">L'IA interdite bannie</text>
    <text x="490" y="153" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle" font-weight="500">Janv 2025</text>
  </g>

  <!-- China -->
  <g>
    <line x1="520" y1="280" x2="550" y2="380" stroke="#7D5260" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="490" y="385" width="120" height="80" rx="6" fill="#F7F2FA" stroke="#7D5260" stroke-width="1.5"/>
    <text x="550" y="403" font-family="system-ui, sans-serif" font-size="12" fill="#7D5260" text-anchor="middle" font-weight="700">Règles LLM</text>
    <text x="550" y="420" font-family="system-ui, sans-serif" font-size="10" fill="#1C1B1F" text-anchor="middle" font-weight="600">Resserrement</text>
    <text x="550" y="435" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle" font-weight="500">Contrôles renforcés</text>
  </g>

  <!-- 2026 Events -->
  <!-- US -->
  <g>
    <line x1="650" y1="280" x2="680" y2="380" stroke="#6750A4" stroke-width="1.5" stroke-dasharray="3,3"/>
    <rect x="620" y="385" width="120" height="80" rx="6" fill="#EDE7F6" stroke="#6750A4" stroke-width="1.5"/>
    <text x="680" y="403" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" text-anchor="middle" font-weight="700">Possible</text>
    <text x="680" y="420" font-family="system-ui, sans-serif" font-size="10" fill="#1C1B1F" text-anchor="middle" font-weight="600">Loi IA en débat</text>
    <text x="680" y="435" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle" font-weight="500">Toujours incertain</text>
  </g>

  <!-- Bottom legend -->
  <rect x="80" y="450" width="740" height="20" rx="4" fill="#F7F2FA"/>
  <text x="90" y="464" font-family="system-ui, sans-serif" font-size="12" fill="#49454F" font-weight="600">
    🇪🇺 UE menace avec règles prescriptives | 🇺🇸 US approche sectoriel + volontaire | 🇨🇳 Chine impose contrôle d'État
  </text>
</svg>
