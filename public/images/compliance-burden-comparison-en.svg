<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="480" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="450" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Compliance Burden: Cost, Complexity &amp; Timeline
  </text>

  <!-- Legend -->
  <rect x="280" y="50" width="340" height="25" rx="4" fill="#FEF7FF" stroke="#6750A4" stroke-width="1"/>
  <text x="300" y="67" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" font-weight="700">
    For a company deploying generative AI globally
  </text>

  <!-- EU Compliance (Left column) -->
  <g id="eu-compliance">
    <!-- Header -->
    <rect x="50" y="100" width="220" height="35" rx="6" fill="#EDE7F6" stroke="#6750A4" stroke-width="2.5"/>
    <text x="160" y="123" font-family="system-ui, sans-serif" font-size="16" fill="#6750A4" text-anchor="middle" font-weight="700">
      🇪🇺 EU Compliance
    </text>

    <!-- Cost -->
    <rect x="50" y="150" width="220" height="70" rx="6" fill="#F7F2FA" stroke="#6750A4" stroke-width="1.5"/>
    <text x="60" y="172" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Estimated Cost:</text>
    <text x="60" y="191" font-family="system-ui, sans-serif" font-size="14" fill="#6750A4" font-weight="700">$500K – $2M+</text>
    <text x="60" y="208" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" font-weight="500">Legal, tech compliance,</text>
    <text x="60" y="221" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" font-weight="500">audit, governance team</text>

    <!-- Complexity -->
    <rect x="50" y="235" width="220" height="70" rx="6" fill="#F7F2FA" stroke="#6750A4" stroke-width="1.5"/>
    <text x="60" y="257" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Complexity:</text>
    <text x="60" y="276" font-family="system-ui, sans-serif" font-size="14" fill="#6750A4" font-weight="700">Very High 🔴</text>
    <text x="60" y="293" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" font-weight="500">Prescriptive rules,</text>
    <text x="60" y="306" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" font-weight="500">technical standards</text>

    <!-- Timeline -->
    <rect x="50" y="320" width="220" height="70" rx="6" fill="#F7F2FA" stroke="#6750A4" stroke-width="1.5"/>
    <text x="60" y="342" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Timeline:</text>
    <text x="60" y="361" font-family="system-ui, sans-serif" font-size="14" fill="#6750A4" font-weight="700">6–12 months</text>
    <text x="60" y="378" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" font-weight="500">Phase-in already underway</text>
    <text x="60" y="391" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" font-weight="500">(Jan 2025 enforcement)</text>

    <!-- Note -->
    <rect x="50" y="405" width="220" height="45" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5"/>
    <text x="160" y="420" font-family="system-ui, sans-serif" font-size="12" fill="#D32F2F" text-anchor="middle" font-weight="700">Risk</text>
    <text x="160" y="437" font-family="system-ui, sans-serif" font-size="11" fill="#1C1B1F" text-anchor="middle" font-weight="500">Non-compliance: €35M fines</text>
  </g>

  <!-- US Compliance (Center column) -->
  <g id="us-compliance">
    <!-- Header -->
    <rect x="340" y="100" width="220" height="35" rx="6" fill="#EDE7F6" stroke="#6750A4" stroke-width="2.5"/>
    <text x="450" y="123" font-family="system-ui, sans-serif" font-size="16" fill="#6750A4" text-anchor="middle" font-weight="700">
      🇺🇸 US Compliance
    </text>

    <!-- Cost -->
    <rect x="340" y="150" width="220" height="70" rx="6" fill="#F7F2FA" stroke="#6750A4" stroke-width="1.5"/>
    <text x="350" y="172" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Estimated Cost:</text>
    <text x="350" y="191" font-family="system-ui, sans-serif" font-size="14" fill="#6750A4" font-weight="700">$50K – $300K</text>
    <text x="350" y="208" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" font-weight="500">NIST RMF adoption,</text>
    <text x="350" y="221" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" font-weight="500">sector-specific legal review</text>

    <!-- Complexity -->
    <rect x="340" y="235" width="220" height="70" rx="6" fill="#F7F2FA" stroke="#6750A4" stroke-width="1.5"/>
    <text x="350" y="257" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Complexity:</text>
    <text x="350" y="276" font-family="system-ui, sans-serif" font-size="14" fill="#6750A4" font-weight="700">Medium 🟡</text>
    <text x="350" y="293" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" font-weight="500">Voluntary frameworks,</text>
    <text x="350" y="306" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" font-weight="500">no single standard</text>

    <!-- Timeline -->
    <rect x="340" y="320" width="220" height="70" rx="6" fill="#F7F2FA" stroke="#6750A4" stroke-width="1.5"/>
    <text x="350" y="342" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Timeline:</text>
    <text x="350" y="361" font-family="system-ui, sans-serif" font-size="14" fill="#6750A4" font-weight="700">2–4 months</text>
    <text x="350" y="378" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" font-weight="500">No hard deadline,</text>
    <text x="350" y="391" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" font-weight="500">ongoing monitoring</text>

    <!-- Note -->
    <rect x="340" y="405" width="220" height="45" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
    <text x="450" y="420" font-family="system-ui, sans-serif" font-size="12" fill="#388E3C" text-anchor="middle" font-weight="700">Upside</text>
    <text x="450" y="437" font-family="system-ui, sans-serif" font-size="11" fill="#1C1B1F" text-anchor="middle" font-weight="500">Light touch, innovation-friendly</text>
  </g>

  <!-- China Compliance (Right column) -->
  <g id="china-compliance">
    <!-- Header -->
    <rect x="630" y="100" width="220" height="35" rx="6" fill="#F7F2FA" stroke="#7D5260" stroke-width="2.5"/>
    <text x="740" y="123" font-family="system-ui, sans-serif" font-size="16" fill="#7D5260" text-anchor="middle" font-weight="700">
      🇨🇳 China Compliance
    </text>

    <!-- Cost -->
    <rect x="630" y="150" width="220" height="70" rx="6" fill="#F7F2FA" stroke="#7D5260" stroke-width="1.5"/>
    <text x="640" y="172" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Estimated Cost:</text>
    <text x="640" y="191" font-family="system-ui, sans-serif" font-size="14" fill="#7D5260" font-weight="700">$200K – $1M+</text>
    <text x="640" y="208" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" font-weight="500">Approval process, gov't</text>
    <text x="640" y="221" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" font-weight="500">relations, compliance staff</text>

    <!-- Complexity -->
    <rect x="630" y="235" width="220" height="70" rx="6" fill="#F7F2FA" stroke="#7D5260" stroke-width="1.5"/>
    <text x="640" y="257" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Complexity:</text>
    <text x="640" y="276" font-family="system-ui, sans-serif" font-size="14" fill="#7D5260" font-weight="700">Very High 🔴</text>
    <text x="640" y="293" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" font-weight="500">CAC approval required,</text>
    <text x="640" y="306" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" font-weight="500">opaque standards</text>

    <!-- Timeline -->
    <rect x="630" y="320" width="220" height="70" rx="6" fill="#F7F2FA" stroke="#7D5260" stroke-width="1.5"/>
    <text x="640" y="342" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Timeline:</text>
    <text x="640" y="361" font-family="system-ui, sans-serif" font-size="14" fill="#7D5260" font-weight="700">3–12+ months</text>
    <text x="640" y="378" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" font-weight="500">Approval uncertain,</text>
    <text x="640" y="391" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" font-weight="500">no guarantee</text>

    <!-- Note -->
    <rect x="630" y="405" width="220" height="45" rx="6" fill="#F7F2FA" stroke="#7D5260" stroke-width="1.5"/>
    <text x="740" y="420" font-family="system-ui, sans-serif" font-size="12" fill="#7D5260" text-anchor="middle" font-weight="700">Risk</text>
    <text x="740" y="437" font-family="system-ui, sans-serif" font-size="11" fill="#1C1B1F" text-anchor="middle" font-weight="500">Denial possible, ongoing rules</text>
  </g>
</svg>
