<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <metadata>
    <dc:title xmlns:dc="http://purl.org/dc/elements/1.1/">Team LLM Architecture Comparison</dc:title>
    <dc:creator>PromptQuorum</dc:creator>
    <dc:rights>© PromptQuorum 2026</dc:rights>
    <dc:source>https://www.promptquorum.com/local-llms/local-llm-setup-for-teams</dc:source>
  </metadata>

  <rect width="900" height="500" fill="#FFFFFF"/>

  <text x="450" y="35" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#1C1B1F" text-anchor="middle">Team LLM Server Architecture Options</text>

  <!-- LEFT SIDE: Single Server -->
  <rect x="40" y="70" width="380" height="400" rx="8" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="2"/>

  <text x="230" y="105" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#6750A4" text-anchor="middle">Single Server (5-10 users)</text>
  <text x="230" y="130" font-family="system-ui, sans-serif" font-size="13" fill="#49454F" text-anchor="middle">Simple • Single Point of Failure</text>

  <!-- Single Server Components -->
  <rect x="110" y="160" width="240" height="60" rx="4" fill="#FFFFFF" stroke="#6750A4" stroke-width="2"/>
  <text x="230" y="180" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6750A4" text-anchor="middle">Client Requests</text>
  <text x="230" y="200" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">HTTP API</text>

  <path d="M 230 220 L 230 260" stroke="#6750A4" stroke-width="2" fill="none"/>

  <rect x="110" y="260" width="240" height="60" rx="4" fill="#FFFFFF" stroke="#6750A4" stroke-width="2"/>
  <text x="230" y="280" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6750A4" text-anchor="middle">nginx (Load Balancer)</text>
  <text x="230" y="300" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Token Auth</text>

  <path d="M 230 320 L 230 360" stroke="#6750A4" stroke-width="2" fill="none"/>

  <rect x="80" y="360" width="300" height="80" rx="4" fill="#FFF8E1" stroke="#F4B400" stroke-width="2"/>
  <text x="230" y="385" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F57F17" text-anchor="middle">1× RTX 4090 (24GB)</text>
  <text x="230" y="405" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">vLLM + Llama 3.3 70B</text>
  <text x="230" y="425" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#F57F17" text-anchor="middle">Cost: $2,500 + $50/mo</text>

  <!-- RIGHT SIDE: Dual-GPU Cluster -->
  <rect x="480" y="70" width="380" height="400" rx="8" fill="#E8F5E9" stroke="#34A853" stroke-width="2"/>

  <text x="670" y="105" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#34A853" text-anchor="middle">Dual-GPU Cluster (10-50 users)</text>
  <text x="670" y="130" font-family="system-ui, sans-serif" font-size="13" fill="#49454F" text-anchor="middle">Resilient • Automatic Failover</text>

  <!-- Dual-GPU Components -->
  <rect x="550" y="160" width="240" height="60" rx="4" fill="#FFFFFF" stroke="#34A853" stroke-width="2"/>
  <text x="670" y="180" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#34A853" text-anchor="middle">Client Requests</text>
  <text x="670" y="200" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">HTTP API</text>

  <path d="M 670 220 L 670 260" stroke="#34A853" stroke-width="2" fill="none"/>

  <rect x="550" y="260" width="240" height="60" rx="4" fill="#FFFFFF" stroke="#34A853" stroke-width="2"/>
  <text x="670" y="280" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#34A853" text-anchor="middle">nginx Load Balancer</text>
  <text x="670" y="300" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Health Check • Auto-failover</text>

  <path d="M 600 320 L 560 360" stroke="#34A853" stroke-width="2" fill="none"/>
  <path d="M 740 320 L 780 360" stroke="#34A853" stroke-width="2" fill="none"/>

  <!-- GPU 1 -->
  <rect x="500" y="360" width="140" height="80" rx="4" fill="#FFF8E1" stroke="#F4B400" stroke-width="2"/>
  <text x="570" y="385" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#F57F17" text-anchor="middle">RTX 4090</text>
  <text x="570" y="405" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle">vLLM #1</text>
  <text x="570" y="420" font-family="system-ui, sans-serif" font-size="9" fill="#49454F" text-anchor="middle">(Primary)</text>

  <!-- GPU 2 -->
  <rect x="740" y="360" width="140" height="80" rx="4" fill="#FFF8E1" stroke="#F4B400" stroke-width="2"/>
  <text x="810" y="385" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#F57F17" text-anchor="middle">RTX 4090</text>
  <text x="810" y="405" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle">vLLM #2</text>
  <text x="810" y="420" font-family="system-ui, sans-serif" font-size="9" fill="#49454F" text-anchor="middle">(Failover)</text>

  <rect x="520" y="460" width="280" height="20" rx="3" fill="#E8F5E9"/>
  <text x="660" y="474" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#34A853" text-anchor="middle">Cost: $5,000 + $100/mo</text>

  <text x="830" y="490" font-family="system-ui, sans-serif" font-size="10" fill="#999999" text-anchor="end">promptquorum.com</text>
</svg>