<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#FFFFFF"/>
  <text x="400" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">Comparaison 8GB vs 16GB RAM</text>
  <rect x="50" y="70" width="300" height="280" rx="6" fill="#F7F2FA" stroke="#7D5260" stroke-width="2"/>
  <text x="200" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#7D5260" text-anchor="middle" font-weight="700">8 GB RAM
(7B ralenti)</text>
  <text x="200" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#49454F" text-anchor="middle">Slower tokens/sec</text>
  <rect x="450" y="70" width="300" height="280" rx="6" fill="#E8DEF8" stroke="#6750A4" stroke-width="2"/>
