<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="360" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="28" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">Écart de qualité: scores de benchmarks</text>
  <text x="400" y="47" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">Les modèles locaux 7B marquent 10–20 points de moins en raisonnement et programmation que GPT-4o</text>

  <!-- MMLU (General Knowledge) -->
  <text x="50" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#1C1B1F">MMLU (Connaissance générale)</text>

  <!-- Bar background -->
  <rect x="50" y="95" width="700" height="20" rx="3" fill="#E8DEF8"/>

  <!-- Local 7B bar -->
  <rect x="50" y="95" width="233" height="20" rx="3" fill="#6750A4"/>
  <text x="297" y="112" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Local 7B: 62–68%</text>

  <!-- Local 70B bar -->
  <rect x="50" y="125" width="309" height="20" rx="3" fill="#6750A4"/>
  <text x="373" y="142" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Local 70B: 75–80%</text>

  <!-- GPT-4o bar -->
  <rect x="50" y="155" width="377" height="20" rx="3" fill="#34A853"/>
  <text x="441" y="172" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">GPT-4o: 88.7%</text>

  <line x1="50" y1="185" x2="750" y2="185" stroke="#E8DEF8" stroke-width="1"/>

  <!-- HumanEval (Coding) -->
  <text x="50" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#1C1B1F">HumanEval (Programmation Python)</text>

  <!-- Bar background -->
  <rect x="50" y="230" width="700" height="20" rx="3" fill="#E8DEF8"/>

  <!-- Local 7B bar -->
  <rect x="50" y="230" width="198" height="20" rx="3" fill="#6750A4"/>
  <text x="262" y="247" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Local 7B: 45–55%</text>

  <!-- Local 70B bar -->
  <rect x="50" y="260" width="336" height="20" rx="3" fill="#6750A4"/>
  <text x="400" y="277" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Local 70B: 65–75%</text>

  <!-- GPT-4o bar -->
  <rect x="50" y="290" width="442" height="20" rx="3" fill="#34A853"/>
  <text x="506" y="307" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">GPT-4o: 90.2%</text>

  <!-- Footer -->
  <text x="400" y="348" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79747E" text-anchor="middle">promptquorum.com/local-llms/local-llm-limitations</text>
