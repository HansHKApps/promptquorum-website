<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#FFFFFF"/>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/></filter>
  </defs>

  <text x="400" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">GPU vs CPU Detection</text>

  <line x1="18" y1="40" x2="782" y2="40" stroke="#E8DEF8" stroke-width="1.5"/>

  <!-- Left panel: CPU Only (Problem) -->
  <rect x="28" y="55" width="340" height="280" rx="6" fill="#FFFFFF" stroke="#EA4335" stroke-width="2"/>
  <rect x="28" y="55" width="340" height="4" rx="0" fill="#EA4335"/>

  <text x="198" y="80" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#EA4335" text-anchor="middle">CPU Only (Problem)</text>

  <text x="48" y="110" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Speed:</text>
  <text x="48" y="128" font-family="'SF Mono', Monaco, monospace" font-size="13" font-weight="600" fill="#EA4335">2–8 tokens/sec</text>

  <text x="48" y="155" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">ollama ps:</text>
  <text x="48" y="173" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">SIZE&nbsp;&nbsp;PROCESSOR</text>
  <text x="48" y="189" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#EA4335">3.2B&nbsp;&nbsp;100% CPU</text>

  <text x="48" y="216" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Log shows:</text>
  <text x="48" y="234" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#EA4335">"no GPU detected"</text>

  <text x="48" y="261" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">To fix:</text>
  <text x="48" y="279" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#6750A4">export OLLAMA_GPU_LAYERS=35</text>

  <!-- Right panel: GPU Active (Goal) -->
  <rect x="432" y="55" width="340" height="280" rx="6" fill="#FFFFFF" stroke="#34A853" stroke-width="2"/>
  <rect x="432" y="55" width="340" height="4" rx="0" fill="#34A853"/>

  <text x="602" y="80" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#34A853" text-anchor="middle">GPU Active (Goal)</text>

  <text x="452" y="110" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Speed:</text>
  <text x="452" y="128" font-family="'SF Mono', Monaco, monospace" font-size="13" font-weight="600" fill="#34A853">30–120 tokens/sec</text>

  <text x="452" y="155" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">ollama ps:</text>
  <text x="452" y="173" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">SIZE&nbsp;&nbsp;PROCESSOR</text>
  <text x="452" y="189" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#34A853">3.2B&nbsp;&nbsp;100% GPU</text>

  <text x="452" y="216" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Verify (NVIDIA):</text>
  <text x="452" y="234" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#34A853">nvidia-smi | grep ollama</text>

  <text x="452" y="261" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">macOS:</text>
  <text x="452" y="279" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#34A853">Metal auto-detected</text>

  <line x1="18" y1="340" x2="782" y2="340" stroke="#E8DEF8" stroke-width="1.5"/>

  <text x="400" y="356" font-family="system-ui, sans-serif" font-size="11" fill="#79747E" text-anchor="middle">10× speed difference: GPU acceleration is essential for practical inference. Check with ollama ps or nvidia-smi.</text>
</svg>
