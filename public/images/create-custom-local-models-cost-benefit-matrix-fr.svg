<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="32" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui">
    Quand Fine-tuner vs Pré-entraîner vs RAG
  </text>

  <!-- RAG Box (bottom-left) -->
  <rect x="28" y="55" width="220" height="270" rx="6" fill="#FFFFFF" stroke="#7D5260" stroke-width="2" filter="url(#shadow)"/>
  <rect x="28" y="55" width="220" height="4" rx="0" fill="#7D5260"/>
  <text x="138" y="82" font-size="13" font-weight="700" fill="#7D5260" text-anchor="middle" font-family="system-ui">RAG (Gratuit)</text>
  <text x="48" y="105" font-size="11" font-weight="600" fill="#1C1B1F" font-family="system-ui">Quand :</text>
  <text x="48" y="122" font-size="11" fill="#49454F" font-family="system-ui">• Pas de données</text>
  <text x="48" y="138" font-size="11" fill="#49454F" font-family="system-ui">• Itération rapide</text>
  <text x="48" y="154" font-size="11" fill="#49454F" font-family="system-ui">• Ressources limitées</text>
  <text x="48" y="175" font-size="11" font-weight="600" fill="#1C1B1F" font-family="system-ui">Coût : 0 €</text>
  <text x="48" y="195" font-size="11" font-weight="600" fill="#1C1B1F" font-family="system-ui">Vitesse : Immédiat</text>
  <text x="48" y="215" font-size="11" font-weight="600" fill="#1C1B1F" font-family="system-ui">Limitation :</text>
  <text x="48" y="231" font-size="11" fill="#49454F" font-family="system-ui">Pas d\'apprentissage,</text>
  <text x="48" y="247" font-size="11" fill="#49454F" font-family="system-ui">récupération</text>
  <text x="48" y="263" font-size="11" fill="#49454F" font-family="system-ui">uniquement</text>

  <!-- Fine-Tuning Box (center) -->
  <rect x="270" y="55" width="220" height="270" rx="6" fill="#FFFFFF" stroke="#34A853" stroke-width="2" filter="url(#shadow)"/>
  <rect x="270" y="55" width="220" height="4" rx="0" fill="#34A853"/>
  <text x="380" y="82" font-size="13" font-weight="700" fill="#34A853" text-anchor="middle" font-family="system-ui">Fine-tuning ⭐</text>
  <text x="290" y="105" font-size="11" font-weight="600" fill="#1C1B1F" font-family="system-ui">Quand :</text>
  <text x="290" y="122" font-size="11" fill="#49454F" font-family="system-ui">• 500+ exemples</text>
  <text x="290" y="138" font-size="11" fill="#49454F" font-family="system-ui">• Expertise domaine</text>
  <text x="290" y="154" font-size="11" fill="#49454F" font-family="system-ui">• Budget <500 €</text>
  <text x="290" y="175" font-size="11" font-weight="600" fill="#1C1B1F" font-family="system-ui">Coût : 100–500 €</text>
  <text x="290" y="195" font-size="11" font-weight="600" fill="#1C1B1F" font-family="system-ui">Vitesse : 1–4 heures</text>
  <text x="290" y="215" font-size="11" font-weight="600" fill="#1C1B1F" font-family="system-ui">Taux réussite :</text>
  <text x="290" y="231" font-size="11" fill="#49454F" font-family="system-ui">+5–15 % précision</text>
  <text x="290" y="247" font-size="11" fill="#49454F" font-family="system-ui">sur domaine</text>
  <text x="290" y="263" font-size="11" fill="#49454F" font-family="system-ui">spécifique</text>

  <!-- Pre-Training Box (right) -->
  <rect x="512" y="55" width="260" height="270" rx="6" fill="#FFFFFF" stroke="#F4B400" stroke-width="2" filter="url(#shadow)"/>
  <rect x="512" y="55" width="260" height="4" rx="0" fill="#F4B400"/>
  <text x="642" y="82" font-size="13" font-weight="700" fill="#F4B400" text-anchor="middle" font-family="system-ui">Pré-entraînement (Rare)</text>
  <text x="532" y="105" font-size="11" font-weight="600" fill="#1C1B1F" font-family="system-ui">Quand :</text>
  <text x="532" y="122" font-size="11" fill="#49454F" font-family="system-ui">• 100B+ tokens</text>
  <text x="532" y="138" font-size="11" fill="#49454F" font-family="system-ui">• Budget >50 K€</text>
  <text x="532" y="154" font-size="11" fill="#49454F" font-family="system-ui">• Modèle propriétaire</text>
  <text x="532" y="175" font-size="11" font-weight="600" fill="#1C1B1F" font-family="system-ui">Coût : 50K–500K €</text>
  <text x="532" y="195" font-size="11" font-weight="600" fill="#1C1B1F" font-family="system-ui">Vitesse : Semaines–Mois</text>
  <text x="532" y="215" font-size="11" font-weight="600" fill="#1C1B1F" font-family="system-ui">Idéal pour :</text>
  <text x="532" y="231" font-size="11" fill="#49454F" font-family="system-ui">Avantage compétitif,</text>
  <text x="532" y="247" font-size="11" fill="#49454F" font-family="system-ui">grandes entreprises,</text>
  <text x="532" y="263" font-size="11" fill="#49454F" font-family="system-ui">financements VC</text>

  <!-- Footer -->
  <text x="400" y="330" font-size="10" font-weight="600" fill="#79747E" text-anchor="middle" font-family="system-ui">Recommandé : commencez par fine-tuning (1–4 heures). Si précision insuffisante, considérez pré-entraînement.</text>
<text x="792" y="345" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>