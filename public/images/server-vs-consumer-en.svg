<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="420" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Server-Grade vs Consumer Hardware
  </text>

  <!-- Center divider -->
  <line x1="400" y1="55" x2="400" y2="395" stroke="#E8DEF8" stroke-width="2.5"/>

  <!-- Consumer Side (Left) -->
  <g id="consumer-side">
    <!-- Box -->
    <rect x="40" y="70" width="320" height="300" rx="8" fill="#F7F2FA" stroke="#6750A4" stroke-width="2.5"/>

    <!-- Title -->
    <text x="200" y="105" font-family="system-ui, sans-serif" font-size="20" fill="#6750A4" text-anchor="middle" font-weight="700">
      Consumer-Grade
    </text>
    <text x="200" y="130" font-family="system-ui, sans-serif" font-size="15" fill="#1C1B1F" text-anchor="middle" font-weight="700">
      RTX 4090
    </text>

    <line x1="50" y1="140" x2="350" y2="140" stroke="#E8DEF8" stroke-width="1.5"/>

    <!-- Specs -->
    <text x="60" y="165" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Price: $1800</text>
    <text x="60" y="185" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">VRAM: 24 GB</text>
    <text x="60" y="205" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Power: 575W</text>
    <text x="60" y="225" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Users: Single</text>
    <text x="60" y="245" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Duty Cycle: Part-time</text>
    <text x="60" y="265" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Cooling: Standard fans</text>

    <!-- Use case -->
    <rect x="50" y="285" width="300" height="60" rx="6" fill="#FEF7FF" stroke="#6750A4" stroke-width="1.5"/>
    <text x="200" y="305" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" text-anchor="middle" font-weight="700">
      For personal use,
    </text>
    <text x="200" y="325" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" text-anchor="middle" font-weight="700">
      research, prototyping
    </text>
  </g>

  <!-- Server Side (Right) -->
  <g id="server-side">
    <!-- Box -->
    <rect x="440" y="70" width="320" height="300" rx="8" fill="#FEF7FF" stroke="#7D5260" stroke-width="2.5"/>

    <!-- Title -->
    <text x="600" y="105" font-family="system-ui, sans-serif" font-size="20" fill="#7D5260" text-anchor="middle" font-weight="700">
      Server-Grade
    </text>
    <text x="600" y="130" font-family="system-ui, sans-serif" font-size="15" fill="#1C1B1F" text-anchor="middle" font-weight="700">
      RTX 6000 Ada / A100
    </text>

    <line x1="450" y1="140" x2="750" y2="140" stroke="#E8DEF8" stroke-width="1.5"/>

    <!-- Specs -->
    <text x="460" y="165" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Price: $5000+</text>
    <text x="460" y="185" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">VRAM: 48+ GB</text>
    <text x="460" y="205" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Power: 700W+</text>
    <text x="460" y="225" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Users: Multi-user</text>
    <text x="460" y="245" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Duty Cycle: 24/7</text>
    <text x="460" y="265" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Cooling: Active/liquid</text>

    <!-- Use case -->
    <rect x="450" y="285" width="300" height="60" rx="6" fill="#FEF7FF" stroke="#7D5260" stroke-width="1.5"/>
    <text x="600" y="305" font-family="system-ui, sans-serif" font-size="12" fill="#7D5260" text-anchor="middle" font-weight="700">
      For production apps,
    </text>
    <text x="600" y="325" font-family="system-ui, sans-serif" font-size="12" fill="#7D5260" text-anchor="middle" font-weight="700">
      API services, enterprises
    </text>
  </g>

  <!-- Bottom recommendation -->
  <text x="400" y="415" font-family="system-ui, sans-serif" font-size="12" fill="#79747E" text-anchor="middle" font-weight="500">
    Start with RTX 4090. Upgrade to RTX 6000 only if running 24/7 for multiple users.
  </text>
</svg>