<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <metadata>
    <dc:title xmlns:dc="http://purl.org/dc/elements/1.1/">On-Premises vs Cloud: Latency & Performance</dc:title>
    <dc:creator>PromptQuorum</dc:creator>
    <dc:rights>© PromptQuorum 2026</dc:rights>
    <dc:source>https://www.promptquorum.com/local-llms/private-local-ai-for-business</dc:source>
  </metadata>

  <rect width="800" height="400" fill="#FFFFFF"/>

  <text x="400" y="35" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">On-Premises vs Cloud: First-Token Latency</text>

  <!-- Chart Title -->
  <text x="60" y="70" font-family="system-ui, sans-serif" font-size="12" fill="#49454F">First-Token Latency (milliseconds)</text>

  <!-- Y-axis labels -->
  <text x="50" y="115" font-family="system-ui, sans-serif" font-size="11" fill="#999" text-anchor="end">500ms</text>
  <text x="50" y="175" font-family="system-ui, sans-serif" font-size="11" fill="#999" text-anchor="end">400ms</text>
  <text x="50" y="235" font-family="system-ui, sans-serif" font-size="11" fill="#999" text-anchor="end">300ms</text>
  <text x="50" y="295" font-family="system-ui, sans-serif" font-size="11" fill="#999" text-anchor="end">200ms</text>
  <text x="50" y="355" font-family="system-ui, sans-serif" font-size="11" fill="#999" text-anchor="end">0ms</text>

  <!-- Grid lines -->
  <line x1="60" y1="110" x2="750" y2="110" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="60" y1="170" x2="750" y2="170" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="60" y1="230" x2="750" y2="230" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="60" y1="290" x2="750" y2="290" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="60" y1="350" x2="750" y2="350" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Axes -->
  <line x1="60" y1="110" x2="60" y2="350" stroke="#1C1B1F" stroke-width="2"/>
  <line x1="60" y1="350" x2="750" y2="350" stroke="#1C1B1F" stroke-width="2"/>

  <!-- Cloud API bar (200-500ms) -->
  <rect x="100" y="140" width="80" height="210" fill="#EA4335" opacity="0.8"/>
  <text x="140" y="365" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#EA4335" text-anchor="middle">Cloud API</text>
  <text x="140" y="130" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#EA4335" text-anchor="middle">200–500ms</text>

  <!-- On-Premises bar (50-150ms) -->
  <rect x="250" y="275" width="80" height="75" fill="#34A853" opacity="0.8"/>
  <text x="290" y="365" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#34A853" text-anchor="middle">On-Premises</text>
  <text x="290" y="265" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#34A853" text-anchor="middle">50–150ms</text>

  <!-- Performance metrics boxes -->
  <rect x="420" y="80" width="310" height="250" rx="6" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1"/>

  <text x="575" y="105" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1C1B1F" text-anchor="middle">Why On-Premises is Faster</text>

  <circle cx="445" cy="135" r="4" fill="#6750A4"/>
  <text x="460" y="140" font-family="system-ui, sans-serif" font-size="11" fill="#49454F"><tspan font-weight="700">No network round-trip.</tspan> Local vLLM on</text>
  <text x="460" y="154" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">RTX 5090 = instant response</text>

  <circle cx="445" cy="180" r="4" fill="#6750A4"/>
  <text x="460" y="185" font-family="system-ui, sans-serif" font-size="11" fill="#49454F"><tspan font-weight="700">No cloud queuing.</tspan> Dedicated GPU,</text>
  <text x="460" y="199" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">no rate limits or throttling</text>

  <circle cx="445" cy="225" r="4" fill="#6750A4"/>
  <text x="460" y="230" font-family="system-ui, sans-serif" font-size="11" fill="#49454F"><tspan font-weight="700">Predictable performance.</tspan></text>
  <text x="460" y="244" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">No spikes from cloud load</text>

  <circle cx="445" cy="270" r="4" fill="#6750A4"/>
  <text x="460" y="275" font-family="system-ui, sans-serif" font-size="11" fill="#49454F"><tspan font-weight="700">Best for real-time apps.</tspan></text>
  <text x="460" y="289" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">Chat, autocomplete, search</text>

  <circle cx="445" cy="315" r="4" fill="#6750A4"/>
  <text x="460" y="320" font-family="system-ui, sans-serif" font-size="11" fill="#49454F"><tspan font-weight="700">Concurrent requests.</tspan> No API</text>
  <text x="460" y="334" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">rate limits (hardware = limit)</text>

  <text x="792" y="390" font-family="system-ui, sans-serif" font-size="10" fill="#999999" text-anchor="end">promptquorum.com</text>
</svg>
