<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg">
  <metadata>
    <dc:title xmlns:dc="http://purl.org/dc/elements/1.1/">When to Use Multi-GPU</dc:title>
    <dc:creator>PromptQuorum</dc:creator>
    <dc:rights>© PromptQuorum 2026</dc:rights>
    <dc:source>https://www.promptquorum.com/local-llms/multi-gpu-local-llms</dc:source>
  </metadata>

  <rect width="800" height="360" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="28" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">マルチ GPU を使用する時期：決定マトリックス</text>

  <!-- Row 1: Model Size (YES) -->
  <rect x="40" y="55" width="720" height="50" rx="4" fill="#E8F5E9" stroke="#34A853" stroke-width="1.5"/>
  <circle cx="65" cy="80" r="14" fill="#34A853"/>
  <text x="65" y="86" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓</text>

  <text x="95" y="75" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">You want to run 70B+ models</text>
  <text x="95" y="95" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">A single RTX 4090 (24 GB) cannot fit Llama 3.3 70B. Two RTX 4090s (48 GB) fit it easily at Q4.</text>

  <!-- Row 2: High Concurrency (YES) -->
  <rect x="40" y="115" width="720" height="50" rx="4" fill="#E8F5E9" stroke="#34A853" stroke-width="1.5"/>
  <circle cx="65" cy="140" r="14" fill="#34A853"/>
  <text x="65" y="146" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓</text>

  <text x="95" y="135" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">You serve 50+ concurrent users</text>
  <text x="95" y="155" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">Batching across GPUs increases throughput. Single GPU bottlenecks at ~5 concurrent users.</text>

  <!-- Row 3: Bought 2nd GPU (NO) -->
  <rect x="40" y="175" width="720" height="50" rx="4" fill="#FFEBEE" stroke="#EA4335" stroke-width="1.5"/>
  <circle cx="65" cy="200" r="14" fill="#EA4335"/>
  <text x="65" y="206" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">✗</text>

  <text x="95" y="195" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">You haven't bought the 2nd GPU yet</text>
  <text x="95" y="215" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">Try Q4 quantization or RTX 5090 (single card) before spending $1,800+ on a second RTX 4090.</text>

  <!-- Row 4: Production Requirement (YES) -->
  <rect x="40" y="235" width="720" height="50" rx="4" fill="#E8F5E9" stroke="#34A853" stroke-width="1.5"/>
  <circle cx="65" cy="260" r="14" fill="#34A853"/>
  <text x="65" y="266" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓</text>

  <text x="95" y="255" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">You need production-grade speed (100+ tok/sec)</text>
  <text x="95" y="275" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">Multi-GPU is the only way to get 100 tok/sec on 70B. Single GPU + CPU offload: only 8–10 tok/sec.</text>

  <!-- Bottom decision -->
  <rect x="40" y="305" width="720" height="40" rx="6" fill="#F3E5F5" stroke="#6750A4" stroke-width="2"/>
  <text x="60" y="328" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#6750A4">Decision Rule: Use multi-GPU only if ALL of these are true:</text>
  <text x="60" y="343" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">(1) You already own 2 GPUs OR (2) You have explicit need for 70B + production speed, not experimentation</text>

  <!-- Corner attribution -->
  <text x="730" y="348" font-family="system-ui, sans-serif" font-size="10" fill="#999999" text-anchor="end">promptquorum.com</text>
</svg>