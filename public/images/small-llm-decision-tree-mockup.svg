<svg viewBox="0 0 1000 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="900" fill="#f8f6ff"/>

  <!-- Title -->
  <text x="500" y="55" font-size="40" font-weight="bold" text-anchor="middle" fill="#2d1b4e">
    Which Small Local LLM Should You Use?
  </text>
  <text x="500" y="95" font-size="20" text-anchor="middle" fill="#666">
    Quick Decision Tree
  </text>

  <!-- START box -->
  <rect x="300" y="120" width="400" height="70" fill="#6750a4" rx="8"/>
  <text x="500" y="170" font-size="18" font-weight="bold" fill="white" text-anchor="middle">
    Choose Your Priority
  </text>

  <!-- Lines down -->
  <line x1="500" y1="190" x2="500" y2="230" stroke="#333" stroke-width="2"/>
  <line x1="150" y1="230" x2="850" y2="230" stroke="#333" stroke-width="2"/>

  <!-- Three branches down -->
  <line x1="150" y1="230" x2="150" y2="280" stroke="#333" stroke-width="2"/>
  <line x1="500" y1="230" x2="500" y2="280" stroke="#333" stroke-width="2"/>
  <line x1="850" y1="230" x2="850" y2="280" stroke="#333" stroke-width="2"/>

  <!-- Branch 1: Reasoning (left) -->
  <rect x="10" y="280" width="280" height="100" fill="#f0f4ff" stroke="#4f46e5" stroke-width="2" rx="8"/>
  <text x="150" y="310" font-size="16" font-weight="bold" fill="#2d1b4e" text-anchor="middle">Need Reasoning?</text>
  <text x="150" y="335" font-size="14" fill="#666" text-anchor="middle">(Math, Logic, Complex)</text>
  <line x1="150" y1="380" x2="150" y2="420" stroke="#4f46e5" stroke-width="2"/>

  <!-- Phi-4 Mini box -->
  <rect x="10" y="420" width="280" height="120" fill="#fff5f7" stroke="#f0a6d6" stroke-width="2" rx="8"/>
  <text x="150" y="450" font-size="16" font-weight="bold" fill="#2d1b4e" text-anchor="middle">Phi-4 Mini 3.8B</text>
  <text x="150" y="475" font-size="14" fill="#333" text-anchor="middle">68% MMLU • 70% HumanEval</text>
  <text x="150" y="500" font-size="14" fill="#333" text-anchor="middle">30-50 tok/sec • 2.5 GB RAM</text>
  <text x="150" y="530" font-size="14" font-weight="bold" fill="#22c55e" text-anchor="middle">✓ Best for Reasoning</text>

  <!-- Branch 2: Speed (center) -->
  <rect x="360" y="280" width="280" height="100" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" rx="8"/>
  <text x="500" y="310" font-size="16" font-weight="bold" fill="#2d1b4e" text-anchor="middle">Need Speed?</text>
  <text x="500" y="335" font-size="14" fill="#666" text-anchor="middle">(Real-time Response, Chat)</text>
  <line x1="500" y1="380" x2="500" y2="420" stroke="#0ea5e9" stroke-width="2"/>

  <!-- Gemma 2 box -->
  <rect x="360" y="420" width="280" height="120" fill="#fef2f2" stroke="#ef4444" stroke-width="2" rx="8"/>
  <text x="500" y="450" font-size="16" font-weight="bold" fill="#2d1b4e" text-anchor="middle">Gemma 2 2B</text>
  <text x="500" y="475" font-size="14" fill="#333" text-anchor="middle">52% MMLU • 1.7 GB RAM</text>
  <text x="500" y="500" font-size="14" fill="#333" text-anchor="middle">40-60 tok/sec (Fastest)</text>
  <text x="500" y="530" font-size="14" font-weight="bold" fill="#f97316" text-anchor="middle">✓ Fastest on CPU</text>

  <!-- Branch 3: Coding (right) -->
  <rect x="710" y="280" width="280" height="100" fill="#fffbf0" stroke="#fbbf24" stroke-width="2" rx="8"/>
  <text x="850" y="310" font-size="16" font-weight="bold" fill="#2d1b4e" text-anchor="middle">Need Coding?</text>
  <text x="850" y="335" font-size="14" fill="#666" text-anchor="middle">(Programming, Code Gen)</text>
  <line x1="850" y1="380" x2="850" y2="420" stroke="#fbbf24" stroke-width="2"/>

  <!-- Qwen2.5 box -->
  <rect x="710" y="420" width="280" height="120" fill="#fffbf0" stroke="#fbbf24" stroke-width="2" rx="8"/>
  <text x="850" y="450" font-size="16" font-weight="bold" fill="#2d1b4e" text-anchor="middle">Qwen2.5 3B</text>
  <text x="850" y="475" font-size="14" fill="#333" text-anchor="middle">62% MMLU • 65% HumanEval</text>
  <text x="850" y="500" font-size="14" fill="#333" text-anchor="middle">Function Calling • 2 GB RAM</text>
  <text x="850" y="530" font-size="14" font-weight="bold" fill="#eab308" text-anchor="middle">✓ Best for Coding</text>

  <!-- Default recommendation box -->
  <rect x="80" y="600" width="840" height="140" fill="#f0fdf4" stroke="#22c55e" stroke-width="3" rx="8"/>
  <text x="500" y="635" font-size="18" font-weight="bold" fill="#2d1b4e" text-anchor="middle">
    Not Sure? Use Llama 3.2 3B (Default)
  </text>
  <text x="500" y="665" font-size="14" fill="#333" text-anchor="middle">
    • 58% MMLU, 60% HumanEval • 2.5 GB RAM • 128K context
  </text>
  <text x="500" y="690" font-size="14" fill="#333" text-anchor="middle">
    • Best community support • Most fine-tunes available
  </text>
  <text x="500" y="715" font-size="14" fill="#333" text-anchor="middle">
    • Best for general-purpose chat and everyday tasks
  </text>
  <text x="500" y="740" font-size="15" font-weight="bold" fill="#22c55e" text-anchor="middle">
    ollama run llama3.2:3b
  </text>

  <!-- Footer note -->
  <text x="500" y="810" font-size="14" fill="#666" text-anchor="middle">
    Extreme RAM constraint? Use Llama 3.2 1B (1.3 GB only) — accept lower quality
  </text>

  <text x="500" y="860" font-size="13" text-anchor="middle" fill="#999">
    Q4_K_M quantization • CPU speeds on modern laptops • April 2026
  </text>
</svg>
