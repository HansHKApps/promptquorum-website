<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#FFFFFF"/>
  <text x="400" y="28" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, sans-serif">Entscheidungsrahmen: Cloud vs. lokale Agenten</text>

  <!-- Left panel: When to choose Cloud -->
  <rect x="28" y="55" width="340" height="340" rx="6" fill="#FFFFFF" stroke="#34A853" stroke-width="2"/>
  <rect x="28" y="55" width="340" height="4" rx="0" fill="#34A853"/>
  <text x="198" y="80" font-size="16" font-weight="700" fill="#34A853" text-anchor="middle" font-family="system-ui, sans-serif">Cloud wählen</text>

  <text x="48" y="110" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">Best für:</text>
  <text x="48" y="130" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• Komplexe Denkaufgaben</text>
  <text x="48" y="148" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• Interaktives Chat-UI (&lt;500ms)</text>
  <text x="48" y="166" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• Niedriges Volumen (&lt;50M/Mo)</text>
  <text x="48" y="184" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• Unkritische Daten</text>
  <text x="48" y="202" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• Kein DevOps-Overhead</text>

  <line x1="48" y1="220" x2="308" y2="220" stroke="#E8DEF8" stroke-width="1"/>

  <text x="48" y="240" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">Modelle:</text>
  <text x="48" y="258" font-size="11" fill="#49454F" font-family="'SF Mono', Monaco, monospace">GPT-4, Claude 4.6,</text>
  <text x="48" y="273" font-size="11" fill="#49454F" font-family="'SF Mono', Monaco, monospace">Gemini 2.5 Pro</text>

  <text x="48" y="300" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">Kosten:</text>
  <text x="48" y="318" font-size="11" font-weight="700" fill="#34A853" font-family="'SF Mono', Monaco, monospace">€18/1M Token</text>

  <text x="48" y="345" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">Engpass: Anbieter-Lock-in</text>

  <!-- Right panel: When to choose Local -->
  <rect x="432" y="55" width="340" height="340" rx="6" fill="#FFFFFF" stroke="#EA4335" stroke-width="2"/>
  <rect x="432" y="55" width="340" height="4" rx="0" fill="#EA4335"/>
  <text x="602" y="80" font-size="16" font-weight="700" fill="#EA4335" text-anchor="middle" font-family="system-ui, sans-serif">Lokal wählen</text>

  <text x="452" y="110" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">Best für:</text>
  <text x="452" y="130" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• Datenschutzkritische Daten</text>
  <text x="452" y="148" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• Hohes Volumen (&gt;50M/Mo)</text>
  <text x="452" y="166" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• DSGVO/HIPAA/SOC2</text>
  <text x="452" y="184" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• Benutzerdefinierte Kontrolle</text>
  <text x="452" y="202" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• Offline-First-Betrieb</text>

  <line x1="452" y1="220" x2="712" y2="220" stroke="#E8DEF8" stroke-width="1"/>

  <text x="452" y="240" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">Modelle:</text>
  <text x="452" y="258" font-size="11" fill="#49454F" font-family="'SF Mono', Monaco, monospace">Llama 13B/32B,</text>
  <text x="452" y="273" font-size="11" fill="#49454F" font-family="'SF Mono', Monaco, monospace">Qwen 32B, DeepSeek</text>

  <text x="452" y="300" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">Kosten:</text>
  <text x="452" y="318" font-size="11" font-weight="700" fill="#EA4335" font-family="'SF Mono', Monaco, monospace">€0/Token (Hardware)</text>

  <text x="452" y="345" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">Engpass: Hardware-Kosten</text>
</svg>