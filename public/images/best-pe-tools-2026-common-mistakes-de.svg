  </text>

  <!-- Footer -->
  <text x="400" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#79747E" text-anchor="middle">
    Diese Fehler verstärken sich mit der Zeit. Klare Tool-Grenzen von Anfang an.
  </text>
<text x="792" y="415" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>