<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <rect width="800" height="420" fill="#FFFFFF"/>
  <text x="400" y="28" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, sans-serif">決定フレームワーク: クラウド vs ローカル エージェント</text>

  <!-- Left panel: When to choose Cloud -->
  <rect x="28" y="55" width="340" height="340" rx="6" fill="#FFFFFF" stroke="#34A853" stroke-width="2"/>
  <rect x="28" y="55" width="340" height="4" rx="0" fill="#34A853"/>
  <text x="198" y="80" font-size="16" font-weight="700" fill="#34A853" text-anchor="middle" font-family="system-ui, sans-serif">クラウドを選択</text>

  <text x="48" y="110" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">最適：</text>
  <text x="48" y="130" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• 複雑な推論タスク</text>
  <text x="48" y="148" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• インタラクティブ チャット UI (&lt;500ms)</text>
  <text x="48" y="166" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• 低ボリューム (&lt;50M/月)</text>
  <text x="48" y="184" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• 非機密データ</text>
  <text x="48" y="202" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• DevOps不要</text>

  <line x1="48" y1="220" x2="308" y2="220" stroke="#E8DEF8" stroke-width="1"/>

  <text x="48" y="240" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">モデル:</text>
  <text x="48" y="258" font-size="11" fill="#49454F" font-family="'SF Mono', Monaco, monospace">GPT-4, Claude 4.6,</text>
  <text x="48" y="273" font-size="11" fill="#49454F" font-family="'SF Mono', Monaco, monospace">Gemini 2.5 Pro</text>

  <text x="48" y="300" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">コスト:</text>
  <text x="48" y="318" font-size="11" font-weight="700" fill="#34A853" font-family="'SF Mono', Monaco, monospace">$20/1M トークン</text>

  <text x="48" y="345" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">問題: ベンダー ロック イン</text>

  <!-- Right panel: When to choose Local -->
  <rect x="432" y="55" width="340" height="340" rx="6" fill="#FFFFFF" stroke="#EA4335" stroke-width="2"/>
  <rect x="432" y="55" width="340" height="4" rx="0" fill="#EA4335"/>
  <text x="602" y="80" font-size="16" font-weight="700" fill="#EA4335" text-anchor="middle" font-family="system-ui, sans-serif">ローカルを選択</text>

  <text x="452" y="110" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">最適：</text>
  <text x="452" y="130" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• プライバシー重視データ</text>
  <text x="452" y="148" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• 高ボリューム (&gt;50M/月)</text>
  <text x="452" y="166" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• GDPR/HIPAA/SOC2</text>
  <text x="452" y="184" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• カスタム制御</text>
  <text x="452" y="202" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• オフライン操作</text>

  <line x1="452" y1="220" x2="712" y2="220" stroke="#E8DEF8" stroke-width="1"/>

  <text x="452" y="240" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">モデル:</text>
  <text x="452" y="258" font-size="11" fill="#49454F" font-family="'SF Mono', Monaco, monospace">Llama 13B/32B,</text>
  <text x="452" y="273" font-size="11" fill="#49454F" font-family="'SF Mono', Monaco, monospace">Qwen 32B, DeepSeek</text>

  <text x="452" y="300" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">コスト:</text>
  <text x="452" y="318" font-size="11" font-weight="700" fill="#EA4335" font-family="'SF Mono', Monaco, monospace">$0/トークン (ハード)</text>

  <text x="452" y="345" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">問題: ハードウェア コスト</text>
<text x="792" y="415" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>