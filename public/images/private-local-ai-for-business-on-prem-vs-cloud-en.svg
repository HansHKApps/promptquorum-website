<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <metadata>
    <dc:title xmlns:dc="http://purl.org/dc/elements/1.1/">On-Premises vs Cloud AI Architecture</dc:title>
    <dc:creator>PromptQuorum</dc:creator>
    <dc:rights>© PromptQuorum 2026</dc:rights>
    <dc:source>https://www.promptquorum.com/local-llms/private-local-ai-for-business</dc:source>
  </metadata>

  <rect width="800" height="350" fill="#FFFFFF"/>

  <text x="400" y="30" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">On-Premises vs Cloud AI Architecture</text>

  <!-- Left Panel: Cloud APIs (Problem) -->
  <rect x="28" y="55" width="340" height="280" rx="6" fill="#FFFFFF" stroke="#EA4335" stroke-width="2"/>
  <rect x="28" y="55" width="340" height="4" rx="0" fill="#EA4335"/>

  <text x="198" y="80" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#EA4335" text-anchor="middle">Cloud APIs (OpenAI, Anthropic)</text>

  <text x="48" y="110" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Data Flow:</text>
  <text x="48" y="128" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">• App sends request over internet</text>
  <text x="48" y="143" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">• Data exposed to vendor servers</text>
  <text x="48" y="158" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">• Response returned (200-500ms latency)</text>

  <text x="48" y="185" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#EA4335">Cost @ Scale:</text>
  <text x="48" y="203" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#EA4335">$20,000/year</text>
  <text x="48" y="220" font-family="system-ui, sans-serif" font-size="10" fill="#49454F">(for 1B tokens/month)</text>

  <text x="48" y="245" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Compliance:</text>
  <text x="48" y="263" font-family="system-ui, sans-serif" font-size="11" fill="#EA4335">❌ HIPAA risky</text>
  <text x="48" y="278" font-family="system-ui, sans-serif" font-size="11" fill="#EA4335">❌ GDPR hard</text>
  <text x="48" y="293" font-family="system-ui, sans-serif" font-size="11" fill="#EA4335">❌ Data residency</text>

  <!-- Right Panel: On-Premises (Goal) -->
  <rect x="432" y="55" width="340" height="280" rx="6" fill="#FFFFFF" stroke="#34A853" stroke-width="2"/>
  <rect x="432" y="55" width="340" height="4" rx="0" fill="#34A853"/>

  <text x="602" y="80" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#34A853" text-anchor="middle">On-Premises Infrastructure</text>

  <text x="452" y="110" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Data Flow:</text>
  <text x="452" y="128" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">• App requests vLLM locally</text>
  <text x="452" y="143" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">• Data never leaves datacenter</text>
  <text x="452" y="158" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">• Response instant (50-150ms latency)</text>

  <text x="452" y="185" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#34A853">Cost @ Scale:</text>
  <text x="452" y="203" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#34A853">$5,000/year</text>
  <text x="452" y="220" font-family="system-ui, sans-serif" font-size="10" fill="#49454F">(hardware + electricity)</text>

  <text x="452" y="245" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Compliance:</text>
  <text x="452" y="263" font-family="system-ui, sans-serif" font-size="11" fill="#34A853">✓ HIPAA ready</text>
  <text x="452" y="278" font-family="system-ui, sans-serif" font-size="11" fill="#34A853">✓ GDPR compliant</text>
  <text x="452" y="293" font-family="system-ui, sans-serif" font-size="11" fill="#34A853">✓ Full control</text>

  <text x="830" y="340" font-family="system-ui, sans-serif" font-size="10" fill="#999999" text-anchor="end">promptquorum.com</text>
</svg>