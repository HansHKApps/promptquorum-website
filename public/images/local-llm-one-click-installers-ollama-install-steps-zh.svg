<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
<rect width="800" height="300" fill="#FFFFFF"/>
<text x="400" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1C1B1F" text-anchor="middle">安装Ollama — 3步</text>
<line x1="18" y1="42" x2="782" y2="42" stroke="#E8DEF8" stroke-width="1.5"/>
<text x="280" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#6750A4" text-anchor="middle">→</text>
<text x="520" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#6750A4" text-anchor="middle">→</text>
<circle cx="160" cy="100" r="28" fill="#6750A4"/>
<text x="160" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
<text x="160" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">访问ollama.com</text>
<text x="160" y="173" font-family="'SF Mono', Monaco, monospace" font-size="11" font-weight="700" fill="#6750A4" text-anchor="middle">ollama.com/download</text>
<text x="160" y="189" font-family="'SF Mono', Monaco, monospace" font-size="10" font-weight="700" fill="#79747E" text-anchor="middle">下载 .pkg / .exe</text>
<circle cx="400" cy="100" r="28" fill="#6750A4"/>
<text x="400" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
<text x="400" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">运行安装器</text>
<text x="400" y="173" font-family="'SF Mono', Monaco, monospace" font-size="11" font-weight="700" fill="#6750A4" text-anchor="middle">双击安装器</text>
<text x="400" y="189" font-family="'SF Mono', Monaco, monospace" font-size="10" font-weight="700" fill="#79747E" text-anchor="middle">无需额外依赖</text>
<circle cx="640" cy="100" r="28" fill="#6750A4"/>
<text x="640" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
<text x="640" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">运行模型</text>
<text x="640" y="173" font-family="'SF Mono', Monaco, monospace" font-size="11" font-weight="700" fill="#6750A4" text-anchor="middle">ollama run llama3.2</text>
<text x="640" y="189" font-family="'SF Mono', Monaco, monospace" font-size="10" font-weight="700" fill="#79747E" text-anchor="middle">终端 / PowerShell</text>
<rect x="18" y="220" width="764" height="36" rx="6" fill="#F7F2FA"/>
<text x="400" y="243" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#49454F" text-anchor="middle">Ollama作为后台服务安装。无需GUI。在localhost:11434提供OpenAI兼容API。</text>
</svg>
