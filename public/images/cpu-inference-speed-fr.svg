<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Vitesse d'inférence CPU: 16 Go RAM
  </text>
  <text x="400" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#79747E" text-anchor="middle">
    (Ryzen 9 7950X)
  </text>

  <!-- Row 1: Gemma 2 2B Q8_0 28 tok/sec ⚡ -->
  <g>
    <text x="20" y="85" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Gemma 2 2B Q8_0</text>
    <text x="20" y="103" font-family="system-ui, sans-serif" font-size="12" fill="#49454F">~2,7 Go</text>
    <rect x="220" y="75" width="420" height="28" rx="4" fill="#6750A4" stroke="#6750A4" stroke-width="1"/>
    <text x="225" y="95" font-family="system-ui, sans-serif" font-size="11" fill="#FFFFFF" font-weight="600">████████████████████████████████████████████████ 28 jetons/sec ⚡</text>
  </g>

  <!-- Row 2: Phi-4 Mini 3.8B Q4_K_M 25 tok/sec ⭐ -->
  <g>
    <text x="20" y="155" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Phi-4 Mini 3.8B Q4_K_M</text>
    <text x="20" y="173" font-family="system-ui, sans-serif" font-size="12" fill="#49454F">~2,5 Go</text>
    <rect x="220" y="145" width="375" height="28" rx="4" fill="#6750A4" stroke="#6750A4" stroke-width="1"/>
    <text x="225" y="165" font-family="system-ui, sans-serif" font-size="11" fill="#FFFFFF" font-weight="600">███████████████████████████████ 25 jetons/sec ⭐ Meilleur</text>
  </g>

  <!-- Row 3: Llama 3.2 3B Q8_0 20 tok/sec -->
  <g>
    <text x="20" y="225" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Llama 3.2 3B Q8_0</text>
    <text x="20" y="243" font-family="system-ui, sans-serif" font-size="12" fill="#49454F">~3,8 Go</text>
    <rect x="220" y="215" width="300" height="28" rx="4" fill="#E8DEF8" stroke="#6750A4" stroke-width="1"/>
    <text x="225" y="235" font-family="system-ui, sans-serif" font-size="11" fill="#1C1B1F" font-weight="600">██████████████████████ 20 jetons/sec</text>
  </g>

  <!-- Row 4: Llama 3.1 8B Q4_K_M 12 tok/sec -->
  <g>
    <text x="20" y="295" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Llama 3.1 8B Q4_K_M</text>
    <text x="20" y="313" font-family="system-ui, sans-serif" font-size="12" fill="#49454F">~4,9 Go</text>
    <rect x="220" y="285" width="180" height="28" rx="4" fill="#E8DEF8" stroke="#6750A4" stroke-width="1"/>
    <text x="225" y="305" font-family="system-ui, sans-serif" font-size="11" fill="#1C1B1F" font-weight="600">███████████████ 12 jetons/sec</text>
  </g>

  <!-- Comparison callout -->
  <g>
    <rect x="520" y="258" width="260" height="105" rx="6" fill="#FEF7FF" stroke="#6750A4" stroke-width="1.5" stroke-dasharray="2,2"/>
    <text x="530" y="278" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" font-weight="700">GPU vs CPU</text>
    <text x="530" y="300" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">RTX 3060 12Go d'occasion</text>
    <text x="530" y="316" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">(~200 € occasion):</text>
    <text x="530" y="334" font-family="system-ui, sans-serif" font-size="13" fill="#28A745" font-weight="700">70 jetons/sec</text>
    <text x="530" y="350" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">5–8× plus rapide</text>
  </g>

  <!-- Bottom note -->
  <text x="400" y="430" font-family="system-ui, sans-serif" font-size="12" fill="#79747E" text-anchor="middle" font-weight="500">
    CPU limité par la bande passante mémoire. Une GPU (même budget) est toujours 5–8× plus rapide. Mettez à jour GPU avant CPU.
  </text>
</svg>
