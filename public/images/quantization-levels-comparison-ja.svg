<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="800" height="420" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">量子化レベル：RAM vs. 品質トレードオフ（7Bモデル）</text>
  <text x="400" y="50" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">Q4_K_M（★）が標準推奨 — RAMと品質の最良バランス</text>

  <!-- Header row -->
  <rect x="40" y="64" width="720" height="32" rx="6" fill="#6750A4"/>
  <text x="90" y="84" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">レベル</text>
  <text x="175" y="84" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">ビット</text>
  <text x="255" y="84" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">RAM（7B）</text>
  <text x="365" y="84" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">品質低下</text>
  <text x="530" y="84" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">使用場面</text>

  <!-- Row 1: Q2_K -->
  <rect x="40" y="100" width="720" height="42" rx="6" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1.5"/>
  <text x="90" y="126" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#1C1B1F">Q2_K</text>
  <text x="175" y="126" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#49454F">2ビット</text>
  <text x="255" y="126" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#49454F">~2.7 GB</text>
  <text x="365" y="126" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#E67C73">15–25%</text>
  <text x="530" y="126" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F">RAM 4GB未満（劣化あり）</text>

  <!-- Row 2: Q3_K_S -->
  <rect x="40" y="146" width="720" height="42" rx="6" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1.5"/>
  <text x="90" y="172" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#1C1B1F">Q3_K_S</text>
  <text x="175" y="172" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#49454F">3ビット</text>
  <text x="255" y="172" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#49454F">~3.3 GB</text>
  <text x="365" y="172" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#F4B400">5–10%</text>
  <text x="530" y="172" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F">RAM 4–5 GB</text>

  <!-- Row 3: Q4_K_M (Recommended) -->
  <rect x="40" y="192" width="720" height="42" rx="6" fill="#E8DEF8" stroke="#6750A4" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="90" y="218" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#6750A4">Q4_K_M ★</text>
  <text x="175" y="218" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#6750A4">4ビット</text>
  <text x="255" y="218" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#6750A4">~4.5 GB</text>
  <text x="365" y="218" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#34A853">1–3%</text>
  <text x="530" y="218" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#6750A4">ほとんどのユーザーのデフォルト</text>

  <!-- Row 4: Q5_K_M -->
  <rect x="40" y="238" width="720" height="42" rx="6" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1.5"/>
  <text x="90" y="264" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#1C1B1F">Q5_K_M</text>
  <text x="175" y="264" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#49454F">5ビット</text>
  <text x="255" y="264" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#49454F">~5.7 GB</text>
  <text x="365" y="264" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#34A853">&lt;1%</text>
  <text x="530" y="264" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F">16 GB RAM・高品質重視</text>

  <!-- Row 5: Q6_K -->
  <rect x="40" y="284" width="720" height="42" rx="6" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1.5"/>
  <text x="90" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#1C1B1F">Q6_K</text>
  <text x="175" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#49454F">6ビット</text>
  <text x="255" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#49454F">~6.6 GB</text>
  <text x="365" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#34A853">ほぼ無損失</text>
  <text x="530" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F">16 GB・コーディング/数学</text>

  <!-- Row 6: Q8_0 -->
  <rect x="40" y="330" width="720" height="42" rx="6" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1.5"/>
  <text x="90" y="356" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#1C1B1F">Q8_0</text>
  <text x="175" y="356" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#49454F">8ビット</text>
  <text x="255" y="356" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#49454F">~7.7 GB</text>
  <text x="365" y="356" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#34A853">無視できる（~0%）</text>
  <text x="530" y="356" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F">16+ GB・最高品質</text>

  <!-- Footer note -->
  <text x="400" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#79747E" text-anchor="middle">★ Q4_K_M推奨 — FP16品質の97–99%をRAM32%で実現。Q4_0よりQ4_K_Mを常に優先。</text>
</svg>
