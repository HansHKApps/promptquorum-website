  <text x="185" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F">13B models</text>
  <text x="360" y="255" font-family="'SF Mono',Monaco,monospace" font-size="11" font-weight="700" fill="#49454F">Q4</text>
  <text x="440" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#34A853">20–50 t/s</text>
