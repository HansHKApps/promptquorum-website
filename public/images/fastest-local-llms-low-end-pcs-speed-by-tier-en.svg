  <text x="360" y="140" font-family="'SF Mono',Monaco,monospace" font-size="11" font-weight="700" fill="#49454F">Q5</text>
  <text x="440" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#F4B400">20–40 t/s</text>
