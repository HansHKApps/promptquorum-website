  <text x="400" y="47" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">Wrong model choice = 4–10× speed wasted. Match hardware to model exactly.</text>

  <!-- Column headers -->
  <text x="38" y="73" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#79747E">Hardware</text>
