  <text x="560" y="214" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#49454F">4.1 GB VRAM</text>
  <text x="700" y="214" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#6750A4">sweet spot</text>
