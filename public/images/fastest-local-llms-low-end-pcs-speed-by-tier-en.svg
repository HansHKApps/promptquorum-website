  <!-- Speed legend -->
  <circle cx="180" cy="295" r="6" fill="#EA4335"/>
  <text x="192" y="299" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#49454F">Slow (&lt;15 t/s)</text>
  <circle cx="310" cy="295" r="6" fill="#F4B400"/>
  <text x="322" y="299" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#49454F">Acceptable (15–30 t/s)</text>
  <circle cx="480" cy="295" r="6" fill="#34A853"/>
  <text x="492" y="299" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#49454F">Smooth (30+ t/s)</text>

  <!-- Footer -->
  <text x="400" y="330" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79747E" text-anchor="middle">★ 8 GB GPU sweet spot: Mistral 7B Q4 at 25–60 tok/sec — full assistant experience at interactive speed.</text>
  <text x="400" y="348" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79747E" text-anchor="middle">promptquorum.com/local-llms/fastest-local-llms-low-end-pcs</text>
