<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="tempGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#79747E;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#6750A4;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#7D5260;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D32F2F;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="900" height="400" fill="#FFFFFF"/>
  <rect x="30" y="20" width="840" height="360" rx="12" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="2" filter="url(#shadow)"/>

  <!-- Title -->
  <text x="450" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">Temperatur-Leitfaden für kreatives Schreiben</text>

  <!-- Gradient bar -->
  <rect x="100" y="90" width="700" height="40" rx="6" fill="url(#tempGradient)"/>

  <!-- Temperature scale markers and labels -->
  <text x="100" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#79747E" text-anchor="middle">0,7</text>
  <text x="100" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#79747E" text-anchor="middle">Zu flach</text>

  <text x="250" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#6750A4" text-anchor="middle">0,85</text>
  <text x="250" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#6750A4" text-anchor="middle">Standard</text>

  <text x="400" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#6750A4" text-anchor="middle">0,95</text>
  <text x="400" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#6750A4" text-anchor="middle">Kreativ</text>

  <text x="550" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#7D5260" text-anchor="middle">1,05</text>
  <text x="550" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#7D5260" text-anchor="middle">Optimal ✓</text>

  <text x="700" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#D32F2F" text-anchor="middle">1,2+</text>
  <text x="700" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#D32F2F" text-anchor="middle">Instabil</text>

  <!-- Tick marks -->
  <line x1="100" y1="85" x2="100" y2="95" stroke="#E8DEF8" stroke-width="2"/>
  <line x1="250" y1="85" x2="250" y2="95" stroke="#E8DEF8" stroke-width="2"/>
  <line x1="400" y1="85" x2="400" y2="95" stroke="#E8DEF8" stroke-width="2"/>
  <line x1="550" y1="85" x2="550" y2="95" stroke="#E8DEF8" stroke-width="2"/>
  <line x1="700" y1="85" x2="700" y2="95" stroke="#E8DEF8" stroke-width="2"/>

  <!-- Recommended range highlight box -->
  <rect x="380" y="220" width="240" height="28" rx="6" fill="#F7EDEF" stroke="#7D5260" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="500" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#7D5260" text-anchor="middle">Empfohlen: 0,9–1,05</text>

  <!-- Warning text -->
  <rect x="80" y="280" width="740" height="70" rx="6" fill="#FFF8F7" stroke="#E8B4AF" stroke-width="1.5"/>
  <text x="100" y="302" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">⚠️ Modellgrenzen:</text>
  <text x="100" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#49454F">Llama 3 und Mistral unterstützen 0–1,2. Einige Modelle maximal 1,0. GPT-ähnliche Modelle können höher</text>
  <text x="100" y="343" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#49454F">gehen. Prüfen Sie die Dokumentation für den unterstützten Temperaturbereich Ihres Modells.</text>
</svg>