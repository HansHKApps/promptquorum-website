<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <rect width="800" height="420" fill="#FFFFFF"/>
  <text x="400" y="28" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, sans-serif">Cost Break-Even Analysis: Cloud vs Local Agents</text>
  <text x="400" y="48" font-size="12" fill="#79747E" text-anchor="middle" font-family="system-ui, sans-serif">Monthly token volume determines cheaper approach</text>

  <!-- Header -->
  <text x="40" y="80" font-size="12" font-weight="700" fill="#79747E" font-family="system-ui, sans-serif">Monthly Volume</text>
  <text x="240" y="80" font-size="12" font-weight="700" fill="#79747E" font-family="system-ui, sans-serif">Cloud Cost (GPT-4)</text>
  <text x="480" y="80" font-size="12" font-weight="700" fill="#79747E" font-family="system-ui, sans-serif">Local Cost (amortized)</text>
  <text x="700" y="80" font-size="12" font-weight="700" fill="#79747E" font-family="system-ui, sans-serif">Cheaper</text>
  <line x1="18" y1="88" x2="782" y2="88" stroke="#E8DEF8" stroke-width="1.5"/>

  <!-- Row 1 -->
  <text x="40" y="115" font-size="12" fill="#1C1B1F" font-family="system-ui, sans-serif">1M tokens/month</text>
  <text x="240" y="115" font-size="12" font-weight="600" fill="#34A853" font-family="'SF Mono', Monaco, monospace">$20</text>
  <text x="480" y="115" font-size="12" fill="#49454F" font-family="'SF Mono', Monaco, monospace">$50 (hardware)</text>
  <circle cx="730" cy="111" r="12" fill="#34A853"/>
  <text x="730" y="116" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="system-ui, sans-serif">Cloud</text>
  <line x1="18" y1="128" x2="782" y2="128" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 2 -->
  <text x="40" y="155" font-size="12" fill="#1C1B1F" font-family="system-ui, sans-serif">10M tokens/month</text>
  <text x="240" y="155" font-size="12" font-weight="600" fill="#34A853" font-family="'SF Mono', Monaco, monospace">$200</text>
  <text x="480" y="155" font-size="12" fill="#49454F" font-family="'SF Mono', Monaco, monospace">$50 + power</text>
  <circle cx="730" cy="151" r="12" fill="#34A853"/>
  <text x="730" y="156" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="system-ui, sans-serif">Cloud</text>
  <line x1="18" y1="168" x2="782" y2="168" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 3: Break-even -->
  <text x="40" y="195" font-size="12" fill="#1C1B1F" font-family="system-ui, sans-serif" font-weight="700">50M tokens/month</text>
  <text x="240" y="195" font-size="12" font-weight="700" fill="#F4B400" font-family="'SF Mono', Monaco, monospace">$1,000</text>
  <text x="480" y="195" font-size="12" font-weight="700" fill="#F4B400" font-family="'SF Mono', Monaco, monospace">$1,000</text>
  <circle cx="730" cy="191" r="12" fill="#F4B400"/>
  <text x="730" y="196" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="system-ui, sans-serif">Even</text>
  <line x1="18" y1="208" x2="782" y2="208" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 4 -->
  <text x="40" y="235" font-size="12" fill="#1C1B1F" font-family="system-ui, sans-serif">100M tokens/month</text>
  <text x="240" y="235" font-size="12" font-weight="600" fill="#49454F" font-family="'SF Mono', Monaco, monospace">$2,000</text>
  <text x="480" y="235" font-size="12" fill="#EA4335" font-weight="700" font-family="'SF Mono', Monaco, monospace">$100</text>
  <circle cx="730" cy="231" r="12" fill="#EA4335"/>
  <text x="730" y="236" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="system-ui, sans-serif">Local</text>
  <line x1="18" y1="248" x2="782" y2="248" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 5 -->
  <text x="40" y="275" font-size="12" fill="#1C1B1F" font-family="system-ui, sans-serif">1B tokens/month</text>
  <text x="240" y="275" font-size="12" font-weight="600" fill="#49454F" font-family="'SF Mono', Monaco, monospace">$20,000</text>
  <text x="480" y="275" font-size="12" fill="#EA4335" font-weight="700" font-family="'SF Mono', Monaco, monospace">$300</text>
  <circle cx="730" cy="271" r="12" fill="#EA4335"/>
  <text x="730" y="276" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="system-ui, sans-serif">Local</text>
  <line x1="18" y1="288" x2="782" y2="288" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Key insight boxes -->
  <rect x="28" y="320" width="340" height="80" rx="4" fill="#E8F5E9" stroke="#34A853" stroke-width="1"/>
  <text x="48" y="340" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">Cloud Wins Below 50M/mo</text>
  <text x="48" y="360" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">Lower upfront cost, no hardware.</text>
  <text x="48" y="375" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">Best for: Startups, variable load.</text>
  <text x="48" y="390" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">Break-even: ~50M tokens/month</text>

  <rect x="432" y="320" width="340" height="80" rx="4" fill="#FFEBEE" stroke="#EA4335" stroke-width="1"/>
  <text x="452" y="340" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">Local Wins Above 50M/mo</text>
  <text x="452" y="360" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">Up to 20× cheaper at scale.</text>
  <text x="452" y="375" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">Best for: Enterprises, high volume.</text>
  <text x="452" y="390" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">Requires: 16–64 GB GPU.</text>
<text x="792" y="415" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>