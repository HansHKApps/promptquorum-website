  </text>

  <!-- Row 1: Llama 3.3 70B -->
  <rect x="50" y="110" width="700" height="50" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1"/>
  <text x="120" y="143" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#6750A4" text-anchor="middle">
    Llama 3.3 70B
  </text>
  <text x="240" y="143" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#1C1B1F" text-anchor="middle">
