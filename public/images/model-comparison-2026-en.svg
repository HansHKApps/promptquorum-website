  </text>
  <text x="340" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1C1B1F" text-anchor="middle">
    MMLU Score
  </text>
  <text x="470" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1C1B1F" text-anchor="middle">
