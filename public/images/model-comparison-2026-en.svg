  </text>

  <!-- Row 4: DeepSeek-R1 7B -->
  <rect x="50" y="290" width="700" height="50" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1"/>
  <text x="120" y="323" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#6750A4" text-anchor="middle">
    DeepSeek-R1 7B
  </text>
  <text x="240" y="323" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#1C1B1F" text-anchor="middle">
