  </text>

  <!-- Footer note -->
  <text x="50" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#79747E">
    MMLU = General knowledge benchmark. VRAM = RAM needed at Q4 quantization. All models available in Ollama.
  </text>
  <text x="50" y="470" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#79747E">
    Desktop ideal: 7B–12B (4–8 GB). Server production: 70B models (40–50 GB).
  </text>
<text x="792" y="495" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>
