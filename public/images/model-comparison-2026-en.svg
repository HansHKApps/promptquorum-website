  </text>
  <text x="470" y="143" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#1C1B1F" text-anchor="middle">
    ~42 GB
  </text>
  <text x="600" y="143" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#49454F" text-anchor="middle">
