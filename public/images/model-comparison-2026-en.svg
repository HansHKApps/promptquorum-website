  </text>

  <!-- Row 3: Gemma 3 9B -->
  <rect x="50" y="230" width="700" height="50" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1"/>
  <text x="120" y="263" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#6750A4" text-anchor="middle">
