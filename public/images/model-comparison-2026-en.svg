  </text>
  <text x="470" y="323" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#1C1B1F" text-anchor="middle">
    ~5 GB
  </text>
  <text x="600" y="323" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#49454F" text-anchor="middle">
    Reasoning tasks
  </text>

  <!-- Row 5: Phi-4 12B -->
  <rect x="50" y="350" width="700" height="50" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1"/>
  <text x="120" y="383" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#6750A4" text-anchor="middle">
    Phi-4 12B
  </text>
  <text x="240" y="383" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#1C1B1F" text-anchor="middle">
    12B
  </text>
  <text x="340" y="383" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#34A853" text-anchor="middle">
