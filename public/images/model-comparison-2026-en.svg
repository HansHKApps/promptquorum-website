  </text>

  <!-- Row 2: Qwen2.5 7B -->
  <rect x="50" y="170" width="700" height="50" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1"/>
  <text x="120" y="203" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#6750A4" text-anchor="middle">
    Qwen2.5 7B
  </text>
  <text x="240" y="203" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#1C1B1F" text-anchor="middle">
    7B
  </text>
  <text x="340" y="203" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#34A853" text-anchor="middle">
