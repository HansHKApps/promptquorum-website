<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="480" fill="#FFFFFF"/>
  <text x="450" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Compliance-Belastung: Kosten, Komplexität & Zeitrahmen
  </text>
  <rect x="280" y="50" width="340" height="25" rx="4" fill="#FEF7FF" stroke="#6750A4" stroke-width="1"/>
  <text x="300" y="67" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" font-weight="700">
    Für ein Unternehmen, das generative KI global einsetzt
  </text>
  <g id="eu-compliance">
    <rect x="50" y="100" width="220" height="35" rx="6" fill="#EDE7F6" stroke="#6750A4" stroke-width="2.5"/>
    <text x="160" y="123" font-family="system-ui, sans-serif" font-size="16" fill="#6750A4" text-anchor="middle" font-weight="700">🇪🇺 EU-Compliance</text>
    <rect x="50" y="150" width="220" height="70" rx="6" fill="#F7F2FA" stroke="#6750A4" stroke-width="1.5"/>
    <text x="60" y="172" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F" font-weight="700">Geschätzter Kosten:</text>
    <text x="60" y="191" font-family="system-ui, sans-serif" font-size="13" fill="#6750A4" font-weight="700">€500K – €2M+</text>
    <text x="60" y="208" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" font-weight="500">Rechtlich, technisch, Audits,</text>
    <text x="60" y="221" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" font-weight="500">Governance-Team</text>
    <rect x="50" y="235" width="220" height="70" rx="6" fill="#F7F2FA" stroke="#6750A4" stroke-width="1.5"/>
    <text x="60" y="257" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F" font-weight="700">Komplexität:</text>
    <text x="60" y="276" font-family="system-ui, sans-serif" font-size="13" fill="#6750A4" font-weight="700">Sehr Hoch 🔴</text>
    <text x="60" y="293" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" font-weight="500">Vorschreibende Regeln,</text>
    <text x="60" y="306" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" font-weight="500">technische Standards</text>
    <rect x="50" y="320" width="220" height="70" rx="6" fill="#F7F2FA" stroke="#6750A4" stroke-width="1.5"/>
    <text x="60" y="342" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F" font-weight="700">Zeitrahmen:</text>
    <text x="60" y="361" font-family="system-ui, sans-serif" font-size="13" fill="#6750A4" font-weight="700">6–12 Monate</text>
    <text x="60" y="378" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" font-weight="500">Phase-in im Gange</text>
    <text x="60" y="391" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" font-weight="500">(Jan 2025 Durchsetzung)</text>
    <rect x="50" y="405" width="220" height="45" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5"/>
    <text x="160" y="420" font-family="system-ui, sans-serif" font-size="11" fill="#D32F2F" text-anchor="middle" font-weight="700">Risiko</text>
    <text x="160" y="437" font-family="system-ui, sans-serif" font-size="10" fill="#1C1B1F" text-anchor="middle" font-weight="500">Nichtkonformität: €35M Bußgeld</text>
  </g>
  <g id="us-compliance">
    <rect x="340" y="100" width="220" height="35" rx="6" fill="#EDE7F6" stroke="#6750A4" stroke-width="2.5"/>
    <text x="450" y="123" font-family="system-ui, sans-serif" font-size="16" fill="#6750A4" text-anchor="middle" font-weight="700">🇺🇸 US-Compliance</text>
    <rect x="340" y="150" width="220" height="70" rx="6" fill="#F7F2FA" stroke="#6750A4" stroke-width="1.5"/>
    <text x="350" y="172" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F" font-weight="700">Geschätzter Kosten:</text>
    <text x="350" y="191" font-family="system-ui, sans-serif" font-size="13" fill="#6750A4" font-weight="700">€50K – €300K</text>
    <text x="350" y="208" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" font-weight="500">NIST RMF-Einführung,</text>
    <text x="350" y="221" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" font-weight="500">branchenspezifische Rechtsprüfung</text>
    <rect x="340" y="235" width="220" height="70" rx="6" fill="#F7F2FA" stroke="#6750A4" stroke-width="1.5"/>
    <text x="350" y="257" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F" font-weight="700">Komplexität:</text>
    <text x="350" y="276" font-family="system-ui, sans-serif" font-size="13" fill="#6750A4" font-weight="700">Mittelmäßig 🟡</text>
    <text x="350" y="293" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" font-weight="500">Freiwillige Frameworks,</text>
    <text x="350" y="306" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" font-weight="500">kein einheitlicher Standard</text>
    <rect x="340" y="320" width="220" height="70" rx="6" fill="#F7F2FA" stroke="#6750A4" stroke-width="1.5"/>
    <text x="350" y="342" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F" font-weight="700">Zeitrahmen:</text>
    <text x="350" y="361" font-family="system-ui, sans-serif" font-size="13" fill="#6750A4" font-weight="700">2–4 Monate</text>
    <text x="350" y="378" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" font-weight="500">Keine harte Frist,</text>
    <text x="350" y="391" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" font-weight="500">fortlaufende Überwachung</text>
    <rect x="340" y="405" width="220" height="45" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
    <text x="450" y="420" font-family="system-ui, sans-serif" font-size="11" fill="#388E3C" text-anchor="middle" font-weight="700">Vorteil</text>
    <text x="450" y="437" font-family="system-ui, sans-serif" font-size="10" fill="#1C1B1F" text-anchor="middle" font-weight="500">Leichte Hand, innovationsfreundlich</text>
  </g>
  <g id="china-compliance">
    <rect x="630" y="100" width="220" height="35" rx="6" fill="#F7F2FA" stroke="#7D5260" stroke-width="2.5"/>
    <text x="740" y="123" font-family="system-ui, sans-serif" font-size="16" fill="#7D5260" text-anchor="middle" font-weight="700">🇨🇳 China-Compliance</text>
    <rect x="630" y="150" width="220" height="70" rx="6" fill="#F7F2FA" stroke="#7D5260" stroke-width="1.5"/>
    <text x="640" y="172" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F" font-weight="700">Geschätzter Kosten:</text>
    <text x="640" y="191" font-family="system-ui, sans-serif" font-size="13" fill="#7D5260" font-weight="700">€200K – €1M+</text>
    <text x="640" y="208" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" font-weight="500">Genehmigungsverfahren,</text>
    <text x="640" y="221" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" font-weight="500">Regierungsbeziehungen, Compliance</text>
    <rect x="630" y="235" width="220" height="70" rx="6" fill="#F7F2FA" stroke="#7D5260" stroke-width="1.5"/>
    <text x="640" y="257" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F" font-weight="700">Komplexität:</text>
    <text x="640" y="276" font-family="system-ui, sans-serif" font-size="13" fill="#7D5260" font-weight="700">Sehr Hoch 🔴</text>
    <text x="640" y="293" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" font-weight="500">CAC-Genehmigung erforderlich,</text>
    <text x="640" y="306" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" font-weight="500">undurchsichtige Standards</text>
    <rect x="630" y="320" width="220" height="70" rx="6" fill="#F7F2FA" stroke="#7D5260" stroke-width="1.5"/>
    <text x="640" y="342" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F" font-weight="700">Zeitrahmen:</text>
    <text x="640" y="361" font-family="system-ui, sans-serif" font-size="13" fill="#7D5260" font-weight="700">3–12+ Monate</text>
    <text x="640" y="378" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" font-weight="500">Genehmigung unsicher,</text>
    <text x="640" y="391" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" font-weight="500">keine Garantie</text>
    <rect x="630" y="405" width="220" height="45" rx="6" fill="#F7F2FA" stroke="#7D5260" stroke-width="1.5"/>
    <text x="740" y="420" font-family="system-ui, sans-serif" font-size="11" fill="#7D5260" text-anchor="middle" font-weight="700">Risiko</text>
    <text x="740" y="437" font-family="system-ui, sans-serif" font-size="10" fill="#1C1B1F" text-anchor="middle" font-weight="500">Ablehnung möglich, laufende Änderungen</text>
  </g>
</svg>
