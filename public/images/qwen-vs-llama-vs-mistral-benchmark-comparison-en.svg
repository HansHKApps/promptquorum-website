  <rect x="240" y="123" width="221" height="18" fill="#79747E" rx="3"/>
  <text x="467" y="136" font-size="13" font-weight="700" fill="#79747E">79%</text>

  <!-- Divider 1 -->
  <line x1="20" y1="150" x2="780" y2="150" stroke="#E8DEF8" stroke-width="1"/>

  <!-- HumanEval Section -->
  <text x="20" y="168" font-size="13" font-weight="700" fill="#6750A4">HumanEval Score (Coding)</text>

  <!-- HumanEval Row 1: Qwen -->
  <text x="235" y="192" text-anchor="end" font-size="12" fill="#49454F">Qwen2.5 72B</text>
  <rect x="240" y="179" width="244" height="18" fill="#6750A4" rx="3"/>
  <text x="490" y="192" font-size="13" font-weight="700" fill="#6750A4">87%</text>

  <!-- HumanEval Row 2: Llama -->
  <text x="235" y="212" text-anchor="end" font-size="12" fill="#49454F">Llama 3.3 70B</text>
  <rect x="240" y="199" width="246" height="18" fill="#7D5260" rx="3"/>
  <text x="492" y="212" font-size="13" font-weight="700" fill="#7D5260">88%</text>

  <!-- HumanEval Row 3: Mistral -->
  <text x="235" y="232" text-anchor="end" font-size="12" fill="#49454F">Mistral Small 3.1</text>
  <rect x="240" y="219" width="207" height="18" fill="#79747E" rx="3"/>
  <text x="453" y="232" font-size="13" font-weight="700" fill="#79747E">74%</text>

  <!-- Divider 2 -->
  <line x1="20" y1="246" x2="780" y2="246" stroke="#E8DEF8" stroke-width="1"/>

