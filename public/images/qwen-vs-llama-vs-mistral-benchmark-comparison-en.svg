<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360" style="font-family:system-ui,sans-serif;background:#fff">

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="19" font-weight="700" fill="#1C1B1F">Qwen2.5 vs Llama 3.x vs Mistral — Benchmark Comparison</text>

  <!-- Legend -->
  <rect x="155" y="42" width="12" height="12" fill="#6750A4" rx="2"/>
  <text x="173" y="53" font-size="12" fill="#49454F">Qwen2.5 72B</text>
  <rect x="295" y="42" width="12" height="12" fill="#7D5260" rx="2"/>
