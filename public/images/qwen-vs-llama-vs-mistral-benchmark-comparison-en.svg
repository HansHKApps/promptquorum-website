  <rect x="440" y="42" width="12" height="12" fill="#79747E" rx="2"/>
  <text x="458" y="53" font-size="12" fill="#49454F">Mistral Small 3.1 (24B, 14 GB)</text>

  <!-- MMLU Section -->
  <text x="20" y="72" font-size="13" font-weight="700" fill="#6750A4">MMLU Score (General Knowledge)</text>

  <!-- MMLU Row 1: Qwen -->
  <text x="235" y="96" text-anchor="end" font-size="12" fill="#49454F">Qwen2.5 72B</text>
  <rect x="240" y="83" width="235" height="18" fill="#6750A4" rx="3"/>
  <text x="481" y="96" font-size="13" font-weight="700" fill="#6750A4">84%</text>

  <!-- MMLU Row 2: Llama -->
  <text x="235" y="116" text-anchor="end" font-size="12" fill="#49454F">Llama 3.3 70B</text>
  <rect x="240" y="103" width="230" height="18" fill="#7D5260" rx="3"/>
  <text x="476" y="116" font-size="13" font-weight="700" fill="#7D5260">82%</text>

  <!-- MMLU Row 3: Mistral -->
