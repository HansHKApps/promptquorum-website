  <text x="430" y="235" font-size="12" fill="#49454F" font-family="system-ui, sans-serif">4令牌/秒</text>
  <text x="570" y="235" font-size="12" fill="#49454F" font-family="system-ui, sans-serif">12 GB共享</text>
  <circle cx="730" cy="231" r="14" fill="#F4B400"/>
  <text x="730" y="236" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="system-ui, sans-serif">OK</text>
