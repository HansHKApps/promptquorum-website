  <text x="430" y="115" font-size="12" font-weight="700" fill="#34A853" font-family="system-ui, sans-serif">15令牌/秒</text>
  <text x="570" y="115" font-size="12" fill="#49454F" font-family="system-ui, sans-serif">16 GB统一</text>
