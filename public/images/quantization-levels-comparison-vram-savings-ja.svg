<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="360" fill="#FFFFFF"/>

  <text x="400" y="32" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">VRAM削減：Q4 vs その他のレベル（Llama 3 70B）</text>

  <!-- FP32 (baseline) -->
  <rect x="28" y="60" width="150" height="240" rx="4" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1"/>
  <text x="103" y="90" font-size="14" font-weight="700" fill="#1C1B1F" text-anchor="middle">FP32</text>
  <text x="103" y="180" font-size="28" font-weight="700" fill="#EA4335" text-anchor="middle">280 GB</text>
  <text x="103" y="210" font-size="12" fill="#49454F" text-anchor="middle">100 %（ベースライン）</text>
  <text x="103" y="228" font-size="11" fill="#79747E" text-anchor="middle">実用的ではない</text>

  <!-- Q8 -->
  <rect x="188" y="60" width="150" height="180" rx="4" fill="#E8F5E9" stroke="#34A853" stroke-width="2"/>
  <rect x="188" y="60" width="150" height="4" rx="0" fill="#34A853"/>
  <text x="263" y="90" font-size="14" font-weight="700" fill="#34A853" text-anchor="middle">Q8</text>
  <text x="263" y="170" font-size="28" font-weight="700" fill="#1C1B1F" text-anchor="middle">140 GB</text>
  <text x="263" y="200" font-size="12" fill="#49454F" text-anchor="middle">50 % 削減</text>
  <text x="263" y="218" font-size="11" fill="#79747E" text-anchor="middle">32GB+ VRAM</text>

  <!-- Q5 -->
  <rect x="348" y="60" width="150" height="150" rx="4" fill="#FFF9C4" stroke="#F4B400" stroke-width="2"/>
  <rect x="348" y="60" width="150" height="4" rx="0" fill="#F4B400"/>
  <text x="423" y="90" font-size="14" font-weight="700" fill="#F4B400" text-anchor="middle">Q5</text>
  <text x="423" y="165" font-size="28" font-weight="700" fill="#1C1B1F" text-anchor="middle">88 GB</text>
  <text x="423" y="195" font-size="12" fill="#49454F" text-anchor="middle">69 % 削減</text>
  <text x="423" y="213" font-size="11" fill="#79747E" text-anchor="middle">避けるべき（デッドゾーン）</text>

  <!-- Q4 (highlighted) -->
  <rect x="508" y="60" width="150" height="120" rx="4" fill="#F3E5F5" stroke="#6750A4" stroke-width="2"/>
  <rect x="508" y="60" width="150" height="4" rx="0" fill="#6750A4"/>
  <text x="583" y="90" font-size="14" font-weight="700" fill="#6750A4" text-anchor="middle">Q4 ✓</text>
  <text x="583" y="160" font-size="28" font-weight="700" fill="#6750A4" text-anchor="middle">70 GB</text>
  <text x="583" y="190" font-size="12" fill="#49454F" text-anchor="middle">75 % 削減</text>
  <text x="583" y="208" font-size="11" fill="#79747E" text-anchor="middle">推奨</text>

  <!-- Q3 -->
  <rect x="668" y="60" width="150" height="95" rx="4" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1"/>
  <text x="743" y="90" font-size="14" font-weight="700" fill="#1C1B1F" text-anchor="middle">Q3</text>
  <text x="743" y="155" font-size="28" font-weight="700" fill="#1C1B1F" text-anchor="middle">53 GB</text>
  <text x="743" y="185" font-size="12" fill="#49454F" text-anchor="middle">81 % 削減</text>
  <text x="743" y="203" font-size="11" fill="#79747E" text-anchor="middle">予算制約</text>

  <text x="400" y="330" font-size="10" fill="#79747E" text-anchor="middle">VRAMが少ない = より安いハードウェア。Q4はVRAM削減（75 %）と知覚不可能な品質低下（&lt;1.2 %）のバランスを取ります。</text>
<text x="792" y="355" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>
