<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata><rect width="800" height="350" fill="#FFFFFF"/><text x="400" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">隐藏的VRAM开销</text><text x="40" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1C1B1F" font-weight="600">7B at Q5 = 4.4 GB权重 + 开销</text><rect x="40" y="85" width="720" height="25" fill="#6750A4" stroke="#E8DEF8" stroke-width="1"/><text x="400" y="103" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">4.4 GB模型 + 5.6 GB开销 = 10 GB总计</text><text x="60" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1C1B1F" font-weight="600">1. 上下文窗口 (KV缓存)</text><text x="80" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">4k令牌 = 每请求2–3 GB</text><text x="80" y="176" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">随上下文长度线性增长</text><text x="60" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1C1B1F" font-weight="600">2. 批处理</text><text x="80" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">Batch=1: 4.4 + 3 = 7.4 GB</text><text x="80" y="246" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">Batch=4: 上下文×4 (3 × 4 = 12 GB开销!)</text><text x="60" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1C1B1F" font-weight="600">3. 系统开销</text><text x="80" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">OS + 框架 = 500 MB–1 GB</text><text x="400" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#79747E" text-anchor="middle">← 返回文章</text><text x="792" y="345" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>