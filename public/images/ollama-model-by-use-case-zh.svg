  <text x="650" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1C1B1F">Image understanding</text>
  <text x="650" y="113" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#79747E">llama3.2-vision:11b</text>

  <text x="630" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#34A853" font-weight="600">✓</text>
  <text x="650" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1C1B1F">Embeddings/RAG</text>
  <text x="650" y="153" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#79747E">nomic-embed-text</text>

  <text x="630" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#34A853" font-weight="600">✓</text>
  <text x="650" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1C1B1F">Document Q&A</text>
