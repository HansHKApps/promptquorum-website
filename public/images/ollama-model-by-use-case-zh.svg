  <text x="50" y="113" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#79747E">llama3.2:3b</text>

  <text x="30" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#34A853" font-weight="600">✓</text>
  <text x="50" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1C1B1F">Quality chat</text>
  <text x="50" y="153" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#79747E">llama3.1:8b</text>

  <text x="30" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#34A853" font-weight="600">✓</text>
  <text x="50" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1C1B1F">Fast & lightweight</text>
  <text x="50" y="193" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#79747E">gemma2:2b</text>

  <text x="30" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#34A853" font-weight="600">✓</text>
