<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="800" height="350" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    5 Prompt Engineering Bottlenecks & Tools
  </text>

  <!-- Header row divider -->
  <line x1="18" y1="45" x2="782" y2="45" stroke="#E8DEF8" stroke-width="1.5"/>

  <!-- Column headers -->
  <text x="80" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#79747E" text-anchor="middle">
    #
  </text>
  <text x="200" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#79747E">
    Bottleneck
  </text>
  <text x="450" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#79747E">
    Challenge
  </text>
  <text x="700" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#79747E" text-anchor="end">
    Tool
  </text>

  <!-- Row 1 -->
  <circle cx="80" cy="88" r="10" fill="#6750A4"/>
  <text x="80" y="93" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="200" y="93" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">
    Evaluation
  </text>
  <text x="450" y="93" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#49454F">
    Does this prompt work?
  </text>
  <text x="700" y="93" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#6750A4" text-anchor="end">
    Braintrust
  </text>
  <line x1="18" y1="100" x2="782" y2="100" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 2 -->
  <circle cx="80" cy="123" r="10" fill="#6750A4"/>
  <text x="80" y="128" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="200" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">
    Testing
  </text>
  <text x="450" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#49454F">
    Will it break?
  </text>
  <text x="700" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#6750A4" text-anchor="end">
    Promptfoo
  </text>
  <line x1="18" y1="135" x2="782" y2="135" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 3 -->
  <circle cx="80" cy="158" r="10" fill="#6750A4"/>
  <text x="80" y="163" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="200" y="163" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">
    Versioning
  </text>
  <text x="450" y="163" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#49454F">
    Which version shipped?
  </text>
  <text x="700" y="163" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#6750A4" text-anchor="end">
    PromptHub
  </text>
  <line x1="18" y1="170" x2="782" y2="170" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 4 -->
  <circle cx="80" cy="193" r="10" fill="#6750A4"/>
  <text x="80" y="198" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="200" y="198" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">
    Deployment
  </text>
  <text x="450" y="198" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#49454F">
    How do I serve this?
  </text>
  <text x="700" y="198" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#6750A4" text-anchor="end">
    Vellum
  </text>
  <line x1="18" y1="205" x2="782" y2="205" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 5 -->
  <circle cx="80" cy="228" r="10" fill="#6750A4"/>
  <text x="80" y="233" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text>
  <text x="200" y="233" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">
    Observability
  </text>
  <text x="450" y="233" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#49454F">
    Why did it fail?
  </text>
  <text x="700" y="233" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#6750A4" text-anchor="end">
    LangSmith
  </text>
</svg>