<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <style>
      .header-text { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 700; }
      .label-text { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 500; }
      .item-text { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 500; }
      .footer-text { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; }
      .shadow { filter: drop-shadow(0 4px 6px rgba(0,0,0,0.08)); }
    </style>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="800" height="420" fill="#FFFFFF"/>

  <!-- Left Column: Choose Ollama -->
  <g>
    <!-- Header band -->
    <rect x="20" y="20" width="360" height="40" fill="#6750A4" rx="8"/>
    <text x="200" y="48" class="header-text" fill="#FFFFFF" text-anchor="middle">Choisir Ollama</text>

    <!-- Card container -->
    <rect x="20" y="70" width="360" height="310" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1.5" rx="8" filter="url(#shadow)"/>

    <!-- Checkmark items -->
    <g>
      <!-- Item 1 -->
      <text x="35" y="105" class="item-text" fill="#34A853" font-size="16">✓</text>
      <text x="60" y="105" class="item-text" fill="#1C1B1F">Vous avez besoin d'une API OpenAI</text>

      <!-- Item 2 -->
      <text x="35" y="150" class="item-text" fill="#34A853" font-size="16">✓</text>
      <text x="60" y="145" class="item-text" fill="#1C1B1F">Automatisation avec scripts</text>
      <text x="60" y="160" class="item-text" fill="#1C1B1F">Python / Node.js</text>

      <!-- Item 3 -->
      <text x="35" y="210" class="item-text" fill="#34A853" font-size="16">✓</text>
      <text x="60" y="205" class="item-text" fill="#1C1B1F">Exécution en tant que service</text>
      <text x="60" y="220" class="item-text" fill="#1C1B1F">de production</text>

      <!-- Item 4 -->
      <text x="35" y="265" class="item-text" fill="#34A853" font-size="16">✓</text>
      <text x="60" y="265" class="item-text" fill="#1C1B1F">Intégration avec VS Code/Cursor</text>

      <!-- Item 5 -->
      <text x="35" y="310" class="item-text" fill="#34A853" font-size="16">✓</text>
      <text x="60" y="305" class="item-text" fill="#1C1B1F">Déploiements Docker / systemd /</text>
      <text x="60" y="320" class="item-text" fill="#1C1B1F">CI/CD</text>
    </g>
  </g>

  <!-- Right Column: Choose LM Studio -->
  <g>
    <!-- Header band -->
    <rect x="420" y="20" width="360" height="40" fill="#7D5260" rx="8"/>
    <text x="600" y="48" class="header-text" fill="#FFFFFF" text-anchor="middle">Choisir LM Studio</text>

    <!-- Card container -->
    <rect x="420" y="70" width="360" height="310" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1.5" rx="8" filter="url(#shadow)"/>

    <!-- Checkmark items -->
    <g>
      <!-- Item 1 -->
      <text x="435" y="105" class="item-text" fill="#34A853" font-size="16">✓</text>
      <text x="460" y="105" class="item-text" fill="#1C1B1F">Sans expérience en ligne de commande</text>

      <!-- Item 2 -->
      <text x="435" y="150" class="item-text" fill="#34A853" font-size="16">✓</text>
      <text x="460" y="145" class="item-text" fill="#1C1B1F">Vous voulez un interface de chat</text>
      <text x="460" y="160" class="item-text" fill="#1C1B1F">intégré avec historique</text>

      <!-- Item 3 -->
      <text x="435" y="210" class="item-text" fill="#34A853" font-size="16">✓</text>
      <text x="460" y="210" class="item-text" fill="#1C1B1F">Paramètres GPU et modèle visuels</text>

      <!-- Item 4 -->
      <text x="435" y="255" class="item-text" fill="#34A853" font-size="16">✓</text>
      <text x="460" y="250" class="item-text" fill="#1C1B1F">Navigateur de modèles en un clic</text>
      <text x="460" y="265" class="item-text" fill="#1C1B1F">et téléchargement</text>

      <!-- Item 5 -->
      <text x="435" y="310" class="item-text" fill="#34A853" font-size="16">✓</text>
      <text x="460" y="310" class="item-text" fill="#1C1B1F">Expérimentation rapide sur le bureau</text>
    </g>
  </g>

  <!-- Footer note -->
  <text x="400" y="405" class="footer-text" fill="#79747E" text-anchor="middle">Les deux outils sont gratuits et locaux. Pas de clés API requises.</text>
</svg>