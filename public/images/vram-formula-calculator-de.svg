<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <!-- Background -->
  <rect width="800" height="420" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    VRAM-Rechner für lokale LLMs
  </text>

  <!-- Formula Section -->
  <g id="formula-section">
    <rect x="40" y="60" width="720" height="100" rx="8" fill="#FEF7FF" stroke="#6750A4" stroke-width="2.5"/>
    <text x="60" y="85" font-family="system-ui, sans-serif" font-size="15" fill="#6750A4" font-weight="700">
      VRAM (GB) = (Modellgröße × Quantisierungsbits) ÷ 8
    </text>
    <text x="60" y="115" font-family="system-ui, sans-serif" font-size="14" fill="#49454F" font-weight="600">
      Modellgröße: Parameter in Milliarden (7B, 13B, 70B)
    </text>
    <text x="60" y="140" font-family="system-ui, sans-serif" font-size="14" fill="#49454F" font-weight="600">
      Quantisierungsbits: FP16 (16 Bit), Q8 (8 Bit), Q5 (5 Bit), Q4 (4 Bit)
    </text>
  </g>

  <!-- Examples Section -->
  <g id="examples-section">
    <text x="60" y="190" font-family="system-ui, sans-serif" font-size="18" fill="#1C1B1F" font-weight="700">
      Beispiele:
    </text>

    <!-- Example 1: 7B Q4 -->
    <g id="example1">
      <rect x="55" y="210" width="200" height="80" rx="6" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="2"/>
      <text x="70" y="235" font-family="system-ui, sans-serif" font-size="15" fill="#6750A4" font-weight="700">
        7B-Modell Q4
      </text>
      <text x="70" y="260" font-family="'SF Mono', monospace" font-size="13" fill="#1C1B1F" font-weight="600">
        (7 × 4) ÷ 8 = 3,5 GB
      </text>
      <text x="70" y="282" font-family="system-ui, sans-serif" font-size="12" fill="#49454F" font-weight="600">
        Ideal für: Laptops
      </text>
    </g>

    <!-- Example 2: 13B Q5 -->
    <g id="example2">
      <rect x="300" y="210" width="200" height="80" rx="6" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="2"/>
      <text x="315" y="235" font-family="system-ui, sans-serif" font-size="15" fill="#6750A4" font-weight="700">
        13B-Modell Q5
      </text>
      <text x="315" y="260" font-family="'SF Mono', monospace" font-size="13" fill="#1C1B1F" font-weight="600">
        (13 × 5) ÷ 8 = 8,1 GB
      </text>
      <text x="315" y="282" font-family="system-ui, sans-serif" font-size="12" fill="#49454F" font-weight="600">
        Ideal für: Desktop
      </text>
    </g>

    <!-- Example 3: 70B Q4 -->
    <g id="example3">
      <rect x="545" y="210" width="215" height="80" rx="6" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="2"/>
      <text x="560" y="235" font-family="system-ui, sans-serif" font-size="15" fill="#6750A4" font-weight="700">
        70B-Modell Q4
      </text>
      <text x="560" y="260" font-family="'SF Mono', monospace" font-size="13" fill="#1C1B1F" font-weight="600">
        (70 × 4) ÷ 8 = 35 GB
      </text>
      <text x="560" y="282" font-family="system-ui, sans-serif" font-size="12" fill="#49454F" font-weight="600">
        Server / RTX 4090
      </text>
    </g>
  </g>

  <!-- Quantization Scale -->
  <g id="quantization-scale">
    <text x="60" y="325" font-family="system-ui, sans-serif" font-size="18" fill="#1C1B1F" font-weight="700">
      Qualität vs. VRAM-Verbrauch:
    </text>

    <!-- FP16 -->
    <rect x="60" y="350" width="130" height="50" rx="5" fill="#E8DEF8" stroke="#6750A4" stroke-width="2"/>
    <text x="125" y="373" font-family="system-ui, sans-serif" font-size="14" fill="#1C1B1F" text-anchor="middle" font-weight="700">
      FP16
    </text>
    <text x="125" y="392" font-family="system-ui, sans-serif" font-size="12" fill="#49454F" text-anchor="middle" font-weight="600">
      Beste Qualität
    </text>

    <!-- Q8 -->
    <rect x="210" y="350" width="130" height="50" rx="5" fill="#E8DEF8" stroke="#6750A4" stroke-width="2"/>
    <text x="275" y="373" font-family="system-ui, sans-serif" font-size="14" fill="#1C1B1F" text-anchor="middle" font-weight="700">
      Q8
    </text>
    <text x="275" y="392" font-family="system-ui, sans-serif" font-size="12" fill="#49454F" text-anchor="middle" font-weight="600">
      99 % Qualität
    </text>

    <!-- Q5 -->
    <rect x="360" y="350" width="130" height="50" rx="5" fill="#F7F2FA" stroke="#6750A4" stroke-width="2"/>
    <text x="425" y="373" font-family="system-ui, sans-serif" font-size="14" fill="#1C1B1F" text-anchor="middle" font-weight="700">
      Q5
    </text>
    <text x="425" y="392" font-family="system-ui, sans-serif" font-size="12" fill="#49454F" text-anchor="middle" font-weight="600">
      95 % Qualität
    </text>

    <!-- Q4 -->
    <rect x="510" y="350" width="130" height="50" rx="5" fill="#F7F2FA" stroke="#6750A4" stroke-width="2"/>
    <text x="575" y="373" font-family="system-ui, sans-serif" font-size="14" fill="#1C1B1F" text-anchor="middle" font-weight="700">
      Q4
    </text>
    <text x="575" y="392" font-family="system-ui, sans-serif" font-size="12" fill="#49454F" text-anchor="middle" font-weight="600">
      90–95 % Qualität
    </text>

    <!-- Note -->
    <text x="660" y="373" font-family="system-ui, sans-serif" font-size="12" fill="#7D5260" font-weight="600">
      ← Empfohlen
    </text>
  </g>

  <!-- Bottom note -->
  <text x="400" y="415" font-family="system-ui, sans-serif" font-size="12" fill="#79747E" text-anchor="middle" font-weight="500">
    25 % Overhead für System, Kontext und Sicherheitspuffer einrechnen
  </text>
<text x="792" y="415" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>
