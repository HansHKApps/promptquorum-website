<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="qualityGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#34A853" stop-opacity="1"/>
      <stop offset="22%"  stop-color="#F4B400" stop-opacity="1"/>
      <stop offset="40%"  stop-color="#E67C73" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#E67C73" stop-opacity="1"/>
      <stop offset="78%"  stop-color="#F4B400" stop-opacity="1"/>
      <stop offset="100%" stop-color="#34A853" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="#FFFFFF"/>
  <rect x="24" y="16" width="752" height="368" rx="12" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1.5" filter="url(#shadow)"/>

  <text x="400" y="50" font-family="system-ui,-apple-system,sans-serif" font-size="19" font-weight="700" fill="#1C1B1F" text-anchor="middle">「迷失在中间」效应 — 128K上下文窗口</text>
  <text x="400" y="72" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">LLM可靠地回忆开头和结尾的信息 — 但容易遗漏40K–80K中间位置的细节</text>

  <rect x="60" y="100" width="680" height="80" rx="8" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1.5"/>
  <rect x="60" y="100" width="680" height="80" rx="8" fill="url(#qualityGradient)" opacity="0.25"/>

  <rect x="68" y="108" width="124" height="64" rx="6" fill="#34A853" opacity="0.18"/>
  <text x="130" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#34A853" text-anchor="middle">高</text>
  <text x="130" y="153" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#34A853" text-anchor="middle">召回质量</text>

  <rect x="276" y="108" width="248" height="64" rx="6" fill="#E67C73" opacity="0.18"/>
  <text x="400" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#E67C73" text-anchor="middle">低 — 常被忽略</text>
  <text x="400" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#E67C73" text-anchor="middle">40K–80K令牌范围</text>

  <rect x="548" y="108" width="184" height="64" rx="6" fill="#34A853" opacity="0.18"/>
  <text x="640" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#34A853" text-anchor="middle">高</text>
  <text x="640" y="153" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#34A853" text-anchor="middle">召回质量</text>

  <text x="60"  y="198" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#79747E" text-anchor="middle">0</text>
  <text x="196" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">25K</text>
  <text x="332" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">50K</text>
  <text x="468" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">75K</text>
  <text x="604" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">100K</text>
  <text x="740" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#79747E" text-anchor="middle">128K</text>
  <text x="400" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#79747E" text-anchor="middle">← 上下文窗口中的令牌位置 →</text>

  <text x="400" y="244" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#1C1B1F" text-anchor="middle">如何避免</text>

  <rect x="48" y="258" width="210" height="90" rx="8" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1.5"/>
  <text x="153" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#6750A4" text-anchor="middle">① 关键信息前置</text>
  <text x="153" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">将关键信息放在</text>
  <text x="153" y="314" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">提示词的开头</text>
  <text x="153" y="334" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#79747E" text-anchor="middle">最可靠的位置</text>

  <rect x="295" y="258" width="210" height="90" rx="8" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1.5"/>
  <text x="400" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#6750A4" text-anchor="middle">② 使用RAG</text>
  <text x="400" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">检索3–5个相关块</text>
  <text x="400" y="314" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">（4K–8K令牌）</text>
  <text x="400" y="334" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#79747E" text-anchor="middle">完全避开中间区域</text>

  <rect x="542" y="258" width="210" height="90" rx="8" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1.5"/>
  <text x="647" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#6750A4" text-anchor="middle">③ 分块处理文档</text>
  <text x="647" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">以重叠的16K–32K</text>
  <text x="647" y="314" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">片段分段处理</text>
  <text x="647" y="334" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#79747E" text-anchor="middle">内容保持在安全区域</text>

  <text x="400" y="376" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79747E" text-anchor="middle">来源：「Lost in the Middle: How Language Models Use Long Contexts」— Liu et al., 2023 (arxiv.org/abs/2307.03172)</text>
<text x="792" y="395" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>
