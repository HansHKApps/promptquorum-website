<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <metadata>
    <dc:title xmlns:dc="http://purl.org/dc/elements/1.1/">First-Token Latency: On-Premises vs Cloud</dc:title>
    <dc:creator>PromptQuorum</dc:creator>
    <dc:rights>© PromptQuorum 2026</dc:rights>
    <dc:source>https://www.promptquorum.com/local-llms/private-local-ai-for-business</dc:source>
  </metadata>

  <rect width="800" height="350" fill="#FFFFFF"/>

  <text x="400" y="30" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">First-Token Latency Comparison</text>

  <!-- Latency Bars -->
  <text x="60" y="75" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Platform</text>
  <text x="250" y="75" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Latency</text>
  <text x="500" y="75" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Explanation</text>
  <line x1="40" y1="82" x2="760" y2="82" stroke="#E8DEF8" stroke-width="1.5"/>

  <!-- Row 1: Cloud API -->
  <text x="60" y="110" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F">OpenAI GPT-4o (Cloud)</text>
  <rect x="250" y="98" width="180" height="20" rx="4" fill="#FFEBEE" stroke="#EA4335" stroke-width="1"/>
  <text x="265" y="113" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#EA4335">200–500ms</text>
  <text x="500" y="110" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">Network round-trip time</text>
  <text x="500" y="125" font-family="system-ui, sans-serif" font-size="10" fill="#79747E">(internet overhead dominant)</text>

  <!-- Row 2: On-Premises Local Network -->
  <text x="60" y="165" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F">vLLM on RTX 4090 (Local)</text>
  <rect x="250" y="153" width="100" height="20" rx="4" fill="#E8F5E9" stroke="#34A853" stroke-width="2"/>
  <text x="265" y="168" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#34A853">50–150ms</text>
  <text x="500" y="165" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">Direct GPU inference on LAN</text>
  <text x="500" y="180" font-family="system-ui, sans-serif" font-size="10" fill="#79747E">(minimal network latency)</text>

  <!-- Row 3: On-Premises + Distant Network -->
  <text x="60" y="220" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F">vLLM on RTX 4090 (WAN)</text>
  <rect x="250" y="208" width="140" height="20" rx="4" fill="#FFF3E0" stroke="#F4B400" stroke-width="1"/>
  <text x="265" y="223" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#F57F17">100–300ms</text>
  <text x="500" y="220" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">VPN/internet latency added</text>
  <text x="500" y="235" font-family="system-ui, sans-serif" font-size="10" fill="#79747E">(still 2–3× faster than cloud)</text>

  <!-- Key Insight Box -->
  <rect x="40" y="280" width="720" height="50" rx="4" fill="#F3E5F5" stroke="#6750A4" stroke-width="2"/>
  <text x="60" y="300" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#6750A4">Key Insight:</text>
  <text x="60" y="318" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">On-premises AI achieves 2–5× lower latency than cloud APIs. Critical for real-time applications (chatbots, document processing) and high-frequency inference.</text>

  <text x="792" y="340" font-family="system-ui, sans-serif" font-size="10" fill="#999999" text-anchor="end">promptquorum.com</text>
</svg>