  <text x="90" y="464" font-family="system-ui, sans-serif" font-size="12" fill="#49454F" font-weight="600">
    🇪🇺 EU führt mit vorschreibenden Regeln | 🇺🇸 US mit Branchen + freiwilliger Ansatz | 🇨🇳 China mit staatlicher Kontrolle über KI
