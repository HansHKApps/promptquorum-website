  <text x="400" y="258" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#34A853" text-anchor="middle">✓ 是</text>
  <text x="400" y="298" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#34A853" text-anchor="middle">✓ 是</text>

  <text x="662" y="100" font-family="'SF Mono', Monaco, monospace" font-size="12" font-weight="700" fill="#7D5260" text-anchor="middle">localhost:1234/v1</text>
  <text x="662" y="138" font-family="'SF Mono', Monaco, monospace" font-size="12" fill="#49454F" text-anchor="middle">在LM Studio界面中启用</text>
