  <text x="178" y="258" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#34A853" text-anchor="middle">✓ 是</text>
  <text x="178" y="298" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#34A853" text-anchor="middle">✓ 是 (Llama 3.1+)</text>

