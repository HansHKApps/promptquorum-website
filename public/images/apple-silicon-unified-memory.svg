<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <!-- Background -->
  <rect width="800" height="380" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Unified Memory Architecture
  </text>

  <!-- Apple advantage (top left) -->
  <text x="80" y="65" font-family="system-ui, sans-serif" font-size="14" fill="#6750A4" text-anchor="start" font-weight="700">
    ✓ GPU sees full 18 GB
  </text>
  <text x="80" y="88" font-family="system-ui, sans-serif" font-size="14" fill="#6750A4" text-anchor="start" font-weight="700">
    ✓ 50–80 tok/s
  </text>

  <!-- Windows limitation (top right) -->
  <text x="720" y="65" font-family="system-ui, sans-serif" font-size="14" fill="#7D5260" text-anchor="end" font-weight="700">
    ✗ GPU limited to 8 GB
  </text>
  <text x="720" y="88" font-family="system-ui, sans-serif" font-size="14" fill="#7D5260" text-anchor="end" font-weight="700">
    ✗ CPU offload needed
  </text>

  <!-- LEFT: Apple Silicon M-series -->
  <g id="apple-side">
    <!-- Chip die outline -->
    <rect x="45" y="110" width="300" height="230" rx="8" fill="#FEF7FF" stroke="#6750A4" stroke-width="2.5"/>

    <!-- CPU cores section -->
    <g id="cpu-cores">
      <rect x="65" y="135" width="70" height="70" rx="5" fill="#E8DEF8" stroke="#6750A4" stroke-width="2"/>
      <rect x="155" y="135" width="70" height="70" rx="5" fill="#E8DEF8" stroke="#6750A4" stroke-width="2"/>
      <text x="145" y="180" font-family="system-ui, sans-serif" font-size="16" fill="#6750A4" text-anchor="middle" font-weight="700">
        CPU
      </text>
      <text x="145" y="220" font-family="system-ui, sans-serif" font-size="14" fill="#49454F" text-anchor="middle" font-weight="700">
        8-core
      </text>
    </g>

    <!-- GPU cores section -->
    <g id="gpu-cores">
      <rect x="65" y="225" width="70" height="70" rx="5" fill="#E8DEF8" stroke="#7D5260" stroke-width="2"/>
      <rect x="155" y="225" width="70" height="70" rx="5" fill="#E8DEF8" stroke="#7D5260" stroke-width="2"/>
      <rect x="245" y="225" width="70" height="70" rx="5" fill="#E8DEF8" stroke="#7D5260" stroke-width="2"/>
      <text x="155" y="270" font-family="system-ui, sans-serif" font-size="16" fill="#7D5260" text-anchor="middle" font-weight="700">
        GPU
      </text>
      <text x="155" y="310" font-family="system-ui, sans-serif" font-size="14" fill="#49454F" text-anchor="middle" font-weight="700">
        10-core
      </text>
    </g>

    <!-- Label -->
    <text x="195" y="360" font-family="system-ui, sans-serif" font-size="16" fill="#1C1B1F" text-anchor="middle" font-weight="700">
      M3 Pro
    </text>
  </g>

  <!-- CENTER: Unified Memory pool -->
  <g id="unified-memory">
    <!-- Large memory pool -->
    <ellipse cx="400" cy="210" rx="110" ry="130" fill="#E8DEF8" opacity="0.7" stroke="#6750A4" stroke-width="2.5"/>

    <!-- Memory label -->
    <text x="400" y="200" font-family="system-ui, sans-serif" font-size="18" fill="#6750A4" text-anchor="middle" font-weight="700">
      Unified
    </text>
    <text x="400" y="225" font-family="system-ui, sans-serif" font-size="18" fill="#6750A4" text-anchor="middle" font-weight="700">
      Memory
    </text>
    <text x="400" y="255" font-family="system-ui, sans-serif" font-size="16" fill="#49454F" text-anchor="middle" font-weight="700">
      18 GB
    </text>

    <!-- Model representation -->
    <rect x="350" y="275" width="100" height="45" rx="5" fill="#6750A4" stroke="#6750A4" stroke-width="1"/>
    <text x="400" y="307" font-family="system-ui, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="700">
      13B Model
    </text>
  </g>

  <!-- RIGHT: Discrete GPU -->
  <g id="windows-side">
    <!-- System RAM -->
    <rect x="515" y="110" width="240" height="105" rx="6" fill="#F7F2FA" stroke="#79747E" stroke-width="2.5"/>
    <text x="635" y="150" font-family="system-ui, sans-serif" font-size="16" fill="#1C1B1F" text-anchor="middle" font-weight="700">
      System RAM
    </text>
    <text x="635" y="180" font-family="system-ui, sans-serif" font-size="15" fill="#49454F" text-anchor="middle" font-weight="700">
      16 GB
    </text>

    <!-- Discrete GPU VRAM -->
    <rect x="515" y="235" width="240" height="105" rx="6" fill="#F7F2FA" stroke="#7D5260" stroke-width="2.5"/>
    <text x="635" y="275" font-family="system-ui, sans-serif" font-size="16" fill="#1C1B1F" text-anchor="middle" font-weight="700">
      GPU VRAM
    </text>
    <text x="635" y="305" font-family="system-ui, sans-serif" font-size="15" fill="#49454F" text-anchor="middle" font-weight="700">
      8 GB
    </text>

    <!-- Separate indicator line -->
    <line x1="515" y1="225" x2="755" y2="225" stroke="#7D5260" stroke-width="2" stroke-dasharray="5,5" opacity="0.7"/>

    <!-- Label -->
    <text x="635" y="360" font-family="system-ui, sans-serif" font-size="16" fill="#1C1B1F" text-anchor="middle" font-weight="700">
      Windows + RTX 4060
    </text>
  </g>
<text x="792" y="375" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>