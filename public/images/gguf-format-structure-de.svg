<svg viewBox="0 0 800 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="800" height="440" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">GGUF-Format: Eigenständige quantisierte Modelldatei</text>
  <text x="400" y="50" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">Eine .gguf-Datei enthält alles — keine weiteren Downloads erforderlich</text>

  <!-- Main GGUF File Box -->
  <rect x="50" y="65" width="700" height="310" fill="none" stroke="#6750A4" stroke-width="2.5" rx="10" filter="url(#shadow)"/>

  <!-- File label banner -->
  <rect x="50" y="65" width="700" height="34" rx="10" fill="#6750A4"/>
  <rect x="50" y="85" width="700" height="14" fill="#6750A4"/>
  <text x="400" y="87" font-family="'SF Mono','Monaco',monospace" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf  (~4,5 GB)</text>

  <!-- Component 1: Quantized Weights (top-left) -->
  <rect x="70" y="110" width="295" height="110" rx="8" fill="#E8DEF8" stroke="#6750A4" stroke-width="1.5"/>
  <text x="217" y="133" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#6750A4" text-anchor="middle">Quantisierte Gewichte</text>
  <text x="217" y="155" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">8 Milliarden Parameter</text>
  <text x="217" y="173" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">4-Bit-Präzision (Q4_K_M)</text>
  <rect x="160" y="183" width="115" height="22" rx="4" fill="#6750A4"/>
  <text x="217" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">~4,5 GB auf der Festplatte</text>

  <!-- Component 2: Model Metadata (top-right) -->
  <rect x="385" y="110" width="295" height="110" rx="8" fill="#E8DEF8" stroke="#6750A4" stroke-width="1.5"/>
  <text x="532" y="133" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#6750A4" text-anchor="middle">Modellmetadaten</text>
  <text x="532" y="155" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">Architektur: Transformer</text>
  <text x="532" y="173" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">Kontextlänge: 128K Token</text>
  <text x="532" y="191" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">Versteckte Größe: 4096</text>

  <!-- Component 3: Tokenizer (bottom-left) -->
  <rect x="70" y="235" width="295" height="110" rx="8" fill="#E8DEF8" stroke="#6750A4" stroke-width="1.5"/>
  <text x="217" y="258" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#6750A4" text-anchor="middle">Tokenizer</text>
  <text x="217" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">Vokabular (128K Token)</text>
  <text x="217" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">Token-ID-Zuordnungen</text>
  <text x="217" y="316" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">Kodierungsregeln (BPE)</text>

  <!-- Component 4: Format Info (bottom-right) -->
  <rect x="385" y="235" width="295" height="110" rx="8" fill="#E8DEF8" stroke="#6750A4" stroke-width="1.5"/>
  <text x="532" y="258" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#6750A4" text-anchor="middle">Format-Info</text>
  <text x="532" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">GGUF-Version: 3</text>
  <text x="532" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">Integritätsprüfsummen</text>
  <text x="532" y="316" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">CPU + GPU kompatibel</text>

  <!-- Bottom callout inside box -->
  <rect x="70" y="355" width="660" height="14" rx="4" fill="#F7F2FA"/>
  <text x="400" y="366" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#6750A4" text-anchor="middle">✓ Funktioniert mit Ollama · LM Studio · Jan AI · llama.cpp — keine separaten Konfigdateien nötig</text>

  <!-- Footer note -->
  <text x="400" y="408" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">Ersetzt das ältere GGML-Format. Der Quantisierungsgrad ist im Dateinamen kodiert (Q4_K_M oben).</text>
  <text x="400" y="426" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#79747E" text-anchor="middle">Ollama lädt GGUF-Dateien automatisch herunter: ollama pull llama3.1:8b</text>
</svg>
