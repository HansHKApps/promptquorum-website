<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="360" fill="#FFFFFF"/>

  <text x="400" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Backend-Auswahlhandbuch: Use-Case-Matrix
  </text>

  <rect x="20" y="50" width="180" height="40" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1"/>
  <rect x="200" y="50" width="190" height="40" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1"/>
  <rect x="390" y="50" width="190" height="40" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1"/>
  <rect x="580" y="50" width="200" height="40" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1"/>

  <text x="110" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#79747E" text-anchor="middle">Verwendungsfall</text>
  <text x="295" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#6750A4" text-anchor="middle">llama.cpp</text>
  <text x="485" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#6750A4" text-anchor="middle">Ollama</text>
  <text x="680" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#6750A4" text-anchor="middle">vLLM</text>

  <rect x="20" y="90" width="180" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="200" y="90" width="190" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="390" y="90" width="190" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="580" y="90" width="200" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>

  <text x="110" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F" text-anchor="middle">Persönlicher Chat</text>
  <text x="110" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">(1 Benutzer)</text>

  <text x="295" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Gut. Schnell</text>
  <text x="295" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">aufgebaut.</text>

  <text x="485" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#34A853" font-weight="700" text-anchor="middle">✓ Beste</text>
  <text x="485" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#34A853" text-anchor="middle">Einfachste.</text>

  <text x="680" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Zu viel</text>
  <text x="680" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Komplex.</text>

  <rect x="20" y="140" width="180" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="200" y="140" width="190" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="390" y="140" width="190" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="580" y="140" width="200" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>

  <text x="110" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F" text-anchor="middle">Entwicklung / Test</text>
  <text x="110" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">(Experimente)</text>

  <text x="295" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Gut. Benutzerd.</text>
  <text x="295" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Inferenz.</text>

  <text x="485" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#34A853" font-weight="700" text-anchor="middle">✓ Beste</text>
  <text x="485" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#34A853" text-anchor="middle">Schnell.</text>

  <text x="680" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Gut. API</text>
  <text x="680" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">fokussiert.</text>

  <rect x="20" y="190" width="180" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="200" y="190" width="190" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="390" y="190" width="190" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="580" y="190" width="200" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>

  <text x="110" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F" text-anchor="middle">Produktions-API</text>
  <text x="110" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">(10+ parallel)</text>

  <text x="295" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#EA4335" text-anchor="middle">✗ Nein</text>
  <text x="295" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#EA4335" text-anchor="middle">Kein Batch.</text>

  <text x="485" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#EA4335" text-anchor="middle">✗ Nein</text>
  <text x="485" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#EA4335" text-anchor="middle">Single-Batch.</text>

  <text x="680" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#34A853" font-weight="700" text-anchor="middle">✓ Nur Wahl</text>
  <text x="680" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#34A853" text-anchor="middle">250+ tok/s.</text>

  <rect x="20" y="240" width="180" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="200" y="240" width="190" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="390" y="240" width="190" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="580" y="240" width="200" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>

  <text x="110" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F" text-anchor="middle">Benutzerd. Motor</text>
  <text x="110" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">(Low-Level)</text>

  <text x="295" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#34A853" font-weight="700" text-anchor="middle">✓ Beste</text>
  <text x="295" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#34A853" text-anchor="middle">Vollkontrolle.</text>

  <text x="485" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Begrenzt.</text>
  <text x="485" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">High-Level.</text>

  <text x="680" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Begrenzt.</text>
  <text x="680" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">API-fokussiert.</text>

  <text x="400" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#79747E" text-anchor="middle">
    Alle drei erzeugen identische Modellausgaben. Wählen Sie basierend auf Use-Case und Durchsatzanforderungen.
  </text>
</svg>
