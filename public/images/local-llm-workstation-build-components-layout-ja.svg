  <circle cx="454" cy="110" r="8" fill="#34A853"/>
  <text x="454" y="116" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓</text>
  <text x="475" y="115" font-size="12" font-weight="700" fill="#1C1B1F">100 トークン/秒 (70B Q4)</text>

