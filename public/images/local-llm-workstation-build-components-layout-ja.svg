  <circle cx="454" cy="245" r="8" fill="#34A853"/>
  <text x="454" y="251" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓</text>
  <text x="475" y="250" font-size="12" font-weight="700" fill="#1C1B1F">並列ファインチューニング</text>

  <circle cx="454" cy="290" r="8" fill="#34A853"/>
  <text x="454" y="296" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓</text>
  <text x="475" y="295" font-size="12" font-weight="700" fill="#1C1B1F">TCO: ~¥440,000–572,000</text>

