<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <metadata>
    <dc:title xmlns:dc="http://purl.org/dc/elements/1.1/">On-Premises vs Cloud Cost Break-Even Analysis</dc:title>
    <dc:creator>PromptQuorum</dc:creator>
    <dc:rights>© PromptQuorum 2026</dc:rights>
    <dc:source>https://www.promptquorum.com/local-llms/private-local-ai-for-business</dc:source>
  </metadata>

  <rect width="800" height="350" fill="#FFFFFF"/>

  <text x="400" y="30" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">Cost Break-Even: Local vs Cloud by Token Volume</text>

  <!-- Cost Scenarios Table -->
  <rect x="28" y="55" width="744" height="240" rx="6" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1.5"/>

  <!-- Table Headers -->
  <text x="60" y="85" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#79747E">Token Volume</text>
  <text x="280" y="85" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#79747E">Cloud Cost (GPT-4o)</text>
  <text x="520" y="85" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#79747E">On-Premises Cost</text>
  <line x1="28" y1="92" x2="772" y2="92" stroke="#E8DEF8" stroke-width="1.5"/>

  <!-- Row 1: 10M tokens -->
  <text x="60" y="125" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F">10M tokens/month</text>
  <text x="280" y="125" font-family="system-ui, sans-serif" font-size="12" fill="#49454F">$200</text>
  <text x="520" y="125" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#34A853">$417 (hardware amortized)</text>
  <line x1="28" y1="135" x2="772" y2="135" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 2: 100M tokens -->
  <text x="60" y="160" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F">100M tokens/month</text>
  <text x="280" y="160" font-family="system-ui, sans-serif" font-size="12" fill="#49454F">$2,000</text>
  <text x="520" y="160" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#34A853">$417 (hardware amortized)</text>
  <line x1="28" y1="170" x2="772" y2="170" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 3: 200M tokens (break-even) -->
  <rect x="28" y="175" width="744" height="35" fill="#E8F5E9" stroke="none"/>
  <text x="60" y="202" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#2E7D32">200M tokens/month (BREAK-EVEN)</text>
  <text x="280" y="202" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#2E7D32">$4,000</text>
  <text x="520" y="202" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#2E7D32">~$4,000 (hardware + electricity)</text>
  <line x1="28" y1="212" x2="772" y2="212" stroke="#E8DEF8" stroke-width="1"/>

  <!-- Row 4: 1B tokens -->
  <text x="60" y="240" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F">1B tokens/month</text>
  <text x="280" y="240" font-family="system-ui, sans-serif" font-size="12" fill="#EA4335">$20,000</text>
  <text x="520" y="240" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#34A853">$417 (scales linearly)</text>

  <!-- Summary Box -->
  <rect x="28" y="310" width="744" height="35" rx="4" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1"/>
  <circle cx="48" cy="327" r="3" fill="#6750A4"/>
  <text x="63" y="332" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#6750A4">At 200M+ tokens/month, on-premises infrastructure pays for itself within 3–4 months.</text>

  <text x="792" y="340" font-family="system-ui, sans-serif" font-size="10" fill="#999999" text-anchor="end">promptquorum.com</text>
</svg>