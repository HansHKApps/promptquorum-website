<svg viewBox="0 0 1000 950" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <!-- Background -->
  <rect width="1000" height="950" fill="#f8f6ff"/>

  <!-- Title -->
  <text x="500" y="50" font-size="38" font-weight="bold" text-anchor="middle" fill="#2d1b4e">
    Quantization Trade-off: RAM Usage vs Output Quality
  </text>
  <text x="500" y="85" font-size="18" text-anchor="middle" fill="#666">
    Llama 3.2 3B Model as Example • Q4_K_M is the Sweet Spot
  </text>

  <!-- Y-axis label -->
  <text x="20" y="200" font-size="16" font-weight="bold" fill="#2d1b4e">RAM (GB)</text>

  <!-- Y-axis -->
  <line x1="60" y1="100" x2="60" y2="480" stroke="#333" stroke-width="2"/>

  <!-- Y-axis ticks and labels -->
  <line x1="55" y1="100" x2="60" y2="100" stroke="#333" stroke-width="1"/>
  <text x="35" y="107" font-size="14" fill="#666" text-anchor="end">4.5</text>

  <line x1="55" y1="162" x2="60" y2="162" stroke="#333" stroke-width="1"/>
  <text x="35" y="169" font-size="14" fill="#666" text-anchor="end">4.0</text>

  <line x1="55" y1="224" x2="60" y2="224" stroke="#333" stroke-width="1"/>
  <text x="35" y="231" font-size="14" fill="#666" text-anchor="end">3.5</text>

  <line x1="55" y1="286" x2="60" y2="286" stroke="#333" stroke-width="1"/>
  <text x="35" y="293" font-size="14" fill="#666" text-anchor="end">3.0</text>

  <line x1="55" y1="348" x2="60" y2="348" stroke="#333" stroke-width="1"/>
  <text x="35" y="355" font-size="14" fill="#666" text-anchor="end">2.5</text>

  <line x1="55" y1="410" x2="60" y2="410" stroke="#333" stroke-width="1"/>
  <text x="35" y="417" font-size="14" fill="#666" text-anchor="end">2.0</text>

  <line x1="55" y1="472" x2="60" y2="472" stroke="#333" stroke-width="1"/>
  <text x="35" y="479" font-size="14" fill="#666" text-anchor="end">1.5</text>

  <!-- X-axis -->
  <line x1="60" y1="480" x2="950" y2="480" stroke="#333" stroke-width="2"/>

  <!-- X-axis labels -->
  <text x="60" y="510" font-size="14" fill="#666" text-anchor="middle">Poor Quality (50%)</text>
  <text x="500" y="510" font-size="14" fill="#666" text-anchor="middle">Quality Tier (90% of Q8_0)</text>
  <text x="950" y="510" font-size="14" fill="#666" text-anchor="middle">Excellent (100%)</text>

  <!-- Quality zones background -->
  <rect x="60" y="100" width="340" height="380" fill="#fee2e2" opacity="0.3"/>
  <rect x="400" y="100" width="250" height="380" fill="#fef3c7" opacity="0.3"/>
  <rect x="650" y="100" width="300" height="380" fill="#dcfce7" opacity="0.3"/>

  <!-- Zone labels -->
  <text x="230" y="280" font-size="14" fill="#991b1b" font-weight="bold">Too Much RAM</text>
  <text x="525" y="280" font-size="14" fill="#b45309" font-weight="bold">Transition</text>
  <text x="800" y="280" font-size="14" fill="#15803d" font-weight="bold">Ideal Zone</text>

  <!-- Trade-off curve points and labels -->

  <!-- Q8_0: 3.8 GB, Poor quality -->
  <circle cx="110" cy="155" r="8" fill="#ef4444"/>
  <rect x="40" y="175" width="140" height="90" fill="white" stroke="#ef4444" stroke-width="2" rx="4"/>
  <text x="110" y="200" font-size="14" font-weight="bold" fill="#2d1b4e" text-anchor="middle">Q8_0</text>
  <text x="110" y="220" font-size="13" fill="#666" text-anchor="middle">3.8 GB RAM</text>
  <text x="110" y="240" font-size="13" fill="#666" text-anchor="middle">No quality loss</text>

  <!-- Q6_K: 2.8 GB, medium -->
  <circle cx="340" cy="256" r="8" fill="#f97316"/>
  <rect x="270" y="276" width="140" height="90" fill="white" stroke="#f97316" stroke-width="2" rx="4"/>
  <text x="340" y="301" font-size="14" font-weight="bold" fill="#2d1b4e" text-anchor="middle">Q6_K</text>
  <text x="340" y="321" font-size="13" fill="#666" text-anchor="middle">2.8 GB RAM</text>
  <text x="340" y="341" font-size="13" fill="#666" text-anchor="middle">-0.2% quality</text>

  <!-- Q4_K_M: 2.5 GB, RECOMMENDED -->
  <circle cx="550" cy="348" r="10" fill="#22c55e"/>
  <rect x="450" y="368" width="200" height="105" fill="#f0fdf4" stroke="#22c55e" stroke-width="3" rx="4"/>
  <text x="550" y="398" font-size="15" font-weight="bold" fill="#2d1b4e" text-anchor="middle">Q4_K_M</text>
  <text x="550" y="420" font-size="14" fill="#15803d" text-anchor="middle">2.5 GB RAM</text>
  <text x="550" y="440" font-size="14" fill="#15803d" text-anchor="middle">-0.5% quality</text>
  <text x="550" y="463" font-size="13" font-weight="bold" fill="#15803d" text-anchor="middle">★ RECOMMENDED ★</text>

  <!-- Q3_K_M: 1.8 GB, minimal -->
  <circle cx="800" cy="440" r="8" fill="#f59e0b"/>
  <rect x="730" y="460" width="140" height="90" fill="white" stroke="#f59e0b" stroke-width="2" rx="4"/>
  <text x="800" y="485" font-size="14" font-weight="bold" fill="#2d1b4e" text-anchor="middle">Q3_K_M</text>
  <text x="800" y="505" font-size="13" fill="#666" text-anchor="middle">1.8 GB RAM</text>
  <text x="800" y="525" font-size="13" fill="#666" text-anchor="middle">-1.8% quality</text>

  <!-- Curved line connecting points -->
  <path d="M 110 155 Q 280 210 340 256 Q 440 300 550 348 Q 670 400 800 440"
        stroke="#6750a4" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Comparison table -->
  <text x="60" y="600" font-size="18" font-weight="bold" fill="#2d1b4e">
    Quantization Benchmark (Llama 3.2 3B)
  </text>

  <!-- Table header -->
  <rect x="60" y="620" width="880" height="45" fill="#6750a4" rx="4"/>
  <text x="140" y="655" font-size="15" font-weight="bold" fill="white">Quantization</text>
  <text x="320" y="655" font-size="15" font-weight="bold" fill="white">RAM</text>
  <text x="480" y="655" font-size="15" font-weight="bold" fill="white">MMLU Score</text>
  <text x="700" y="655" font-size="15" font-weight="bold" fill="white">Recommendation</text>

  <!-- Table rows -->
  <rect x="60" y="665" width="880" height="45" fill="#fff5f7"/>
  <text x="140" y="695" font-size="14" fill="#333">Q8_0</text>
  <text x="320" y="695" font-size="14" fill="#333">3.8 GB</text>
  <text x="480" y="695" font-size="14" fill="#333">58% (same)</text>
  <text x="700" y="695" font-size="14" fill="#ef4444" font-weight="bold">❌ Avoid</text>

  <rect x="60" y="710" width="880" height="45" fill="#fffbf0"/>
  <text x="140" y="740" font-size="14" fill="#333">Q6_K</text>
  <text x="320" y="740" font-size="14" fill="#333">2.8 GB</text>
  <text x="480" y="740" font-size="14" fill="#333">57.8% (-0.2)</text>
  <text x="700" y="740" font-size="14" fill="#f97316" font-weight="bold">⚠️ Rare use</text>

  <rect x="60" y="755" width="880" height="45" fill="#f0fdf4"/>
  <text x="140" y="785" font-size="14" fill="#333">Q4_K_M</text>
  <text x="320" y="785" font-size="14" fill="#333">2.5 GB</text>
  <text x="480" y="785" font-size="14" fill="#333">57.5% (-0.5)</text>
  <text x="700" y="785" font-size="14" fill="#22c55e" font-weight="bold">✓ DEFAULT</text>

  <rect x="60" y="800" width="880" height="45" fill="#fef2f2"/>
  <text x="140" y="830" font-size="14" fill="#333">Q3_K_M</text>
  <text x="320" y="830" font-size="14" fill="#333">1.8 GB</text>
  <text x="480" y="830" font-size="14" fill="#333">56.2% (-1.8)</text>
  <text x="700" y="830" font-size="14" fill="#f59e0b" font-weight="bold">Only if needed</text>

  <!-- Decision rules box -->
  <rect x="60" y="870" width="880" height="65" fill="#f0f4ff" stroke="#4f46e5" stroke-width="2" rx="4"/>
  <text x="80" y="895" font-size="14" font-weight="bold" fill="#2d1b4e">When to Use Each:</text>
  <text x="80" y="920" font-size="13" fill="#333">• <tspan font-weight="bold">4 GB machine:</tspan> Q4_K_M (0.5 GB headroom)  •  <tspan font-weight="bold">6-8 GB:</tspan> Q4_K_M or Q6_K  •  <tspan font-weight="bold">&lt;4 GB:</tspan> Q3_K_M only</text>
<text x="992" y="945" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>
