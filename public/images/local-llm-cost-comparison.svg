<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <metadata>
    <dc:title xmlns:dc="http://purl.org/dc/elements/1.1/">Local LLM vs Cloud API Cost Comparison</dc:title>
    <dc:creator>PromptQuorum</dc:creator>
    <dc:rights>© PromptQuorum 2026</dc:rights>
    <dc:source>https://www.promptquorum.com/local-llms/local-llm-setup-for-teams</dc:source>
  </metadata>

  <rect width="900" height="500" fill="#FFFFFF"/>

  <text x="450" y="35" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#1C1B1F" text-anchor="middle">Cost Comparison: Local LLM vs Cloud APIs</text>

  <!-- TIME PERIOD SELECTOR -->
  <rect x="150" y="55" width="150" height="30" rx="4" fill="#F7F2FA" stroke="#6750A4" stroke-width="1.5"/>
  <text x="225" y="75" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#6750A4" text-anchor="middle">Year 1</text>

  <rect x="600" y="55" width="150" height="30" rx="4" fill="#E8F5E9" stroke="#34A853" stroke-width="1.5"/>
  <text x="675" y="75" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#34A853" text-anchor="middle">Year 3+ (Amortized)</text>

  <!-- LEFT SIDE: YEAR 1 -->
  <text x="100" y="120" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">Local LLM Server (Single)</text>

  <!-- Hardware cost -->
  <rect x="40" y="135" width="220" height="80" rx="4" fill="#FFF8E1" stroke="#F4B400" stroke-width="2"/>
  <text x="150" y="155" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F57F17" text-anchor="middle">Hardware</text>
  <text x="150" y="175" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">RTX 4090 + RAM + SSD</text>
  <text x="150" y="195" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#F57F17" text-anchor="middle">$2,500</text>

  <!-- Electricity cost -->
  <rect x="40" y="230" width="220" height="80" rx="4" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="150" y="250" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1976D2" text-anchor="middle">Electricity (1 yr)</text>
  <text x="150" y="270" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">$50/month × 12</text>
  <text x="150" y="290" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1976D2" text-anchor="middle">$600</text>

  <!-- TOTAL Year 1 -->
  <rect x="40" y="325" width="220" height="60" rx="4" fill="#34A853" stroke="#2E7D32" stroke-width="2"/>
  <text x="150" y="345" font-family="system-ui, sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle">Year 1 Total</text>
  <text x="150" y="370" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">$3,100</text>

  <!-- Cloud API Comparison -->
  <text x="340" y="120" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">Cloud API (OpenAI/Anthropic)</text>

  <rect x="280" y="135" width="220" height="175" rx="4" fill="#FFEBEE" stroke="#EA4335" stroke-width="2"/>
  <text x="390" y="160" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#C62828" text-anchor="middle">Monthly Cost</text>
  <text x="390" y="185" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">GPT-4 Turbo</text>
  <text x="390" y="202" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">~$1,000–$3,000/mo</text>
  <text x="390" y="225" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#49454F" text-anchor="middle">(typical team usage)</text>

  <line x1="290" y1="245" x2="500" y2="245" stroke="#EA4335" stroke-width="1" stroke-dasharray="2,2"/>

  <text x="390" y="270" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#C62828" text-anchor="middle">Year 1 Total</text>
  <text x="390" y="295" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#EA4335" text-anchor="middle">$12,000–$36,000</text>

  <!-- RIGHT SIDE: YEAR 3+ AMORTIZED -->
  <text x="570" y="120" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">Local LLM (Amortized Cost)</text>

  <!-- Hardware amortized (3-year lifecycle) -->
  <rect x="510" y="135" width="220" height="80" rx="4" fill="#FFF8E1" stroke="#F4B400" stroke-width="2"/>
  <text x="620" y="155" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F57F17" text-anchor="middle">Hardware (3-year)</text>
  <text x="620" y="175" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">$2,500 ÷ 36 months</text>
  <text x="620" y="195" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#F57F17" text-anchor="middle">$70</text>

  <!-- Electricity amortized -->
  <rect x="510" y="230" width="220" height="80" rx="4" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="620" y="250" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1976D2" text-anchor="middle">Electricity (Monthly)</text>
  <text x="620" y="270" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Continuous operation</text>
  <text x="620" y="290" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1976D2" text-anchor="middle">$50</text>

  <!-- TOTAL Amortized -->
  <rect x="510" y="325" width="220" height="60" rx="4" fill="#34A853" stroke="#2E7D32" stroke-width="2"/>
  <text x="620" y="345" font-family="system-ui, sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle">Monthly Cost</text>
  <text x="620" y="370" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">$120</text>

  <!-- Savings calculation -->
  <rect x="750" y="135" width="120" height="250" rx="4" fill="#E8F5E9" stroke="#34A853" stroke-width="2"/>

  <text x="810" y="165" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#34A853" text-anchor="middle">Annual Savings</text>
  <text x="810" y="210" font-family="system-ui, sans-serif" font-size="12" fill="#49454F" text-anchor="middle">Cloud: ~$18K</text>
  <text x="810" y="230" font-family="system-ui, sans-serif" font-size="12" fill="#49454F" text-anchor="middle">Local: $1,440</text>

  <line x1="760" y1="245" x2="860" y2="245" stroke="#34A853" stroke-width="1"/>

  <text x="810" y="270" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#34A853" text-anchor="middle">Saves ~$16,560</text>
  <text x="810" y="290" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#34A853" text-anchor="middle">per year</text>

  <text x="810" y="320" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Payback:</text>
  <text x="810" y="340" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#34A853" text-anchor="middle">2-3 months</text>
  <text x="810" y="360" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle">for active teams</text>

  <!-- Key insight box -->
  <rect x="40" y="415" width="830" height="65" rx="6" fill="#F3E5F5" stroke="#6750A4" stroke-width="2"/>
  <text x="60" y="440" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#6750A4">💡 Break-even analysis:</text>
  <text x="60" y="460" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">Local servers break even after 2-3 months if team generates $1K+/month in cloud API costs. For smaller teams or infrequent usage, evaluate ROI carefully.</text>

  <text x="830" y="490" font-family="system-ui, sans-serif" font-size="10" fill="#999999" text-anchor="end">promptquorum.com</text>
</svg>