<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="360" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="28" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">训练数据准备工作流程</text>

  <!-- Step 1: Collect Examples -->
  <circle cx="80" cy="80" r="22" fill="#6750A4"/>
  <text x="80" y="88" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="80" y="125" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">收集示例</text>
  <text x="80" y="145" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">500–5000个示例</text>
  <text x="80" y="160" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">指令+输出</text>

  <!-- Arrow 1 -->
  <text x="140" y="88" font-family="system-ui, sans-serif" font-size="24" fill="#6750A4">→</text>

  <!-- Step 2: Format as JSON -->
  <circle cx="220" cy="80" r="22" fill="#6750A4"/>
  <text x="220" y="88" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="220" y="125" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">格式化为JSON</text>
  <text x="220" y="145" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">{instruction, input,</text>
  <text x="220" y="160" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">output}</text>

  <!-- Arrow 2 -->
  <text x="280" y="88" font-family="system-ui, sans-serif" font-size="24" fill="#6750A4">→</text>

  <!-- Step 3: Save as JSONL -->
  <circle cx="360" cy="80" r="22" fill="#6750A4"/>
  <text x="360" y="88" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="360" y="125" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">保存为JSONL</text>
  <text x="360" y="145" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">一行一个示例</text>
  <text x="360" y="160" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">(training.jsonl)</text>

  <!-- Arrow 3 -->
  <text x="420" y="88" font-family="system-ui, sans-serif" font-size="24" fill="#6750A4">→</text>

  <!-- Step 4: Load into Trainer -->
  <circle cx="500" cy="80" r="22" fill="#6750A4"/>
  <text x="500" y="88" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="500" y="125" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">加载到训练器</text>
  <text x="500" y="145" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">SFTTrainer.train()</text>
  <text x="500" y="160" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">3个epoch</text>

  <!-- Arrow 4 -->
  <text x="560" y="88" font-family="system-ui, sans-serif" font-size="24" fill="#6750A4">→</text>

  <!-- Step 5: Export Model -->
  <circle cx="640" cy="80" r="22" fill="#34A853"/>
  <text x="640" y="88" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text>
  <text x="640" y="125" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">导出模型</text>
  <text x="640" y="145" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">merge_and_unload()</text>
  <text x="640" y="160" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">→ GGUF</text>

  <!-- Example box -->
  <rect x="40" y="210" width="720" height="120" rx="6" fill="#E8DEF8" stroke="#6750A4" stroke-width="1.5"/>
  <text x="60" y="235" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">训练数据示例（JSONL格式）：</text>

  <text x="60" y="260" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#1C1B1F">{"instruction": "翻译成法文", "input": "Hello world", "output": "Bonjour le monde"}</text>
  <text x="60" y="280" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#1C1B1F">{"instruction": "总结", "input": "关于AI的长文本...", "output": "总结：AI..."}</text>
  <text x="60" y="300" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#1C1B1F">{"instruction": "代码审查", "input": "def func(): pass", "output": "考虑添加文档字符串..."}</text>
  <text x="60" y="320" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F" font-style="italic">... 对所有500+个示例重复</text>

  <!-- Quality insight -->
  <rect x="40" y="330" width="720" height="24" rx="4" fill="#FFF3E0" stroke="#F4B400" stroke-width="1"/>
  <text x="60" y="348" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#F4B400">💡 提示：质量>数量。100个高质量示例胜过1000个低质量示例。</text>
</svg>