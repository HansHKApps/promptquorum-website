<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <!-- White background -->
  <rect width="800" height="400" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Releases Q1 2026 des LLM locaux
  </text>

  <!-- Timeline line -->
  <line x1="80" y1="100" x2="720" y2="100" stroke="#E8DEF8" stroke-width="2"/>

  <!-- January marker -->
  <circle cx="150" cy="100" r="8" fill="#6750A4"/>
  <text x="150" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F" text-anchor="middle">
    Janvier
  </text>
  <text x="150" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#49454F" text-anchor="middle">
    Phi-4 Mini
  </text>
  <text x="150" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#79747E" text-anchor="middle">
    3.8B, 70% HumanEval
  </text>

  <!-- February marker -->
  <circle cx="300" cy="100" r="8" fill="#6750A4"/>
  <text x="300" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F" text-anchor="middle">
    Février
  </text>
  <text x="300" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#49454F" text-anchor="middle">
    Gemma 3
  </text>
  <text x="300" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#79747E" text-anchor="middle">
    1B–27B, Vision
  </text>

  <!-- March marker -->
  <circle cx="450" cy="100" r="8" fill="#6750A4"/>
  <text x="450" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F" text-anchor="middle">
    Mars
  </text>
  <text x="450" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#49454F" text-anchor="middle">
    Llama 4 Scout
  </text>
  <text x="450" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#79747E" text-anchor="middle">
    MoE, 10M tokens
  </text>

  <!-- April marker -->
  <circle cx="600" cy="100" r="8" fill="#6750A4"/>
  <text x="600" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F" text-anchor="middle">
    Avril
  </text>
  <text x="600" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#49454F" text-anchor="middle">
