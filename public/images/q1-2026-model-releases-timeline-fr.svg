  </text>
  <text x="80" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#49454F">
    • Tous les releases disponibles dans Ollama en quelques jours
  </text>
<text x="792" y="395" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>
