<svg viewBox="0 0 800 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="800" height="440" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">GGUFフォーマット：自己完結型量子化モデルファイル</text>
  <text x="400" y="50" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">1つの.ggufファイルにすべてが含まれる — 追加ダウンロード不要</text>

  <!-- Main GGUF File Box -->
  <rect x="50" y="65" width="700" height="310" fill="none" stroke="#6750A4" stroke-width="2.5" rx="10" filter="url(#shadow)"/>

  <!-- File label banner -->
  <rect x="50" y="65" width="700" height="34" rx="10" fill="#6750A4"/>
  <rect x="50" y="85" width="700" height="14" fill="#6750A4"/>
  <text x="400" y="87" font-family="'SF Mono','Monaco',monospace" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf  (~4.5 GB)</text>

  <!-- Component 1: Quantized Weights (top-left) -->
  <rect x="70" y="110" width="295" height="110" rx="8" fill="#E8DEF8" stroke="#6750A4" stroke-width="1.5"/>
  <text x="217" y="133" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#6750A4" text-anchor="middle">量子化されたウェイト</text>
  <text x="217" y="155" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">80億パラメータ</text>
  <text x="217" y="173" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">4ビット精度（Q4_K_M）</text>
  <rect x="160" y="183" width="115" height="22" rx="4" fill="#6750A4"/>
  <text x="217" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">ディスク上で~4.5 GB</text>

  <!-- Component 2: Model Metadata (top-right) -->
  <rect x="385" y="110" width="295" height="110" rx="8" fill="#E8DEF8" stroke="#6750A4" stroke-width="1.5"/>
  <text x="532" y="133" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#6750A4" text-anchor="middle">モデルメタデータ</text>
  <text x="532" y="155" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">アーキテクチャ：Transformer</text>
  <text x="532" y="173" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">コンテキスト長：128Kトークン</text>
  <text x="532" y="191" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">隠れ層サイズ：4096</text>

  <!-- Component 3: Tokenizer (bottom-left) -->
  <rect x="70" y="235" width="295" height="110" rx="8" fill="#E8DEF8" stroke="#6750A4" stroke-width="1.5"/>
  <text x="217" y="258" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#6750A4" text-anchor="middle">トークナイザー</text>
  <text x="217" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">語彙（128Kトークン）</text>
  <text x="217" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">トークン→IDマッピング</text>
  <text x="217" y="316" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">エンコーディング規則（BPE）</text>

  <!-- Component 4: Format Info (bottom-right) -->
  <rect x="385" y="235" width="295" height="110" rx="8" fill="#E8DEF8" stroke="#6750A4" stroke-width="1.5"/>
  <text x="532" y="258" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#6750A4" text-anchor="middle">フォーマット情報</text>
  <text x="532" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">GGUFバージョン：3</text>
  <text x="532" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">整合性チェックサム</text>
  <text x="532" y="316" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">CPU + GPU対応</text>

  <!-- Bottom callout inside box -->
  <rect x="70" y="355" width="660" height="14" rx="4" fill="#F7F2FA"/>
  <text x="400" y="366" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#6750A4" text-anchor="middle">✓ Ollama · LM Studio · Jan AI · llama.cpp に対応 — 設定ファイル不要</text>

  <!-- Footer note -->
  <text x="400" y="408" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">旧GGMLフォーマットの後継。量子化レベルはファイル名に含まれます（上記のQ4_K_M）。</text>
  <text x="400" y="426" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#79747E" text-anchor="middle">OllamaはGGUFファイルを自動ダウンロード：ollama pull llama3.1:8b</text>
</svg>
