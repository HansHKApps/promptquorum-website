<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#f9fafb"/>

  <!-- Title -->
  <text x="400" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#1f2937">
    Context Window Comparison (tokens)
  </text>

  <!-- Grid lines -->
  <line x1="80" y1="450" x2="760" y2="450" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="80" y1="380" x2="760" y2="380" stroke="#e5e7eb" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="310" x2="760" y2="310" stroke="#e5e7eb" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="240" x2="760" y2="240" stroke="#e5e7eb" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="170" x2="760" y2="170" stroke="#e5e7eb" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="100" x2="760" y2="100" stroke="#e5e7eb" stroke-width="1" opacity="0.5"/>

  <!-- Y-axis labels (0, 500k, 1M, 1.5M, 2M) -->
  <text x="65" y="455" font-size="12" text-anchor="end" fill="#6b7280">0</text>
  <text x="65" y="385" font-size="12" text-anchor="end" fill="#6b7280">500k</text>
  <text x="65" y="315" font-size="12" text-anchor="end" fill="#6b7280">1M</text>
  <text x="65" y="245" font-size="12" text-anchor="end" fill="#6b7280">1.5M</text>
  <text x="65" y="175" font-size="12" text-anchor="end" fill="#6b7280">2M</text>

  <!-- Bars with labels -->
  <!-- GPT-4o: 128k (28.8% of 2M) -->
  <rect x="100" y="420" width="50" height="30" fill="#3b82f6" rx="4"/>
  <text x="125" y="465" font-size="13" font-weight="600" text-anchor="middle" fill="#1f2937">GPT-4o</text>
  <text x="125" y="440" font-size="11" text-anchor="middle" fill="#ffffff" font-weight="500">128k</text>

  <!-- Claude: 200k (45% of 2M) -->
  <rect x="180" y="375" width="50" height="75" fill="#8b5cf6" rx="4"/>
  <text x="205" y="465" font-size="13" font-weight="600" text-anchor="middle" fill="#1f2937">Claude</text>
  <text x="205" y="420" font-size="11" text-anchor="middle" fill="#ffffff" font-weight="500">200k</text>

  <!-- Gemini: 2M (100% of 2M) -->
  <rect x="260" y="100" width="50" height="350" fill="#10b981" rx="4"/>
  <text x="285" y="465" font-size="13" font-weight="600" text-anchor="middle" fill="#1f2937">Gemini</text>
  <text x="285" y="280" font-size="11" text-anchor="middle" fill="#ffffff" font-weight="500">2M</text>

  <!-- DeepSeek: ~80k (18% of 2M) -->
  <rect x="340" y="434" width="50" height="16" fill="#f59e0b" rx="4"/>
  <text x="365" y="465" font-size="13" font-weight="600" text-anchor="middle" fill="#1f2937">DeepSeek</text>
  <text x="365" y="448" font-size="11" text-anchor="middle" fill="#ffffff" font-weight="500">~80k</text>

  <!-- Baidu ERNIE: ~100k (22.5% of 2M) -->
  <rect x="420" y="430" width="50" height="20" fill="#ef4444" rx="4"/>
  <text x="445" y="465" font-size="13" font-weight="600" text-anchor="middle" fill="#1f2937">Baidu</text>
  <text x="445" y="444" font-size="11" text-anchor="middle" fill="#ffffff" font-weight="500">~100k</text>

  <!-- Legend note -->
  <text x="400" y="495" font-size="12" text-anchor="middle" fill="#6b7280" font-style="italic">
    Gemini 2.5 Pro supports 2M tokens — best for loading entire projects or document sets
  </text>
</svg>