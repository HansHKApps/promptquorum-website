<text x="178" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#34A853" text-anchor="middle">BESTE</text>
<text x="80" y="166" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#49454F" text-anchor="start">Keine Telemetrie im MIT-Quellcode bestätigt. Nur Localhost-API.</text>
