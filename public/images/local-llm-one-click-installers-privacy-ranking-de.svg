<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg">
<rect width="800" height="360" fill="#FFFFFF"/>
<text x="400" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1C1B1F" text-anchor="middle">Lokale LLM Datenschutz-Ranking — Telemetrie-Status, April 2026</text>
<text x="400" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#49454F" text-anchor="middle">Alle vier Tools führen Inferenz lokal durch. Ranking basiert auf Telemetrieerhebung und Quellcodeprüfbarkeit.</text>
