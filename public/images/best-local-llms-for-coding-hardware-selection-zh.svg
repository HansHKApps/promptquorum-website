<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="420" fill="#FFFFFF"/>
  <text x="400" y="32" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    应该使用哪个代码模型？硬件匹配指南
  </text>
  <rect x="28" y="55" width="340" height="310" rx="6" fill="#FFFFFF" stroke="#34A853" stroke-width="2" filter="url(#shadow)"/>
  <rect x="28" y="55" width="340" height="4" rx="0" fill="#34A853"/>
  <text x="198" y="80" font-size="16" font-weight="700" fill="#34A853" text-anchor="middle">8 GB RAM</text>
  <text x="198" y="100" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">Qwen2.5-Coder 7B</text>
  <text x="48" y="125" font-weight="700" fill="#1C1B1F">性能：</text>
  <text x="48" y="142" font-size="12" fill="#49454F">• HumanEval: 72%</text>
  <text x="48" y="158" font-size="12" fill="#49454F">• 速度: 15–25 tokens/秒</text>
  <text x="48" y="174" font-size="12" fill="#49454F">• 内存使用: 4.7 GB</text>
  <text x="48" y="200" font-weight="700" fill="#1C1B1F">最适合：</text>
  <text x="48" y="217" font-size="12" fill="#49454F">• 拥有8GB内存的用户</text>
  <text x="48" y="233" font-size="12" fill="#49454F">• IDE自动完成</text>
  <text x="48" y="249" font-size="12" fill="#49454F">• 日常编码任务</text>
  <text x="48" y="275" font-weight="700" fill="#1C1B1F">设置：</text>
  <text x="48" y="295" font-family="'SF Mono'" font-size="11" fill="#49454F">ollama run</text>
  <text x="48" y="310" font-family="'SF Mono'" font-size="11" fill="#49454F">qwen2.5-coder:7b</text>
  <rect x="430" y="55" width="340" height="310" rx="6" fill="#FFFFFF" stroke="#F4B400" stroke-width="2" filter="url(#shadow)"/>
  <rect x="430" y="55" width="340" height="4" rx="0" fill="#F4B400"/>
  <text x="600" y="80" font-size="16" font-weight="700" fill="#F4B400" text-anchor="middle">16 GB RAM</text>
  <text x="600" y="100" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">DeepSeek-Coder V2 16B</text>
  <text x="450" y="125" font-weight="700" fill="#1C1B1F">性能：</text>
  <text x="450" y="142" font-size="12" fill="#49454F">• HumanEval: 81%</text>
  <text x="450" y="158" font-size="12" fill="#49454F">• 速度: 25–40 tokens/秒</text>
  <text x="450" y="174" font-size="12" fill="#49454F">• 内存使用: ~10 GB</text>
  <text x="450" y="200" font-weight="700" fill="#1C1B1F">最适合：</text>
  <text x="450" y="217" font-size="12" fill="#49454F">• 16GB笔记本电脑/台式机</text>
  <text x="450" y="233" font-size="12" fill="#49454F">• 更高的代码质量</text>
  <text x="450" y="249" font-size="12" fill="#49454F">• 快速可靠的生成</text>
  <text x="450" y="275" font-weight="700" fill="#1C1B1F">设置：</text>
  <text x="450" y="295" font-family="'SF Mono'" font-size="11" fill="#49454F">ollama run deepseek-</text>
  <text x="450" y="310" font-family="'SF Mono'" font-size="11" fill="#49454F">coder-v2:16b</text>
  <rect x="28" y="380" width="742" height="35" rx="6" fill="#6750A4" filter="url(#shadow)"/>
  <text x="45" y="397" font-size="13" font-weight="700" fill="#FFFFFF">🏆 20+ GB RAM：</text>
  <text x="220" y="397" font-size="13" fill="#FFFFFF">Qwen2.5-Coder 32B (87% HumanEval) — 最高质量</text>
  <text x="400" y="420" font-size="10" fill="#79747E" text-anchor="middle">
    内存为Q4_K_M量化。始终将模型与可用内存相匹配。
  </text>
</svg>