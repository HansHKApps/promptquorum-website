<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <rect width="800" height="350" fill="#FFFFFF"/>

  <text x="400" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">VRAM计算公式</text>

  <rect x="40" y="55" width="720" height="50" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1"/>
  <text x="400" y="77" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#1C1B1F" text-anchor="middle" font-weight="600">VRAM (GB) = (模型参数量十亿 × 量化位数) ÷ 8</text>
  <text x="400" y="97" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#49454F" text-anchor="middle">+ 25–40% (上下文、批处理、系统开销)</text>

  <rect x="40" y="120" width="220" height="60" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1"/>
  <text x="150" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F" text-anchor="middle">7B at Q4 (4-bit)</text>
  <text x="150" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#6750A4" text-anchor="middle">3.5 GB</text>
  <text x="150" y="177" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">(7 × 4) ÷ 8</text>

  <rect x="290" y="120" width="220" height="60" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1"/>
  <text x="400" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F" text-anchor="middle">13B at Q5 (5-bit)</text>
  <text x="400" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#6750A4" text-anchor="middle">8.1 GB</text>
  <text x="400" y="177" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">(13 × 5) ÷ 8</text>

  <rect x="540" y="120" width="220" height="60" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1"/>
  <text x="650" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F" text-anchor="middle">70B at Q8 (8-bit)</text>
  <text x="650" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#6750A4" text-anchor="middle">70 GB</text>
  <text x="650" y="177" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">(70 × 8) ÷ 8</text>

  <text x="40" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#49454F">💡 关键: 始终为上下文窗口、批处理和系统开销增加25–40%缓冲。</text>
  <text x="40" y="252" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#49454F">例: 13B at Q5 = 计算值8.1 GB,但实际需要~10–11 GB GPU内存。</text>

  <text x="400" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#79747E" text-anchor="middle">
    ← 返回文章
  </text>
<text x="792" y="345" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>