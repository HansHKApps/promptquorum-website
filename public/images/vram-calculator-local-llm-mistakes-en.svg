<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata><rect width="800" height="350" fill="#FFFFFF"/><text x="400" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">4 Common VRAM Mistakes</text><rect x="40" y="55" width="720" height="30" fill="#EA4335" stroke="#E8DEF8" stroke-width="1"/><text x="400" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">❌ Mistake #1: Forgetting context overhead</text><text x="60" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">A 7B model at Q4 looks like 3.5 GB, but with 4k context it needs 5–6 GB total.</text><rect x="40" y="118" width="720" height="30" fill="#EA4335" stroke="#E8DEF8" stroke-width="1"/><text x="400" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">❌ Mistake #2: Confusing 70B with 70 GB VRAM</text><text x="60" y="163" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">70B means 70 billion parameters. VRAM needed is (70 × bits) ÷ 8, not 70 GB fixed.</text><rect x="40" y="181" width="720" height="30" fill="#EA4335" stroke="#E8DEF8" stroke-width="1"/><text x="400" y="201" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">❌ Mistake #3: Ignoring system overhead</text><text x="60" y="226" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">OS + inference framework reserve 1–2 GB. Your GPU never gets the full capacity.</text><rect x="40" y="244" width="720" height="30" fill="#EA4335" stroke="#E8DEF8" stroke-width="1"/><text x="400" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">❌ Mistake #4: Buying GPU exactly at calculated size</text><text x="60" y="289" font-family="system-ui, -apache-system, sans-serif" font-size="11" fill="#49454F">Need 18 GB? Buy 24 GB. Need 35 GB? Buy 40 GB. Always add 25% buffer.</text><text x="400" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#79747E" text-anchor="middle">← Back to Article</text><text x="792" y="345" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>