<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="800" height="400" fill="#FFFFFF"/>
  <rect x="24" y="16" width="752" height="368" rx="12" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1.5" filter="url(#shadow)"/>

  <text x="400" y="50" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#1C1B1F" text-anchor="middle">Définir la longueur de contexte dans Ollama — Modelfile</text>
  <text x="400" y="70" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">Ollama utilise 2048 tokens par défaut — définir num_ctx explicitement pour accéder au 128K complet</text>

  <!-- Left terminal: Modelfile -->
  <rect x="40" y="88" width="350" height="196" rx="8" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1.5"/>
  <rect x="40" y="88" width="350" height="28" rx="8" fill="#E8DEF8"/>
  <rect x="40" y="104" width="350" height="12" fill="#E8DEF8"/>
  <circle cx="58" cy="102" r="5" fill="#E67C73"/>
  <circle cx="76" cy="102" r="5" fill="#F4B400"/>
  <circle cx="94" cy="102" r="5" fill="#34A853"/>
  <text x="215" y="106" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#49454F" text-anchor="middle">Modelfile</text>

  <text x="60" y="138" font-family="'SF Mono','Monaco',monospace" font-size="14" font-weight="600" fill="#6750A4">FROM llama3.1:8b</text>
  <text x="60" y="162" font-family="'SF Mono','Monaco',monospace" font-size="14" font-weight="600" fill="#6750A4">PARAMETER num_ctx 32768</text>
  <text x="60" y="200" font-family="'SF Mono','Monaco',monospace" font-size="13" fill="#79747E"># Enregistrer le modèle :</text>
  <text x="60" y="220" font-family="'SF Mono','Monaco',monospace" font-size="14" font-weight="600" fill="#1C1B1F">$ ollama create llama3.1-32k \</text>
  <text x="60" y="240" font-family="'SF Mono','Monaco',monospace" font-size="14" font-weight="600" fill="#1C1B1F">    -f Modelfile</text>
  <text x="60" y="268" font-family="'SF Mono','Monaco',monospace" font-size="14" font-weight="600" fill="#34A853">transferring model data...</text>

  <!-- Right terminal: Verify -->
  <rect x="410" y="88" width="350" height="196" rx="8" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1.5"/>
  <rect x="410" y="88" width="350" height="28" rx="8" fill="#E8DEF8"/>
  <rect x="410" y="104" width="350" height="12" fill="#E8DEF8"/>
  <circle cx="428" cy="102" r="5" fill="#E67C73"/>
  <circle cx="446" cy="102" r="5" fill="#F4B400"/>
  <circle cx="464" cy="102" r="5" fill="#34A853"/>
  <text x="585" y="106" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#49454F" text-anchor="middle">Terminal — Vérification</text>

  <text x="428" y="138" font-family="'SF Mono','Monaco',monospace" font-size="14" font-weight="600" fill="#1C1B1F">$ ollama ps</text>
  <text x="428" y="162" font-family="'SF Mono','Monaco',monospace" font-size="12" fill="#79747E">NAME              SIZE    CTX    PROCESSOR</text>
  <text x="428" y="182" font-family="'SF Mono','Monaco',monospace" font-size="13" fill="#1C1B1F">llama3.1-32k</text>
  <text x="545" y="182" font-family="'SF Mono','Monaco',monospace" font-size="13" fill="#1C1B1F">4.7 Go</text>
  <rect x="604" y="170" width="52" height="18" rx="4" fill="#6750A4"/>
  <text x="630" y="183" font-family="'SF Mono','Monaco',monospace" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">32768</text>
  <text x="664" y="182" font-family="'SF Mono','Monaco',monospace" font-size="13" fill="#1C1B1F">CPU</text>

  <text x="428" y="210" font-family="'SF Mono','Monaco',monospace" font-size="14" font-weight="600" fill="#1C1B1F">$ ollama run llama3.1-32k</text>
  <text x="428" y="234" font-family="'SF Mono','Monaco',monospace" font-size="13" fill="#49454F">&gt;&gt;&gt; Send a message (/? for help)</text>
  <text x="428" y="258" font-family="'SF Mono','Monaco',monospace" font-size="13" fill="#79747E"># Contexte : 32K tokens actifs ✓</text>
  <text x="428" y="278" font-family="'SF Mono','Monaco',monospace" font-size="13" fill="#34A853">█</text>

  <!-- Callout -->
  <rect x="40" y="300" width="720" height="72" rx="8" fill="#E8DEF8"/>
  <text x="400" y="321" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#1C1B1F" text-anchor="middle">Valeurs num_ctx recommandées par taille de modèle</text>
  <text x="160" y="345" font-family="'SF Mono','Monaco',monospace" font-size="13" font-weight="600" fill="#6750A4" text-anchor="middle">Modèle 3B → 16384</text>
  <text x="160" y="362" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">(16K — ~6 Go RAM)</text>
  <text x="400" y="345" font-family="'SF Mono','Monaco',monospace" font-size="13" font-weight="600" fill="#6750A4" text-anchor="middle">Modèle 7B–8B → 32768</text>
  <text x="400" y="362" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">(32K — ~9 Go RAM)</text>
  <text x="640" y="345" font-family="'SF Mono','Monaco',monospace" font-size="13" font-weight="600" fill="#6750A4" text-anchor="middle">Modèle 70B → 65536</text>
  <text x="640" y="362" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">(64K — ~45 Go RAM)</text>
<text x="792" y="395" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>
