<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="360" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="28" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">设置时间: 本地与云</text>
  <text x="400" y="47" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">本地设置需要 20–40 分钟; 云 API 在 5 分钟内准备就绪</text>

  <!-- Left panel: Local (purple) -->
  <rect x="18" y="58" width="370" height="272" rx="6" fill="#FFFFFF" stroke="#6750A4" stroke-width="2"/>
  <rect x="18" y="58" width="370" height="5" rx="0" fill="#6750A4"/>

  <text x="203" y="88" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#6750A4" text-anchor="middle">本地设置</text>
  <text x="203" y="106" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">使用 Ollama 或 LM Studio</text>

  <!-- Timeline -->
  <text x="45" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#79747E">1. 下载推理引擎</text>
  <text x="45" y="152" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#49454F">Ollama 或 LM Studio 安装程序: 2–3 分钟</text>

  <text x="45" y="175" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#79747E">2. 下载模型文件</text>
  <text x="45" y="192" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#49454F">7B 模型 (4 GB): 5–10 分钟, 70B (40 GB): 1–2 小时</text>

  <text x="45" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#79747E">3. 配置 GPU (可选)</text>
  <text x="45" y="232" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#49454F">CUDA/Metal 驱动程序: 5–10 分钟，可能需要故障排除</text>

  <!-- Total time -->
  <rect x="32" y="250" width="336" height="50" rx="3" fill="#F5F5F5" stroke="#E8DEF8" stroke-width="1"/>
  <text x="203" y="270" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#6750A4" text-anchor="middle">⏱ 总计: 20–40 分钟</text>
  <text x="203" y="290" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79747E" text-anchor="middle">+ 持续维护 (更新、驱动程序修复)</text>

  <!-- Right panel: Cloud (green) -->
  <rect x="412" y="58" width="370" height="272" rx="6" fill="#FFFFFF" stroke="#34A853" stroke-width="2"/>
  <rect x="412" y="58" width="370" height="5" rx="0" fill="#34A853"/>

  <text x="597" y="88" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#34A853" text-anchor="middle">云设置</text>
  <text x="597" y="106" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">OpenAI、Anthropic、Google 等</text>

  <!-- Timeline -->
  <text x="435" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#79747E">1. 创建账户</text>
  <text x="435" y="152" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#49454F">电子邮件注册: 1 分钟</text>

  <text x="435" y="175" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#79747E">2. 生成 API 密钥</text>
  <text x="435" y="192" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#49454F">复制粘贴到您的代码: 1 分钟</text>

  <text x="435" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#79747E">3. 开始使用</text>
  <text x="435" y="232" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#49454F">进行第一次 API 调用: 3 分钟</text>

  <!-- Total time -->
  <rect x="426" y="250" width="336" height="50" rx="3" fill="#F5F5F5" stroke="#E8DEF8" stroke-width="1"/>
  <text x="597" y="270" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#34A853" text-anchor="middle">⏱ 总计: 5 分钟</text>
  <text x="597" y="290" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79747E" text-anchor="middle">无需维护，自动更新</text>

  <!-- "vs" divider -->
  <text x="400" y="175" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#79747E" text-anchor="middle">vs</text>

  <!-- Footer -->
  <text x="400" y="348" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79747E" text-anchor="middle">promptquorum.com/local-llms/local-llm-limitations</text>
</svg>
