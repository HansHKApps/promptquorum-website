<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <rect width="800" height="360" fill="#FFFFFF"/>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/></filter>
  </defs>

  <text x="400" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">5步调试流程</text>

  <line x1="18" y1="40" x2="782" y2="40" stroke="#E8DEF8" stroke-width="1.5"/>

  <!-- Step 1 -->
  <circle cx="80" cy="100" r="22" fill="#6750A4"/>
  <text x="80" y="108" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>

  <text x="80" y="145" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">检查内存</text>
  <text x="80" y="165" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">free -h</text>
  <text x="80" y="178" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">Activity Monitor</text>

  <!-- Arrow 1 -->
  <text x="140" y="108" font-family="system-ui, sans-serif" font-size="20" fill="#6750A4">→</text>

  <!-- Step 2 -->
  <circle cx="220" cy="100" r="22" fill="#6750A4"/>
  <text x="220" y="108" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>

  <text x="220" y="145" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">检查GPU</text>
  <text x="220" y="165" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">ollama ps</text>
  <text x="220" y="178" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">nvidia-smi</text>

  <!-- Arrow 2 -->
  <text x="280" y="108" font-family="system-ui, sans-serif" font-size="20" fill="#6750A4">→</text>

  <!-- Step 3 -->
  <circle cx="360" cy="100" r="22" fill="#6750A4"/>
  <text x="360" y="108" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>

  <text x="360" y="145" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">检查服务器</text>
  <text x="360" y="165" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">curl localhost:</text>
  <text x="360" y="178" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">11434</text>

  <!-- Arrow 3 -->
  <text x="420" y="108" font-family="system-ui, sans-serif" font-size="20" fill="#6750A4">→</text>

  <!-- Step 4 -->
  <circle cx="500" cy="100" r="22" fill="#6750A4"/>
  <text x="500" y="108" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>

  <text x="500" y="145" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">检查模型</text>
  <text x="500" y="165" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">ollama list</text>
  <text x="500" y="178" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">验证拉取</text>

  <!-- Arrow 4 -->
  <text x="560" y="108" font-family="system-ui, sans-serif" font-size="20" fill="#6750A4">→</text>

  <!-- Step 5 -->
  <circle cx="640" cy="100" r="22" fill="#6750A4"/>
  <text x="640" y="108" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text>

  <text x="640" y="145" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">检查输出</text>
  <text x="640" y="165" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">降低量化</text>
  <text x="640" y="178" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">Q4_K_M</text>

  <!-- Arrow end -->
  <text x="700" y="108" font-family="system-ui, sans-serif" font-size="20" fill="#6750A4">→</text>

  <text x="730" y="108" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#34A853">✓</text>

  <line x1="18" y1="200" x2="782" y2="200" stroke="#E8DEF8" stroke-width="1.5"/>

  <!-- Key point -->
  <text x="400" y="235" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">在揭示问题的第一步停止。</text>

  <!-- Example outcomes -->
  <text x="60" y="270" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1C1B1F">步骤1失败:</text>
  <text x="60" y="285" font-family="system-ui, sans-serif" font-size="10" fill="#49454F">关闭其他应用、</text>
  <text x="60" y="298" font-family="system-ui, sans-serif" font-size="10" fill="#49454F">缩小模型尺寸</text>

  <text x="280" y="270" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1C1B1F">步骤2失败:</text>
  <text x="280" y="285" font-family="system-ui, sans-serif" font-size="10" fill="#49454F">检查驱动、</text>
  <text x="280" y="298" font-family="system-ui, sans-serif" font-size="10" fill="#49454F">设置GPU_LAYERS</text>

  <text x="500" y="270" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1C1B1F">步骤3失败:</text>
  <text x="500" y="285" font-family="system-ui, sans-serif" font-size="10" fill="#49454F">重启ollama</text>
  <text x="500" y="298" font-family="system-ui, sans-serif" font-size="10" fill="#49454F">检查端口11434</text>

  <!-- Footer -->
  <line x1="18" y1="320" x2="782" y2="320" stroke="#E8DEF8" stroke-width="1.5"/>

  <text x="400" y="345" font-family="system-ui, sans-serif" font-size="11" fill="#79747E" text-anchor="middle">系统调试顺序。每个步骤隔离一个可能的原因。使用输出决定下一个操作。</text>
<text x="792" y="355" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>
