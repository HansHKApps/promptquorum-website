<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg">
  <metadata>
    <dc:title xmlns:dc="http://purl.org/dc/elements/1.1/">vLLM Multi-GPU Setup Steps</dc:title>
    <dc:creator>PromptQuorum</dc:creator>
    <dc:rights>© PromptQuorum 2026</dc:rights>
    <dc:source>https://www.promptquorum.com/local-llms/multi-gpu-local-llms</dc:source>
  </metadata>

  <rect width="800" height="360" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="28" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">vLLM 多 GPU 设置（4 步）</text>

  <!-- Step 1: Verify GPUs -->
  <circle cx="100" cy="90" r="24" fill="#6750A4"/>
  <text x="100" y="100" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="100" y="140" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">Verify GPUs</text>
  <text x="100" y="160" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">nvidia-smi</text>
  <text x="100" y="175" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle">Check both GPUs visible</text>

  <!-- Arrow 1 -->
  <text x="160" y="100" font-family="system-ui, sans-serif" font-size="28" fill="#6750A4">→</text>

  <!-- Step 2: Install vLLM -->
  <circle cx="280" cy="90" r="24" fill="#6750A4"/>
  <text x="280" y="100" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="280" y="140" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">Install vLLM</text>
  <text x="280" y="160" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">pip install vllm</text>
  <text x="280" y="175" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle">Multi-GPU support included</text>

  <!-- Arrow 2 -->
  <text x="340" y="100" font-family="system-ui, sans-serif" font-size="28" fill="#6750A4">→</text>

  <!-- Step 3: Launch with Tensor Parallel -->
  <circle cx="480" cy="90" r="24" fill="#6750A4"/>
  <text x="480" y="100" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="480" y="140" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">Launch vLLM</text>
  <text x="480" y="160" font-family="'SF Mono', Monaco, monospace" font-size="9" fill="#49454F" text-anchor="middle">--tensor-parallel-size 2</text>
  <text x="480" y="175" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle">Splits model across GPUs</text>

  <!-- Arrow 3 -->
  <text x="540" y="100" font-family="system-ui, sans-serif" font-size="28" fill="#6750A4">→</text>

  <!-- Step 4: Verify -->
  <circle cx="660" cy="90" r="24" fill="#34A853"/>
  <text x="660" y="100" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="660" y="140" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">Verify</text>
  <text x="660" y="160" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">Both GPUs loaded</text>
  <text x="660" y="175" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle">~100 tok/sec</text>

  <!-- Code block -->
  <rect x="40" y="220" width="720" height="110" rx="6" fill="#F5F5F5" stroke="#E8DEF8" stroke-width="1.5"/>

  <text x="60" y="242" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Command:</text>

  <text x="60" y="265" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#1C1B1F">vllm serve meta-llama/Llama-3.3-70B \</text>
  <text x="80" y="282" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#1C1B1F">  --tensor-parallel-size 2 \</text>
  <text x="80" y="299" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#1C1B1F">  --gpu-memory-utilization 0.95 \</text>
  <text x="80" y="316" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#1C1B1F">  --port 8000</text>

  <text x="60" y="338" font-family="system-ui, sans-serif" font-size="10" fill="#49454F">Then access OpenAI-compatible API at http://localhost:8000/v1</text>

  <!-- Corner attribution -->
  <text x="730" y="348" font-family="system-ui, sans-serif" font-size="10" fill="#999999" text-anchor="end">promptquorum.com</text>
</svg>