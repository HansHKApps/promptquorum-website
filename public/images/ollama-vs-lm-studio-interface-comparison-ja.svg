<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <defs>
    <style>
      .header-text { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 700; }
      .subtitle-text { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 600; }
      .label-text { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 500; }
      .mono-text { font-family: 'SF Mono', 'Monaco', monospace; font-size: 13px; font-weight: 500; }
      .footer-text { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; }
      .shadow { filter: drop-shadow(0 4px 6px rgba(0,0,0,0.08)); }
    </style>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="800" height="400" fill="#FFFFFF"/>

  <!-- Left panel: Ollama -->
  <g>
    <!-- Header background -->
    <rect x="20" y="20" width="360" height="50" fill="#FFFFFF" stroke="#6750A4" stroke-width="2" rx="8"/>

    <!-- Header text -->
    <text x="40" y="52" class="header-text" fill="#6750A4">Ollama</text>

    <!-- Terminal box -->
    <rect x="40" y="85" width="320" height="180" fill="#1C1B1F" stroke="#E8DEF8" stroke-width="1.5" rx="8" filter="url(#shadow)"/>

    <!-- Terminal text lines -->
    <text x="55" y="110" class="mono-text" fill="#FFFFFF">$ ollama run llama3.2:3b</text>
    <text x="55" y="133" class="mono-text" fill="#79747E">↓ ダウンロード中...</text>
    <text x="55" y="156" class="mono-text" fill="#34A853">>>> ローカル実行中。</text>
    <text x="55" y="185" class="mono-text" fill="#79747E" font-size="11">モデル: 3.2GB · 速度: 22tok/s</text>

    <!-- Subtitle -->
    <text x="40" y="285" class="subtitle-text" fill="#1C1B1F">CLI · API · localhost:11434</text>
  </g>

  <!-- Divider line -->
  <line x1="400" y1="20" x2="400" y2="380" stroke="#E8DEF8" stroke-width="2"/>

  <!-- Right panel: LM Studio -->
  <g>
    <!-- Header background -->
    <rect x="420" y="20" width="360" height="50" fill="#FFFFFF" stroke="#7D5260" stroke-width="2" rx="8"/>

    <!-- Header text -->
    <text x="440" y="52" class="header-text" fill="#7D5260">LM Studio</text>

    <!-- GUI card container -->
    <rect x="440" y="85" width="320" height="180" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1.5" rx="8" filter="url(#shadow)"/>

    <!-- Model selector bar -->
    <rect x="455" y="100" width="290" height="35" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1" rx="6"/>
    <text x="465" y="123" class="label-text" fill="#49454F">モデルを選択</text>
    <text x="710" y="123" class="label-text" fill="#79747E" text-anchor="end">▼</text>

    <!-- GPU slider label -->
    <text x="455" y="160" class="label-text" fill="#1C1B1F">GPU メモリ</text>
    <!-- Slider background -->
    <rect x="455" y="167" width="290" height="8" fill="#E8DEF8" rx="4"/>
    <!-- Slider fill (violet) -->
    <rect x="455" y="167" width="174" height="8" fill="#6750A4" rx="4"/>
    <!-- Slider thumb -->
    <circle cx="629" cy="171" r="6" fill="#6750A4"/>

    <!-- Chat bubble mockup -->
    <rect x="455" y="200" width="290" height="55" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1" rx="6"/>
    <text x="465" y="218" class="label-text" fill="#49454F">💬 チャット準備完了</text>
    <text x="465" y="237" class="label-text" fill="#79747E" font-size="11">メッセージを入力...</text>

    <!-- Subtitle -->
    <text x="440" y="285" class="subtitle-text" fill="#1C1B1F">GUI · ビルトイン チャット · ビジュアル設定</text>
  </g>

  <!-- Footer note -->
  <text x="400" y="360" class="footer-text" fill="#79747E" text-anchor="middle">両ツール llama.cpp 使用 — 同等の推論速度</text>
<text x="792" y="395" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>