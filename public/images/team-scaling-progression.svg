<svg viewBox="0 0 900 450" xmlns="http://www.w3.org/2000/svg">
  <metadata>
    <dc:title xmlns:dc="http://purl.org/dc/elements/1.1/">Team LLM Scaling Progression</dc:title>
    <dc:creator>PromptQuorum</dc:creator>
    <dc:rights>© PromptQuorum 2026</dc:rights>
    <dc:source>https://www.promptquorum.com/local-llms/local-llm-setup-for-teams</dc:source>
  </metadata>

  <rect width="900" height="450" fill="#FFFFFF"/>

  <text x="450" y="35" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#1C1B1F" text-anchor="middle">Scaling Local LLM Servers as Team Grows</text>

  <!-- Stage 1: 5-10 users -->
  <circle cx="120" cy="100" r="35" fill="#6750A4"/>
  <text x="120" y="110" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>

  <text x="120" y="155" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1C1B1F" text-anchor="middle">5-10 Users</text>
  <text x="120" y="175" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">1× RTX 4090</text>
  <text x="120" y="190" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Single Server</text>
  <text x="120" y="210" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#6750A4" text-anchor="middle">$2,500 initial</text>
  <text x="120" y="225" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#6750A4" text-anchor="middle">1 day setup</text>

  <!-- Arrow -->
  <path d="M 170 100 L 220 100" stroke="#E8DEF8" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Stage 2: 10-30 users -->
  <circle cx="340" cy="100" r="35" fill="#6750A4"/>
  <text x="340" y="110" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>

  <text x="340" y="155" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1C1B1F" text-anchor="middle">10-30 Users</text>
  <text x="340" y="175" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">2× RTX 4090</text>
  <text x="340" y="190" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Dual-GPU Machine</text>
  <text x="340" y="210" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#6750A4" text-anchor="middle">$5,000 initial</text>
  <text x="340" y="225" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#6750A4" text-anchor="middle">1 week setup</text>

  <!-- Arrow -->
  <path d="M 390 100 L 440 100" stroke="#E8DEF8" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Stage 3: 30-100 users -->
  <circle cx="560" cy="100" r="35" fill="#6750A4"/>
  <text x="560" y="110" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>

  <text x="560" y="155" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1C1B1F" text-anchor="middle">30-100 Users</text>
  <text x="560" y="175" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">3-4× GPU Cluster</text>
  <text x="560" y="190" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Separate Machines</text>
  <text x="560" y="210" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#6750A4" text-anchor="middle">$8,000-12,000</text>
  <text x="560" y="225" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#6750A4" text-anchor="middle">2-3 weeks setup</text>

  <!-- Arrow -->
  <path d="M 610 100 L 660 100" stroke="#E8DEF8" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Stage 4: 100+ users -->
  <circle cx="780" cy="100" r="35" fill="#34A853"/>
  <text x="780" y="110" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>

  <text x="780" y="155" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1C1B1F" text-anchor="middle">100+ Users</text>
  <text x="780" y="175" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Enterprise Cluster</text>
  <text x="780" y="190" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Multi-region Failover</text>
  <text x="780" y="210" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#34A853" text-anchor="middle">Custom Quote</text>
  <text x="780" y="225" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#34A853" text-anchor="middle">1 month + audit</text>

  <!-- Scaling Metrics Box -->
  <rect x="60" y="290" width="780" height="140" rx="8" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>

  <text x="80" y="320" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">Scaling Considerations:</text>

  <text x="80" y="345" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6750A4">Concurrent Users per GPU:</text>
  <text x="80" y="365" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">• Stage 1-2: 5-10 users with 5 tok/s per user • Stage 3: 10-15 users per GPU • Stage 4: 20+ with load balancing</text>

  <text x="80" y="390" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6750A4">Critical Event: Adding Hardware</text>
  <text x="80" y="410" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">Adding a new GPU: 30 minutes (drain queue → add hardware → rebalance nginx → resume). Zero downtime with dual-GPU or larger clusters.</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#E8DEF8"/>
    </marker>
  </defs>

  <text x="830" y="435" font-family="system-ui, sans-serif" font-size="10" fill="#999999" text-anchor="end">promptquorum.com</text>
</svg>