<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="900" height="400" fill="#FFFFFF"/>
  <rect x="30" y="20" width="840" height="360" rx="12" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="2" filter="url(#shadow)"/>

  <!-- Title -->
  <text x="450" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1C1B1F" text-anchor="middle">创意写作质量谱</text>

  <!-- Metric Labels -->
  <text x="50" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#79747E" letter-spacing="0.5">指标</text>
  <text x="200" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#79747E" letter-spacing="0.5">8B模型</text>
  <text x="450" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#79747E" letter-spacing="0.5">24B模型</text>
  <text x="700" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#79747E" letter-spacing="0.5">70B模型</text>

  <line x1="50" y1="92" x2="850" y2="92" stroke="#E8DEF8" stroke-width="1.5"/>

  <!-- Row 1: Story Length -->
  <text x="50" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1C1B1F">长度</text>
  <rect x="200" y="125" width="150" height="28" rx="6" fill="#F7F2FA" stroke="#79747E" stroke-width="1.5"/>
  <text x="275" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#49454F" text-anchor="middle">最多500字</text>

  <rect x="450" y="125" width="150" height="28" rx="6" fill="#F7F2FA" stroke="#7D5260" stroke-width="1.5"/>
  <text x="525" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#49454F" text-anchor="middle">1K～2K字</text>

  <rect x="700" y="125" width="150" height="28" rx="6" fill="#F7F2FA" stroke="#6750A4" stroke-width="1.5"/>
  <text x="775" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#49454F" text-anchor="middle">1K～3K字</text>

  <!-- Row 2: Coherence -->
  <text x="50" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1C1B1F">连贯性</text>
  <rect x="200" y="200" width="150" height="28" rx="6" fill="#F7F2FA" stroke="#79747E" stroke-width="1.5"/>
  <text x="275" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#49454F" text-anchor="middle">短段落</text>

  <rect x="450" y="200" width="150" height="28" rx="6" fill="#F7F2FA" stroke="#7D5260" stroke-width="1.5"/>
  <text x="525" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#49454F" text-anchor="middle">中等</text>

  <rect x="700" y="200" width="150" height="28" rx="6" fill="#F7F2FA" stroke="#6750A4" stroke-width="1.5"/>
  <text x="775" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#49454F" text-anchor="middle">持续</text>

  <!-- Row 3: Style Range -->
  <text x="50" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1C1B1F">风格范围</text>
  <rect x="200" y="275" width="150" height="28" rx="6" fill="#F7F2FA" stroke="#79747E" stroke-width="1.5"/>
  <text x="275" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#49454F" text-anchor="middle">狭隘</text>

  <rect x="450" y="275" width="150" height="28" rx="6" fill="#F7F2FA" stroke="#7D5260" stroke-width="1.5"/>
  <text x="525" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#49454F" text-anchor="middle">中等</text>

  <rect x="700" y="275" width="150" height="28" rx="6" fill="#F7F2FA" stroke="#6750A4" stroke-width="1.5"/>
  <text x="775" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#49454F" text-anchor="middle">最宽✓</text>

  <!-- Tier Labels at bottom -->
  <rect x="200" y="340" width="150" height="24" rx="12" fill="#F4F4F4" stroke="#79747E" stroke-width="1.5"/>
  <text x="275" y="356" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#49454F" text-anchor="middle">入门级</text>

  <rect x="450" y="340" width="150" height="24" rx="12" fill="#F7EDEF" stroke="#7D5260" stroke-width="1.5"/>
  <text x="525" y="356" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#7D5260" text-anchor="middle">中级</text>

  <rect x="700" y="340" width="150" height="24" rx="12" fill="#E8DEF8" stroke="#6750A4" stroke-width="1.5"/>
  <text x="775" y="356" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#6750A4" text-anchor="middle">最高质量✓</text>
</svg>