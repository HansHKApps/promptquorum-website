<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <rect width="800" height="420" fill="#FFFFFF"/>
  <text x="400" y="28" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, sans-serif">决策框架：云端 vs 本地代理</text>

  <!-- Left panel: When to choose Cloud -->
  <rect x="28" y="55" width="340" height="340" rx="6" fill="#FFFFFF" stroke="#34A853" stroke-width="2"/>
  <rect x="28" y="55" width="340" height="4" rx="0" fill="#34A853"/>
  <text x="198" y="80" font-size="16" font-weight="700" fill="#34A853" text-anchor="middle" font-family="system-ui, sans-serif">选择云端</text>

  <text x="48" y="110" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">最适合：</text>
  <text x="48" y="130" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• 复杂推理任务</text>
  <text x="48" y="148" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• 交互式聊天UI (&lt;500ms)</text>
  <text x="48" y="166" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• 低容量 (&lt;5000万/月)</text>
  <text x="48" y="184" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• 非敏感数据</text>
  <text x="48" y="202" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• 无DevOps开销</text>

  <line x1="48" y1="220" x2="308" y2="220" stroke="#E8DEF8" stroke-width="1"/>

  <text x="48" y="240" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">模型:</text>
  <text x="48" y="258" font-size="11" fill="#49454F" font-family="'SF Mono', Monaco, monospace">GPT-4, Claude 4.6,</text>
  <text x="48" y="273" font-size="11" fill="#49454F" font-family="'SF Mono', Monaco, monospace">Gemini 2.5 Pro</text>

  <text x="48" y="300" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">成本:</text>
  <text x="48" y="318" font-size="11" font-weight="700" fill="#34A853" font-family="'SF Mono', Monaco, monospace">$20/100万令牌</text>

  <text x="48" y="345" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">瓶颈：供应商锁定</text>

  <!-- Right panel: When to choose Local -->
  <rect x="432" y="55" width="340" height="340" rx="6" fill="#FFFFFF" stroke="#EA4335" stroke-width="2"/>
  <rect x="432" y="55" width="340" height="4" rx="0" fill="#EA4335"/>
  <text x="602" y="80" font-size="16" font-weight="700" fill="#EA4335" text-anchor="middle" font-family="system-ui, sans-serif">选择本地</text>

  <text x="452" y="110" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">最适合：</text>
  <text x="452" y="130" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• 隐私敏感数据</text>
  <text x="452" y="148" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• 高容量 (&gt;5000万/月)</text>
  <text x="452" y="166" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• GDPR/HIPAA/SOC2</text>
  <text x="452" y="184" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• 自定义控制</text>
  <text x="452" y="202" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• 离线操作</text>

  <line x1="452" y1="220" x2="712" y2="220" stroke="#E8DEF8" stroke-width="1"/>

  <text x="452" y="240" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">模型:</text>
  <text x="452" y="258" font-size="11" fill="#49454F" font-family="'SF Mono', Monaco, monospace">Llama 13B/32B,</text>
  <text x="452" y="273" font-size="11" fill="#49454F" font-family="'SF Mono', Monaco, monospace">Qwen 32B, DeepSeek</text>

  <text x="452" y="300" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">成本:</text>
  <text x="452" y="318" font-size="11" font-weight="700" fill="#EA4335" font-family="'SF Mono', Monaco, monospace">$0/令牌 (硬件)</text>

  <text x="452" y="345" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">瓶颈：硬件成本</text>
<text x="792" y="415" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>