  <text x="193" y="85" font-size="14" font-weight="700" fill="#6750A4" text-anchor="middle">FIM Support (IDE Autocomplete)</text>

  <circle cx="60" cy="130" r="18" fill="#34A853"/>
  <text x="60" y="138" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓</text>
  <text x="110" y="140" font-size="12" font-weight="700" fill="#1C1B1F">Qwen2.5-Coder 7B</text>
  <text x="110" y="156" font-size="11" fill="#49454F">Best for 8 GB with FIM</text>

  <circle cx="60" cy="195" r="18" fill="#34A853"/>
  <text x="60" y="203" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓</text>
  <text x="110" y="205" font-size="12" font-weight="700" fill="#1C1B1F">DeepSeek-Coder V2 Lite</text>
  <text x="110" y="221" font-size="11" fill="#49454F">Best for 16 GB with FIM</text>

  <circle cx="60" cy="260" r="18" fill="#34A853"/>
  <text x="60" y="268" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓</text>
