  <text x="607" y="85" font-size="14" font-weight="700" fill="#F4B400" text-anchor="middle">Model Selection by Use Case</text>

  <text x="462" y="125" font-size="12" font-weight="700" fill="#1C1B1F">💻 IDE Autocomplete (VS Code)</text>
  <text x="462" y="145" font-size="11" fill="#49454F">→ Starcoder2 15B (FIM-optimized)</text>
  <text x="462" y="161" font-size="11" fill="#49454F">→ or Qwen2.5-Coder 7B (via Continue.dev)</text>

  <text x="462" y="200" font-size="12" font-weight="700" fill="#1C1B1F">🚀 Best Quality (Reasoning)</text>
  <text x="462" y="220" font-size="11" fill="#49454F">→ Qwen2.5-Coder 32B (87% HumanEval)</text>
  <text x="462" y="236" font-size="11" fill="#49454F">→ Needs 20+ GB RAM</text>

  <text x="462" y="275" font-size="12" font-weight="700" fill="#1C1B1F">⚡ Balanced (8-16 GB Machines)</text>
  <text x="462" y="295" font-size="11" fill="#49454F">→ Qwen2.5-Coder 7B or DeepSeek V2 Lite</text>
  <text x="462" y="311" font-size="11" fill="#49454F">→ Strong HumanEval + FIM support</text>

  <text x="400" y="355" font-size="10" fill="#79747E" text-anchor="middle">FIM = Fill-in-the-Middle. Required for IDE autocomplete patterns. Ollama: ollama run [model-name]</text>
<text x="792" y="355" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>
