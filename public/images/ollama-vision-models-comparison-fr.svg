<svg viewBox="0 0 800 295" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .t { font-family: system-ui, -apple-system, sans-serif; }
      .mono { font-family: 'SF Mono', 'Monaco', monospace; font-size: 11px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="295" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Modèles capables de vision sur Ollama
  </text>

  <!-- Table header row -->
  <rect x="20" y="50" width="760" height="28" rx="4" fill="#F7F2FA"/>

  <!-- Header cells -->
  <text x="70" y="69" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#6750A4" text-anchor="start">Model</text>
  <text x="270" y="69" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#7D5260" text-anchor="start">RAM</text>
  <text x="410" y="69" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#49454F" text-anchor="start">Support des images</text>
  <text x="570" y="69" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#49454F" text-anchor="start">Commande Ollama</text>

  <!-- Divider -->
  <line x1="20" y1="78" x2="780" y2="78" stroke="#E8DEF8" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="20" y="78" width="760" height="28" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="0.5"/>
  <text x="70" y="97" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1C1B1F" text-anchor="start">llama3.2-vision:11b</text>
  <text x="270" y="97" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#49454F" text-anchor="start">~8 GB</text>
  <text x="410" y="97" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#34A853" font-weight="600" text-anchor="start">Yes ✓</text>
  <text x="570" y="97" font-family="SF Mono, Monaco, monospace" font-size="11" fill="#49454F" text-anchor="start">ollama run llama3.2-vision:11b</text>

  <!-- Row 2 -->
  <rect x="20" y="106" width="760" height="28" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="0.5"/>
  <text x="70" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1C1B1F" text-anchor="start">llama3.2-vision:90b</text>
  <text x="270" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#49454F" text-anchor="start">~55 GB</text>
  <text x="410" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#34A853" font-weight="600" text-anchor="start">Yes ✓</text>
  <text x="570" y="125" font-family="SF Mono, Monaco, monospace" font-size="11" fill="#49454F" text-anchor="start">ollama run llama3.2-vision:90b</text>

  <!-- Row 3 -->
  <rect x="20" y="134" width="760" height="28" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="0.5"/>
  <text x="70" y="153" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1C1B1F" text-anchor="start">gemma3:9b (vision)</text>
  <text x="270" y="153" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#49454F" text-anchor="start">~6 GB</text>
  <text x="410" y="153" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#34A853" font-weight="600" text-anchor="start">Yes ✓</text>
  <text x="570" y="153" font-family="SF Mono, Monaco, monospace" font-size="11" fill="#49454F" text-anchor="start">ollama run gemma3:9b</text>

  <!-- Row 4 -->
  <rect x="20" y="162" width="760" height="28" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="0.5"/>
  <text x="70" y="181" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1C1B1F" text-anchor="start">minicpm-v:8b</text>
  <text x="270" y="181" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#49454F" text-anchor="start">~5.5 GB</text>
  <text x="410" y="181" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#34A853" font-weight="600" text-anchor="start">Yes ✓</text>
  <text x="570" y="181" font-family="SF Mono, Monaco, monospace" font-size="11" fill="#49454F" text-anchor="start">ollama run minicpm-v</text>

  <!-- Callout -->
  <rect x="20" y="210" width="760" height="55" rx="6" fill="#EDE7F6" stroke="#6750A4" stroke-width="1.5"/>
  <text x="35" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#6750A4">Les 4 modèles prennent en charge l'entrée d'images :</text>
  <text x="35" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">Téléchargez des images sous forme de fichiers locaux. Aucun transfert cloud. Supporte les formats JPEG, PNG, GIF.</text>
  <text x="35" y="263" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">S'exécute entièrement sur votre machine — idéal pour l'analyse de documents sensibles à la confidentialité.</text>

  <!-- Footer -->
  <text x="400" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#79747E" text-anchor="middle">
    Modèles vision disponibles sur ollama.com/library | Mis à jour avril 2026
  </text>
</svg>
