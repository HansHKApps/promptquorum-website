<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a"/>

  <!-- Terminal window -->
  <rect x="40" y="30" width="720" height="340" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="40" y="30" width="720" height="35" rx="12" ry="12" fill="#334155"/>

  <!-- Traffic light dots -->
  <circle cx="60" cy="47.5" r="5" fill="#ef4444"/>
  <circle cx="85" cy="47.5" r="5" fill="#eab308"/>
  <circle cx="110" cy="47.5" r="5" fill="#22c55e"/>

  <!-- Window title -->
  <text x="280" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">
    zsh — 120×30
  </text>

  <!-- Terminal content background -->
  <rect x="50" y="70" width="700" height="290" fill="#0f172a"/>

  <!-- Prompt and command -->
  <text x="60" y="100" font-family="'SF Mono', 'Monaco', monospace" font-size="13" fill="#94a3b8" letter-spacing="0.5">
    $ ollama run mistral:7b
  </text>

  <!-- Model loading output -->
  <text x="60" y="125" font-family="'SF Mono', 'Monaco', monospace" font-size="12" fill="#64748b" letter-spacing="0.3">
    pulling manifest
  </text>

  <text x="60" y="148" font-family="'SF Mono', 'Monaco', monospace" font-size="12" fill="#64748b" letter-spacing="0.3">
    → llama_model_loader: loaded meta data
  </text>

  <!-- Loading bar -->
  <rect x="60" y="165" width="300" height="6" rx="3" fill="#334155"/>
  <rect x="60" y="165" width="240" height="6" rx="3" fill="#06b6d4"/>
  <text x="370" y="171" font-family="'SF Mono', 'Monaco', monospace" font-size="11" fill="#64748b" letter-spacing="0.2">
    80%
  </text>

  <!-- Generation output with streaming text -->
  <text x="60" y="200" font-family="'SF Mono', 'Monaco', monospace" font-size="13" fill="#22c55e" letter-spacing="0.4">
    >>> What is a local LLM?
  </text>

  <text x="60" y="225" font-family="'SF Mono', 'Monaco', monospace" font-size="12" fill="#86efac" letter-spacing="0.3">
    A local LLM is an AI language model that runs
  </text>

  <text x="60" y="246" font-family="'SF Mono', 'Monaco', monospace" font-size="12" fill="#86efac" letter-spacing="0.3">
    entirely on your device without cloud API calls.
  </text>

  <text x="60" y="267" font-family="'SF Mono', 'Monaco', monospace" font-size="12" fill="#86efac" letter-spacing="0.3">
    This gives you complete privacy and offline access.
  </text>

  <!-- Cursor (blinking indicator) -->
  <rect x="60" y="280" width="8" height="16" fill="#22c55e" opacity="0.7"/>

  <!-- Speed readout -->
  <text x="60" y="320" font-family="'SF Mono', 'Monaco', monospace" font-size="11" fill="#94a3b8" letter-spacing="0.2">
    eval rate: 22.4 tokens/s | stop reason: "length"
  </text>

  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="terminalGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect x="40" y="30" width="720" height="340" rx="12" fill="url(#terminalGradient)"/>
</svg>