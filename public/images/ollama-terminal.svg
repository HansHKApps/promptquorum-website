<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF"/>

  <!-- Terminal window -->
  <rect x="40" y="30" width="720" height="340" rx="12" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="2"/>

  <!-- Title bar -->
  <rect x="40" y="30" width="720" height="35" rx="12" ry="12" fill="#E8DEF8" stroke="#6750A4" stroke-width="1"/>

  <!-- Traffic light dots -->
  <circle cx="60" cy="47.5" r="5" fill="#E67C73"/>
  <circle cx="85" cy="47.5" r="5" fill="#F4B400"/>
  <circle cx="110" cy="47.5" r="5" fill="#34A853"/>

  <!-- Window title -->
  <text x="280" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#49454F" text-anchor="middle" font-weight="600">
    Terminal — Ollama
  </text>

  <!-- Terminal content background -->
  <rect x="50" y="70" width="700" height="290" fill="#FFFFFF"/>

  <!-- Prompt and command -->
  <text x="60" y="105" font-family="'SF Mono', 'Monaco', monospace" font-size="16" fill="#1C1B1F" letter-spacing="0.5" font-weight="600">
    $ ollama run mistral:7b
  </text>

  <!-- Model loading output -->
  <text x="60" y="135" font-family="'SF Mono', 'Monaco', monospace" font-size="14" fill="#79747E" letter-spacing="0.3">
    pulling manifest
  </text>

  <text x="60" y="160" font-family="'SF Mono', 'Monaco', monospace" font-size="14" fill="#79747E" letter-spacing="0.3">
    → llama_model_loader: loaded meta data
  </text>

  <!-- Loading bar -->
  <rect x="60" y="175" width="300" height="8" rx="4" fill="#E8DEF8"/>
  <rect x="60" y="175" width="240" height="8" rx="4" fill="#6750A4"/>
  <text x="370" y="185" font-family="'SF Mono', 'Monaco', monospace" font-size="13" fill="#49454F" letter-spacing="0.2" font-weight="600">
    80%
  </text>

  <!-- Generation output with text -->
  <text x="60" y="215" font-family="'SF Mono', 'Monaco', monospace" font-size="16" fill="#6750A4" letter-spacing="0.4" font-weight="700">
    >>> What is a local LLM?
  </text>

  <text x="60" y="245" font-family="'SF Mono', 'Monaco', monospace" font-size="14" fill="#1C1B1F" letter-spacing="0.3" font-weight="500">
    A local LLM is an AI language model that runs
  </text>

  <text x="60" y="268" font-family="'SF Mono', 'Monaco', monospace" font-size="14" fill="#1C1B1F" letter-spacing="0.3" font-weight="500">
    entirely on your device without cloud API calls.
  </text>

  <text x="60" y="291" font-family="'SF Mono', 'Monaco', monospace" font-size="14" fill="#1C1B1F" letter-spacing="0.3" font-weight="500">
    This gives you complete privacy and offline access.
  </text>

  <!-- Cursor (blinking indicator) -->
  <rect x="60" y="305" width="8" height="16" fill="#6750A4" opacity="0.7"/>

  <!-- Speed readout -->
  <text x="60" y="340" font-family="'SF Mono', 'Monaco', monospace" font-size="13" fill="#79747E" letter-spacing="0.2" font-weight="600">
    eval rate: 22.4 tokens/s | stop reason: "length"
  </text>

  <!-- Subtle shadow -->
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect x="40" y="30" width="720" height="340" rx="12" fill="none" filter="url(#shadow)"/>
</svg>