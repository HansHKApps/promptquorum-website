<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="340" fill="#FFFFFF"/>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/></filter>
  </defs>

  <text x="400" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">モデルサイズ別のRAM要件</text>

  <line x1="18" y1="40" x2="782" y2="40" stroke="#E8DEF8" stroke-width="1.5"/>

  <rect x="340" y="50" width="90" height="280" fill="#E8DEF8" opacity="0.3"/>

  <text x="50" y="65" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#79747E">モデル</text>
  <text x="150" y="65" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#79747E">パラメータ</text>
  <text x="350" y="65" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#6750A4" text-anchor="middle">Q4_K_M</text>
  <text x="470" y="65" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#79747E">Q8_0</text>
  <text x="650" y="65" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#79747E">最小RAM</text>

  <line x1="18" y1="72" x2="782" y2="72" stroke="#E8DEF8" stroke-width="1.5"/>

  <text x="50" y="98" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F">llama3.2:1b</text>
  <text x="150" y="98" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">1B</text>
  <text x="350" y="98" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#1C1B1F" text-anchor="middle">~1 GB</text>
  <text x="470" y="98" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">~1.5 GB</text>
  <circle cx="650" cy="92" r="14" fill="#34A853"/>
  <text x="650" y="98" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">8 GB</text>
  <line x1="18" y1="108" x2="782" y2="108" stroke="#F7F2FA" stroke-width="1"/>

  <text x="50" y="134" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F">llama3.2:3b</text>
  <text x="150" y="134" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">3B</text>
  <text x="350" y="134" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#1C1B1F" text-anchor="middle">~2.3 GB</text>
  <text x="470" y="134" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">~3.5 GB</text>
  <circle cx="650" cy="128" r="14" fill="#34A853"/>
  <text x="650" y="134" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">8 GB</text>
  <line x1="18" y1="144" x2="782" y2="144" stroke="#F7F2FA" stroke-width="1"/>

  <text x="50" y="170" font-family="system-ui, sans-serif" font-size="11" fill="#1C1B1F">llama3.1:8b /</text>
  <text x="50" y="182" font-family="system-ui, sans-serif" font-size="11" fill="#1C1B1F">mistral:7b</text>
  <text x="150" y="176" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">7–8B</text>
  <text x="350" y="176" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#1C1B1F" text-anchor="middle">~4.5–5 GB</text>
  <text x="470" y="176" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">~7.5–8.5 GB</text>
  <circle cx="650" cy="170" r="14" fill="#34A853"/>
  <text x="650" y="176" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">16 GB</text>
  <line x1="18" y1="192" x2="782" y2="192" stroke="#F7F2FA" stroke-width="1"/>

  <text x="50" y="218" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F">qwen2.5:14b</text>
  <text x="150" y="218" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">14B</text>
  <text x="350" y="218" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#1C1B1F" text-anchor="middle">~9 GB</text>
  <text x="470" y="218" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">~15 GB</text>
  <circle cx="650" cy="212" r="14" fill="#F4B400"/>
  <text x="650" y="218" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">32 GB</text>
  <line x1="18" y1="228" x2="782" y2="228" stroke="#F7F2FA" stroke-width="1"/>

  <text x="50" y="254" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F">llama3.1:70b</text>
  <text x="150" y="254" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">70B</text>
  <text x="350" y="254" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#1C1B1F" text-anchor="middle">~43 GB</text>
  <text x="470" y="254" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">~75 GB</text>
  <circle cx="650" cy="248" r="14" fill="#EA4335"/>
  <text x="650" y="254" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">64 GB</text>

  <line x1="18" y1="264" x2="782" y2="264" stroke="#E8DEF8" stroke-width="1.5"/>

  <text x="400" y="285" font-family="system-ui, sans-serif" font-size="11" fill="#79747E" text-anchor="middle">Q4_K_M（推奨） — 最も一般的な量子化。システムRAM = モデルRAM × 1.5余裕。</text>
  <text x="400" y="300" font-family="system-ui, sans-serif" font-size="11" fill="#79747E" text-anchor="middle">緑：≤16GB、琥珀：32GB、赤：64GBシステム要件。</text>
</svg>
