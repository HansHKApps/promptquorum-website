<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <metadata>
    <dc:title xmlns:dc="http://purl.org/dc/elements/1.1/">Team LLM Monitoring Metrics Dashboard</dc:title>
    <dc:creator>PromptQuorum</dc:creator>
    <dc:rights>© PromptQuorum 2026</dc:rights>
    <dc:source>https://www.promptquorum.com/local-llms/local-llm-setup-for-teams</dc:source>
  </metadata>

  <rect width="900" height="550" fill="#FFFFFF"/>

  <text x="450" y="35" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#1C1B1F" text-anchor="middle">Monitoring & Performance Metrics Dashboard</text>

  <!-- Top Row: Key Metrics -->
  <!-- Metric 1: GPU Utilization -->
  <rect x="40" y="70" width="200" height="130" rx="6" fill="#F0F4FF" stroke="#2196F3" stroke-width="2"/>
  <text x="140" y="95" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1976D2" text-anchor="middle">GPU Utilization</text>

  <!-- Gauge-like progress bar -->
  <rect x="60" y="105" width="160" height="12" rx="4" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/>
  <rect x="60" y="105" width="120" height="12" rx="4" fill="#2196F3"/>
  <text x="140" y="125" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1976D2" text-anchor="middle">75%</text>

  <text x="60" y="150" font-family="system-ui, sans-serif" font-size="10" fill="#49454F">Healthy: < 90%</text>
  <text x="60" y="163" font-family="system-ui, sans-serif" font-size="10" fill="#49454F">Alert: > 90%</text>

  <!-- Metric 2: Request Latency -->
  <rect x="270" y="70" width="200" height="130" rx="6" fill="#FCF3E9" stroke="#FF9800" stroke-width="2"/>
  <text x="370" y="95" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#E65100" text-anchor="middle">Avg Latency</text>

  <rect x="290" y="105" width="160" height="12" rx="4" fill="#FFE0B2" stroke="#FF9800" stroke-width="1"/>
  <rect x="290" y="105" width="64" height="12" rx="4" fill="#FF9800"/>
  <text x="370" y="125" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#E65100" text-anchor="middle">640ms</text>

  <text x="290" y="150" font-family="system-ui, sans-serif" font-size="10" fill="#49454F">Target: < 1s</text>
  <text x="290" y="163" font-family="system-ui, sans-serif" font-size="10" fill="#49454F">p99: 1.2s</text>

  <!-- Metric 3: Queue Length -->
  <rect x="500" y="70" width="200" height="130" rx="6" fill="#FFF3E0" stroke="#F4B400" stroke-width="2"/>
  <text x="600" y="95" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#F57F17" text-anchor="middle">Request Queue</text>

  <rect x="520" y="105" width="160" height="12" rx="4" fill="#FFE0B2" stroke="#F4B400" stroke-width="1"/>
  <rect x="520" y="105" width="32" height="12" rx="4" fill="#F4B400"/>
  <text x="600" y="125" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#F57F17" text-anchor="middle">3 requests</text>

  <text x="520" y="150" font-family="system-ui, sans-serif" font-size="10" fill="#49454F">Max: 10 (alert)</text>
  <text x="520" y="163" font-family="system-ui, sans-serif" font-size="10" fill="#49454F">Current: Healthy</text>

  <!-- Metric 4: Throughput -->
  <rect x="730" y="70" width="150" height="130" rx="6" fill="#F3E5F5" stroke="#6750A4" stroke-width="2"/>
  <text x="805" y="95" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#6750A4" text-anchor="middle">Throughput</text>

  <text x="805" y="125" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#6750A4" text-anchor="middle">87 tok/s</text>

  <text x="745" y="150" font-family="system-ui, sans-serif" font-size="9" fill="#49454F">Dual-GPU:</text>
  <text x="745" y="163" font-family="system-ui, sans-serif" font-size="9" fill="#49454F">100+ tok/s target</text>

  <!-- Chart Section -->
  <text x="60" y="230" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">Latency Trend (Last 24 hours)</text>

  <rect x="40" y="250" width="820" height="200" rx="6" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1.5"/>

  <!-- Y-axis labels -->
  <text x="30" y="260" font-family="system-ui, sans-serif" font-size="9" fill="#999999" text-anchor="end">2s</text>
  <text x="30" y="315" font-family="system-ui, sans-serif" font-size="9" fill="#999999" text-anchor="end">1s</text>
  <text x="30" y="370" font-family="system-ui, sans-serif" font-size="9" fill="#999999" text-anchor="end">0s</text>

  <!-- Y-axis line -->
  <line x1="40" y1="255" x2="40" y2="385" stroke="#E0E0E0" stroke-width="1"/>
  <!-- X-axis line -->
  <line x1="40" y1="385" x2="850" y2="385" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Latency line chart -->
  <polyline points="60,340 110,330 160,320 210,310 260,300 310,305 360,315 410,325 460,335 510,330 560,320 610,310 660,305 710,315 760,325 810,340"
            fill="none" stroke="#2196F3" stroke-width="3" stroke-linecap="round"/>

  <!-- Target line (1 second) -->
  <line x1="40" y1="315" x2="850" y2="315" stroke="#EA4335" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="855" y="320" font-family="system-ui, sans-serif" font-size="8" fill="#EA4335">Target: 1s</text>

  <!-- Time labels -->
  <text x="100" y="410" font-family="system-ui, sans-serif" font-size="9" fill="#999999" text-anchor="middle">12 hrs ago</text>
  <text x="450" y="410" font-family="system-ui, sans-serif" font-size="9" fill="#999999" text-anchor="middle">Now</text>
  <text x="800" y="410" font-family="system-ui, sans-serif" font-size="9" fill="#999999" text-anchor="middle">12 hrs from now</text>

  <!-- Legend & Alerts -->
  <rect x="40" y="440" width="820" height="100" rx="6" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>

  <text x="60" y="465" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Active Alerts & Configuration</text>

  <circle cx="60" cy="495" r="3" fill="#2196F3"/>
  <text x="75" y="500" font-family="system-ui, sans-serif" font-size="11" fill="#1C1B1F">Prometheus scrapes metrics every 15 seconds</text>

  <circle cx="60" cy="520" r="3" fill="#F4B400"/>
  <text x="75" y="525" font-family="system-ui, sans-serif" font-size="11" fill="#1C1B1F">Alert if latency > 2s OR queue > 10: Page on-call engineer immediately</text>

  <circle cx="410" cy="495" r="3" fill="#EA4335"/>
  <text x="425" y="500" font-family="system-ui, sans-serif" font-size="11" fill="#1C1B1F">GPU utilization > 90%: Recommend hardware upgrade</text>

  <circle cx="410" cy="520" r="3" fill="#34A853"/>
  <text x="425" y="525" font-family="system-ui, sans-serif" font-size="11" fill="#1C1B1F">Logs centralized in ELK Stack (searchable by user, timestamp, error)</text>

  <text x="830" y="535" font-family="system-ui, sans-serif" font-size="10" fill="#999999" text-anchor="end">promptquorum.com</text>
</svg>