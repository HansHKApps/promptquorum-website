<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <defs>
    <style>
      .header-text { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 700; }
      .label-text { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 500; }
      .item-text { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 500; }
      .footer-text { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; }
      .shadow { filter: drop-shadow(0 4px 6px rgba(0,0,0,0.08)); }
    </style>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="800" height="420" fill="#FFFFFF"/>

  <!-- Left Column: Choose Ollama -->
  <g>
    <!-- Header band -->
    <rect x="20" y="20" width="360" height="40" fill="#6750A4" rx="8"/>
    <text x="200" y="48" class="header-text" fill="#FFFFFF" text-anchor="middle">Choose Ollama</text>

    <!-- Card container -->
    <rect x="20" y="70" width="360" height="310" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1.5" rx="8" filter="url(#shadow)"/>

    <!-- Checkmark items -->
    <g>
      <!-- Item 1 -->
      <text x="35" y="105" class="item-text" fill="#34A853" font-size="16">✓</text>
      <text x="60" y="105" class="item-text" fill="#1C1B1F">You need an OpenAI-compatible API</text>

      <!-- Item 2 -->
      <text x="35" y="145" class="item-text" fill="#34A853" font-size="16">✓</text>
      <text x="60" y="140" class="item-text" fill="#1C1B1F">Automating with Python / Node.js</text>
      <text x="60" y="155" class="item-text" fill="#1C1B1F">scripts</text>

      <!-- Item 3 -->
      <text x="35" y="200" class="item-text" fill="#34A853" font-size="16">✓</text>
      <text x="60" y="195" class="item-text" fill="#1C1B1F">Running as a production background</text>
      <text x="60" y="210" class="item-text" fill="#1C1B1F">service</text>

      <!-- Item 4 -->
      <text x="35" y="255" class="item-text" fill="#34A853" font-size="16">✓</text>
      <text x="60" y="255" class="item-text" fill="#1C1B1F">Integrating with VS Code or Cursor</text>

      <!-- Item 5 -->
      <text x="35" y="300" class="item-text" fill="#34A853" font-size="16">✓</text>
      <text x="60" y="295" class="item-text" fill="#1C1B1F">Docker / systemd / CI/CD</text>
      <text x="60" y="310" class="item-text" fill="#1C1B1F">deployments</text>
    </g>
  </g>

  <!-- Right Column: Choose LM Studio -->
  <g>
    <!-- Header band -->
    <rect x="420" y="20" width="360" height="40" fill="#7D5260" rx="8"/>
    <text x="600" y="48" class="header-text" fill="#FFFFFF" text-anchor="middle">Choose LM Studio</text>

    <!-- Card container -->
    <rect x="420" y="70" width="360" height="310" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1.5" rx="8" filter="url(#shadow)"/>

    <!-- Checkmark items -->
    <g>
      <!-- Item 1 -->
      <text x="435" y="105" class="item-text" fill="#34A853" font-size="16">✓</text>
      <text x="460" y="105" class="item-text" fill="#1C1B1F">No command-line experience</text>

      <!-- Item 2 -->
      <text x="435" y="150" class="item-text" fill="#34A853" font-size="16">✓</text>
      <text x="460" y="145" class="item-text" fill="#1C1B1F">You want a built-in chat interface</text>
      <text x="460" y="160" class="item-text" fill="#1C1B1F">with conversation history</text>

      <!-- Item 3 -->
      <text x="435" y="210" class="item-text" fill="#34A853" font-size="16">✓</text>
      <text x="460" y="210" class="item-text" fill="#1C1B1F">Visual GPU and model settings</text>

      <!-- Item 4 -->
      <text x="435" y="255" class="item-text" fill="#34A853" font-size="16">✓</text>
      <text x="460" y="250" class="item-text" fill="#1C1B1F">One-click model browsing and</text>
      <text x="460" y="265" class="item-text" fill="#1C1B1F">download</text>

      <!-- Item 5 -->
      <text x="435" y="310" class="item-text" fill="#34A853" font-size="16">✓</text>
      <text x="460" y="310" class="item-text" fill="#1C1B1F">Quick desktop experimentation</text>
    </g>
  </g>

  <!-- Footer note -->
  <text x="400" y="405" class="footer-text" fill="#79747E" text-anchor="middle">Both tools are free and run 100% locally. No API keys needed.</text>
<text x="792" y="415" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>