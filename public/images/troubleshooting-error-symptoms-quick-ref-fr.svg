<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#FFFFFF"/>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/></filter>
  </defs>

  <text x="400" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">10 Erreurs LLM Locales les Plus Courantes — Référence Rapide</text>

  <line x1="18" y1="40" x2="782" y2="40" stroke="#E8DEF8" stroke-width="1.5"/>

  <!-- Header row -->
  <text x="40" y="65" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#79747E">#</text>
  <text x="90" y="65" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#79747E">Erreur</text>
  <text x="280" y="65" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#79747E">Symptôme</text>
  <text x="550" y="65" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#79747E">Solution</text>

  <line x1="18" y1="72" x2="782" y2="72" stroke="#E8DEF8" stroke-width="1.5"/>

  <!-- Row 1 -->
  <circle cx="40" cy="95" r="12" fill="#6750A4"/>
  <text x="40" y="99" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="90" y="99" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">Mémoire insuffisante</text>
  <text x="280" y="99" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">Crash "GGML_ASSERT"</text>
  <text x="550" y="99" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">Modèle plus petit ou Q4_K_M</text>
  <line x1="18" y1="108" x2="782" y2="108" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 2 -->
  <circle cx="40" cy="131" r="12" fill="#6750A4"/>
  <text x="40" y="135" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="90" y="135" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">GPU non utilisé</text>
  <text x="280" y="135" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">&lt;5 tok/s, 100% CPU</text>
  <text x="550" y="135" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">Réglez OLLAMA_GPU_LAYERS=35</text>
  <line x1="18" y1="144" x2="782" y2="144" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 3 -->
  <circle cx="40" cy="167" r="12" fill="#6750A4"/>
  <text x="40" y="171" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="90" y="171" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">Inférence lente</text>
  <text x="280" y="171" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">&lt;10 tok/s sur GPU</text>
  <text x="550" y="171" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">Réduisez num_ctx, libérez RAM</text>
  <line x1="18" y1="180" x2="782" y2="180" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 4 -->
  <circle cx="40" cy="203" r="12" fill="#6750A4"/>
  <text x="40" y="207" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="90" y="207" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">Connexion refusée</text>
  <text x="280" y="207" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">curl: (7) Erreur</text>
  <text x="550" y="207" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">Exécutez: ollama serve</text>
  <line x1="18" y1="216" x2="782" y2="216" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 5 -->
  <circle cx="40" cy="239" r="12" fill="#6750A4"/>
  <text x="40" y="243" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text>
  <text x="90" y="243" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">Modèle introuvable</text>
  <text x="280" y="243" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">"error: model not found"</text>
  <text x="550" y="243" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">ollama pull llama3.2:3b</text>
  <line x1="18" y1="252" x2="782" y2="252" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 6 -->
  <circle cx="40" cy="275" r="12" fill="#6750A4"/>
  <text x="40" y="279" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">6</text>
  <text x="90" y="279" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">Fichier corrompu</text>
  <text x="280" y="279" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">Erreur décodage JSON</text>
  <text x="550" y="279" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">ollama rm + re-pull</text>
  <line x1="18" y1="288" x2="782" y2="288" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 7 -->
  <circle cx="40" cy="311" r="12" fill="#6750A4"/>
  <text x="40" y="315" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">7</text>
  <text x="90" y="315" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">Erreur CUDA</text>
  <text x="280" y="315" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">"device-side assert triggered"</text>
  <text x="550" y="315" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">Correspondre version CUDA + pilote</text>
  <line x1="18" y1="324" x2="782" y2="324" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 8 -->
  <circle cx="40" cy="347" r="12" fill="#6750A4"/>
  <text x="40" y="351" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">8</text>
  <text x="90" y="351" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">Sortie incohérente</text>
  <text x="280" y="351" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">Répétition/non-sens</text>
  <text x="550" y="351" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">Réduire quantisation</text>
  <line x1="18" y1="360" x2="782" y2="360" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 9 -->
  <circle cx="40" cy="383" r="12" fill="#6750A4"/>
  <text x="40" y="387" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">9</text>
  <text x="90" y="387" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">Conflit de port</text>
  <text x="280" y="387" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#49454F">"Address already in use"</text>
  <text x="550" y="387" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">Terminez processus sur 11434</text>

  <line x1="18" y1="396" x2="782" y2="396" stroke="#E8DEF8" stroke-width="1.5"/>

  <!-- Row 10 -->
  <circle cx="40" cy="410" r="12" fill="#6750A4"/>
  <text x="40" y="414" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">10</text>
  <text x="95" y="414" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1C1B1F">Arrêt en cours</text>
  <text x="330" y="414" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F">Coupe en limite</text>
  <text x="550" y="414" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">Augmentez num_ctx</text>
</svg>
