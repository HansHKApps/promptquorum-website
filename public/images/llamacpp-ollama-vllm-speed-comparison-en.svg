<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Speed & Throughput: Single Request vs. Batch
  </text>

  <!-- Legend -->
  <text x="50" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">Single Request (batch=1)</text>
  <text x="50" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#49454F">RTX 4090, Llama 3 70B Q4</text>

  <!-- Left section: Single Request -->
  <g>
    <!-- Bar 1: llama.cpp -->
    <rect x="50" y="95" width="200" height="28" rx="4" fill="#6750A4" opacity="0.9"/>
    <text x="260" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">llama.cpp: 36 tok/s</text>

    <!-- Bar 2: Ollama -->
    <rect x="50" y="135" width="189" height="28" rx="4" fill="#6750A4" opacity="0.7"/>
    <text x="260" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">Ollama: 34 tok/s</text>

    <!-- Bar 3: vLLM -->
    <rect x="50" y="175" width="178" height="28" rx="4" fill="#6750A4" opacity="0.5"/>
    <text x="260" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">vLLM: 32 tok/s</text>

    <!-- Speed labels inside bars -->
    <text x="155" y="112" font-family="'SF Mono', Monaco, monospace" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">36 tok/s</text>
    <text x="144" y="152" font-family="'SF Mono', Monaco, monospace" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">34 tok/s</text>
    <text x="139" y="192" font-family="'SF Mono', Monaco, monospace" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">32 tok/s</text>
  </g>

  <!-- Right section: Batch (10 concurrent) -->
  <text x="500" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">10 Concurrent Requests (Batching)</text>
  <text x="500" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#49454F">Same hardware, vLLM dominates</text>

  <g>
    <!-- Batch bars: scaled to show vLLM advantage -->
    <!-- llama.cpp batch: same speed as single (no batching support) -->
    <rect x="500" y="95" width="60" height="28" rx="4" fill="#EA4335" opacity="0.6"/>
    <text x="610" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">llama.cpp: 36 tok/s</text>
    <text x="535" y="112" font-family="'SF Mono', Monaco, monospace" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">36</text>

    <!-- Ollama batch: same as single (single-batch only) -->
    <rect x="500" y="135" width="60" height="28" rx="4" fill="#F4B400" opacity="0.7"/>
    <text x="610" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">Ollama: 34 tok/s</text>
    <text x="535" y="152" font-family="'SF Mono', Monaco, monospace" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">34</text>

    <!-- vLLM batch: 250+ tok/s -->
    <rect x="500" y="175" width="440" height="28" rx="4" fill="#34A853"/>
    <text x="960" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="end">vLLM: 250+ tok/s</text>
    <text x="720" y="192" font-family="'SF Mono', Monaco, monospace" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">250+ tok/s (7× faster)</text>
  </g>

  <!-- Annotation -->
  <text x="400" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#79747E" text-anchor="middle">
    vLLM's advantage is batching. For single-user chat, all three are nearly identical. For API servers with 10+ concurrent users, vLLM is mandatory.
  </text>
</svg>
