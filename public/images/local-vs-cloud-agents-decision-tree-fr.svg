  <text x="198" y="80" font-size="16" font-weight="700" fill="#34A853" text-anchor="middle" font-family="system-ui, sans-serif">Choisir Cloud</text>

  <text x="48" y="110" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">Idéal pour :</text>
  <text x="48" y="130" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• Tâches de raisonnement complexe</text>
  <text x="48" y="148" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• UI chat interactif (&lt;500ms)</text>
  <text x="48" y="166" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• Volume faible (&lt;50M/mo)</text>
  <text x="48" y="184" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• Données non sensibles</text>
  <text x="48" y="202" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• Pas de frais DevOps</text>

