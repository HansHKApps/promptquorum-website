  <text x="602" y="80" font-size="16" font-weight="700" fill="#EA4335" text-anchor="middle" font-family="system-ui, sans-serif">Choisir Local</text>

  <text x="452" y="110" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">Idéal pour :</text>
