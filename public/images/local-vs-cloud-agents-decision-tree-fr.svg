  <text x="48" y="345" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">Goulot : Verrouillage des fournisseurs</text>

  <!-- Right panel: When to choose Local -->
  <rect x="432" y="55" width="340" height="340" rx="6" fill="#FFFFFF" stroke="#EA4335" stroke-width="2"/>
