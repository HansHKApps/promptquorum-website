  <text x="48" y="273" font-size="11" fill="#49454F" font-family="'SF Mono', Monaco, monospace">Gemini 2.5 Pro</text>

  <text x="48" y="300" font-size="12" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">Coût :</text>
