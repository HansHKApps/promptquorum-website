<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="420" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Models That Fit in 16 GB VRAM (RTX 4080)
  </text>

  <!-- 16 GB limit reference line (will draw bars against this) -->
  <line x1="650" y1="70" x2="650" y2="370" stroke="#6750A4" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="660" y="75" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" font-weight="600">16 GB limit</text>

  <!-- Row 1: Qwen2.5 14B Q8_0 ~15 GB ✅ -->
  <g>
    <text x="20" y="95" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Qwen2.5 14B</text>
    <text x="20" y="113" font-family="system-ui, sans-serif" font-size="12" fill="#49454F">Q8_0 • ~15 GB</text>
    <rect x="240" y="85" width="405" height="28" rx="4" fill="#D4EDDA" stroke="#28A745" stroke-width="1"/>
    <text x="245" y="105" font-family="system-ui, sans-serif" font-size="11" fill="#1C1B1F" font-weight="600">███████████████████████████ 94%</text>
    <text x="655" y="105" font-family="system-ui, sans-serif" font-size="14" fill="#28A745" font-weight="700">✅</text>
  </g>

  <!-- Row 2: Mistral Small 3.1 22B Q4_K_M ~13 GB ✅ -->
  <g>
    <text x="20" y="155" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Mistral Small 3.1 22B</text>
    <text x="20" y="173" font-family="system-ui, sans-serif" font-size="12" fill="#49454F">Q4_K_M • ~13 GB</text>
    <rect x="240" y="145" width="351" height="28" rx="4" fill="#D4EDDA" stroke="#28A745" stroke-width="1"/>
    <text x="245" y="165" font-family="system-ui, sans-serif" font-size="11" fill="#1C1B1F" font-weight="600">██████████████████████ 81%</text>
    <text x="655" y="165" font-family="system-ui, sans-serif" font-size="14" fill="#28A745" font-weight="700">✅</text>
  </g>

  <!-- Row 3: DeepSeek-R1 14B Q8_0 ~15 GB ✅ -->
  <g>
    <text x="20" y="215" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">DeepSeek-R1 14B</text>
    <text x="20" y="233" font-family="system-ui, sans-serif" font-size="12" fill="#49454F">Q8_0 • ~15 GB</text>
    <rect x="240" y="205" width="405" height="28" rx="4" fill="#D4EDDA" stroke="#28A745" stroke-width="1"/>
    <text x="245" y="225" font-family="system-ui, sans-serif" font-size="11" fill="#1C1B1F" font-weight="600">███████████████████████████ 94%</text>
    <text x="655" y="225" font-family="system-ui, sans-serif" font-size="14" fill="#28A745" font-weight="700">✅</text>
  </g>

  <!-- Row 4: Llama 3.1 8B FP16 ~16 GB ✅ Tight -->
  <g>
    <text x="20" y="275" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Llama 3.1 8B</text>
    <text x="20" y="293" font-family="system-ui, sans-serif" font-size="12" fill="#49454F">FP16 • ~16 GB</text>
    <rect x="240" y="265" width="406" height="28" rx="4" fill="#FFF3CD" stroke="#FFC107" stroke-width="1"/>
    <text x="245" y="285" font-family="system-ui, sans-serif" font-size="11" fill="#1C1B1F" font-weight="600">████████████████████████████ 100%</text>
    <text x="655" y="285" font-family="system-ui, sans-serif" font-size="14" fill="#FFC107" font-weight="700">⚠️</text>
  </g>

  <!-- Row 5: Qwen2.5 32B Q4_K_M ~18 GB ❌ No -->
  <g>
    <text x="20" y="335" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Qwen2.5 32B</text>
    <text x="20" y="353" font-family="system-ui, sans-serif" font-size="12" fill="#49454F">Q4_K_M • ~18 GB</text>
    <rect x="240" y="325" width="484" height="28" rx="4" fill="#F8D7DA" stroke="#DC3545" stroke-width="1"/>
    <text x="245" y="345" font-family="system-ui, sans-serif" font-size="11" fill="#1C1B1F" font-weight="600">██████████████████████████████ 113%</text>
    <text x="655" y="345" font-family="system-ui, sans-serif" font-size="14" fill="#DC3545" font-weight="700">❌</text>
  </g>

  <!-- Bottom note -->
  <text x="400" y="412" font-family="system-ui, sans-serif" font-size="12" fill="#79747E" text-anchor="middle" font-weight="500">
    Best pick: Qwen2.5 14B Q8_0 (~15 GB, 45 tok/sec). Mistral Small 3.1 22B Q4_K_M fastest at 55 tok/sec.
  </text>
</svg>
