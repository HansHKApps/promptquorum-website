<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
<rect width="800" height="360" fill="#FFFFFF"/>
<text x="400" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1C1B1F" text-anchor="middle">Local LLM Privacy Ranking — Telemetry Status, April 2026</text>
<text x="400" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#49454F" text-anchor="middle">All four tools run inference on-device. Ranking based on telemetry collection and source auditability.</text>
<line x1="18" y1="58" x2="782" y2="58" stroke="#E8DEF8" stroke-width="1.5"/>
<circle cx="45" cy="92" r="18" fill="#34A853"/>
<text x="45" y="96" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">#1</text>
<text x="80" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1C1B1F" text-anchor="start">Jan AI</text>
<rect x="146" y="78" width="65" height="18" rx="9" fill="#34A853" opacity="0.15"/>
<text x="178" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#34A853" text-anchor="middle">BEST</text>
<text x="80" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#49454F" text-anchor="start">No telemetry. All chat stored locally in plain JSON. MIT open source, fully auditable.</text>
<line x1="18" y1="124" x2="782" y2="124" stroke="#F7F2FA" stroke-width="1"/>
<circle cx="45" cy="150" r="18" fill="#34A853"/>
<text x="45" y="154" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">#2</text>
<text x="80" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1C1B1F" text-anchor="start">Ollama</text>
<rect x="146" y="136" width="65" height="18" rx="9" fill="#34A853" opacity="0.15"/>
<text x="178" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#34A853" text-anchor="middle">BEST</text>
<text x="80" y="166" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#49454F" text-anchor="start">No telemetry confirmed in MIT source code. Localhost API only, no external calls.</text>
<line x1="18" y1="182" x2="782" y2="182" stroke="#F7F2FA" stroke-width="1"/>
<circle cx="45" cy="208" r="18" fill="#F4B400"/>
<text x="45" y="212" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">#3</text>
<text x="80" y="206" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1C1B1F" text-anchor="start">GPT4All</text>
<rect x="155" y="194" width="65" height="18" rx="9" fill="#F4B400" opacity="0.15"/>
<text x="187" y="206" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#F4B400" text-anchor="middle">GOOD</text>
<text x="80" y="224" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#49454F" text-anchor="start">Opt-in telemetry only — disabled by default. MIT open source.</text>
<line x1="18" y1="240" x2="782" y2="240" stroke="#F7F2FA" stroke-width="1"/>
<circle cx="45" cy="266" r="18" fill="#EA4335"/>
<text x="45" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">#4</text>
<text x="80" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1C1B1F" text-anchor="start">LM Studio</text>
<rect x="173" y="252" width="65" height="18" rx="9" fill="#EA4335" opacity="0.15"/>
<text x="205" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#EA4335" text-anchor="middle">CAUTION</text>
<text x="80" y="282" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#49454F" text-anchor="start">Anonymous analytics ON by default. Disable: Settings → Privacy. Closed-source freeware.</text>
<line x1="18" y1="304" x2="782" y2="304" stroke="#E8DEF8" stroke-width="1"/>
<circle cx="24" cy="318" r="5" fill="#34A853"/>
<text x="34" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#79747E" text-anchor="start">Green: no telemetry</text>
<circle cx="187" cy="318" r="5" fill="#F4B400"/>
<text x="197" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#79747E" text-anchor="start">Amber: opt-in only</text>
<circle cx="343" cy="318" r="5" fill="#EA4335"/>
<text x="353" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#79747E" text-anchor="start">Red: on by default — action needed</text>
<text x="792" y="355" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>
