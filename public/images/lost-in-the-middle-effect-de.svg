    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="#FFFFFF"/>
  <rect x="24" y="16" width="752" height="368" rx="12" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1.5" filter="url(#shadow)"/>

  <text x="400" y="50" font-family="system-ui,-apple-system,sans-serif" font-size="19" font-weight="700" fill="#1C1B1F" text-anchor="middle">Der „Lost in the Middle"-Effekt — 128K Kontextfenster</text>
  <text x="400" y="72" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">LLMs erinnern sich zuverlässig an Anfang und Ende — aber übersehen Details in der Mitte</text>

  <rect x="60" y="100" width="680" height="80" rx="8" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1.5"/>
  <rect x="60" y="100" width="680" height="80" rx="8" fill="url(#qualityGradient)" opacity="0.25"/>

  <rect x="68" y="108" width="124" height="64" rx="6" fill="#34A853" opacity="0.18"/>
  <text x="130" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#34A853" text-anchor="middle">HOCH</text>
  <text x="130" y="153" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#34A853" text-anchor="middle">Abrufqualität</text>

  <rect x="276" y="108" width="248" height="64" rx="6" fill="#E67C73" opacity="0.18"/>
  <text x="400" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#E67C73" text-anchor="middle">NIEDRIG — Oft übersehen</text>
  <text x="400" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#E67C73" text-anchor="middle">Token-Bereich 40K–80K</text>

  <rect x="548" y="108" width="184" height="64" rx="6" fill="#34A853" opacity="0.18"/>
  <text x="640" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#34A853" text-anchor="middle">HOCH</text>
  <text x="640" y="153" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#34A853" text-anchor="middle">Abrufqualität</text>

  <text x="60"  y="198" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#79747E" text-anchor="middle">0</text>
  <text x="196" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">25K</text>
  <text x="332" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">50K</text>
  <text x="468" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">75K</text>
  <text x="604" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">100K</text>
  <text x="740" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#79747E" text-anchor="middle">128K</text>
  <text x="400" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#79747E" text-anchor="middle">← Token-Position im Kontextfenster →</text>

  <text x="400" y="244" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#1C1B1F" text-anchor="middle">So vermeidet man ihn</text>

  <rect x="48" y="258" width="210" height="90" rx="8" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1.5"/>
  <text x="153" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#6750A4" text-anchor="middle">① Wichtiges vorlagern</text>
  <text x="153" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">Kritische Infos an den</text>
  <text x="153" y="314" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">Anfang des Prompts stellen</text>
  <text x="153" y="334" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#79747E" text-anchor="middle">Zuverlässigste Zone</text>

  <rect x="295" y="258" width="210" height="90" rx="8" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1.5"/>
  <text x="400" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#6750A4" text-anchor="middle">② RAG verwenden</text>
  <text x="400" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">3–5 relevante Abschnitte</text>
  <text x="400" y="314" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">abrufen (4K–8K Token)</text>
  <text x="400" y="334" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#79747E" text-anchor="middle">Mitte vollständig vermeiden</text>

  <rect x="542" y="258" width="210" height="90" rx="8" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1.5"/>
  <text x="647" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#6750A4" text-anchor="middle">③ Dokumente aufteilen</text>
  <text x="647" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">In überlappende Abschnitte</text>
  <text x="647" y="314" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F" text-anchor="middle">à 16K–32K Token verarbeiten</text>
  <text x="647" y="334" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#79747E" text-anchor="middle">Inhalt in sicherer Zone halten</text>

  <text x="400" y="376" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79747E" text-anchor="middle">Quelle: „Lost in the Middle: How Language Models Use Long Contexts" — Liu et al., 2023 (arxiv.org/abs/2307.03172)</text>
<text x="792" y="395" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>
