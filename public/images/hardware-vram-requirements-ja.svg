<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <!-- Title -->
  <text x="400" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    モデルサイズ別VRAM要件
  </text>
  
  <!-- Chart area background -->
  <rect x="80" y="60" width="680" height="280" fill="#F7F2FA" rx="8" stroke="#E8DEF8" stroke-width="1.5"/>
  
  <!-- Y-axis labels and gridlines -->
  <text x="50" y="330" font-family="system-ui, sans-serif" font-size="12" fill="#49454F" text-anchor="end">0</text>
  <line x1="80" y1="330" x2="760" y2="330" stroke="#E8DEF8" stroke-width="1"/>
  
  <text x="50" y="275" font-family="system-ui, sans-serif" font-size="12" fill="#49454F" text-anchor="end">20</text>
  <line x1="80" y1="270" x2="760" y2="270" stroke="#E8DEF8" stroke-width="1" stroke-dasharray="2,2"/>
  
  <text x="50" y="220" font-family="system-ui, sans-serif" font-size="12" fill="#49454F" text-anchor="end">40</text>
  <line x1="80" y1="215" x2="760" y2="215" stroke="#E8DEF8" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Bars -->
  <g>
    <!-- 7B (4 GB) -->
    <rect x="140" y="290" width="50" height="40" fill="#6750A4"/>
    <text x="165" y="355" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1C1B1F" text-anchor="middle">7B</text>
    <text x="165" y="315" font-family="system-ui, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="600">4 GB</text>
    
    <!-- 13B (8 GB) -->
    <rect x="280" y="270" width="50" height="60" fill="#6750A4"/>
    <text x="305" y="355" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1C1B1F" text-anchor="middle">13B</text>
    <text x="305" y="310" font-family="system-ui, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="600">8 GB</text>
    
    <!-- 30B (16 GB) -->
    <rect x="420" y="210" width="50" height="120" fill="#6750A4"/>
    <text x="445" y="355" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1C1B1F" text-anchor="middle">30B</text>
    <text x="445" y="275" font-family="system-ui, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="600">16 GB</text>
    
    <!-- 70B (40 GB) -->
    <rect x="560" y="70" width="50" height="260" fill="#6750A4"/>
    <text x="585" y="355" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1C1B1F" text-anchor="middle">70B</text>
    <text x="585" y="170" font-family="system-ui, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="600">40 GB</text>
  </g>
  
  <!-- Axis labels -->
  <text x="30" y="135" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle" transform="rotate(-90 30 135)">VRAM (GB)</text>
<text x="792" y="395" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>