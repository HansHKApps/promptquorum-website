<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="360" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="28" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">速度: 本地与云 API</text>
  <text x="400" y="47" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">本地 CPU 每秒生成的 token 数比云 API 少 4–10 倍</text>

  <!-- Left panel: Local (purple) -->
  <rect x="18" y="58" width="370" height="272" rx="6" fill="#FFFFFF" stroke="#6750A4" stroke-width="2"/>
  <rect x="18" y="58" width="370" height="5" rx="0" fill="#6750A4"/>

  <text x="203" y="88" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#6750A4" text-anchor="middle">本地推理</text>
  <text x="203" y="106" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">在消费级硬件上 (CPU 或 GPU)</text>

  <!-- CPU speed -->
  <text x="45" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#79747E">CPU:</text>
  <text x="85" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#34A853">10–25 token/秒</text>
  <text x="45" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79747E">(慢 4–10 倍)</text>

  <line x1="32" y1="160" x2="375" y2="160" stroke="#E8DEF8" stroke-width="1"/>

  <!-- GPU speed -->
  <text x="45" y="180" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#79747E">GPU (RTX 4090):</text>
  <text x="45" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#F4B400">130–160 token/秒</text>
  <text x="45" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79747E">成本: $1,600+</text>

  <line x1="32" y1="230" x2="375" y2="230" stroke="#E8DEF8" stroke-width="1"/>

  <!-- Use cases -->
  <text x="203" y="250" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#6750A4" text-anchor="middle">最适合:</text>
  <text x="203" y="270" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1C1B1F" text-anchor="middle">✓ 交互式聊天 (非紧急)</text>
  <text x="203" y="290" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1C1B1F" text-anchor="middle">✓ 离线批处理</text>

  <!-- Right panel: Cloud (green) -->
  <rect x="412" y="58" width="370" height="272" rx="6" fill="#FFFFFF" stroke="#34A853" stroke-width="2"/>
  <rect x="412" y="58" width="370" height="5" rx="0" fill="#34A853"/>

  <text x="597" y="88" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#34A853" text-anchor="middle">云 API</text>
  <text x="597" y="106" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">在企业 GPU 上 (H100, A100)</text>

  <!-- Cloud speed -->
  <text x="435" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#79747E">GPT-4o:</text>
  <text x="485" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#34A853">80–150 token/秒</text>
  <text x="435" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79747E">(企业级)</text>

  <line x1="426" y1="160" x2="769" y2="160" stroke="#E8DEF8" stroke-width="1"/>

  <!-- Cost and reliability -->
  <text x="435" y="180" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#79747E">成本:</text>
  <text x="485" y="180" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#F4B400">每 1K token $0.01–0.10</text>
  <text x="435" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#79747E">SLA:</text>
  <text x="485" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#F4B400">保证 99.9% 可用时间</text>

  <line x1="426" y1="210" x2="769" y2="210" stroke="#E8DEF8" stroke-width="1"/>

  <!-- Use cases -->
  <text x="597" y="235" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#34A853" text-anchor="middle">最适合:</text>
  <text x="597" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1C1B1F" text-anchor="middle">✓ 实时交互使用</text>
  <text x="597" y="275" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1C1B1F" text-anchor="middle">✓ 高吞吐量批处理 (1,000+ 文档)</text>
  <text x="597" y="295" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1C1B1F" text-anchor="middle">✓ 带可用时间保证的生产环境</text>

  <!-- "vs" divider -->
  <text x="400" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#79747E" text-anchor="middle">vs</text>

  <!-- Footer -->
  <text x="400" y="348" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79747E" text-anchor="middle">promptquorum.com/local-llms/local-llm-limitations</text>
</svg>
