<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="360" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="28" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">Hardware Requirements by Model Size</text>
  <text x="400" y="47" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">16 GB RAM minimum for usable 7B models · 40+ GB for frontier-quality 70B models</text>

  <!-- Table Header -->
  <rect x="20" y="60" width="760" height="25" rx="3" fill="#F5F5F5"/>
  <text x="40" y="78" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Hardware</text>
  <text x="280" y="78" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Max Model</text>
  <text x="500" y="78" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Quality Level</text>

  <!-- Row 1: 8 GB -->
  <rect x="20" y="85" width="760" height="40" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1"/>
  <text x="40" y="102" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1C1B1F">Laptop (8 GB RAM, CPU only)</text>
  <text x="280" y="102" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#6750A4">7B @ Q4_K_M</text>
  <text x="500" y="102" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#79747E">Below GPT-3.5</text>
  <text x="40" y="118" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79747E">Slow, marginal results</text>

  <!-- Row 2: 16 GB -->
  <rect x="20" y="125" width="760" height="40" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1"/>
  <text x="40" y="142" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1C1B1F">Mid-range (16 GB RAM)</text>
  <text x="280" y="142" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#34A853">13B @ Q4_K_M</text>
  <text x="500" y="142" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#79747E">≈ GPT-3.5</text>
  <text x="40" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79747E">Good for most tasks</text>

  <!-- Row 3: 24 GB (GPU) -->
  <rect x="20" y="165" width="760" height="40" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1"/>
  <text x="40" y="182" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1C1B1F">High-end GPU (24 GB VRAM, RTX 4090)</text>
  <text x="280" y="182" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#34A853">34B @ Q4_K_M</text>
  <text x="500" y="182" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#79747E">≈ GPT-4</text>
  <text x="40" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79747E">Cost: $1,600+</text>

  <!-- Row 4: 40+ GB -->
  <rect x="20" y="205" width="760" height="40" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1"/>
  <text x="40" y="222" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1C1B1F">Workstation (40+ GB RAM or VRAM)</text>
  <text x="280" y="222" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#34A853">70B (full precision)</text>
  <text x="500" y="222" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#79747E">≈ GPT-4o</text>
  <text x="40" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79747E">Mac Studio or multi-GPU</text>

  <!-- Bottom note -->
  <rect x="20" y="260" width="760" height="45" rx="3" fill="#F5F5F5" stroke="#E8DEF8" stroke-width="1"/>
  <text x="40" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">💡 Tip: Use Ollama or LM Studio to check exact VRAM before downloading. Add 25% overhead for system memory, context, and safety margin.</text>

  <!-- Footer -->
  <text x="400" y="348" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79747E" text-anchor="middle">promptquorum.com/local-llms/local-llm-limitations</text>
</svg>