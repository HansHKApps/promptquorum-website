<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="350" fill="#FFFFFF"/><text x="400" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">Hidden VRAM Overhead</text><text x="40" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1C1B1F" font-weight="600">7B model at Q5 = 4.4 GB model weights + overhead</text><rect x="40" y="85" width="720" height="25" fill="#6750A4" stroke="#E8DEF8" stroke-width="1"/><text x="400" y="103" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">4.4 GB Model + 5.6 GB Overhead = 10 GB Total</text><text x="60" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1C1B1F" font-weight="600">1. Context Window (KV Cache)</text><text x="80" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">4k token context = 2–3 GB per request</text><text x="80" y="176" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">Grows linearly with context length</text><text x="60" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1C1B1F" font-weight="600">2. Batch Processing</text><text x="80" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">Batch=1: 4.4 + 3 = 7.4 GB</text><text x="80" y="246" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">Batch=4: multiply context by 4 (3 × 4 = 12 GB overhead alone!)</text><text x="60" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1C1B1F" font-weight="600">3. System Overhead</text><text x="80" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">OS + Ollama/vLLM framework = 500 MB–1 GB</text><text x="400" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#79747E" text-anchor="middle">← Back to Article</text></svg>