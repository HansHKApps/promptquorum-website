<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <!-- Background -->
  <rect width="800" height="420" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    What Fits in 24 GB VRAM (RTX 4090)
  </text>

  <!-- 24 GB limit line (horizontal dashed) -->
  <line x1="80" y1="200" x2="700" y2="200" stroke="#6750A4" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="710" y="205" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4" font-weight="600">24 GB</text>

  <!-- Column 1: DeepSeek-R1 32B Q4_K_M ~19 GB ✅ -->
  <g>
    <rect x="90" y="60" width="100" height="160" rx="4" fill="#D4EDDA" stroke="#28A745" stroke-width="2"/>
    <text x="140" y="220" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F" text-anchor="middle" font-weight="700">DeepSeek-R1 32B</text>
    <text x="140" y="238" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Q4_K_M</text>
    <text x="140" y="256" font-family="system-ui, sans-serif" font-size="11" fill="#28A745" text-anchor="middle" font-weight="700">~19 GB ✅</text>
    <text x="140" y="274" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle">Best choice</text>
  </g>

  <!-- Column 2: Qwen2.5 32B Q5_K_M ~21 GB ✅ -->
  <g>
    <rect x="260" y="45" width="100" height="175" rx="4" fill="#D4EDDA" stroke="#28A745" stroke-width="2"/>
    <text x="310" y="220" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F" text-anchor="middle" font-weight="700">Qwen2.5 32B</text>
    <text x="310" y="238" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Q5_K_M</text>
    <text x="310" y="256" font-family="system-ui, sans-serif" font-size="11" fill="#28A745" text-anchor="middle" font-weight="700">~21 GB ✅</text>
    <text x="310" y="274" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle">High quality</text>
  </g>

  <!-- Column 3: Llama 3.3 70B Q2_K ~24 GB ⚠️ -->
  <g>
    <rect x="430" y="200" width="100" height="20" rx="4" fill="#FFF3CD" stroke="#FFC107" stroke-width="2"/>
    <text x="480" y="220" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F" text-anchor="middle" font-weight="700">Llama 3.3 70B</text>
    <text x="480" y="238" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Q2_K</text>
    <text x="480" y="256" font-family="system-ui, sans-serif" font-size="11" fill="#FFC107" text-anchor="middle" font-weight="700">~24 GB ⚠️</text>
    <text x="480" y="274" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle">Quality loss</text>
  </g>

  <!-- Column 4: Llama 3.3 70B Q4_K_M ~39 GB ❌ -->
  <g>
    <rect x="600" y="330" width="100" height="50" rx="4" fill="#F8D7DA" stroke="#DC3545" stroke-width="2"/>
    <text x="650" y="220" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F" text-anchor="middle" font-weight="700">Llama 3.3 70B</text>
    <text x="650" y="238" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Q4_K_M</text>
    <text x="650" y="256" font-family="system-ui, sans-serif" font-size="11" fill="#DC3545" text-anchor="middle" font-weight="700">~39 GB ❌</text>
    <text x="650" y="274" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle">+63% over limit</text>
  </g>

  <!-- Bottom note -->
  <text x="400" y="412" font-family="system-ui, sans-serif" font-size="12" fill="#79747E" text-anchor="middle" font-weight="500">
    32B at Q4–Q5 is the practical sweet spot for a single RTX 4090. 70B requires 2× RTX 4090 or 48 GB server GPU.
  </text>
<text x="792" y="415" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>
