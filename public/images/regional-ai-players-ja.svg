<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" fill="#FFFFFF"/>
  <text x="450" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    地域別AI指導力と主要プレイヤー
  </text>
  <g id="eu-players">
    <rect x="30" y="60" width="260" height="40" rx="6" fill="#EDE7F6" stroke="#6750A4" stroke-width="2"/>
    <text x="160" y="86" font-family="system-ui, sans-serif" font-size="16" fill="#6750A4" text-anchor="middle" font-weight="700">🇪🇺 欧州連合</text>
    <text x="50" y="130" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F" font-weight="700">フロンティアモデル:</text>
    <rect x="40" y="145" width="240" height="50" rx="6" fill="#F7F2FA" stroke="#6750A4" stroke-width="1.5"/>
    <text x="160" y="163" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" text-anchor="middle" font-weight="700">Mistral AI</text>
    <text x="160" y="180" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle" font-weight="500">パリ — 7B~120B モデル</text>
    <rect x="40" y="205" width="240" height="50" rx="6" fill="#F7F2FA" stroke="#6750A4" stroke-width="1.5"/>
    <text x="160" y="223" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" text-anchor="middle" font-weight="700">Stability AI</text>
    <text x="160" y="240" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle" font-weight="500">英国 — 拡散、オープンモデル</text>
    <text x="50" y="285" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F" font-weight="700">注目プレイヤー:</text>
    <rect x="40" y="300" width="240" height="45" rx="6" fill="#FEF7FF" stroke="#6750A4" stroke-width="1.5"/>
    <text x="160" y="313" font-family="system-ui, sans-serif" font-size="11" fill="#1C1B1F" text-anchor="middle" font-weight="600">Hugging Face (FR), Big Science</text>
    <text x="160" y="333" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle" font-weight="500">BLOOM、オープン研究</text>
    <rect x="40" y="360" width="240" height="60" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5"/>
    <text x="160" y="378" font-family="system-ui, sans-serif" font-size="11" fill="#D32F2F" text-anchor="middle" font-weight="700">課題</text>
    <text x="160" y="395" font-family="system-ui, sans-serif" font-size="10" fill="#1C1B1F" text-anchor="middle" font-weight="500">オープンソース強いが、</text>
    <text x="160" y="410" font-family="system-ui, sans-serif" font-size="10" fill="#1C1B1F" text-anchor="middle" font-weight="500">米国規模の資金がない</text>
  </g>
  <g id="us-players">
    <rect x="320" y="60" width="260" height="40" rx="6" fill="#EDE7F6" stroke="#6750A4" stroke-width="2"/>
    <text x="450" y="86" font-family="system-ui, sans-serif" font-size="16" fill="#6750A4" text-anchor="middle" font-weight="700">🇺🇸 米国</text>
    <text x="340" y="130" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F" font-weight="700">フロンティアリーダー:</text>
    <rect x="330" y="145" width="240" height="50" rx="6" fill="#E8DEF8" stroke="#6750A4" stroke-width="2.5"/>
    <text x="450" y="163" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" text-anchor="middle" font-weight="700">OpenAI</text>
    <text x="450" y="180" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle" font-weight="500">GPT-4o、市場リーダー</text>
    <rect x="330" y="205" width="240" height="50" rx="6" fill="#E8DEF8" stroke="#6750A4" stroke-width="2.5"/>
    <text x="450" y="223" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" text-anchor="middle" font-weight="700">Google DeepMind</text>
    <text x="450" y="240" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle" font-weight="500">Gemini、主要インフラ</text>
    <text x="340" y="285" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F" font-weight="700">主要貢献者:</text>
    <rect x="330" y="300" width="240" height="45" rx="6" fill="#FEF7FF" stroke="#6750A4" stroke-width="1.5"/>
    <text x="450" y="313" font-family="system-ui, sans-serif" font-size="11" fill="#1C1B1F" text-anchor="middle" font-weight="600">Anthropic, Meta, xAI</text>
    <text x="450" y="333" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle" font-weight="500">Claude、Llama、Grok</text>
    <rect x="330" y="360" width="240" height="60" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
    <text x="450" y="378" font-family="system-ui, sans-serif" font-size="11" fill="#388E3C" text-anchor="middle" font-weight="700">優位性</text>
    <text x="450" y="395" font-family="system-ui, sans-serif" font-size="10" fill="#1C1B1F" text-anchor="middle" font-weight="500">ベンチャー資金、</text>
    <text x="450" y="410" font-family="system-ui, sans-serif" font-size="10" fill="#1C1B1F" text-anchor="middle" font-weight="500">計算スケール、人材</text>
  </g>
  <g id="china-players">
    <rect x="610" y="60" width="260" height="40" rx="6" fill="#F7F2FA" stroke="#7D5260" stroke-width="2"/>
    <text x="740" y="86" font-family="system-ui, sans-serif" font-size="16" fill="#7D5260" text-anchor="middle" font-weight="700">🇨🇳 中国</text>
    <text x="630" y="130" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F" font-weight="700">国家支援リーダー:</text>
    <rect x="620" y="145" width="240" height="50" rx="6" fill="#F7F2FA" stroke="#7D5260" stroke-width="1.5"/>
    <text x="740" y="163" font-family="system-ui, sans-serif" font-size="12" fill="#7D5260" text-anchor="middle" font-weight="700">Baidu</text>
    <text x="740" y="180" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle" font-weight="500">Ernie Bot、検索+AI</text>
    <rect x="620" y="205" width="240" height="50" rx="6" fill="#F7F2FA" stroke="#7D5260" stroke-width="1.5"/>
    <text x="740" y="223" font-family="system-ui, sans-serif" font-size="12" fill="#7D5260" text-anchor="middle" font-weight="700">Alibaba、Tencent</text>
    <text x="740" y="240" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle" font-weight="500">クラウド+モバイルAI</text>
    <text x="630" y="285" font-family="system-ui, sans-serif" font-size="12" fill="#1C1B1F" font-weight="700">新興:</text>
    <rect x="620" y="300" width="240" height="45" rx="6" fill="#FEF7FF" stroke="#7D5260" stroke-width="1.5"/>
    <text x="740" y="313" font-family="system-ui, sans-serif" font-size="11" fill="#1C1B1F" text-anchor="middle" font-weight="600">Zhipu AI、SenseTime</text>
    <text x="740" y="333" font-family="system-ui, sans-serif" font-size="10" fill="#49454F" text-anchor="middle" font-weight="500">ChatGLM、ビジョン</text>
    <rect x="620" y="360" width="240" height="60" rx="6" fill="#F7F2FA" stroke="#7D5260" stroke-width="1.5"/>
    <text x="740" y="378" font-family="system-ui, sans-serif" font-size="11" fill="#7D5260" text-anchor="middle" font-weight="700">統治</text>
    <text x="740" y="395" font-family="system-ui, sans-serif" font-size="10" fill="#1C1B1F" text-anchor="middle" font-weight="500">国家承認が必須、</text>
    <text x="740" y="410" font-family="system-ui, sans-serif" font-size="10" fill="#1C1B1F" text-anchor="middle" font-weight="500">CAC監督</text>
  </g>
  <text x="450" y="480" font-family="system-ui, sans-serif" font-size="12" fill="#49454F" text-anchor="middle" font-weight="600">
    米国は規模+速度 | EUはオープンソース| 中国は国家支援+統制
  </text>
</svg>
