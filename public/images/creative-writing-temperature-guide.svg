<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF"/>

  <!-- Card container -->
  <rect x="30" y="20" width="740" height="360" rx="12" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="2" filter="url(#shadow)"/>

  <!-- Title -->
  <text x="400" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Temperature Guide for Creative Writing
  </text>
  <text x="400" y="76" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#79747E" text-anchor="middle">
    ⚠️ Range varies by model: Llama/Mistral support 0–1.2; some models cap at 1.0. Check your model docs.
  </text>
  <text x="400" y="91" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#79747E" text-anchor="middle">
    Set via Ollama parameters or LM Studio slider
  </text>

  <!-- Zone backgrounds (coloured rectangles) -->
  <!-- Zone: Too Flat  0.7–0.8 → x=60 to x=175 (115px) -->
  <rect x="60" y="115" width="115" height="36" rx="0" fill="#EEEEEE"/>
  <!-- Zone: Default   0.8–0.9 → x=175 to x=290 -->
  <rect x="175" y="115" width="115" height="36" fill="#D9D0EA"/>
  <!-- Zone: Creative  0.9–1.0 → x=290 to x=405 -->
  <rect x="290" y="115" width="115" height="36" fill="#B5A7D0"/>
  <!-- Zone: Optimal   1.0–1.1 → x=405 to x=580 (highlight, wider) -->
  <rect x="405" y="107" width="175" height="52" rx="6" fill="#6750A4"/>
  <!-- Zone: Unstable  1.1–1.2 → x=580 to x=695 -->
  <rect x="580" y="115" width="115" height="36" fill="#C8A8B2"/>
  <!-- Zone: Incoherent 1.2+ → x=695 to x=740 -->
  <rect x="695" y="115" width="45" height="36" rx="0" fill="#E67C73" opacity="0.7"/>

  <!-- Round left/right ends on outer zones -->
  <rect x="60" y="115" width="10" height="36" rx="5" fill="#EEEEEE"/>
  <rect x="730" y="115" width="10" height="36" rx="5" fill="#E67C73" opacity="0.7"/>

  <!-- Zone labels inside bar -->
  <text x="117" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#79747E" text-anchor="middle">Too Flat</text>
  <text x="232" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#49454F" text-anchor="middle">Default</text>
  <text x="347" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1C1B1F" text-anchor="middle">Creative</text>
  <text x="492" y="134" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Optimal ✓</text>
  <text x="492" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#E8DEF8" text-anchor="middle">for fiction</text>
  <text x="637" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#7D5260" text-anchor="middle">Unstable</text>
  <text x="717" y="136" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">!</text>

  <!-- Tick marks below bar -->
  <line x1="60"  y1="151" x2="60"  y2="165" stroke="#1C1B1F" stroke-width="1.5"/>
  <line x1="175" y1="151" x2="175" y2="165" stroke="#1C1B1F" stroke-width="1.5"/>
  <line x1="290" y1="151" x2="290" y2="165" stroke="#1C1B1F" stroke-width="1.5"/>
  <line x1="405" y1="159" x2="405" y2="169" stroke="#6750A4" stroke-width="2"/>
  <line x1="580" y1="159" x2="580" y2="169" stroke="#6750A4" stroke-width="2"/>
  <line x1="695" y1="151" x2="695" y2="165" stroke="#1C1B1F" stroke-width="1.5"/>
  <line x1="740" y1="151" x2="740" y2="165" stroke="#1C1B1F" stroke-width="1.5"/>

  <!-- Temperature values below ticks -->
  <text x="60"  y="181" font-family="'SF Mono', Monaco, monospace" font-size="13" font-weight="700" fill="#79747E" text-anchor="middle">0.7</text>
  <text x="175" y="181" font-family="'SF Mono', Monaco, monospace" font-size="13" font-weight="700" fill="#49454F" text-anchor="middle">0.8</text>
  <text x="290" y="181" font-family="'SF Mono', Monaco, monospace" font-size="13" font-weight="700" fill="#49454F" text-anchor="middle">0.9</text>
  <text x="405" y="185" font-family="'SF Mono', Monaco, monospace" font-size="14" font-weight="700" fill="#6750A4" text-anchor="middle">1.0</text>
  <text x="580" y="185" font-family="'SF Mono', Monaco, monospace" font-size="14" font-weight="700" fill="#6750A4" text-anchor="middle">1.05</text>
  <text x="695" y="181" font-family="'SF Mono', Monaco, monospace" font-size="13" font-weight="700" fill="#7D5260" text-anchor="middle">1.1</text>
  <text x="740" y="181" font-family="'SF Mono', Monaco, monospace" font-size="13" font-weight="700" fill="#7D5260" text-anchor="middle">1.2+</text>

  <!-- Optimal range brace/bracket indicator -->
  <line x1="405" y1="198" x2="580" y2="198" stroke="#6750A4" stroke-width="2"/>
  <line x1="405" y1="193" x2="405" y2="198" stroke="#6750A4" stroke-width="2"/>
  <line x1="580" y1="193" x2="580" y2="198" stroke="#6750A4" stroke-width="2"/>
  <text x="492" y="213" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#6750A4" text-anchor="middle">Recommended range</text>

  <!-- Divider -->
  <line x1="50" y1="233" x2="750" y2="233" stroke="#E8DEF8" stroke-width="1.5"/>

  <!-- Three callout rows -->
  <!-- Row 1: Good -->
  <rect x="50" y="247" width="18" height="18" rx="4" fill="#34A853"/>
  <text x="59" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓</text>
  <text x="78" y="261" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1C1B1F">0.9–1.05</text>
  <text x="170" y="261" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#49454F"> — Optimal for fiction. Varied word choice, natural rhythm, style adherence.</text>

  <!-- Row 2: Warning -->
  <rect x="50" y="283" width="18" height="18" rx="4" fill="#F4B400"/>
  <text x="59" y="296" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">!</text>
  <text x="78" y="297" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1C1B1F">0.7–0.8</text>
  <text x="170" y="297" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#49454F"> — Ollama/LM Studio default. Too predictable; prose feels formulaic.</text>

  <!-- Row 3: Bad -->
  <rect x="50" y="319" width="18" height="18" rx="4" fill="#E67C73"/>
  <text x="59" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">✗</text>
  <text x="78" y="333" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1C1B1F">Above 1.1</text>
  <text x="188" y="333" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#49454F"> — Incoherent output. Plot logic breaks down; hallucinated details.</text>

  <!-- Bottom footnote -->
  <text x="400" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#79747E" text-anchor="middle">
    Set temperature in Ollama: ollama run llama3.3:70b --temp 1.0   |   LM Studio: Parameters → Temperature slider
  </text>
<text x="792" y="395" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>
