<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: system-ui, sans-serif; font-size: 16px; font-weight: 600; fill: #1C1B1F; }
      .temp-value { font-family: monospace; font-size: 13px; font-weight: 600; fill: #1C1B1F; }
      .temp-label { font-family: system-ui, sans-serif; font-size: 12px; fill: #1C1B1F; }
      .quality-label { font-family: system-ui, sans-serif; font-size: 13px; fill: #FFFFFF; font-weight: 600; }
      .tick-line { stroke: #1C1B1F; stroke-width: 1; }
    </style>
    <linearGradient id="tempGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#999999;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#B5A7D0;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#8B6BB8;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#D89BC8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8A0B5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="40" y="35" class="title">Temperature Scale for Creative Writing</text>

  <!-- Temperature scale bar -->
  <rect x="120" y="80" width="520" height="40" fill="url(#tempGradient)" rx="4"/>

  <!-- Tick marks and value labels -->
  <!-- 0.7 -->
  <line x1="120" y1="130" x2="120" y2="145" class="tick-line"/>
  <text x="120" y="165" class="temp-value" text-anchor="middle">0.7</text>

  <!-- 0.8 -->
  <line x1="200" y1="130" x2="200" y2="145" class="tick-line"/>
  <text x="200" y="165" class="temp-value" text-anchor="middle">0.8</text>

  <!-- 0.9 -->
  <line x1="280" y1="130" x2="280" y2="145" class="tick-line"/>
  <text x="280" y="165" class="temp-value" text-anchor="middle">0.9</text>

  <!-- 1.0 -->
  <line x1="360" y1="130" x2="360" y2="145" class="tick-line"/>
  <text x="360" y="165" class="temp-value" text-anchor="middle">1.0</text>

  <!-- 1.1 -->
  <line x1="520" y1="130" x2="520" y2="145" class="tick-line"/>
  <text x="520" y="165" class="temp-value" text-anchor="middle">1.1</text>

  <!-- 1.2 -->
  <line x1="640" y1="130" x2="640" y2="145" class="tick-line"/>
  <text x="640" y="165" class="temp-value" text-anchor="middle">1.2+</text>

  <!-- Quality zones with labels below -->
  <!-- Too Flat Zone -->
  <rect x="120" y="200" width="80" height="32" fill="#E8DEF8" rx="3"/>
  <text x="160" y="222" class="quality-label" text-anchor="middle">Too Flat</text>

  <!-- Default Zone -->
  <rect x="200" y="200" width="80" height="32" fill="#B5A7D0" rx="3"/>
  <text x="240" y="222" class="quality-label" text-anchor="middle">Default</text>

  <!-- Creative Zone -->
  <rect x="280" y="200" width="80" height="32" fill="#8B6BB8" rx="3"/>
  <text x="320" y="222" class="quality-label" text-anchor="middle">Creative</text>

  <!-- Optimal Zone -->
  <rect x="360" y="200" width="160" height="32" fill="#6750A4" rx="3"/>
  <text x="440" y="222" class="quality-label" text-anchor="middle">Optimal for Fiction</text>

  <!-- Unstable Zone -->
  <rect x="520" y="200" width="120" height="32" fill="#D89BC8" rx="3"/>
  <text x="580" y="222" class="quality-label" text-anchor="middle">Unstable</text>

  <!-- Recommendations -->
  <text x="40" y="290" class="temp-label" font-weight="600">Recommendations:</text>
  <text x="40" y="315" class="temp-label">• 0.7–0.8: Too predictable for creative writing</text>
  <text x="40" y="335" class="temp-label">• 0.9–1.05: Optimal range for fiction and narrative prose</text>
  <text x="40" y="355" class="temp-label">• Above 1.1: Risk of incoherent or nonsensical output</text>
</svg>