<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <!-- Background -->
  <rect width="800" height="420" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Vitesse llama.cpp: Défaut vs Optimisé
  </text>
  <text x="400" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#79747E" text-anchor="middle">
    (RTX 4070 Ti, Llama 3.1 8B Q4_K_M)
  </text>

  <!-- Default config -->
  <g>
    <text x="180" y="85" font-family="system-ui, sans-serif" font-size="14" fill="#1C1B1F" text-anchor="middle" font-weight="700">Défaut</text>
    <rect x="80" y="100" width="200" height="30" rx="4" fill="#E8DEF8" stroke="#9C9CA0" stroke-width="2"/>
    <text x="90" y="120" font-family="system-ui, sans-serif" font-size="12" fill="#49454F" font-weight="600">████████ 40 jetons/sec</text>
  </g>

  <!-- Arrow + percentage -->
  <text x="400" y="128" font-family="system-ui, sans-serif" font-size="20" fill="#6750A4" text-anchor="middle" font-weight="700">→</text>
  <text x="400" y="100" font-family="system-ui, sans-serif" font-size="16" fill="#28A745" text-anchor="middle" font-weight="700">+125%</text>

  <!-- Optimized config -->
  <g>
    <text x="620" y="85" font-family="system-ui, sans-serif" font-size="14" fill="#1C1B1F" text-anchor="middle" font-weight="700">Optimisé</text>
    <rect x="520" y="100" width="200" height="30" rx="4" fill="#E8DEF8" stroke="#6750A4" stroke-width="2"/>
    <text x="530" y="120" font-family="system-ui, sans-serif" font-size="12" fill="#49454F" font-weight="600">████████████████████ 90 jetons/sec</text>
  </g>

  <!-- Key Flags Section -->
  <text x="40" y="160" font-family="system-ui, sans-serif" font-size="14" fill="#1C1B1F" font-weight="700">Drapeaux clés:</text>

  <!-- Flag 1 -->
  <g>
    <text x="50" y="185" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" font-weight="700">--n-gpu-layers 99</text>
    <text x="50" y="203" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">Décharger toutes les couches sur GPU</text>
    <text x="50" y="218" font-family="system-ui, sans-serif" font-size="11" fill="#28A745" font-weight="600">→ +100–150% vitesse</text>
  </g>

  <!-- Flag 2 -->
  <g>
    <text x="50" y="245" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" font-weight="700">--ctx-size 2048</text>
    <text x="50" y="263" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">Fenêtre de contexte KV-cache</text>
    <text x="50" y="278" font-family="system-ui, sans-serif" font-size="11" fill="#79747E">→ Économise 0,5–8 Go VRAM</text>
  </g>

  <!-- Flag 3 -->
  <g>
    <text x="50" y="305" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" font-weight="700">--flash-attn</text>
    <text x="50" y="323" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">Noyau Flash Attention 2</text>
    <text x="50" y="338" font-family="system-ui, sans-serif" font-size="11" fill="#79747E">→ -20–30% VRAM (long contexte)</text>
  </g>

  <!-- Bottom note -->
  <text x="400" y="380" font-family="system-ui, sans-serif" font-size="12" fill="#79747E" text-anchor="middle" font-weight="500">
    Clé: Définissez d'abord --n-gpu-layers 99. Combinez avec --ctx-size 2048 pour économiser VRAM.
  </text>
  <text x="400" y="398" font-family="system-ui, sans-serif" font-size="11" fill="#79747E" text-anchor="middle" font-weight="400">
    Ollama active automatiquement --n-gpu-layers 99 quand les pilotes CUDA sont correctement installés.
  </text>
<text x="792" y="415" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>
