<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <rect width="800" height="350" fill="#FFFFFF"/>
  <text x="400" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    5つのボトルネック &amp; ツール
  </text>
  <line x1="18" y1="45" x2="782" y2="45" stroke="#E8DEF8" stroke-width="1.5"/>
  <text x="80" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#79747E" text-anchor="middle">#</text>
  <text x="200" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#79747E">ボトルネック</text>
  <text x="450" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#79747E">課題</text>
  <text x="700" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#79747E" text-anchor="end">ツール</text>

  <circle cx="80" cy="88" r="10" fill="#6750A4"/><text x="80" y="93" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="200" y="93" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">評価</text>
  <text x="450" y="93" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">このプロンプトは機能する?</text>
  <text x="700" y="93" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#6750A4" text-anchor="end">Braintrust</text>
  <line x1="18" y1="100" x2="782" y2="100" stroke="#F7F2FA" stroke-width="1"/>

  <circle cx="80" cy="123" r="10" fill="#6750A4"/><text x="80" y="128" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="200" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">テスト</text>
  <text x="450" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">これは壊れる?</text>
  <text x="700" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#6750A4" text-anchor="end">Promptfoo</text>
  <line x1="18" y1="135" x2="782" y2="135" stroke="#F7F2FA" stroke-width="1"/>

  <circle cx="80" cy="158" r="10" fill="#6750A4"/><text x="80" y="163" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="200" y="163" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">バージョン管理</text>
  <text x="450" y="163" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">どのバージョン?</text>
  <text x="700" y="163" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#6750A4" text-anchor="end">PromptHub</text>
  <line x1="18" y1="170" x2="782" y2="170" stroke="#F7F2FA" stroke-width="1"/>

  <circle cx="80" cy="193" r="10" fill="#6750A4"/><text x="80" y="198" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="200" y="198" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">デプロイ</text>
  <text x="450" y="198" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">どのように提供する?</text>
  <text x="700" y="198" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#6750A4" text-anchor="end">Vellum</text>
  <line x1="18" y1="205" x2="782" y2="205" stroke="#F7F2FA" stroke-width="1"/>

  <circle cx="80" cy="228" r="10" fill="#6750A4"/><text x="80" y="233" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text>
  <text x="200" y="233" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">可観測性</text>
  <text x="450" y="233" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">なぜ失敗した?</text>
  <text x="700" y="233" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#6750A4" text-anchor="end">LangSmith</text>
<text x="792" y="345" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>