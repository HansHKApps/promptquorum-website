<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata><rect width="800" height="350" fill="#FFFFFF"/><text x="400" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">4个常见VRAM错误</text><rect x="40" y="55" width="720" height="30" fill="#EA4335" stroke="#E8DEF8" stroke-width="1"/><text x="400" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">❌ 错误#1: 忘记上下文开销</text><text x="60" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">7B Q4 = 3.5 GB,但4k上下文 = 5–6 GB实际。</text><rect x="40" y="118" width="720" height="30" fill="#EA4335" stroke="#E8DEF8" stroke-width="1"/><text x="400" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">❌ 错误#2: 混淆70B和70GB VRAM</text><text x="60" y="163" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">70B = 700亿参数。VRAM = (70 × bits) ÷ 8,不是固定70 GB。</text><rect x="40" y="181" width="720" height="30" fill="#EA4335" stroke="#E8DEF8" stroke-width="1"/><text x="400" y="201" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">❌ 错误#3: 忽视系统开销</text><text x="60" y="226" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">OS + 框架预留1–2 GB。GPU无法获得全部容量。</text><rect x="40" y="244" width="720" height="30" fill="#EA4335" stroke="#E8DEF8" stroke-width="1"/><text x="400" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">❌ 错误#4: 按计算值购买GPU</text><text x="60" y="289" font-family="system-ui, -apache-system, sans-serif" font-size="11" fill="#49454F">需要18 GB?购买24 GB。需要35 GB?购买40 GB。始终+25%。</text><text x="400" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#79747E" text-anchor="middle">← 返回文章</text><text x="792" y="345" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>