<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <text x="400" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    AI Code Review Workflow
  </text>
  
  <!-- Step 1 -->
  <rect x="40" y="80" width="120" height="120" rx="8" fill="#E8DEF8" stroke="#6750A4" stroke-width="2"/>
  <circle cx="100" cy="95" r="14" fill="#6750A4"/>
  <text x="100" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle" font-weight="700">1</text>
  <text x="100" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1C1B1F" text-anchor="middle" font-weight="600">Paste code</text>
  
  <!-- Arrow 1 -->
  <line x1="160" y1="140" x2="190" y2="140" stroke="#6750A4" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2 -->
  <rect x="190" y="80" width="120" height="120" rx="8" fill="#E8DEF8" stroke="#6750A4" stroke-width="2"/>
  <circle cx="250" cy="95" r="14" fill="#6750A4"/>
  <text x="250" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle" font-weight="700">2</text>
  <text x="250" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1C1B1F" text-anchor="middle" font-weight="600">Add context</text>
  
  <!-- Arrow 2 -->
  <line x1="310" y1="140" x2="340" y2="140" stroke="#6750A4" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 3 -->
  <rect x="340" y="80" width="120" height="120" rx="8" fill="#E8DEF8" stroke="#6750A4" stroke-width="2"/>
  <circle cx="400" cy="95" r="14" fill="#6750A4"/>
  <text x="400" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle" font-weight="700">3</text>
  <text x="400" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1C1B1F" text-anchor="middle" font-weight="600">Select models</text>
  
  <!-- Arrow 3 -->
  <line x1="460" y1="140" x2="490" y2="140" stroke="#6750A4" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 4 -->
  <rect x="490" y="80" width="120" height="120" rx="8" fill="#E8DEF8" stroke="#6750A4" stroke-width="2"/>
  <circle cx="550" cy="95" r="14" fill="#6750A4"/>
  <text x="550" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle" font-weight="700">4</text>
  <text x="550" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1C1B1F" text-anchor="middle" font-weight="600">Run review</text>
  
  <!-- Arrow 4 -->
  <line x1="610" y1="140" x2="640" y2="140" stroke="#6750A4" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 5 -->
  <rect x="640" y="80" width="120" height="120" rx="8" fill="#E8DEF8" stroke="#6750A4" stroke-width="2"/>
  <circle cx="700" cy="95" r="14" fill="#6750A4"/>
  <text x="700" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle" font-weight="700">5</text>
  <text x="700" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1C1B1F" text-anchor="middle" font-weight="600">Triage results</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#6750A4"/>
    </marker>
  </defs>
  
  <!-- Bottom explanation -->
  <text x="400" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1C1B1F" text-anchor="middle" font-weight="600">
    Structured workflow increases actionable finding rate by 3×
  </text>
<text x="792" y="395" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>