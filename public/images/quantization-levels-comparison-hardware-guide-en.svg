<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="420" fill="#FFFFFF"/>

  <text x="400" y="32" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">Choose Quantization by Hardware</text>

  <!-- 8GB RAM -->
  <rect x="28" y="55" width="170" height="310" rx="6" fill="#FFFFFF" stroke="#34A853" stroke-width="2" filter="url(#shadow)"/>
  <rect x="28" y="55" width="170" height="4" rx="0" fill="#34A853"/>

  <text x="113" y="85" font-size="14" font-weight="700" fill="#34A853" text-anchor="middle">8 GB RAM</text>

  <text x="48" y="120" font-weight="700" fill="#1C1B1F">Recommended:</text>
  <text x="48" y="140" font-size="12" fill="#49454F">Q3 or Q4</text>
  <text x="48" y="156" font-size="11" fill="#79747E">(7B models only)</text>

  <text x="48" y="185" font-weight="700" fill="#1C1B1F">Example Model:</text>
  <text x="48" y="202" font-size="12" fill="#49454F">Mistral 7B-Q4</text>
  <text x="48" y="218" font-size="11" fill="#79747E">~4.2 GB VRAM</text>

  <text x="48" y="250" font-weight="700" fill="#1C1B1F">Quality:</text>
  <circle cx="60" cy="268" r="6" fill="#F4B400"/>
  <text x="75" y="272" font-size="11" fill="#49454F">Good (for chat)</text>

  <text x="48" y="305" font-weight="700" fill="#1C1B1F">Speed:</text>
  <text x="48" y="322" font-size="12" fill="#49454F">15–25 tokens/sec</text>
  <text x="48" y="338" font-size="11" fill="#79747E">CPU bottleneck</text>

  <!-- 16GB RAM -->
  <rect x="218" y="55" width="170" height="310" rx="6" fill="#FFFFFF" stroke="#6750A4" stroke-width="2" filter="url(#shadow)"/>
  <rect x="218" y="55" width="170" height="4" rx="0" fill="#6750A4"/>

  <text x="303" y="85" font-size="14" font-weight="700" fill="#6750A4" text-anchor="middle">16 GB RAM ✓</text>

  <text x="238" y="120" font-weight="700" fill="#1C1B1F">Best Choice:</text>
  <text x="238" y="140" font-size="12" fill="#49454F">Q4_K_M</text>
  <text x="238" y="156" font-size="11" fill="#79747E">(most common)</text>

  <text x="238" y="185" font-weight="700" fill="#1C1B1F">Example Models:</text>
  <text x="238" y="202" font-size="12" fill="#49454F">Llama 3 8B-Q4</text>
  <text x="238" y="218" font-size="11" fill="#79747E">~7 GB VRAM</text>

  <text x="238" y="250" font-weight="700" fill="#1C1B1F">Quality:</text>
  <circle cx="250" cy="268" r="6" fill="#34A853"/>
  <text x="265" y="272" font-size="11" fill="#49454F">Excellent (99%)</text>

  <text x="238" y="305" font-weight="700" fill="#1C1B1F">Speed:</text>
  <text x="238" y="322" font-size="12" fill="#49454F">20–40 tokens/sec</text>
  <text x="238" y="338" font-size="11" fill="#79747E">GPU + CPU combo</text>

  <!-- 32GB RAM -->
  <rect x="408" y="55" width="170" height="310" rx="6" fill="#FFFFFF" stroke="#F4B400" stroke-width="2" filter="url(#shadow)"/>
  <rect x="408" y="55" width="170" height="4" rx="0" fill="#F4B400"/>

  <text x="493" y="85" font-size="14" font-weight="700" fill="#F4B400" text-anchor="middle">32 GB RAM</text>

  <text x="428" y="120" font-weight="700" fill="#1C1B1F">Options:</text>
  <text x="428" y="140" font-size="12" fill="#49454F">Q5, Q6, or Q8</text>
  <text x="428" y="156" font-size="11" fill="#79747E">(larger models)</text>

  <text x="428" y="185" font-weight="700" fill="#1C1B1F">Example Models:</text>
  <text x="428" y="202" font-size="12" fill="#49454F">Llama 3 70B-Q5</text>
  <text x="428" y="218" font-size="11" fill="#79747E">~88 GB × 0.5 bytes</text>

  <text x="428" y="250" font-weight="700" fill="#1C1B1F">Quality:</text>
  <circle cx="440" cy="268" r="6" fill="#34A853"/>
  <text x="455" y="272" font-size="11" fill="#49454F">Excellent (99.5%)</text>

  <text x="428" y="305" font-weight="700" fill="#1C1B1F">Speed:</text>
  <text x="428" y="322" font-size="12" fill="#49454F">30–60 tokens/sec</text>
  <text x="428" y="338" font-size="11" fill="#79747E">Full GPU utilization</text>

  <!-- 64GB+ RAM -->
  <rect x="598" y="55" width="174" height="310" rx="6" fill="#FFFFFF" stroke="#6750A4" stroke-width="2" filter="url(#shadow)"/>
  <rect x="598" y="55" width="174" height="4" rx="0" fill="#6750A4"/>

  <text x="685" y="85" font-size="14" font-weight="700" fill="#6750A4" text-anchor="middle">64 GB+ RAM</text>

  <text x="618" y="120" font-weight="700" fill="#1C1B1F">Maximum Quality:</text>
  <text x="618" y="140" font-size="12" fill="#49454F">Q8 or FP32</text>
  <text x="618" y="156" font-size="11" fill="#79747E">(research, medical)</text>

  <text x="618" y="185" font-weight="700" fill="#1C1B1F">Example Models:</text>
  <text x="618" y="202" font-size="12" fill="#49454F">Llama 3 70B-Q8</text>
  <text x="618" y="218" font-size="11" fill="#79747E">~140 GB (perfect)</text>

  <text x="618" y="250" font-weight="700" fill="#1C1B1F">Quality:</text>
  <circle cx="630" cy="268" r="6" fill="#34A853"/>
  <text x="645" y="272" font-size="11" fill="#49454F">Perfect (99.9%)</text>

  <text x="618" y="305" font-weight="700" fill="#1C1B1F">Speed:</text>
  <text x="618" y="322" font-size="12" fill="#49454F">Same as Q4–Q5</text>
  <text x="618" y="338" font-size="11" fill="#79747E">(memory-bound)</text>

  <!-- Bottom note -->
  <rect x="28" y="380" width="744" height="35" rx="6" fill="#F3E5F5" stroke="#6750A4" stroke-width="1"/>
  <text x="48" y="400" font-size="12" fill="#1C1B1F"><tspan font-weight="700">Pro Tip:</tspan> Match model size to VRAM. More RAM = use larger model at Q4, not smaller model at Q8.</text>
</svg>
