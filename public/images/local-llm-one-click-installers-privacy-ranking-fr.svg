<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg">
<rect width="800" height="360" fill="#FFFFFF"/>
<text x="400" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1C1B1F" text-anchor="middle">Classement confidentialité LLM local — Statut télémétrie, avril 2026</text>
<text x="400" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#49454F" text-anchor="middle">Les quatre outils effectuent l'inférence sur l'appareil. Classement basé sur la télémétrie et l'auditabilité.</text>
<line x1="18" y1="58" x2="782" y2="58" stroke="#E8DEF8" stroke-width="1.5"/>
<circle cx="45" cy="92" r="18" fill="#34A853"/>
<text x="45" y="96" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">#1</text>
<text x="80" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1C1B1F" text-anchor="start">Jan AI</text>
<rect x="146" y="78" width="65" height="18" rx="9" fill="#34A853" opacity="0.15"/>
<text x="178" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#34A853" text-anchor="middle">MIEUX</text>
<text x="80" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#49454F" text-anchor="start">Aucune télémétrie. Chats stockés localement en JSON. MIT open source, auditable.</text>
<line x1="18" y1="124" x2="782" y2="124" stroke="#F7F2FA" stroke-width="1"/>
<circle cx="45" cy="150" r="18" fill="#34A853"/>
<text x="45" y="154" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">#2</text>
<text x="80" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1C1B1F" text-anchor="start">Ollama</text>
<rect x="146" y="136" width="65" height="18" rx="9" fill="#34A853" opacity="0.15"/>
<text x="178" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#34A853" text-anchor="middle">MIEUX</text>
<text x="80" y="166" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#49454F" text-anchor="start">Aucune télémétrie confirmée dans le code MIT. API localhost uniquement.</text>
<line x1="18" y1="182" x2="782" y2="182" stroke="#F7F2FA" stroke-width="1"/>
<circle cx="45" cy="208" r="18" fill="#F4B400"/>
<text x="45" y="212" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">#3</text>
<text x="80" y="206" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1C1B1F" text-anchor="start">GPT4All</text>
<rect x="155" y="194" width="65" height="18" rx="9" fill="#F4B400" opacity="0.15"/>
<text x="187" y="206" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#F4B400" text-anchor="middle">BON</text>
<text x="80" y="224" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#49454F" text-anchor="start">Télémétrie opt-in uniquement — désactivée par défaut. MIT open source.</text>
<line x1="18" y1="240" x2="782" y2="240" stroke="#F7F2FA" stroke-width="1"/>
<circle cx="45" cy="266" r="18" fill="#EA4335"/>
<text x="45" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">#4</text>
<text x="80" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1C1B1F" text-anchor="start">LM Studio</text>
<rect x="173" y="252" width="65" height="18" rx="9" fill="#EA4335" opacity="0.15"/>
<text x="205" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#EA4335" text-anchor="middle">CAUTION</text>
<text x="80" y="282" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#49454F" text-anchor="start">Analytiques anonymes ON par défaut. Désactiver : Paramètres → Confidentialité.</text>
<line x1="18" y1="304" x2="782" y2="304" stroke="#E8DEF8" stroke-width="1"/>
<circle cx="24" cy="318" r="5" fill="#34A853"/>
<text x="34" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#79747E" text-anchor="start">Vert: aucune télémétrie</text>
<circle cx="215" cy="318" r="5" fill="#F4B400"/>
<text x="225" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#79747E" text-anchor="start">Ambre: opt-in uniquement</text>
<circle cx="413" cy="318" r="5" fill="#EA4335"/>
<text x="423" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#79747E" text-anchor="start">Rouge: on par défaut — action requise</text>
</svg>
