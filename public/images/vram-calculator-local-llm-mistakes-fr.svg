<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata><rect width="800" height="350" fill="#FFFFFF"/><text x="400" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">4 Erreurs VRAM Courantes</text><rect x="40" y="55" width="720" height="30" fill="#EA4335" stroke="#E8DEF8" stroke-width="1"/><text x="400" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">❌ Erreur #1: Oublier overhead contexte</text><text x="60" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">7B Q4 = 3.5 GB, mais avec contexte 4k = 5–6 GB réel.</text><rect x="40" y="118" width="720" height="30" fill="#EA4335" stroke="#E8DEF8" stroke-width="1"/><text x="400" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">❌ Erreur #2: Confondre 70B avec 70 GB VRAM</text><text x="60" y="163" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">70B = 70 milliards paramètres. VRAM = (70 × bits) ÷ 8, pas 70 GB fixe.</text><rect x="40" y="181" width="720" height="30" fill="#EA4335" stroke="#E8DEF8" stroke-width="1"/><text x="400" y="201" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">❌ Erreur #3: Ignorer overhead système</text><text x="60" y="226" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">OS + framework réservent 1–2 GB. GPU n'a jamais capacité totale.</text><rect x="40" y="244" width="720" height="30" fill="#EA4335" stroke="#E8DEF8" stroke-width="1"/><text x="400" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">❌ Erreur #4: Acheter GPU juste à taille calculée</text><text x="60" y="289" font-family="system-ui, -apache-system, sans-serif" font-size="11" fill="#49454F">Besoin 18 GB? Achetez 24 GB. Besoin 35 GB? Achetez 40 GB. Toujours +25%.</text><text x="400" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#79747E" text-anchor="middle">← Retour à l'article</text><text x="792" y="345" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>