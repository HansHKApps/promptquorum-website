<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="28" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">Quantization Guide: Speed vs Quality Trade-off</text>
  <text x="400" y="47" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#49454F" text-anchor="middle">Q4 is the standard choice. Drop to Q3/Q2 only when VRAM runs out.</text>

  <!-- Column headers -->
  <text x="38" y="73" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#79747E">Level</text>
  <text x="130" y="73" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#79747E">Quality Loss</text>
  <text x="260" y="73" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#79747E">VRAM Savings</text>
  <text x="400" y="73" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#79747E">Speed Gain</text>
  <text x="520" y="73" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#79747E">Mistral 7B Fits In</text>
  <text x="680" y="73" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#79747E">Verdict</text>
  <line x1="18" y1="80" x2="782" y2="80" stroke="#E8DEF8" stroke-width="1.5"/>

  <!-- Row 1: Q8 -->
  <text x="38" y="106" font-family="'SF Mono',Monaco,monospace" font-size="13" font-weight="700" fill="#1C1B1F">Q8</text>
  <text x="130" y="106" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#34A853">~0%</text>
  <text x="260" y="106" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#EA4335">0% (full precision)</text>
  <text x="400" y="106" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#EA4335">same as FP16</text>
  <text x="520" y="106" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1C1B1F">~8 GB VRAM</text>
  <text x="680" y="106" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#EA4335">avoid — too slow</text>
  <line x1="18" y1="116" x2="782" y2="116" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 2: Q4 — highlighted as recommended -->
  <rect x="18" y="121" width="764" height="38" fill="#F7F2FA" rx="2"/>
  <text x="38" y="144" font-family="'SF Mono',Monaco,monospace" font-size="13" font-weight="700" fill="#6750A4">Q4 ★</text>
  <text x="130" y="144" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#34A853">~1%</text>
  <text x="260" y="144" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#34A853">50% savings</text>
  <text x="400" y="144" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#34A853">baseline</text>
  <text x="520" y="144" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1C1B1F">~4.5 GB VRAM</text>
  <text x="680" y="144" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#6750A4">recommended ★</text>
  <line x1="18" y1="159" x2="782" y2="159" stroke="#E8DEF8" stroke-width="1.5"/>

  <!-- Row 3: Q3 -->
  <text x="38" y="185" font-family="'SF Mono',Monaco,monospace" font-size="13" font-weight="700" fill="#1C1B1F">Q3</text>
  <text x="130" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#F4B400">~3%</text>
  <text x="260" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#34A853">62% savings</text>
  <text x="400" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#F4B400">+15% faster</text>
  <text x="520" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1C1B1F">~3.5 GB VRAM</text>
  <text x="680" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#F4B400">acceptable</text>
  <line x1="18" y1="195" x2="782" y2="195" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Row 4: Q2 -->
  <text x="38" y="221" font-family="'SF Mono',Monaco,monospace" font-size="13" font-weight="700" fill="#1C1B1F">Q2</text>
  <text x="130" y="221" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#EA4335">~10%</text>
  <text x="260" y="221" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#34A853">75% savings</text>
  <text x="400" y="221" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#F4B400">+30% faster</text>
  <text x="520" y="221" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#1C1B1F">~2.5 GB VRAM</text>
  <text x="680" y="221" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#EA4335">last resort only</text>
  <line x1="18" y1="231" x2="782" y2="231" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Key insight box -->
  <rect x="18" y="245" width="764" height="60" rx="6" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1"/>
  <text x="38" y="267" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#6750A4">Key rule: Quantize larger models, don't switch to smaller models.</text>
  <text x="38" y="287" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#49454F">Mistral 7B Q2 beats TinyLlama 1B Q4 in both speed and quality on 4 GB VRAM.</text>
  <text x="38" y="303" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79747E">Q2 is 30% faster than Q4 because less memory bandwidth is required per forward pass.</text>

  <!-- Footer -->
  <text x="400" y="338" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#79747E" text-anchor="middle">promptquorum.com/local-llms/fastest-local-llms-low-end-pcs</text>
</svg>
