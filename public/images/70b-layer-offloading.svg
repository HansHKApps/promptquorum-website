<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="800" height="500" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="35"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="22"
    font-weight="700"
    fill="#1C1B1F"
    text-anchor="middle">
    70B Model Layer Offloading: GPU + CPU Working Together
  </text>

  <!-- Left side: GPU VRAM -->
  <rect x="40" y="80" width="300" height="380" fill="#E8DEF8" stroke="#6750A4" stroke-width="3" rx="8"/>

  <text x="190" y="110"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="18"
    font-weight="700"
    fill="#6750A4"
    text-anchor="middle">
    GPU VRAM
  </text>

  <text x="190" y="135"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="14"
    font-weight="700"
    fill="#6750A4"
    text-anchor="middle">
    RTX 4090: 24 GB
  </text>

  <!-- GPU layers -->
  <rect x="60" y="160" width="260" height="140" fill="#FFFFFF" stroke="#6750A4" stroke-width="1.5" rx="4"/>

  <text x="190" y="180"
    font-family="'SF Mono', 'Monaco', monospace"
    font-size="13"
    font-weight="700"
    fill="#6750A4"
    text-anchor="middle">
    Layers 1–48
  </text>

  <text x="190" y="210"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="12"
    font-weight="600"
    fill="#1C1B1F"
    text-anchor="middle">
    (60% of model)
  </text>

  <text x="190" y="235"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="11"
    font-weight="500"
    fill="#79747E"
    text-anchor="middle">
    ~14 GB
  </text>

  <text x="190" y="255"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="11"
    font-weight="600"
    fill="#34A853"
    text-anchor="middle">
    ✓ GPU Speed: 10–18 tok/s
  </text>

  <!-- Arrow between -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#79747E"/>
    </marker>
  </defs>

  <line x1="360" y1="250" x2="420" y2="250" stroke="#79747E" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="420" y1="320" x2="360" y2="320" stroke="#79747E" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Right side: System RAM -->
  <rect x="460" y="80" width="300" height="380" fill="#F7F2FA" stroke="#7D5260" stroke-width="3" rx="8"/>

  <text x="610" y="110"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="18"
    font-weight="700"
    fill="#7D5260"
    text-anchor="middle">
    System RAM
  </text>

  <text x="610" y="135"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="14"
    font-weight="700"
    fill="#7D5260"
    text-anchor="middle">
    32 GB Available
  </text>

  <!-- CPU layers -->
  <rect x="480" y="160" width="260" height="140" fill="#FFFFFF" stroke="#7D5260" stroke-width="1.5" rx="4"/>

  <text x="610" y="180"
    font-family="'SF Mono', 'Monaco', monospace"
    font-size="13"
    font-weight="700"
    fill="#7D5260"
    text-anchor="middle">
    Layers 49–80
  </text>

  <text x="610" y="210"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="12"
    font-weight="600"
    fill="#1C1B1F"
    text-anchor="middle">
    (40% of model)
  </text>

  <text x="610" y="235"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="11"
    font-weight="500"
    fill="#79747E"
    text-anchor="middle">
    ~26 GB
  </text>

  <text x="610" y="255"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="11"
    font-weight="600"
    fill="#F4B400"
    text-anchor="middle">
    ⚠ CPU Speed: 2–5 tok/s
  </text>

  <!-- Bottom section: Performance comparison -->
  <rect x="60" y="340" width="680" height="100" fill="#E8DEF8" stroke="#E8DEF8" stroke-width="1" rx="6"/>

  <text x="400" y="365"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="14"
    font-weight="700"
    fill="#1C1B1F"
    text-anchor="middle">
    Performance Breakdown
  </text>

  <text x="90" y="395"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="12"
    font-weight="600"
    fill="#49454F">
    With Offloading:
  </text>

  <text x="90" y="420"
    font-family="'SF Mono', 'Monaco', monospace"
    font-size="12"
    font-weight="700"
    fill="#6750A4">
    10–18 tok/s
  </text>

  <text x="300" y="395"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="12"
    font-weight="600"
    fill="#49454F">
    Without Offloading (GPU only):
  </text>

  <text x="300" y="420"
    font-family="'SF Mono', 'Monaco', monospace"
    font-size="12"
    font-weight="700"
    fill="#E67C73">
    ~2–3 tok/s (GPU runs out of VRAM)
  </text>

  <text x="550" y="395"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="12"
    font-weight="600"
    fill="#49454F">
    Interactive Minimum:
  </text>

  <text x="550" y="420"
    font-family="'SF Mono', 'Monaco', monospace"
    font-size="12"
    font-weight="700"
    fill="#34A853">
    8+ tok/s
  </text>
</svg>