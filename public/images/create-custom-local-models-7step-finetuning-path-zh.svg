<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="360" fill="#FFFFFF"/>
  <text x="400" y="32" font-size="18" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, 'Noto Sans CJK SC'">7 步微调路径</text>
  <circle cx="60" cy="100" r="22" fill="#6750A4"/><text x="60" y="108" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="system-ui">1</text>
  <text x="60" y="145" font-size="11" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, 'Noto Sans CJK SC'">收集数据</text>
  <text x="60" y="162" font-family="'SF Mono', Monaco" font-size="10" fill="#49454F" text-anchor="middle">500–5,000 样本</text>
  <text x="60" y="175" font-family="'SF Mono', Monaco" font-size="10" fill="#49454F" text-anchor="middle">JSON 格式</text>
  <text x="115" y="108" font-size="20" fill="#6750A4" font-family="system-ui">→</text>
  <circle cx="170" cy="100" r="22" fill="#6750A4"/><text x="170" y="108" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="system-ui">2</text>
  <text x="170" y="145" font-size="11" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, 'Noto Sans CJK SC'">选择基础模型</text>
  <text x="170" y="162" font-family="'SF Mono', Monaco" font-size="10" fill="#49454F" text-anchor="middle">Llama 3.1 8B</text>
  <text x="170" y="175" font-family="'SF Mono', Monaco" font-size="10" fill="#49454F" text-anchor="middle">或 Qwen 7B</text>
  <text x="225" y="108" font-size="20" fill="#6750A4" font-family="system-ui">→</text>
  <circle cx="280" cy="100" r="22" fill="#6750A4"/><text x="280" y="108" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="system-ui">3</text>
  <text x="280" y="145" font-size="11" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, 'Noto Sans CJK SC'">训练 LoRA</text>
  <text x="280" y="162" font-family="'SF Mono', Monaco" font-size="10" fill="#49454F" text-anchor="middle">3–5 轮次</text>
  <text x="280" y="175" font-family="'SF Mono', Monaco" font-size="10" fill="#49454F" text-anchor="middle">8 GB VRAM</text>
  <circle cx="60" cy="260" r="22" fill="#6750A4"/><text x="60" y="268" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="system-ui">4</text>
  <text x="60" y="305" font-size="11" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, 'Noto Sans CJK SC'">评估</text>
  <text x="60" y="322" font-family="'SF Mono', Monaco" font-size="10" fill="#49454F" text-anchor="middle">测试精度</text>
  <text x="115" y="268" font-size="20" fill="#6750A4" font-family="system-ui">→</text>
  <circle cx="170" cy="260" r="22" fill="#6750A4"/><text x="170" y="268" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="system-ui">5</text>
  <text x="170" y="305" font-size="11" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, 'Noto Sans CJK SC'">合并适配器</text>
  <text x="170" y="322" font-family="'SF Mono', Monaco" font-size="10" fill="#49454F" text-anchor="middle">单一文件</text>
  <text x="225" y="268" font-size="20" fill="#6750A4" font-family="system-ui">→</text>
  <circle cx="280" cy="260" r="22" fill="#6750A4"/><text x="280" y="268" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="system-ui">6</text>
  <text x="280" y="305" font-size="11" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, 'Noto Sans CJK SC'">转换为 GGUF</text>
  <text x="280" y="322" font-family="'SF Mono', Monaco" font-size="10" fill="#49454F" text-anchor="middle">Q4_K_M</text>
  <circle cx="400" cy="180" r="22" fill="#6750A4"/><text x="400" y="188" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="system-ui">7</text>
  <text x="400" y="225" font-size="11" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, 'Noto Sans CJK SC'">部署到 Ollama</text>
  <text x="400" y="242" font-family="'SF Mono', Monaco" font-size="10" fill="#49454F" text-anchor="middle">创建 Modelfile</text>
  <text x="400" y="255" font-family="'SF Mono', Monaco" font-size="10" fill="#49454F" text-anchor="middle">OpenAI API 兼容</text>
  <path d="M 302 100 Q 350 140 378 158" stroke="#6750A4" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 302 260 Q 350 220 378 202" stroke="#6750A4" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <text x="400" y="330" font-size="10" font-weight="600" fill="#79747E" text-anchor="middle" font-family="system-ui, 'Noto Sans CJK SC'">总时间 : 1–4 小时 | 成本 : $100–500</text>
</svg>
