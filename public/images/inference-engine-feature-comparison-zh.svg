  <rect x="20" y="251" width="140" height="42" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="0.5"/>
  <text x="30" y="277" class="t" font-size="13" font-weight="600" fill="#1C1B1F">支持格式</text>
  <rect x="160" y="251" width="238" height="42" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="0.5"/>
  <text x="279" y="277" class="t" font-size="13" fill="#1C1B1F" text-anchor="middle">GGUF</text>
  <rect x="398" y="251" width="240" height="42" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="0.5"/>
  <text x="518" y="277" class="t" font-size="13" fill="#1C1B1F" text-anchor="middle">safetensors, AWQ, fp16</text>
  <rect x="638" y="251" width="222" height="42" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="0.5"/>
  <text x="749" y="277" class="t" font-size="13" fill="#1C1B1F" text-anchor="middle">GGUF + safetensors</text>

  <!-- Row 6: 最适合 -->
  <rect x="20" y="293" width="140" height="50" fill="#6750A4"/>
