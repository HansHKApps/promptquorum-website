  <text x="279" y="235" class="t" font-size="13" fill="#1C1B1F" text-anchor="middle">50–150 tokens/秒</text>
  <rect x="398" y="209" width="240" height="42" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="0.5"/>
