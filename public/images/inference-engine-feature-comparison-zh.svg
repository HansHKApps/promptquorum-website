  <text x="518" y="201" class="t" font-size="12" fill="#E67C73" text-anchor="middle">需要 NVIDIA</text>
  <rect x="638" y="167" width="222" height="42" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="0.5"/>
