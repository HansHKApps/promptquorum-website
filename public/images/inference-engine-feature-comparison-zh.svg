  <rect x="20" y="125" width="140" height="42" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="0.5"/>
  <text x="30" y="151" class="t" font-size="13" font-weight="600" fill="#1C1B1F">CPU 支持</text>
