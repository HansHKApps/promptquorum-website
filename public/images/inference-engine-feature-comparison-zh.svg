  <text x="518" y="241" class="t" font-size="11" fill="#49454F" text-anchor="middle">批量请求模式</text>
  <rect x="638" y="209" width="222" height="42" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="0.5"/>
  <text x="749" y="235" class="t" font-size="13" fill="#1C1B1F" text-anchor="middle">50–150 tokens/秒</text>

