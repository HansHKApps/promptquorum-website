<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="360" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Backend Selection Guide: Use Case Matrix
  </text>

  <!-- Table structure -->
  <!-- Header row -->
  <rect x="20" y="50" width="180" height="40" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1"/>
  <rect x="200" y="50" width="190" height="40" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1"/>
  <rect x="390" y="50" width="190" height="40" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1"/>
  <rect x="580" y="50" width="200" height="40" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1"/>

  <text x="110" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#79747E" text-anchor="middle">Use Case</text>
  <text x="295" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#6750A4" text-anchor="middle">llama.cpp</text>
  <text x="485" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#6750A4" text-anchor="middle">Ollama</text>
  <text x="680" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#6750A4" text-anchor="middle">vLLM</text>

  <!-- Row 1: Personal Chat -->
  <rect x="20" y="90" width="180" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="200" y="90" width="190" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="390" y="90" width="190" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="580" y="90" width="200" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>

  <text x="110" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F" text-anchor="middle">Personal Chat</text>
  <text x="110" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">(1 user)</text>

  <text x="295" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Good. Fast</text>
  <text x="295" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">setup.</text>

  <text x="485" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#34A853" font-weight="700" text-anchor="middle">✓ Best</text>
  <text x="485" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#34A853" text-anchor="middle">Simplest.</text>

  <text x="680" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Overkill</text>
  <text x="680" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Complex.</text>

  <!-- Row 2: Dev/Testing -->
  <rect x="20" y="140" width="180" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="200" y="140" width="190" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="390" y="140" width="190" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="580" y="140" width="200" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>

  <text x="110" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F" text-anchor="middle">Dev / Testing</text>
  <text x="110" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">(Experiments)</text>

  <text x="295" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Good. Custom</text>
  <text x="295" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">inference.</text>

  <text x="485" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#34A853" font-weight="700" text-anchor="middle">✓ Best</text>
  <text x="485" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#34A853" text-anchor="middle">Fast setup.</text>

  <text x="680" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Good.  API</text>
  <text x="680" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">oriented.</text>

  <!-- Row 3: Production API -->
  <rect x="20" y="190" width="180" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="200" y="190" width="190" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="390" y="190" width="190" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="580" y="190" width="200" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>

  <text x="110" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F" text-anchor="middle">Production API</text>
  <text x="110" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">(10+ concurrent)</text>

  <text x="295" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#EA4335" text-anchor="middle">✗ No</text>
  <text x="295" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#EA4335" text-anchor="middle">No batching.</text>

  <text x="485" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#EA4335" text-anchor="middle">✗ No</text>
  <text x="485" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#EA4335" text-anchor="middle">Single-batch.</text>

  <text x="680" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#34A853" font-weight="700" text-anchor="middle">✓ Only Choice</text>
  <text x="680" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#34A853" text-anchor="middle">250+ tok/s.</text>

  <!-- Row 4: Custom Inference -->
  <rect x="20" y="240" width="180" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="200" y="240" width="190" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="390" y="240" width="190" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="580" y="240" width="200" height="50" fill="#FFFFFF" stroke="#F7F2FA" stroke-width="1"/>

  <text x="110" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F" text-anchor="middle">Custom Engine</text>
  <text x="110" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">(Low-level)</text>

  <text x="295" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#34A853" font-weight="700" text-anchor="middle">✓ Best</text>
  <text x="295" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#34A853" text-anchor="middle">Full control.</text>

  <text x="485" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Limited.</text>
  <text x="485" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">High-level.</text>

  <text x="680" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Limited.</text>
  <text x="680" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">API-focused.</text>

  <!-- Footer note -->
  <text x="400" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#79747E" text-anchor="middle">
    All three produce identical model outputs. Choose based on use case, setup complexity tolerance, and throughput needs.
  </text>
</svg>
