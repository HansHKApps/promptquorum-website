<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata><rect width="800" height="350" fill="#FFFFFF"/><text x="400" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">4 häufige VRAM-Fehler</text><rect x="40" y="55" width="720" height="30" fill="#EA4335" stroke="#E8DEF8" stroke-width="1"/><text x="400" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">❌ Fehler #1: Kontextoverhead vergessen</text><text x="60" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">7B bei Q4 = 3,5 GB, aber mit 4k Kontext = 5–6 GB real.</text><rect x="40" y="118" width="720" height="30" fill="#EA4335" stroke="#E8DEF8" stroke-width="1"/><text x="400" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">❌ Fehler #2: 70B mit 70 GB VRAM verwechseln</text><text x="60" y="163" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">70B = 70 Milliarden Parameter. VRAM = (70 × bits) ÷ 8, nicht fix 70 GB.</text><rect x="40" y="181" width="720" height="30" fill="#EA4335" stroke="#E8DEF8" stroke-width="1"/><text x="400" y="201" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">❌ Fehler #3: System-Overhead ignorieren</text><text x="60" y="226" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">OS + Framework reservieren 1–2 GB. GPU hat nie volle Kapazität.</text><rect x="40" y="244" width="720" height="30" fill="#EA4335" stroke="#E8DEF8" stroke-width="1"/><text x="400" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">❌ Fehler #4: GPU genau bei Kalkulationsgröße kaufen</text><text x="60" y="289" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F">Brauche 18 GB? Kauf 24 GB. Brauche 35 GB? Kauf 40 GB. Immer 25% Puffer.</text><text x="400" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#79747E" text-anchor="middle">← Zurück zum Artikel</text><text x="792" y="345" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>