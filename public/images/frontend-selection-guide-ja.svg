  <text x="80" y="253" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500" fill="#49454F">デスクトップ · 3分</text>
  <text x="80" y="269" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#6750A4">オフライン、macOS/Windows</text>
