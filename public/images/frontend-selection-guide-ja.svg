<svg viewBox="0 0 800 415" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="415" fill="#FFFFFF"/>
  <text x="400" y="32" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">ローカルLLMフロントエンドの選び方</text>
