  <text x="643" y="345" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#79747E" text-anchor="middle">5人以上のチームに最適</text>

  <rect x="50" y="380" width="700" height="26" rx="5" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1"/>
  <text x="400" y="397" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#49454F" text-anchor="middle">全フロントエンドがOllamaインスタンスを共有 · いつでも切替可能 · 再ダウンロード不要</text>
