  <text x="566" y="169" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500" fill="#49454F">Docker · 5分セットアップ</text>
  <text x="566" y="186" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#6750A4">RAG + マルチモーダル + 検索</text>
