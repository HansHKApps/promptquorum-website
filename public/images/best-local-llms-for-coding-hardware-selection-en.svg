<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="32" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Which Coding Model Should You Use? Hardware-Matched Guide
  </text>

  <!-- RAM Tier 1: 8 GB -->
  <rect x="28" y="55" width="340" height="310" rx="6" fill="#FFFFFF" stroke="#34A853" stroke-width="2" filter="url(#shadow)"/>
  <rect x="28" y="55" width="340" height="4" rx="0" fill="#34A853"/>

  <text x="198" y="80" font-size="16" font-weight="700" fill="#34A853" text-anchor="middle">8 GB RAM</text>
  <text x="198" y="100" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">Qwen2.5-Coder 7B</text>

  <text x="48" y="125" font-weight="700" fill="#1C1B1F">Performance:</text>
  <text x="48" y="142" font-size="12" fill="#49454F">• HumanEval: 72%</text>
  <text x="48" y="158" font-size="12" fill="#49454F">• Speed: 15–25 tok/sec</text>
  <text x="48" y="174" font-size="12" fill="#49454F">• RAM used: 4.7 GB</text>

  <text x="48" y="200" font-weight="700" fill="#1C1B1F">Best for:</text>
  <text x="48" y="217" font-size="12" fill="#49454F">• Most users with 8 GB</text>
  <text x="48" y="233" font-size="12" fill="#49454F">• IDE autocomplete (FIM)</text>
  <text x="48" y="249" font-size="12" fill="#49454F">• Everyday coding tasks</text>

  <text x="48" y="275" font-weight="700" fill="#1C1B1F">Setup:</text>
  <text x="48" y="295" font-family="'SF Mono'" font-size="11" fill="#49454F">ollama run</text>
  <text x="48" y="310" font-family="'SF Mono'" font-size="11" fill="#49454F">qwen2.5-coder:7b</text>

  <!-- RAM Tier 2: 16 GB -->
  <rect x="430" y="55" width="340" height="310" rx="6" fill="#FFFFFF" stroke="#F4B400" stroke-width="2" filter="url(#shadow)"/>
  <rect x="430" y="55" width="340" height="4" rx="0" fill="#F4B400"/>

  <text x="600" y="80" font-size="16" font-weight="700" fill="#F4B400" text-anchor="middle">16 GB RAM</text>
  <text x="600" y="100" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">DeepSeek-Coder V2 16B</text>

  <text x="450" y="125" font-weight="700" fill="#1C1B1F">Performance:</text>
  <text x="450" y="142" font-size="12" fill="#49454F">• HumanEval: 81%</text>
  <text x="450" y="158" font-size="12" fill="#49454F">• Speed: 25–40 tok/sec</text>
  <text x="450" y="174" font-size="12" fill="#49454F">• RAM used: ~10 GB</text>

  <text x="450" y="200" font-weight="700" fill="#1C1B1F">Best for:</text>
  <text x="450" y="217" font-size="12" fill="#49454F">• 16 GB laptops/desktops</text>
  <text x="450" y="233" font-size="12" fill="#49454F">• Higher code quality</text>
  <text x="450" y="249" font-size="12" fill="#49454F">• Fast, expert-guided generation</text>

  <text x="450" y="275" font-weight="700" fill="#1C1B1F">Setup:</text>
  <text x="450" y="295" font-family="'SF Mono'" font-size="11" fill="#49454F">ollama run deepseek-</text>
  <text x="450" y="310" font-family="'SF Mono'" font-size="11" fill="#49454F">coder-v2:16b</text>

  <!-- RAM Tier 3: 20+ GB (bottom) -->
  <rect x="28" y="380" width="742" height="35" rx="6" fill="#6750A4" filter="url(#shadow)"/>

  <text x="45" y="397" font-size="13" font-weight="700" fill="#FFFFFF">🏆 20+ GB RAM:</text>
  <text x="220" y="397" font-size="13" fill="#FFFFFF">Qwen2.5-Coder 32B (87% HumanEval) — highest quality, best for serious coding work</text>

  <!-- Footer -->
  <text x="400" y="420" font-size="10" fill="#79747E" text-anchor="middle">
    RAM shown is Q4_K_M quantization. Always match model to your available memory first.
  </text>
<text x="792" y="415" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>