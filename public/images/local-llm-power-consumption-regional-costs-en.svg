  <text x="400" y="247" font-size="11" font-weight="700" fill="#34A853">~¥504</text>
  <text x="600" y="247" font-size="11" font-weight="700" fill="#34A853">~¥25</text>
  <line x1="18" y1="265" x2="782" y2="265" stroke="#E8DEF8" stroke-width="1"/>
  <text x="50" y="284" font-size="10" fill="#79747E">RTX 4090 assumes 600W avg system load. EU rates include VAT and are approx. 3× US average.</text>
  <text x="50" y="301" font-size="10" fill="#79747E">For EU users, Apple Silicon or power-limited GPU inference is strongly recommended to control electricity costs.</text>
  <text x="792" y="342" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text>
