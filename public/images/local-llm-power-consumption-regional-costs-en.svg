<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <rect width="800" height="350" fill="#FFFFFF"/>
  <text x="400" y="28" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">Monthly LLM Inference Cost by Region</text>
  <line x1="18" y1="46" x2="782" y2="46" stroke="#E8DEF8" stroke-width="1.5"/>
  <text x="50" y="65" font-size="12" font-weight="700" fill="#79747E">Region</text>
  <text x="240" y="65" font-size="12" font-weight="700" fill="#79747E">Rate / kWh</text>
  <text x="400" y="65" font-size="12" font-weight="700" fill="#79747E">RTX 4090 / mo</text>
  <text x="600" y="65" font-size="12" font-weight="700" fill="#79747E">M5 Max / mo</text>
  <line x1="18" y1="73" x2="782" y2="73" stroke="#E8DEF8" stroke-width="1.5"/>
  <text x="50" y="100" font-size="11" font-weight="600" fill="#1C1B1F">🇺🇸 United States</text>
  <text x="240" y="100" font-size="11" fill="#49454F">$0.12</text>
  <text x="400" y="100" font-size="11" font-weight="700" fill="#49454F">$52</text>
  <text x="600" y="100" font-size="11" fill="#49454F">$2.60</text>
  <line x1="18" y1="110" x2="782" y2="110" stroke="#F7F2FA" stroke-width="1"/>
