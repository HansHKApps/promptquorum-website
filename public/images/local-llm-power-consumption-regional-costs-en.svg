  <text x="400" y="138" font-size="11" font-weight="700" fill="#EA4335">~€152</text>
  <text x="600" y="138" font-size="11" fill="#49454F">~€7.60</text>
  <line x1="18" y1="148" x2="782" y2="148" stroke="#F7F2FA" stroke-width="1"/>
  <text x="50" y="176" font-size="11" font-weight="600" fill="#1C1B1F">🇫🇷 France</text>
  <text x="240" y="176" font-size="11" fill="#49454F">€0.30</text>
  <text x="400" y="176" font-size="11" font-weight="700" fill="#EA4335">~€130</text>
  <text x="600" y="176" font-size="11" fill="#49454F">~€6.50</text>
  <line x1="18" y1="186" x2="782" y2="186" stroke="#F7F2FA" stroke-width="1"/>
  <text x="50" y="214" font-size="11" font-weight="600" fill="#1C1B1F">🇯🇵 Japan</text>
  <text x="240" y="214" font-size="11" fill="#49454F">¥30</text>
  <text x="400" y="214" font-size="11" font-weight="700" fill="#F4B400">~¥12,960</text>
  <text x="600" y="214" font-size="11" fill="#49454F">~¥648</text>
  <line x1="18" y1="224" x2="782" y2="224" stroke="#F7F2FA" stroke-width="1"/>
  <rect x="28" y="227" width="744" height="30" fill="#E8DEF8" opacity="0.5" rx="3"/>
