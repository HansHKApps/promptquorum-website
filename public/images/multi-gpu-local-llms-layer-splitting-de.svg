<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg">
  <metadata>
    <dc:title xmlns:dc="http://purl.org/dc/elements/1.1/">Schichten-Aufteilung auf 2 GPUs</dc:title>
    <dc:creator>PromptQuorum</dc:creator>
    <dc:rights>© PromptQuorum 2026</dc:rights>
    <dc:source>https://www.promptquorum.com/local-llms/multi-gpu-local-llms</dc:source>
  </metadata>

  <rect width="800" height="360" fill="#FFFFFF"/>

  <text x="400" y="28" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">Wie sich 70B-Modellschichten auf 2 GPUs verteilen</text>

  <circle cx="80" cy="80" r="22" fill="#6750A4"/>
  <text x="80" y="88" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="80" y="125" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">Vollständiges Modell</text>
  <text x="80" y="145" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">80 Schichten</text>
  <text x="80" y="160" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">Llama 3.3 70B</text>

  <text x="140" y="88" font-family="system-ui, sans-serif" font-size="24" fill="#6750A4">→</text>

  <circle cx="220" cy="80" r="22" fill="#6750A4"/>
  <text x="220" y="88" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="220" y="125" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">GPU 1</text>
  <text x="220" y="145" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">Schichten 1–40</text>
  <text x="220" y="160" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">24 GB VRAM</text>

  <text x="280" y="88" font-family="system-ui, sans-serif" font-size="24" fill="#6750A4">→</text>

  <circle cx="360" cy="80" r="22" fill="#6750A4"/>
  <text x="360" y="88" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="360" y="125" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">GPU 2</text>
  <text x="360" y="145" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">Schichten 41–80</text>
  <text x="360" y="160" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">24 GB VRAM</text>

  <text x="420" y="88" font-family="system-ui, sans-serif" font-size="24" fill="#6750A4">→</text>

  <circle cx="500" cy="80" r="22" fill="#6750A4"/>
  <text x="500" y="88" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="500" y="125" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">Pro Token</text>
  <text x="500" y="145" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">PCIe: 64 GB/s</text>
  <text x="500" y="160" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">~10% Overhead</text>

  <text x="560" y="88" font-family="system-ui, sans-serif" font-size="24" fill="#6750A4">→</text>

  <circle cx="640" cy="80" r="22" fill="#34A853"/>
  <text x="640" y="88" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text>
  <text x="640" y="125" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">Geschwindigkeit</text>
  <text x="640" y="145" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">~100 tok/sec</text>
  <text x="640" y="160" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">90% von Einzel-GPU</text>

  <rect x="40" y="210" width="720" height="120" rx="6" fill="#E8DEF8" stroke="#6750A4" stroke-width="1.5"/>

  <text x="60" y="235" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">Inferenz-Fluss (pro Token):</text>

  <text x="60" y="260" font-family="'SF Mono', Monaco, monospace" font-size="11" fill="#1C1B1F"><tspan font-weight="700">Eingabe-Token</tspan> → GPU 1 verarbeitet Schichten 1–40 → GPU 2 verarbeitet Schichten 41–80 → Ausgabe-Token</text>

  <text x="60" y="285" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">• Jeder Token erfordert EINE GPU-zu-GPU-Übertragung (nach GPU 1 → GPU 2)</text>

  <text x="60" y="305" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">• PCIe-Bandbreite (64 GB/s) ist der Engpass; NVLink (900 GB/s) wäre 14× schneller, aber nicht auf Consumer-RTX verfügbar</text>

  <text x="60" y="325" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">• Für 70B-Modell: ~96 Bytes pro Token übertragen (~10% der Inferenz-Zeit für GPU-Kommunikation)</text>

  <text x="730" y="348" font-family="system-ui, sans-serif" font-size="10" fill="#999999" text-anchor="end">promptquorum.com</text>
</svg>