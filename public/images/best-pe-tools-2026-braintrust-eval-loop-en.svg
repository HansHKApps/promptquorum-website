<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <!-- White background -->
  <rect width="800" height="360" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Braintrust: Eval-to-Production Loop
  </text>

  <!-- Step 1: Define Evals -->
  <circle cx="100" cy="120" r="22" fill="#6750A4"/>
  <text x="100" y="128" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>

  <text x="100" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Define Evals
  </text>
  <text x="100" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">
    Set scoring
  </text>
  <text x="100" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">
    criteria
  </text>

  <!-- Arrow 1 -->
  <text x="160" y="128" font-size="20" fill="#6750A4">→</text>

  <!-- Step 2: Run Automatically -->
  <circle cx="280" cy="120" r="22" fill="#6750A4"/>
  <text x="280" y="128" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>

  <text x="280" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Run
  </text>
  <text x="280" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">
    API-triggered
  </text>
  <text x="280" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">
    runs
  </text>

  <!-- Arrow 2 -->
  <text x="340" y="128" font-size="20" fill="#6750A4">→</text>

  <!-- Step 3: Score with Humans -->
  <circle cx="460" cy="120" r="22" fill="#6750A4"/>
  <text x="460" y="128" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>

  <text x="460" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Score
  </text>
  <text x="460" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">
    with human
  </text>
  <text x="460" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">
    feedback
  </text>

  <!-- Arrow 3 -->
  <text x="520" y="128" font-size="20" fill="#6750A4">→</text>

  <!-- Step 4: Compile Dataset -->
  <circle cx="640" cy="120" r="22" fill="#6750A4"/>
  <text x="640" y="128" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>

  <text x="640" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Compile
  </text>
  <text x="640" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">
    dataset for
  </text>
  <text x="640" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">
    future evals
  </text>

  <!-- Loop arrow back to step 1 -->
  <path d="M 620 140 Q 370 280 120 140" stroke="#6750A4" stroke-width="2" fill="none"/>
  <polygon points="120,140 108,148 115,138" fill="#6750A4"/>

  <!-- Loop label -->
  <text x="370" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6750A4" text-anchor="middle" font-weight="700">
    Feedback loop
  </text>

  <!-- Description box -->
  <rect x="50" y="240" width="700" height="80" rx="6" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1"/>
  <text x="400" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Ground Truth Dataset
  </text>
  <text x="400" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#49454F" text-anchor="middle">
    LLM judges run automatically. Humans score results. Dataset grows with each eval run.
  </text>
  <text x="400" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#49454F" text-anchor="middle">
    Future evals use this ground truth to improve accuracy and reduce manual scoring.
  </text>
<text x="792" y="355" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>