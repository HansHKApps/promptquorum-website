<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="360" fill="#FFFFFF"/>
  <text x="400" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="19" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Braintrust: Boucle d'Évaluation à Prod
  </text>

  <circle cx="100" cy="120" r="22" fill="#6750A4"/><text x="100" y="128" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="100" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">Définir Evals</text>
  <text x="100" y="182" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Critères notation</text>
  <text x="160" y="128" font-size="20" fill="#6750A4">→</text>

  <circle cx="280" cy="120" r="22" fill="#6750A4"/><text x="280" y="128" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="280" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">Exécuter</text>
  <text x="280" y="182" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Via API auto</text>
  <text x="340" y="128" font-size="20" fill="#6750A4">→</text>

  <circle cx="460" cy="120" r="22" fill="#6750A4"/><text x="460" y="128" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="460" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">Noter</text>
  <text x="460" y="182" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Feedback humain</text>
  <text x="520" y="128" font-size="20" fill="#6750A4">→</text>

  <circle cx="640" cy="120" r="22" fill="#6750A4"/><text x="640" y="128" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="640" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">Compiler</text>
  <text x="640" y="182" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">Dataset futur</text>

  <path d="M 620 140 Q 370 280 120 140" stroke="#6750A4" stroke-width="2" fill="none"/>
  <polygon points="120,140 108,148 115,138" fill="#6750A4"/>
  <text x="370" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6750A4" text-anchor="middle" font-weight="700">
    Boucle retour
  </text>

  <rect x="50" y="240" width="700" height="80" rx="6" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1"/>
  <text x="400" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Dataset de Vérité
  </text>
  <text x="400" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#49454F" text-anchor="middle">
    LLM juges auto. Humains notent. Dataset croît à chaque eval.
  </text>
  <text x="400" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#49454F" text-anchor="middle">
    Futures evals utilisent vérité pour meilleure précision et moins notation manuelle.
  </text>
</svg>