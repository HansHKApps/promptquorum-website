<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <!-- Background -->
  <rect width="800" height="450" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    CPU-Inferenz Geschwindigkeit: 16 GB RAM
  </text>
  <text x="400" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#79747E" text-anchor="middle">
    (Ryzen 9 7950X)
  </text>

  <!-- Row 1: Gemma 2 2B Q8_0 28 tok/sec ⚡ -->
  <g>
    <text x="20" y="85" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Gemma 2 2B Q8_0</text>
    <text x="20" y="103" font-family="system-ui, sans-serif" font-size="12" fill="#49454F">~2,7 GB</text>
    <rect x="220" y="75" width="420" height="28" rx="4" fill="#6750A4" stroke="#6750A4" stroke-width="1"/>
    <text x="225" y="95" font-family="system-ui, sans-serif" font-size="11" fill="#FFFFFF" font-weight="600">████████████████████████████████████████████████ 28 tok/Sek. ⚡</text>
  </g>

  <!-- Row 2: Phi-4 Mini 3.8B Q4_K_M 25 tok/sec ⭐ -->
  <g>
    <text x="20" y="155" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Phi-4 Mini 3.8B Q4_K_M</text>
    <text x="20" y="173" font-family="system-ui, sans-serif" font-size="12" fill="#49454F">~2,5 GB</text>
    <rect x="220" y="145" width="375" height="28" rx="4" fill="#6750A4" stroke="#6750A4" stroke-width="1"/>
    <text x="225" y="165" font-family="system-ui, sans-serif" font-size="11" fill="#FFFFFF" font-weight="600">███████████████████████████████ 25 tok/Sek. ⭐ Beste</text>
  </g>

  <!-- Row 3: Llama 3.2 3B Q8_0 20 tok/sec -->
  <g>
    <text x="20" y="225" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Llama 3.2 3B Q8_0</text>
    <text x="20" y="243" font-family="system-ui, sans-serif" font-size="12" fill="#49454F">~3,8 GB</text>
    <rect x="220" y="215" width="300" height="28" rx="4" fill="#E8DEF8" stroke="#6750A4" stroke-width="1"/>
    <text x="225" y="235" font-family="system-ui, sans-serif" font-size="11" fill="#1C1B1F" font-weight="600">██████████████████████ 20 tok/Sek.</text>
  </g>

  <!-- Row 4: Llama 3.1 8B Q4_K_M 12 tok/sec -->
  <g>
    <text x="20" y="295" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">Llama 3.1 8B Q4_K_M</text>
    <text x="20" y="313" font-family="system-ui, sans-serif" font-size="12" fill="#49454F">~4,9 GB</text>
    <rect x="220" y="285" width="180" height="28" rx="4" fill="#E8DEF8" stroke="#6750A4" stroke-width="1"/>
    <text x="225" y="305" font-family="system-ui, sans-serif" font-size="11" fill="#1C1B1F" font-weight="600">███████████████ 12 tok/Sek.</text>
  </g>

  <!-- Comparison callout -->
  <g>
    <rect x="520" y="258" width="260" height="105" rx="6" fill="#FEF7FF" stroke="#6750A4" stroke-width="1.5" stroke-dasharray="2,2"/>
    <text x="530" y="278" font-family="system-ui, sans-serif" font-size="12" fill="#6750A4" font-weight="700">GPU vs CPU</text>
    <text x="530" y="300" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">RTX 3060 12GB gebraucht</text>
    <text x="530" y="316" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">(~200 € gebraucht):</text>
    <text x="530" y="334" font-family="system-ui, sans-serif" font-size="13" fill="#28A745" font-weight="700">70 tok/Sek.</text>
    <text x="530" y="350" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">5–8× schneller</text>
  </g>

  <!-- Bottom note -->
  <text x="400" y="430" font-family="system-ui, sans-serif" font-size="12" fill="#79747E" text-anchor="middle" font-weight="500">
    CPU ist Speicherbandbreite-begrenzt. Eine GPU (auch Budget-Modelle) ist immer noch 5–8× schneller. GPU vor CPU upgraden.
  </text>
<text x="792" y="445" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>
