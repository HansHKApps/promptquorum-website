<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#FFFFFF"/>
  <text x="400" y="30" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, sans-serif">LLM推理负载下的电池续航</text>
  <text x="400" y="50" font-size="12" fill="#79747E" text-anchor="middle" font-family="system-ui, sans-serif">电池耗尽前的连续推理时间（2026年4月）</text>

  <!-- Y-axis -->
  <line x1="120" y1="70" x2="120" y2="280" stroke="#79747E" stroke-width="2"/>
  <line x1="120" y1="280" x2="720" y2="280" stroke="#79747E" stroke-width="2"/>
  <text x="40" y="180" font-size="12" fill="#49454F" text-anchor="middle" transform="rotate(-90 40 180)" font-family="system-ui, sans-serif">推理时间</text>
  <text x="110" y="285" text-anchor="end" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">0</text>
  <text x="110" y="250" text-anchor="end" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">1</text>
  <text x="110" y="215" text-anchor="end" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">2</text>
  <text x="110" y="180" text-anchor="end" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">3</text>
  <text x="110" y="145" text-anchor="end" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">4</text>
  <text x="110" y="110" text-anchor="end" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">5</text>
  <text x="110" y="78" text-anchor="end" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">6</text>

  <!-- Grid -->
  <line x1="120" y1="250" x2="720" y2="250" stroke="#F7F2FA" stroke-width="1"/>
  <line x1="120" y1="215" x2="720" y2="215" stroke="#F7F2FA" stroke-width="1"/>
  <line x1="120" y1="180" x2="720" y2="180" stroke="#F7F2FA" stroke-width="1"/>
  <line x1="120" y1="145" x2="720" y2="145" stroke="#F7F2FA" stroke-width="1"/>
  <line x1="120" y1="110" x2="720" y2="110" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Bar 1: iPad M4 = 5h -->
  <rect x="160" y="110" width="100" height="170" fill="#34A853" rx="4"/>
  <text x="210" y="100" font-size="14" font-weight="700" fill="#34A853" text-anchor="middle" font-family="system-ui, sans-serif">5小时</text>
  <text x="210" y="300" font-size="11" font-weight="600" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, sans-serif">iPad Pro M4</text>
  <text x="210" y="314" font-size="10" fill="#79747E" text-anchor="middle" font-family="system-ui, sans-serif">7B模型</text>

  <!-- Bar 2: Galaxy S25 = 3.5h -->
  <rect x="290" y="157" width="100" height="123" fill="#F4B400" rx="4"/>
  <text x="340" y="147" font-size="14" font-weight="700" fill="#F4B400" text-anchor="middle" font-family="system-ui, sans-serif">3.5小时</text>
  <text x="340" y="300" font-size="11" font-weight="600" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, sans-serif">Galaxy S25 Ultra</text>
  <text x="340" y="314" font-size="10" fill="#79747E" text-anchor="middle" font-family="system-ui, sans-serif">7B模型</text>

  <!-- Bar 3: iPhone 16 Pro = 3h -->
  <rect x="420" y="175" width="100" height="105" fill="#EA4335" rx="4"/>
  <text x="470" y="165" font-size="14" font-weight="700" fill="#EA4335" text-anchor="middle" font-family="system-ui, sans-serif">3小时</text>
  <text x="470" y="300" font-size="11" font-weight="600" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, sans-serif">iPhone 16 Pro</text>
  <text x="470" y="314" font-size="10" fill="#79747E" text-anchor="middle" font-family="system-ui, sans-serif">3B模型</text>

  <!-- Bar 4: iPhone 16 = 2h -->
  <rect x="550" y="215" width="100" height="65" fill="#EA4335" rx="4"/>
  <text x="600" y="205" font-size="14" font-weight="700" fill="#EA4335" text-anchor="middle" font-family="system-ui, sans-serif">2小时</text>
  <text x="600" y="300" font-size="11" font-weight="600" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, sans-serif">iPhone 16</text>
  <text x="600" y="314" font-size="10" fill="#79747E" text-anchor="middle" font-family="system-ui, sans-serif">3B模型</text>

  <!-- Footer -->
  <text x="400" y="338" font-size="12" font-weight="600" fill="#49454F" text-anchor="middle" font-family="system-ui, sans-serif">提示：将响应长度限制为最多200令牌。加载LLM前关闭其他应用。</text>
  <text x="750" y="348" text-anchor="end" font-size="10" fill="#999" font-family="system-ui, sans-serif">promptquorum.com</text>
</svg>