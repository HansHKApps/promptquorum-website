<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="800" height="350" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    IDE Integration Workflow
  </text>

  <!-- IDE Section (left) -->
  <g>
    <!-- VS Code window -->
    <rect x="50" y="70" width="300" height="250" rx="8" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="2"/>

    <!-- Window title bar -->
    <rect x="50" y="70" width="300" height="35" rx="8" fill="#E8DEF8"/>

    <!-- Title -->
    <text x="70" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">
      VS Code + Continue Extension
    </text>

    <!-- Code content -->
    <rect x="60" y="115" width="280" height="190" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1" rx="4"/>

    <!-- Sample code -->
    <text x="75" y="140" font-family="'SF Mono', 'Monaco', monospace" font-size="13" font-weight="500" fill="#1C1B1F">
      def fibonacci(n):
    </text>
    <text x="80" y="160" font-family="'SF Mono', 'Monaco', monospace" font-size="13" font-weight="500" fill="#1C1B1F">
      if n ≤ 1:
    </text>
    <text x="85" y="180" font-family="'SF Mono', 'Monaco', monospace" font-size="13" font-weight="500" fill="#1C1B1F">
      return n
    </text>

    <!-- Autocomplete suggestion box -->
    <rect x="75" y="195" width="220" height="75" fill="#E8DEF8" stroke="#6750A4" stroke-width="1.5" rx="4"/>
    <text x="85" y="218" font-family="'SF Mono', 'Monaco', monospace" font-size="12" font-weight="600" fill="#6750A4">
      💡 return fib(n-1) + fib(n-2)
    </text>
    <text x="85" y="238" font-family="'SF Mono', 'Monaco', monospace" font-size="11" font-weight="500" fill="#49454F">
      LLM suggestion (20 tok/s)
    </text>
    <text x="85" y="256" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#79747E">
      Tab to accept
    </text>
  </g>

  <!-- Connection Arrow -->
  <g>
    <!-- Arrow -->
    <line x1="370" y1="160" x2="430" y2="160" stroke="#6750A4" stroke-width="3"/>
    <polygon points="430,160 415,155 420,160 415,165" fill="#6750A4"/>

    <!-- Label on arrow -->
    <text x="400" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#6750A4" text-anchor="middle">
      HTTP
    </text>
  </g>

  <!-- vLLM Server Section (right) -->
  <g>
    <!-- Server container -->
    <rect x="450" y="70" width="300" height="250" rx="8" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="2"/>

    <!-- Header -->
    <rect x="450" y="70" width="300" height="35" rx="8" fill="#E8DEF8"/>

    <text x="470" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">
      vLLM Server (localhost:8000)
    </text>

    <!-- Terminal/logs -->
    <rect x="460" y="115" width="280" height="190" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1" rx="4"/>

    <!-- Log content -->
    <text x="475" y="140" font-family="'SF Mono', 'Monaco', monospace" font-size="12" font-weight="500" fill="#1C1B1F">
      $ python -m vllm.entrypoints...
    </text>
    <text x="475" y="158" font-family="'SF Mono', 'Monaco', monospace" font-size="12" font-weight="500" fill="#49454F">
      Model: meta-llama/Llama-3.1-8B
    </text>

    <!-- Active indicator -->
    <circle cx="485" cy="180" r="5" fill="#34A853"/>
    <text x="500" y="185" font-family="'SF Mono', 'Monaco', monospace" font-size="12" font-weight="500" fill="#34A853">
      Running
    </text>

    <!-- Request processing -->
    <text x="475" y="210" font-family="'SF Mono', 'Monaco', monospace" font-size="11" font-weight="500" fill="#1C1B1F">
      POST /v1/completions
    </text>
    <text x="475" y="228" font-family="'SF Mono', 'Monaco', monospace" font-size="11" font-weight="500" fill="#6750A4">
      ✓ Processing...
    </text>
    <text x="475" y="246" font-family="'SF Mono', 'Monaco', monospace" font-size="11" font-weight="500" fill="#6750A4">
      20 tokens/sec
    </text>
  </g>

  <!-- Bottom info box -->
  <rect x="50" y="320" width="700" height="25" rx="4" fill="#E8DEF8" stroke="#E8DEF8" stroke-width="0"/>
  <text x="400" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#1C1B1F" text-anchor="middle">
    Continue extension sends code prompts to vLLM over HTTP. Real-time completions appear in VS Code within milliseconds.
  </text>
</svg>
