<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <rect width="800" height="360" fill="#FFFFFF"/>
  <text x="400" y="28" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, sans-serif">ハイブリッド アプローチ: 複雑さでルーティング</text>

  <!-- Step 1: Incoming Query -->
  <circle cx="80" cy="80" r="22" fill="#6750A4"/>
  <text x="80" y="88" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="system-ui, sans-serif">1</text>
  <text x="80" y="125" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, sans-serif">ユーザー クエリ</text>
  <text x="80" y="145" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">"X とは?"</text>

  <!-- Arrow -->
  <text x="140" y="88" font-size="24" fill="#6750A4" font-family="system-ui, sans-serif">→</text>

  <!-- Step 2: Route Decision -->
  <circle cx="220" cy="80" r="22" fill="#6750A4"/>
  <text x="220" y="88" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="system-ui, sans-serif">2</text>
  <text x="220" y="125" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, sans-serif">分類する</text>
  <text x="220" y="145" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">シンプルか複雑か?</text>

  <!-- Left branch: Simple → Local -->
  <text x="140" y="180" font-size="12" font-weight="600" fill="#49454F" font-family="system-ui, sans-serif">シンプル</text>
  <line x1="190" y1="110" x2="140" y2="200"/>

  <circle cx="140" cy="260" r="22" fill="#34A853"/>
  <text x="140" y="268" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="system-ui, sans-serif">3</text>
  <text x="140" y="305" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, sans-serif">ローカル エージェント</text>
  <text x="140" y="325" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">Llama 13B</text>

  <!-- Local results box -->
  <rect x="80" y="330" width="120" height="18" rx="3" fill="#E8F5E9" stroke="#34A853" stroke-width="1"/>
  <text x="140" y="342" font-size="10" font-weight="600" fill="#34A853" text-anchor="middle" font-family="'SF Mono', Monaco, monospace">2秒、$0.00</text>

  <!-- Right branch: Complex → Cloud -->
  <text x="300" y="180" font-size="12" font-weight="600" fill="#49454F" font-family="system-ui, sans-serif">複雑</text>
  <line x1="250" y1="110" x2="300" y2="200"/>

  <circle cx="300" cy="260" r="22" fill="#6750A4"/>
  <text x="300" y="268" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="system-ui, sans-serif">4</text>
  <text x="300" y="305" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle" font-family="system-ui, sans-serif">クラウド エージェント</text>
  <text x="300" y="325" font-family="'SF Mono', Monaco, monospace" font-size="10" fill="#49454F" text-anchor="middle">GPT-4</text>

  <!-- Cloud results box -->
  <rect x="240" y="330" width="120" height="18" rx="3" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
  <text x="300" y="342" font-size="10" font-weight="600" fill="#1976D2" text-anchor="middle" font-family="'SF Mono', Monaco, monospace">200 ms、$0.02</text>

  <!-- Key insight -->
  <rect x="400" y="200" width="360" height="140" rx="4" fill="#FFF3E0" stroke="#F4B400" stroke-width="1"/>
  <text x="420" y="225" font-size="13" font-weight="700" fill="#1C1B1F" font-family="system-ui, sans-serif">ハイブリッドで80%コスト削減</text>
  <text x="420" y="245" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• FAQ と シンプル質問を ローカルにルーティング</text>
  <text x="420" y="263" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• 複雑な推論は クラウドにエスカレート</text>
  <text x="420" y="281" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• 難しい問題で品質の低下なし</text>
  <text x="420" y="299" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">• 推奨: PromptQuorum を使用</text>
  <text x="420" y="317" font-size="11" fill="#49454F" font-family="system-ui, sans-serif">  自動ディスパッチのため</text>
<text x="792" y="355" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>