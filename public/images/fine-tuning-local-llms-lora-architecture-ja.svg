<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="28" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">LoRAアーキテクチャ：アダプタ＋固定重み</text>

  <!-- Left section: Base Model -->
  <text x="120" y="70" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#49454F" text-anchor="middle">ベースモデル（固定）</text>
  <rect x="40" y="85" width="160" height="200" rx="6" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1.5"/>

  <!-- Base model layers -->
  <rect x="55" y="100" width="130" height="25" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1"/>
  <text x="120" y="118" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">レイヤー1</text>

  <rect x="55" y="135" width="130" height="25" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1"/>
  <text x="120" y="153" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">レイヤー2</text>

  <rect x="55" y="170" width="130" height="25" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1"/>
  <text x="120" y="188" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">...</text>

  <rect x="55" y="205" width="130" height="25" fill="#FFFFFF" stroke="#E8DEF8" stroke-width="1"/>
  <text x="120" y="223" font-family="system-ui, sans-serif" font-size="11" fill="#49454F" text-anchor="middle">レイヤーN</text>

  <text x="120" y="280" font-family="system-ui, sans-serif" font-size="10" fill="#79747E" text-anchor="middle">130億パラメータ</text>
  <text x="120" y="295" font-family="system-ui, sans-serif" font-size="10" fill="#79747E" text-anchor="middle">（固定、学習なし）</text>

  <!-- Center: Plus symbol -->
  <text x="400" y="200" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#6750A4" text-anchor="middle">+</text>

  <!-- Right section: LoRA Adapters -->
  <text x="680" y="70" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6750A4" text-anchor="middle">LoRAアダプタ（学習可能）</text>
  <rect x="600" y="85" width="160" height="200" rx="6" fill="#E8DEF8" stroke="#6750A4" stroke-width="2"/>

  <!-- Adapter layers -->
  <rect x="615" y="100" width="130" height="25" fill="#6750A4" stroke="none"/>
  <text x="680" y="118" font-family="system-ui, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="600">アダプタ1</text>

  <rect x="615" y="135" width="130" height="25" fill="#6750A4" stroke="none"/>
  <text x="680" y="153" font-family="system-ui, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="600">アダプタ2</text>

  <rect x="615" y="170" width="130" height="25" fill="#6750A4" stroke="none"/>
  <text x="680" y="188" font-family="system-ui, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="600">...</text>

  <rect x="615" y="205" width="130" height="25" fill="#6750A4" stroke="none"/>
  <text x="680" y="223" font-family="system-ui, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="600">アダプタN</text>

  <text x="680" y="280" font-family="system-ui, sans-serif" font-size="10" fill="#6750A4" text-anchor="middle" font-weight="600">5000万パラメータ</text>
  <text x="680" y="295" font-family="system-ui, sans-serif" font-size="10" fill="#6750A4" text-anchor="middle" font-weight="600">（全体の0.4%）</text>

  <!-- Equals and Result -->
  <text x="400" y="330" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F" text-anchor="middle">= ファインチューニング済みモデル（推論時に統合）</text>
</svg>