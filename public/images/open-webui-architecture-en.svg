<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="800" height="360" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="32" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">Open WebUI: How It Connects</text>
  <text x="400" y="52" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#79747E" text-anchor="middle">Docker runs Open WebUI · Ollama runs the model · Browser is your interface</text>

  <!-- LEFT: Browser / Users -->
  <rect x="30" y="120" width="155" height="130" rx="8" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="2"/>
  <text x="107" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#1C1B1F" text-anchor="middle">Your Browser</text>
  <text x="107" y="168" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500" fill="#49454F" text-anchor="middle">localhost:3000</text>
  <!-- User icons -->
  <circle cx="72" cy="208" r="10" fill="#E8DEF8" stroke="#6750A4" stroke-width="1.5"/>
  <text x="72" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#6750A4" text-anchor="middle">U1</text>
  <circle cx="107" cy="208" r="10" fill="#E8DEF8" stroke="#6750A4" stroke-width="1.5"/>
  <text x="107" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#6750A4" text-anchor="middle">U2</text>
  <circle cx="142" cy="208" r="10" fill="#E8DEF8" stroke="#6750A4" stroke-width="1.5"/>
  <text x="142" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#6750A4" text-anchor="middle">U3</text>
  <text x="107" y="238" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#6750A4" text-anchor="middle">Multi-user</text>

  <!-- Arrow: Browser → Open WebUI -->
  <line x1="185" y1="185" x2="250" y2="185" stroke="#6750A4" stroke-width="2.5"/>
  <polygon points="250,185 240,180 245,185 240,190" fill="#6750A4"/>
  <text x="217" y="176" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#6750A4" text-anchor="middle">HTTP</text>

  <!-- CENTER: Open WebUI Docker -->
  <rect x="255" y="95" width="210" height="185" rx="10" fill="#F7F2FA" stroke="#6750A4" stroke-width="2.5"/>
  <!-- Docker badge -->
  <rect x="265" y="105" width="190" height="38" rx="6" fill="#6750A4"/>
  <text x="360" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Open WebUI</text>
  <text x="360" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" fill="#E8DEF8" text-anchor="middle">Docker · port 3000→8080</text>

  <!-- Feature list inside Open WebUI -->
  <text x="275" y="164" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">✓ RAG (document Q&amp;A)</text>
  <text x="275" y="182" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">✓ Multimodal (images)</text>
  <text x="275" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">✓ Web search</text>
  <text x="275" y="218" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">✓ Function calling</text>
  <text x="275" y="236" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">✓ Auth + admin controls</text>
  <text x="275" y="254" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1C1B1F">✓ Model marketplace</text>

  <!-- Arrow: Open WebUI → Ollama -->
  <line x1="465" y1="185" x2="530" y2="185" stroke="#6750A4" stroke-width="2.5"/>
  <polygon points="530,185 520,180 525,185 520,190" fill="#6750A4"/>
  <text x="497" y="176" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#6750A4" text-anchor="middle">REST API</text>

  <!-- RIGHT: Ollama -->
  <rect x="535" y="120" width="155" height="130" rx="8" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="2"/>
  <text x="612" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#1C1B1F" text-anchor="middle">Ollama</text>
  <text x="612" y="169" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500" fill="#49454F" text-anchor="middle">localhost:11434</text>
  <text x="612" y="194" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#49454F" text-anchor="middle">Llama 3.1 8B</text>
  <text x="612" y="212" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#49454F" text-anchor="middle">Qwen2.5 7B</text>
  <text x="612" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#49454F" text-anchor="middle">Mistral 7B</text>

  <!-- Setup command at bottom -->
  <rect x="80" y="305" width="640" height="40" rx="6" fill="#F7F2FA" stroke="#E8DEF8" stroke-width="1.5"/>
  <text x="400" y="321" font-family="'SF Mono','Monaco',monospace" font-size="12" font-weight="600" fill="#6750A4" text-anchor="middle">docker run -d -p 3000:8080 --add-host=host.docker.internal:host-gateway \</text>
  <text x="400" y="337" font-family="'SF Mono','Monaco',monospace" font-size="12" font-weight="600" fill="#6750A4" text-anchor="middle">  -e OLLAMA_BASE_URL=http://host.docker.internal:11434 open-webui:latest</text>
</svg>
