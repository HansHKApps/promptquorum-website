<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <rect width="800" height="350" fill="#FFFFFF"/>
  <text x="400" y="28" font-size="18" font-weight="700" fill="#1C1B1F" text-anchor="middle">IDE Setup: VS Code + Continue.dev in 3 Steps</text>

  <!-- Step 1 -->
  <circle cx="100" cy="110" r="20" fill="#6750A4"/>
  <text x="100" y="120" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="100" y="160" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">Install Ollama</text>
  <text x="100" y="180" font-family="'SF Mono'" font-size="10" fill="#49454F" text-anchor="middle">ollama.ai/download</text>
  <text x="100" y="195" font-family="'SF Mono'" font-size="10" fill="#49454F" text-anchor="middle">Start: ollama serve</text>

  <!-- Arrow -->
  <text x="180" y="120" font-size="20" fill="#6750A4">→</text>

  <!-- Step 2 -->
  <circle cx="300" cy="110" r="20" fill="#6750A4"/>
  <text x="300" y="120" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="300" y="160" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">Install Continue.dev</text>
  <text x="300" y="180" font-family="'SF Mono'" font-size="10" fill="#49454F" text-anchor="middle">VS Code: Extensions</text>
  <text x="300" y="195" font-family="'SF Mono'" font-size="10" fill="#49454F" text-anchor="middle">Search "Continue"</text>

  <!-- Arrow -->
  <text x="380" y="120" font-size="20" fill="#6750A4">→</text>

  <!-- Step 3 -->
  <circle cx="500" cy="110" r="20" fill="#6750A4"/>
  <text x="500" y="120" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="500" y="160" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">Configure Model</text>
  <text x="500" y="180" font-family="'SF Mono'" font-size="10" fill="#49454F" text-anchor="middle">localhost:11434</text>
  <text x="500" y="195" font-family="'SF Mono'" font-size="10" fill="#49454F" text-anchor="middle">Select Qwen2.5-coder:7b</text>

  <!-- Arrow -->
  <text x="580" y="120" font-size="20" fill="#6750A4">→</text>

  <!-- Step 4 (Success) -->
  <circle cx="700" cy="110" r="20" fill="#34A853"/>
  <text x="700" y="120" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓</text>
  <text x="700" y="160" font-size="13" font-weight="700" fill="#1C1B1F" text-anchor="middle">Ready!</text>
  <text x="700" y="180" font-family="'SF Mono'" font-size="10" fill="#34A853" text-anchor="middle">Ctrl+Shift+\\</text>
  <text x="700" y="195" font-family="'SF Mono'" font-size="10" fill="#34A853" text-anchor="middle">for suggestions</text>

  <!-- Usage Box -->
  <rect x="40" y="240" width="720" height="90" rx="6" fill="#E8DEF8" stroke="#6750A4" stroke-width="1.5"/>
  <text x="400" y="265" font-size="12" font-weight="700" fill="#6750A4" text-anchor="middle">Using Continue.dev in VS Code</text>
  <text x="60" y="290" font-size="11" fill="#49454F"><tspan font-weight="600">Inline Code:</tspan> Tab or Ctrl+Shift+\\ to trigger local LLM suggestion</text>
  <text x="60" y="310" font-size="11" fill="#49454F"><tspan font-weight="600">Chat Mode:</tspan> Open Continue sidebar (left panel) to chat with your local Qwen2.5-Coder</text>
<text x="792" y="345" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>
