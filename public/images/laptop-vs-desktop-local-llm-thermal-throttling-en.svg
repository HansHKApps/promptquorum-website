<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="28" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Thermal Throttling Over Time
  </text>

  <!-- Grid lines -->
  <line x1="70" y1="60" x2="750" y2="60" stroke="#F7F2FA" stroke-width="1"/>
  <line x1="70" y1="110" x2="750" y2="110" stroke="#F7F2FA" stroke-width="1"/>
  <line x1="70" y1="160" x2="750" y2="160" stroke="#F7F2FA" stroke-width="1"/>
  <line x1="70" y1="210" x2="750" y2="210" stroke="#F7F2FA" stroke-width="1"/>
  <line x1="70" y1="260" x2="750" y2="260" stroke="#F7F2FA" stroke-width="1"/>

  <!-- Y-axis -->
  <line x1="70" y1="55" x2="70" y2="260" stroke="#E8DEF8" stroke-width="2"/>
  <!-- X-axis -->
  <line x1="70" y1="260" x2="750" y2="260" stroke="#E8DEF8" stroke-width="2"/>

  <!-- Y-axis labels (tokens/sec) -->
  <text x="55" y="268" font-size="11" fill="#79747E" text-anchor="end">0</text>
  <text x="55" y="218" font-size="11" fill="#79747E" text-anchor="end">20</text>
  <text x="55" y="168" font-size="11" fill="#79747E" text-anchor="end">40</text>
  <text x="55" y="118" font-size="11" fill="#79747E" text-anchor="end">60</text>
  <text x="55" y="68" font-size="11" fill="#79747E" text-anchor="end">80</text>

  <!-- Y-axis title -->
  <text x="20" y="160" font-size="11" fill="#49454F" text-anchor="middle" transform="rotate(-90 20 160)">
    Speed (tok/sec)
  </text>

  <!-- X-axis labels (time) -->
  <text x="70" y="285" font-size="11" fill="#79747E" text-anchor="middle">0 min</text>
  <text x="220" y="285" font-size="11" fill="#79747E" text-anchor="middle">10 min</text>
  <text x="370" y="285" font-size="11" fill="#79747E" text-anchor="middle">20 min</text>
  <text x="520" y="285" font-size="11" fill="#79747E" text-anchor="middle">30 min</text>
  <text x="670" y="285" font-size="11" fill="#79747E" text-anchor="middle">40 min</text>
  <text x="750" y="285" font-size="11" fill="#79747E" text-anchor="middle">60 min</text>

  <!-- X-axis title -->
  <text x="410" y="315" font-size="11" fill="#49454F" text-anchor="middle">Time Under Load</text>

  <!-- Desktop line (green, flat) -->
  <polyline points="70,60 220,60 370,60 520,60 670,60 750,60"
            fill="none" stroke="#34A853" stroke-width="3" stroke-linecap="round"/>
  <circle cx="70" cy="60" r="4" fill="#34A853"/>
  <circle cx="220" cy="60" r="4" fill="#34A853"/>
  <circle cx="370" cy="60" r="4" fill="#34A853"/>
  <circle cx="520" cy="60" r="4" fill="#34A853"/>
  <circle cx="670" cy="60" r="4" fill="#34A853"/>
  <circle cx="750" cy="60" r="4" fill="#34A853"/>

  <!-- Laptop line (red, declining) -->
  <polyline points="70,85 220,115 370,150 520,180 670,180 750,180"
            fill="none" stroke="#EA4335" stroke-width="3" stroke-linecap="round"/>
  <circle cx="70" cy="85" r="4" fill="#EA4335"/>
  <circle cx="220" cy="115" r="4" fill="#EA4335"/>
  <circle cx="370" cy="150" r="4" fill="#EA4335"/>
  <circle cx="520" cy="180" r="4" fill="#EA4335"/>
  <circle cx="670" cy="180" r="4" fill="#EA4335"/>
  <circle cx="750" cy="180" r="4" fill="#EA4335"/>

  <!-- Throttle threshold line -->
  <line x1="70" y1="150" x2="750" y2="150" stroke="#F4B400" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="765" y="155" font-size="10" fill="#F4B400" font-weight="600">Throttle</text>

  <!-- Legend -->
  <circle cx="80" cy="310" r="4" fill="#34A853"/>
  <text x="95" y="315" font-size="12" fill="#49454F">Desktop (no throttle)</text>

  <circle cx="320" cy="310" r="4" fill="#EA4335"/>
  <text x="335" y="315" font-size="12" fill="#49454F">MacBook (throttles at 15 min)</text>
<text x="792" y="345" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>