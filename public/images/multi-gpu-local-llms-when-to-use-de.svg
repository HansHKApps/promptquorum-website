<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg">
  <metadata>
    <dc:title xmlns:dc="http://purl.org/dc/elements/1.1/">Wann sollte man Multi-GPU nutzen?</dc:title>
    <dc:creator>PromptQuorum</dc:creator>
    <dc:rights>© PromptQuorum 2026</dc:rights>
    <dc:source>https://www.promptquorum.com/local-llms/multi-gpu-local-llms</dc:source>
  </metadata>

  <rect width="800" height="360" fill="#FFFFFF"/>

  <text x="400" y="28" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">Wann sollte man Multi-GPU nutzen? Entscheidungsmatrix</text>

  <rect x="40" y="55" width="720" height="50" rx="4" fill="#E8F5E9" stroke="#34A853" stroke-width="1.5"/>
  <circle cx="65" cy="80" r="14" fill="#34A853"/>
  <text x="65" y="86" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓</text>

  <text x="95" y="75" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">Sie möchten 70B+-Modelle ausführen</text>
  <text x="95" y="95" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">Eine einzelne RTX 4090 (24 GB) kann Llama 3.3 70B nicht anpassen. Zwei RTX 4090 (48 GB) passen problemlos bei Q4.</text>

  <rect x="40" y="115" width="720" height="50" rx="4" fill="#E8F5E9" stroke="#34A853" stroke-width="1.5"/>
  <circle cx="65" cy="140" r="14" fill="#34A853"/>
  <text x="65" y="146" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓</text>

  <text x="95" y="135" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">Sie bedienen 50+ gleichzeitige Benutzer</text>
  <text x="95" y="155" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">Batch-Verarbeitung über GPUs erhöht den Durchsatz. Einzelne GPU Engpass bei ~5 gleichzeitigen Benutzern.</text>

  <rect x="40" y="175" width="720" height="50" rx="4" fill="#FFEBEE" stroke="#EA4335" stroke-width="1.5"/>
  <circle cx="65" cy="200" r="14" fill="#EA4335"/>
  <text x="65" y="206" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">✗</text>

  <text x="95" y="195" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">Sie haben die 2. GPU noch nicht gekauft</text>
  <text x="95" y="215" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">Versuchen Sie zuerst Q4-Quantisierung oder RTX 5090 (Einzelkarte), bevor Sie $1.800+ für eine zweite RTX 4090 ausgeben.</text>

  <rect x="40" y="235" width="720" height="50" rx="4" fill="#E8F5E9" stroke="#34A853" stroke-width="1.5"/>
  <circle cx="65" cy="260" r="14" fill="#34A853"/>
  <text x="65" y="266" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓</text>

  <text x="95" y="255" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1C1B1F">Sie benötigen Produktionsgeschwindigkeit (100+ tok/sec)</text>
  <text x="95" y="275" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">Multi-GPU ist die einzige Möglichkeit, 100 tok/sec auf 70B zu erreichen. Einzelne GPU + CPU-Offload: nur 8–10 tok/sec.</text>

  <rect x="40" y="305" width="720" height="40" rx="6" fill="#F3E5F5" stroke="#6750A4" stroke-width="2"/>
  <text x="60" y="328" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#6750A4">Entscheidungsregel: Nutzen Sie Multi-GPU nur wenn ALLE dieser Kriterien erfüllt sind:</text>
  <text x="60" y="343" font-family="system-ui, sans-serif" font-size="11" fill="#6750A4">(1) Sie besitzen bereits 2 GPUs ODER (2) Sie haben expliziter Bedarf für 70B + Produktionsgeschwindigkeit, nicht für Experimente</text>

  <text x="730" y="348" font-family="system-ui, sans-serif" font-size="10" fill="#999999" text-anchor="end">promptquorum.com</text>
</svg>