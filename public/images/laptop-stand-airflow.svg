<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description rdf:about=""><dc:creator>PromptQuorum</dc:creator><dc:rights>© 2025 PromptQuorum. All rights reserved.</dc:rights><dc:source>https://www.promptquorum.com</dc:source></rdf:Description></rdf:RDF></metadata>
  <!-- Background -->
  <rect width="800" height="350" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#1C1B1F" text-anchor="middle">
    Thermal Management with Laptop Stand
  </text>

  <!-- Desk surface -->
  <line x1="0" y1="280" x2="800" y2="280" stroke="#E8DEF8" stroke-width="3"/>

  <!-- LEFT: Without stand -->
  <g id="without-stand">
    <!-- Laptop flat on desk -->
    <rect x="50" y="210" width="150" height="95" rx="4" fill="#F7F2FA" stroke="#6750A4" stroke-width="2"/>
    <!-- Screen -->
    <rect x="60" y="220" width="130" height="55" rx="2" fill="#E8DEF8" stroke="#6750A4" stroke-width="1"/>
    <!-- Heat indicator -->
    <ellipse cx="125" cy="265" rx="45" ry="18" fill="#7D5260" opacity="0.35"/>
    <text x="125" y="272" font-family="system-ui, sans-serif" font-size="12" fill="#7D5260" text-anchor="middle" font-weight="700">
      HEAT
    </text>
    <!-- Result text -->
    <text x="125" y="320" font-family="system-ui, sans-serif" font-size="15" fill="#7D5260" text-anchor="middle" font-weight="700">
      Throttles ~10 min
    </text>
  </g>

  <!-- CENTER divider -->
  <line x1="400" y1="55" x2="400" y2="330" stroke="#E8DEF8" stroke-width="2.5"/>

  <!-- RIGHT: With stand -->
  <g id="with-stand">
    <!-- Stand structure -->
    <line x1="460" y1="240" x2="535" y2="280" stroke="#6750A4" stroke-width="7" stroke-linecap="round"/>
    <line x1="640" y1="240" x2="565" y2="280" stroke="#6750A4" stroke-width="7" stroke-linecap="round"/>
    <line x1="460" y1="240" x2="640" y2="240" stroke="#6750A4" stroke-width="4" stroke-linecap="round"/>

    <!-- Laptop tilted -->
    <g transform="translate(550, 195) rotate(-15)">
      <rect x="-70" y="-45" width="150" height="95" rx="4" fill="#F7F2FA" stroke="#6750A4" stroke-width="2"/>
      <rect x="-60" y="-35" width="130" height="55" rx="2" fill="#E8DEF8" stroke="#6750A4" stroke-width="1"/>
    </g>

    <!-- Elevation measurement -->
    <line x1="435" y1="240" x2="435" y2="280" stroke="#49454F" stroke-width="1.5" stroke-dasharray="2,2"/>
    <line x1="425" y1="240" x2="445" y2="240" stroke="#49454F" stroke-width="1.5"/>
    <line x1="425" y1="280" x2="445" y2="280" stroke="#49454F" stroke-width="1.5"/>
    <text x="410" y="262" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" text-anchor="end" font-weight="700">
      2–3 cm
    </text>

    <!-- Airflow arrows -->
    <defs>
      <marker id="arrow-cool" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill="#6750A4"/>
      </marker>
      <marker id="arrow-warm" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill="#7D5260"/>
      </marker>
    </defs>

    <!-- Cool air in -->
    <path d="M 485 285 Q 495 270 510 255" stroke="#6750A4" stroke-width="3.5" fill="none" marker-end="url(#arrow-cool)" stroke-linecap="round"/>
    <path d="M 525 290 Q 535 270 555 255" stroke="#6750A4" stroke-width="3.5" fill="none" marker-end="url(#arrow-cool)" stroke-linecap="round"/>
    <path d="M 570 285 Q 580 270 600 255" stroke="#6750A4" stroke-width="3.5" fill="none" marker-end="url(#arrow-cool)" stroke-linecap="round"/>

    <!-- Hot air out -->
    <path d="M 560 175 Q 570 155 590 135" stroke="#7D5260" stroke-width="3.5" fill="none" marker-end="url(#arrow-warm)" stroke-linecap="round"/>
    <path d="M 590 180 Q 610 160 630 135" stroke="#7D5260" stroke-width="3.5" fill="none" marker-end="url(#arrow-warm)" stroke-linecap="round"/>

    <!-- Result text -->
    <text x="550" y="320" font-family="system-ui, sans-serif" font-size="15" fill="#6750A4" text-anchor="middle" font-weight="700">
      Throttles ~20+ min ✓
    </text>
  </g>

  <!-- Bottom labels -->
  <text x="125" y="345" font-family="system-ui, sans-serif" font-size="15" fill="#1C1B1F" text-anchor="middle" font-weight="700">
    Without Stand
  </text>
  <text x="550" y="345" font-family="system-ui, sans-serif" font-size="15" fill="#1C1B1F" text-anchor="middle" font-weight="700">
    With Stand
  </text>

  <!-- Legend -->
  <g id="legend">
    <line x1="60" y1="65" x2="95" y2="65" stroke="#6750A4" stroke-width="3.5"/>
    <text x="105" y="72" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">
      Cool air in
    </text>

    <line x1="280" y1="65" x2="315" y2="65" stroke="#7D5260" stroke-width="3.5"/>
    <text x="325" y="72" font-family="system-ui, sans-serif" font-size="13" fill="#1C1B1F" font-weight="700">
      Hot air out
    </text>
  </g>
<text x="792" y="345" font-family="system-ui,sans-serif" font-size="9" fill="#BBBBBB" text-anchor="end">promptquorum.com</text></svg>