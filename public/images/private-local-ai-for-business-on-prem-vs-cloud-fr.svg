<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <metadata>
    <dc:title xmlns:dc="http://purl.org/dc/elements/1.1/">Architecture On-Premises vs Cloud AI</dc:title>
    <dc:creator>PromptQuorum</dc:creator>
    <dc:rights>© PromptQuorum 2026</dc:rights>
    <dc:source>https://www.promptquorum.com/local-llms/private-local-ai-for-business?lang=fr</dc:source>
  </metadata>

  <rect width="800" height="350" fill="#FFFFFF"/>

  <text x="400" y="30" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1C1B1F" text-anchor="middle">Architecture On-Premises vs Cloud AI</text>

  <!-- Left Panel: Cloud APIs (Problem) -->
  <rect x="28" y="55" width="340" height="280" rx="6" fill="#FFFFFF" stroke="#EA4335" stroke-width="2"/>
  <rect x="28" y="55" width="340" height="4" rx="0" fill="#EA4335"/>

  <text x="198" y="80" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#EA4335" text-anchor="middle">Cloud APIs (OpenAI, Anthropic)</text>

  <text x="48" y="110" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Flux de données:</text>
  <text x="48" y="128" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">• Requête envoyée par Internet</text>
  <text x="48" y="143" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">• Données exposées au serveur</text>
  <text x="48" y="158" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">• Réponse (200–500ms latence)</text>

  <text x="48" y="185" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#EA4335">Coût à l'échelle:</text>
  <text x="48" y="203" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#EA4335">20 000 €/an</text>
  <text x="48" y="220" font-family="system-ui, sans-serif" font-size="10" fill="#49454F">(pour 1 milliard tokens/mois)</text>

  <text x="48" y="245" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Conformité:</text>
  <text x="48" y="263" font-family="system-ui, sans-serif" font-size="11" fill="#EA4335">❌ HIPAA risqué</text>
  <text x="48" y="278" font-family="system-ui, sans-serif" font-size="11" fill="#EA4335">❌ RGPD difficile</text>
  <text x="48" y="293" font-family="system-ui, sans-serif" font-size="11" fill="#EA4335">❌ Résidence des données</text>

  <!-- Right Panel: On-Premises (Goal) -->
  <rect x="432" y="55" width="340" height="280" rx="6" fill="#FFFFFF" stroke="#34A853" stroke-width="2"/>
  <rect x="432" y="55" width="340" height="4" rx="0" fill="#34A853"/>

  <text x="602" y="80" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#34A853" text-anchor="middle">Infrastructure On-Premises</text>

  <text x="452" y="110" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Flux de données:</text>
  <text x="452" y="128" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">• Requête au vLLM local</text>
  <text x="452" y="143" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">• Données restent en entreprise</text>
  <text x="452" y="158" font-family="system-ui, sans-serif" font-size="11" fill="#49454F">• Réponse instantanée (50–150ms)</text>

  <text x="452" y="185" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#34A853">Coût à l'échelle:</text>
  <text x="452" y="203" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#34A853">5 000 €/an</text>
  <text x="452" y="220" font-family="system-ui, sans-serif" font-size="10" fill="#49454F">(matériel + électricité)</text>

  <text x="452" y="245" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1C1B1F">Conformité:</text>
  <text x="452" y="263" font-family="system-ui, sans-serif" font-size="11" fill="#34A853">✓ Adapté HIPAA</text>
  <text x="452" y="278" font-family="system-ui, sans-serif" font-size="11" fill="#34A853">✓ Conforme RGPD</text>
  <text x="452" y="293" font-family="system-ui, sans-serif" font-size="11" fill="#34A853">✓ Contrôle total</text>

  <text x="830" y="340" font-family="system-ui, sans-serif" font-size="10" fill="#999999" text-anchor="end">promptquorum.com</text>
</svg>