          {type: 'list', h2: 'What Are AI Hallucinations?', items: ['<strong>AI Hallucination:</strong> A factually false or fabricated statement generated by an LLM with apparent confidence — wrong names, invented sources, impossible dates, fictitious URLs.', '<strong>Not uncertainty:</strong> Hallucinations are confident, detailed assertions about things that don\'t exist or events that never occurred — different from a model expressing doubt.', '<strong>In one sentence:</strong> Hallucinations are fluently false statements language models generate because they predict text patterns rather than retrieving facts from a reliable store.']},

          {type: 'list', h2: 'Prompts That Increase Hallucination Risk', intro: 'Your prompts encourage or discourage hallucinations. The difference is measurable.', items: ['"Tell me everything about [topic]" — no limit, no permission to say "I don\'t know"', '"Make sure to include [many details]" — explicit pressure to fill space with invented information', '"Write as if you\'re a leading expert" — encourages confident assertions even for uncertain claims', '"Answer even if you\'re not completely sure" — removes the brake on hallucination']},

          {type: 'numbered', h2: '6 Techniques to Reduce Hallucinations', items: ['<strong>Give explicit permission to say "I don\'t know":</strong> Add: "If you are not certain, say \'I don\'t know\' rather than guessing." This alone eliminates a large class of confident fabrications.', '<strong>Ask for sources or evidence:</strong> Instruct the model to cite a source for each claim. Example: "After each fact, note either the source name or \'[unverified]\'"', '<strong>Add a self-critique step:</strong> Ask the model to review its own output before finalizing. Example: "Before answering, list any claims you are less than 90% confident in."', '<strong>Use negative instructions:</strong> Explicitly prohibit hallucination-prone behavior. Example: "Do not invent names, titles, or statistics."', '<strong>Require step-by-step reasoning:</strong> Chain-of-thought prompting forces the model to show its work, making errors detectable before they reach the final answer.', '<strong>Dispatch to multiple models with PromptQuorum:</strong> Send the same prompt to GPT-4o, Claude, and Gemini simultaneously. Facts confirmed by all three have high confidence.']},

          {type: 'list', h2: 'Multi-Model Consensus Detection', intro: 'A single model can hallucinate confidently. Multiple independent models often disagree on hallucinated claims.', items: ['If 5 models independently produce similar answers, that answer is far more likely to be correct than a single-model response.', 'If only 1 model claims something and 4 others don\'t mention it — that claim is highly suspect and warrants verification.', '<strong>Consensus Scoring:</strong> Send the same prompt to many models (GPT-4o, Claude, Gemini, Mistral, Llama 3, DeepSeek) and analyze where they agree and disagree.', '<strong>PromptQuorum Test:</strong> 15 hallucination-prone prompts — only 1 citation appeared across all three model responses (GPT-4o, Claude 4.6 Sonnet, Gemini 1.5 Pro).', 'PromptQuorum automates this: dispatch one prompt to 25+ AI models simultaneously and run consensus analysis on all responses.']},

          {type: 'list', h2: 'Systemebenen-Strategien', intro: 'Prompts allein reichen für kritische Arbeit nicht aus. Füge diese Tools und Workflows hinzu.', items: ['<strong>Retrieval-Augmented Generation (RAG).</strong> Gebe dem Modell ein spezifisches Dokument oder eine Wissensdatenbank und fordere es auf, nur mit diesem Inhalt zu antworten.', '<strong>Tool Calling und Function Use.</strong> Lasse das Modell externe Funktionen für Berechnungen, Datenbankabfragen oder Faktenkontrolle aufrufen.', '<strong>Menschliche Überprüfung und Expertenverifikation.</strong> Für kritische Entscheidungen – medizinisch, rechtlich, finanziell – lasse immer einen Menschen KI-generierte Antworten verifizieren.', '<strong>Automatisierte Fakten-Überprüfungs-Workflows.</strong> Führe Modell-Ausgaben durch automatisierte Systeme durch, bevor du sie Nutzern zeigst.']},
          {type: 'list', h2: 'Mehrere Modelle und Consensus-Erkennung', intro: 'Ein einzelnes Modell kann selbstsicher halluzinieren. Mehrere unabhängige Modelle sind sich oft uneinig über halluzinierte Aussagen.', items: ['Wenn fünf Modelle unabhängig ähnliche Antworten auf eine Frage geben, ist diese Antwort viel wahrscheinlicher korrekt.', 'Wenn nur 1 Modell etwas behauptet und 4 andere es nicht erwähnen — ist dieser Anspruch hochgradig verdächtig.', '<strong>Consensus Scoring:</strong> Den gleichen Prompt an viele Modelle senden (GPT-4o, Claude, Gemini, Mistral, Llama 3, DeepSeek).', '<strong>PromptQuorum Test:</strong> 15 halluzinationsanfällige Prompts — nur 1 Zitat erschien in allen drei Modell-Antworten.', 'PromptQuorum automatisiert dies: sende einen Prompt an 25+ KI-Modelle gleichzeitig.']},
          {type: 'list', h2: 'Wenn Halluzinationen am gefährlichsten sind', items: ['<strong>Medizinische und Gesundheitsentscheidungen</strong> — falsche Arzneimittelnamen, Dosierungen können Patienten schaden', '<strong>Rechtliche und Compliance-Fragen</strong> — erfundene Rechtsprechung kann zu teuren Fehlern oder Verstößen führen', '<strong>Finanzielle Ratschläge</strong> — falsche Marktdaten führen hochriskante Entscheidungen fehlleitet', '<strong>Sicherheitskritische Systeme</strong> — Halluzinationen können Schwachstellen oder Bugs einführen', '<strong>Öffentliche Zuschreibung</strong> — alles, das unter deinem Namen veröffentlicht wird, muss überprüft werden']},
          {type: 'numbered', h2: 'Checkliste vor dem Absenden kritischer Prompts', items: ['Erlaubt der Prompt explizit „Ich weiß nicht"?', 'Gibt es echten Kontext oder Daten im Prompt?', 'Sind Einschränkungen explizit?', 'Ist das Ausgabeformat strukturiert?', 'Fragst du nach Quellen?', 'Ist die Aufgabe spezifisch, nicht offenendlich?', 'Hast du das Modell aufgefordert zu selbst-überprüfen?', 'Für hochriskante Entscheidungen, überprüfst du quer?']},
          {type: 'faq', h2: 'Häufig gestellte Fragen', faqs: [{q: 'Können Halluzinationen vollständig eliminiert werden?', a: 'Nein. Halluzinationen sind dem Funktionieren von Sprachmodellen eigen. Du kannst sie mit gutem Prompt-Design und Multi-Modell-Consensus erheblich reduzieren, aber vollständige Elimination ist nicht möglich.'}, {q: 'Warum klingt das Modell so selbstsicher, wenn es falsch ist?', a: 'Sprachmodelle sind darauf trainiert, flüssigen, kohärenten Text zu generieren. Selbstsicherheit ist ein Nebenprodukt sprachlicher Kohärenz.'}, {q: 'Halluzinieren neuere, größere Modelle weniger?', a: 'Größere Modelle halluzinieren oft mehr bei einigen Aufgaben, weil sie besser darin sind, plausibel klingende Text zu generieren.'}, {q: 'Entfernt das Verbinden eines Modells mit dem Internet Halluzinationen?', a: 'Teilweise. Echtzeit-Web-Zugang hilft bei aktuellen Ereignissen, löst aber nicht das Kernproblem.'}]},
          {type: 'list', h2: 'Wichtigste Erkenntnisse', items: ['<strong>Was Halluzinationen sind:</strong> Von LLMs generierte selbstsichere falsche Aussagen, die der Realität widersprechen — erfundene Quellen, falsche Fakten.', '<strong>Warum sie auftreten:</strong> LLMs sagen Textmuster vorher, anstatt Fakten abzurufen; ihnen fehlt eine Datenbank zur Überprüfung.', '<strong>Wie man sie erkennt:</strong> Verwenden Sie Consensus Scoring, überprüfen Sie Zitate, verifizieren Sie Ansprüche unabhängig.', '<strong>Consensus Scoring:</strong> Senden Sie die gleiche Aufforderung an 5+ unabhängige Modelle.', '<strong>Minderungsstrategien:</strong> Verwenden Sie RAG, setzen Sie Einschränkungen, verwenden Sie Multi-Modell-Consensus.']},
          {type: 'cta', h2: 'Hör auf zu raten. Lass den Consensus entscheiden.', body: 'Fange Halluzinationen, bevor sie Schaden anrichten. PromptQuorum sendet deinen Prompt gleichzeitig an 25+ KI-Modelle und zeigt auf, wo sie übereinstimmen.', cta: 'PromptQuorum kostenlos testen', href: 'https://www.promptquorum.com'}
        ]
      },
      fr: {
        title: 'Hallucinations IA: Pourquoi l\'IA Invente des Choses — et Comment les Arrêter',
        slides: [
          {type: 'title', h1: 'Hallucinations IA: Pourquoi l\'IA Invente des Choses — et Comment les Arrêter', subtitle: 'Les grands modèles de langage produisent confidentement des informations fausses. Comprendre pourquoi elles se produisent, comment les détecter et les réduire est essentiel pour utiliser les LLM dans un travail réel.', link: 'https://www.promptquorum.com/prompt-engineering/ai-hallucinations-why-ai-makes-things-up'},
          {type: 'list', h2: 'Que sont les hallucinations IA?', items: ['<strong>Hallucination IA:</strong> Une déclaration factuellement fausse ou fabriquée générée par un LLM avec une confiance apparente. Le modèle produit du texte qui viole la réalité.', '<strong>Pas incertitude:</strong> Les hallucinations se caractérisent par des affirmations confiantes et détaillées sur des choses qui n\'existent pas ou sur des événements qui ne se sont jamais produits.', '<strong>En une phrase:</strong> Les hallucinations sont des déclarations fausses formulées couramment que les modèles de langage génèrent parce qu\'ils prédisent les modèles de texte plutôt que de récupérer les faits.']},
          {type: 'list', h2: 'Pourquoi les modèles de langage hallucinent: Mécanismes fondamentaux', items: ['<strong>Prédiction du token, pas récupération des faits.</strong> L\'architecture du modèle est optimisée pour la génération de langage, pas la vérification des faits.', '<strong>Lacunes dans les données d\'entraînement et expiration.</strong> Les modèles s\'entraînent sur des données avec une date de fin spécifique. Les lacunes informatives créent des vides.', '<strong>Pas de mécanisme de confiance explicite.</strong> Les modèles ne génèrent pas un score de confiance aux côtés de chaque sortie.', '<strong>Pression des prompts exigeant une réponse.</strong> Les prompts comme \"Explique tout sur [sujet]\" communiquent implicitement: tu dois répondre.', '<strong>Fenêtre de contexte limitée et perte d\'information.</strong> Les LLM ne peuvent tenir qu\'une quantité finie de contexte en mémoire.']},
          {type: 'table', h2: 'Types courants d\'hallucinations', columns: ['Type', 'Exemple', 'Gravité'], rows: [{Type: 'Sources inventées', Exemple: 'Citation d\'un article qui n\'existe pas; faux noms d\'auteurs', Gravité: 'Très élevée'}, {Type: 'Mauvais faits (dates, nombres)', Exemple: 'Énoncer un événement historique en mauvaise année', Gravité: 'Très élevée'}, {Type: 'URL et e-mails fabriqués', Exemple: 'Fournir un lien qui ne se résout pas', Gravité: 'Élevée'}, {Type: 'Perte de contexte', Exemple: 'Répondre comme si le modèle avait compris le contexte antérieur', Gravité: 'Élevée'}, {Type: 'Dérive de rôle', Exemple: 'Commencer dans un rôle, gradually passer à un autre', Gravité: 'Moyen'}, {Type: 'Généralisation trop confiante', Exemple: 'Déclarer "Tous les X font Y" quand seuls des exemples spécifiques le montrent', Gravité: 'Moyen'}, {Type: 'Contradiction interne', Exemple: 'Énoncer des faits opposés au sein de la même réponse', Gravité: 'Moyen'}]},
          {type: 'list', h2: 'Prompts augmentant le risque d\'hallucination', intro: 'Vos prompts encouragent ou découragent les hallucinations. La différence est mesurable.', items: ['"Dis-moi tout sur [sujet]" – aucune limite, aucune permission de dire "je ne sais pas"', '"Assure-toi d\'inclure [de nombreux détails]" – pression explicite pour remplir l\'espace d\'informations inventées', '"Écris comme si tu étais un expert de premier plan" – encourage les affirmations confiantes', '"Réponds même si tu n\'es pas complètement sûr" – supprime le frein sur l\'hallucination']},
          {type: 'list', h2: 'Prompts réduisant le risque d\'hallucination', items: ['"Tu peux dire \'Je ne sais pas\' si tu n\'es pas sûr" – permission explicite d\'admettre les lacunes de connaissances', '"Utilise uniquement les informations du contexte ci-dessous" – limite la réponse aux données fournies', '"Sépare les faits des opinions. Marque les affirmations incertaines [INCERTAIN]" – force le modèle à différencier', '"Cite ta source pour tout énoncé factuel" – rend les citations inventées manifestement visibles', '"Si tu ne peux pas vérifier cette affirmation, ne l\'inclus pas" – limite explicite sur les affirmations non vérifiées']},
          {type: 'numbered', h2: '6 Techniques pour réduire les hallucinations', items: ['<strong>Permission explicite de dire "Je ne sais pas":</strong> Ajoutez: "Si tu n\'es pas sûr, dis \'Je ne sais pas\' plutôt que de deviner."', '<strong>Demander des sources ou des preuves:</strong> Demandez au modèle de citer une source pour chaque affirmation.', '<strong>Ajouter une étape d\'autocritique:</strong> Demandez au modèle de revoir sa sortie.', '<strong>Utiliser les instructions négatives:</strong> Interdisez explicitement les comportements générateurs de hallucinations.', '<strong>Exiger un raisonnement étape par étape:</strong> Le prompting Chain-of-Thought force le modèle à montrer son travail.', '<strong>Dispatcher vers plusieurs modèles avec PromptQuorum:</strong> Envoyez le même prompt à GPT-4o, Claude et Gemini simultanément.']},
          {type: 'list', h2: 'Stratégies au niveau du système', intro: 'Les prompts seuls ne suffisent pas pour les travaux critiques. Ajoutez ces outils et flux de travail.', items: ['<strong>Retrieval-Augmented Generation (RAG).</strong> Donnez au modèle un document spécifique ou une base de connaissances et demandez-lui d\'utiliser uniquement ce contenu.', '<strong>Appel de fonction et utilisation de fonctions.</strong> Laissez le modèle appeler des fonctions externes pour les calculs, les recherches en base de données ou la vérification des faits.', '<strong>Examen humain et vérification par les experts.</strong> Pour les décisions critiques, laissez toujours un humain vérifier les réponses générées par l\'IA.', '<strong>Workflows de vérification automatisée des faits.</strong> Exécutez les résultats du modèle par des systèmes automatisés avant de les montrer aux utilisateurs.']},
          {type: 'list', h2: 'Plusieurs modèles et détection du consensus', intro: 'Un seul modèle peut halluciner confidentement. Plusieurs modèles indépendants désaccordent souvent sur les affirmations hallucées.', items: ['Si cinq modèles produisent indépendamment des réponses similaires, cette réponse est beaucoup plus susceptible d\'être correcte.', 'Si seulement 1 modèle revendique quelque chose et 4 autres ne le mentionnent pas, cette réclamation est hautement suspecte.', '<strong>Consensus Scoring:</strong> Envoyez le même prompt à de nombreux modèles (GPT-4o, Claude, Gemini, Mistral, Llama 3, DeepSeek).', '<strong>Test PromptQuorum:</strong> 15 prompts sujets aux hallucinations — seulement 1 citation apparaissait dans tous les trois modèles.', 'PromptQuorum automatise cela: envoyez un prompt à 25+ modèles IA simultanément.']},
          {type: 'list', h2: 'Quand les hallucinations sont les plus dangereuses', items: ['<strong>Décisions médicales et de santé</strong> – les mauvais noms de médicaments, dosages peuvent faire du mal aux patients', '<strong>Questions juridiques et de conformité</strong> – les jurisprudences inventées peuvent entraîner des erreurs coûteuses', '<strong>Conseils financiers</strong> – les fausses données de marché induisent en erreur les décisions à haut risque', '<strong>Systèmes critiques pour la sécurité</strong> – les hallucinations peuvent introduire des vulnérabilités', '<strong>Attribution publique</strong> – tout ce qui est publié sous votre nom doit être vérifié']},
          {type: 'numbered', h2: 'Liste de contrôle avant d\'envoyer un prompt critique', items: ['Le prompt permet-il explicitement "Je ne sais pas"?', 'Y a-t-il un contexte ou des données réels dans le prompt?', 'Les contraintes sont-elles explicites?', 'Le format de sortie est-il structuré?', 'Demandez-vous des sources?', 'La tâche est-elle spécifique, pas ouverte?', 'Avez-vous demandé au modèle d\'auto-vérifier?', 'Pour les décisions à haut risque, vérifiez-vous entre eux?']},
          {type: 'faq', h2: 'Foire aux questions', faqs: [{q: 'Les hallucinations peuvent-elles être complètement éliminées?', a: 'Non. Les hallucinations sont inhérentes à la façon dont les modèles de langage fonctionnent. Vous pouvez les réduire considérablement, mais l\'élimination complète n\'est pas possible.'}, {q: 'Pourquoi le modèle semble-t-il si confiant quand il se trompe?', a: 'Les modèles de langage sont entraînés pour générer du texte fluide et cohérent. La confiance est un sous-produit de la cohérence linguistique.'}, {q: 'Les modèles plus récents et plus grands hallucinent-ils moins?', a: 'Les plus grands modèles hallucinent souvent plus pour certaines tâches car ils sont meilleurs pour générer du texte plausible.'}, {q: 'Connecter un modèle à Internet supprime-t-il les hallucinations?', a: 'Partiellement. L\'accès Web en temps réel aide avec les événements actuels, mais il ne résout pas le problème fondamental.'}]},
          {type: 'list', h2: 'Points clés', items: ['<strong>Ce que sont les hallucinations:</strong> Des déclarations fausses confiantes générées par les LLM qui violent la réalité.', '<strong>Pourquoi elles se produisent:</strong> Les LLM prédisent les modèles de texte plutôt que de récupérer les faits.', '<strong>Comment les détecter:</strong> Utilisez le consensus scoring, vérifiez les citations, vérifiez les affirmations indépendamment.', '<strong>Consensus scoring:</strong> Envoyez le même prompt à 5+ modèles indépendants.', '<strong>Stratégies d\'atténuation:</strong> Utilisez RAG, fournissez des sources explicites, utilisez le consensus multi-modèles.']},
          {type: 'cta', h2: 'Arrêtez de deviner. Faites confiance au consensus.', body: 'Détectez les hallucinations avant qu\'elles ne causent des dommages. PromptQuorum envoie votre prompt à plus de 25 modèles IA simultanément et montre où ils s\'accordent.', cta: 'Essayez PromptQuorum gratuitement', href: 'https://www.promptquorum.com'}
        ]
      },
      ja: {
        title: 'AIハルシネーション：AIがなぜ物を作り出すのか — そしてそれを止める方法',
        slides: [
          {type: 'title', h1: 'AIハルシネーション：AIがなぜ物を作り出すのか — そしてそれを止める方法', subtitle: '大規模言語モデルは誤った情報を自信を持って生成します。ハルシネーションが発生する理由、検出方法、削減方法を理解することは、実際の作業でLLMを使用する誰にとっても重要です。', link: 'https://www.promptquorum.com/prompt-engineering/ai-hallucinations-why-ai-makes-things-up'},
          {type: 'list', h2: 'AIハルシネーションとは何ですか？', items: ['<strong>AIハルシネーション：</strong>見かけの確信を持ってLLMによって生成された事実上の偽りまたは捏造されたステートメントです。モデルは不正な名前、架空の出典を使用して現実に違反するテキストを生成します。', '<strong>不確実性ではない：</strong>ハルシネーションは存在しないこと、または決して起こらなかったイベントについての自信を持った詳細な主張が特徴です。', '<strong>一文で：</strong>ハルシネーションは流暢な虚偽のステートメントであり、言語モデルが信頼できるストアから事実を検索するのではなくテキストパターンを予測するために生成します。']},
          {type: 'list', h2: 'LLMがハルシネーションを起こす理由：コアメカニズム', items: ['<strong>トークン予測、事実検索ではない。</strong>モデルのアーキテクチャは言語生成用に最適化され、事実検証用には最適化されていません。', '<strong>トレーニングデータの隙間と有効期限。</strong>モデルは、特定の終了日付を持つデータでトレーニングされています。情報ギャップは空白を生み出します。', '<strong>明示的な信頼メカニズムがない。</strong>モデルは各出力の横に信頼スコアを生成しません。', '<strong>回答を要求するプロンプトからの圧力。</strong>「[トピック]について説明する」のようなプロンプトは「あなたが不確かであっても、あなたは答える必要があります」と暗黙的に伝えます。', '<strong>コンテキストウィンドウの制限と情報喪失。</strong>LLMは、メモリ内に有限の量のコンテキストのみを保持できます。']},
          {type: 'table', h2: 'ハルシネーションの一般的なタイプ', columns: ['タイプ', '例', '深刻度'], rows: [{タイプ: '架空の出典', 例: 'ピアレビュー済みのペーパーへの引用が存在しない；偽の著者名', 深刻度: '非常に高い'}, {タイプ: '誤った事実（日付、数字）', 例: '歴史的なイベントを誤った年に述べる', 深刻度: '非常に高い'}, {タイプ: '偽造URL および電子メール', 例: 'リンクまたはメールアドレスを提供し、解決しない', 深刻度: '高い'}, {タイプ: 'コンテキスト損失', 例: 'モデルが以前のコンテキストを理解しているかのように答える', 深刻度: '高い'}, {タイプ: '役割ドリフト', 例: '1つの役割で始まり、徐々に別の役割に移行する', 深刻度: '中程度'}, {タイプ: '過信の一般化', 例: '特定のトレーニング例のみが示す場合、「すべてのXがYを行う」と述べる', 深刻度: '中程度'}, {タイプ: '内部矛盾', 例: '同じ応答内で対立する事実を述べる', 深刻度: '中程度'}]},
          {type: 'list', h2: 'ハルシネーションリスクを増加させるプロンプト', intro: 'あなたのプロンプトはハルシネーションを奨励または落胆させます。違いは測定可能です。', items: ['「[トピック]についてすべてを教えてください」—制限なし、「わかりません」と言う許可なし', '「[多くの詳細]を含めることを確認してください」—発明された情報でスペースを埋めるための明示的な圧力', '「あたかも一流の専門家であるかのように書く」—不確かな請求でさえ、自信を持った主張を促す', '「確実でなくても答えてください」—ハルシネーションのブレーキを削除']},
          {type: 'list', h2: 'ハルシネーションリスクを減らすプロンプト', items: ['「確実でない場合は、「わかりません」と言うことができます」—知識ギャップを認める明示的な許可', '「以下のコンテキストからの情報のみを使用してください」—応答を提供されたデータに制限', '「事実を意見から分離してください。不確かな請求に[不確かな]マークを付けてください」—モデルを区別するように強制', '「任意の事実上の主張について、あなたのソースを引用してください」—発明されたサイテーションを明らかに見える', '「この請求を確認できない場合は、それを含めないでください」—未検証のステートメントに明示的な制約']},
          {type: 'numbered', h2: 'ハルシネーションを減らす6つのテクニック', items: ['<strong>「わかりません」と言う明示的な許可：</strong>追加：「確実でない場合は、推測するのではなく「わかりません」と言ってください」', '<strong>ソースまたは証拠を求める：</strong>各請求について出典を引用するようモデルに指示します。', '<strong>自己批判ステップを追加する：</strong>モデルに独自の出力を確認するよう依頼します。', '<strong>否定的指示を使用する：</strong>ハルシネーションを引き起こす行動を明示的に禁止します。', '<strong>段階的な推論を要求する：</strong>Chain-of-Thoughtプロンプティングはモデルに作業を見せることを強制します。', '<strong>PromptQuorumで複数のモデルにディスパッチ：</strong>同じプロンプトをGPT-4o、Claude、Geminiに同時に送信します。']},
          {type: 'list', h2: 'システムレベル戦略', intro: 'プロンプトだけは高リスク作業には不十分です。これらのツールとワークフローを追加します。', items: ['<strong>Retrieval-Augmented Generation（RAG）。</strong>モデルに特定のドキュメント、ナレッジベース、またはデータセットを提供し、そのコンテンツのみを使用して回答するよう依頼します。', '<strong>ツール呼び出しと関数の使用。</strong>モデルが計算、データベースルックアップ、または事実確認のための外部関数を呼び出すことを許可します。', '<strong>人間のレビューと専門家検証。</strong>重大な決定については、常に人間（理想的には専門家）がAIで生成された回答を確認させてください。', '<strong>自動ファクトチェックワークフロー。</strong>自動システムを通じてモデル出力を実行してから、ユーザーに表示します。']},
          {type: 'list', h2: '複数のモデルとコンセンサス検出', intro: '単一のモデルは自信を持ってハルシネーションできます。複数の独立したモデルはしばしば幻想的な請求について意見が異なります。', items: ['5つのモデルが独立して類似した回答を生成する場合、その答えは単一モデルの場合よりもはるかに正確である可能性があります。', '1つのモデルのみが何かを主張し、4つのモデルは言及しない場合、その請求は非常に疑わしく、検証を正当化します。', '<strong>コンセンサススコアリング：</strong>同じプロンプトを多くのモデル（GPT-4o、Claude、Gemini、Mistral、Llama 3、DeepSeek）に送信します。', '<strong>PromptQuorumテスト：</strong>15のハルシネーション傾向プロンプト—3つのモデル応答全体でのみ1つの引用が表示されました。', 'PromptQuorumはこれを自動化します：1つのプロンプトを25以上のAIモデルに同時に送信します。']},
          {type: 'list', h2: 'ハルシネーションが最も危険な場合', items: ['<strong>医療および健康決定</strong> —誤った薬物名、用量は患者に害を及ぼす可能性があります', '<strong>法律およびコンプライアンス</strong> —作成された判例法は高額なエラーにつながる可能性があります', '<strong>財務アドバイス</strong> —虚偽の市場データは高リスク決定を誤ったります', '<strong>安全クリティカルシステム</strong> —ハルシネーションは脆弱性またはバグを導入できます', '<strong>公衆帰属</strong> —あなたの名前の下で公開されたもの、幻想は信頼性を傷つけることが確認する必要があります']},

          {type: 'list', h2: '什么是AI幻觉？', items: ['<strong>AI幻觉：</strong>由LLM以明显的信心生成的事实上虚假或编造的陈述。该模型生成违反现实的文本。', '<strong>这与模型表达不确定性根本不同。</strong>幻觉的特点是对不存在的事物或从未发生过的事件进行自信的、详细的断言。', '<strong>一句话：</strong>幻觉是流利的虚假声明，语言模型产生，因为他们预测文本模式而不是从可靠的存储区检索事实。']},
          {type: 'list', h2: '为什么语言模型产生幻觉：核心机制', items: ['<strong>令牌预测，而不是事实检索。</strong>模型的架构针对语言生成进行了优化，而不是事实检查。', '<strong>训练数据间隙和到期。</strong>模型在具有特定结束日期的数据上进行训练。信息间隙造成空隙。', '<strong>没有明确的信心机制。</strong>模型不会在每个输出旁生成置信度分数。', '<strong>来自要求答案的提示的压力。</strong>像"解释所有[主题]"的提示隐含地传达：你必须回答。', '<strong>有限的上下文窗口和信息丢失。</strong>LLM只能在内存中保持有限的上下文。']},
          {type: 'table', h2: '常见的幻觉类型', columns: ['类型', '示例', '严重性'], rows: [{类型: '虚假来源', 示例: '引用不存在的同行评审论文;假作者名', 严重性: '非常高'}, {类型: '错误的事实（日期、数字）', 示例: '以错误的一年说出历史事件', 严重性: '非常高'}, {类型: '伪造的URL和电子邮件', 示例: '提供未解析的链接', 严重性: '高'}, {类型: '背景丧失', 示例: '回答一个问题，好像模型理解了早期的上下文', 严重性: '高'}, {类型: '角色漂移', 示例: '在一个角色中开始，逐渐转换为另一个', 严重性: '中等'}, {类型: '过度自信的概括', 示例: '陈述"所有X做Y"，当仅特定的培训示例显示这一点时', 严重性: '中等'}, {类型: '内部矛盾', 示例: '在同一响应中陈述相反的事实', 严重性: '中等'}]},

          {type: 'list', h2: '降低幻觉风险的提示', items: ['"如果你不确定，你可以说"我不知道""—明确允许承认知识差距', '"仅使用以下上下文中的信息"—将响应限制为提供的数据', '"将事实与意见分开。用[不确定]标记不确定的索赔"—强制模型区分', '"为任何事实声明引用您的来源"—使虚构的引文明显可见', '"如果您无法验证此索赔，请勿包含它"—对未验证的陈述的明确约束']},
          {type: 'numbered', h2: '减少幻觉的6种技术', items: ['<strong>明确允许说"我不知道"：</strong>在您的提示中添加："如果您不确定，请说\'我不知道\'而不是猜测。"', '<strong>要求来源或证据：</strong>指示模型为每个索赔引用来源。', '<strong>添加自我批评步骤：</strong>要求模型审查自己的输出。', '<strong>使用否定指令：</strong>明确禁止容易产生幻觉的行为。', '<strong>要求逐步推理：</strong>思维链提示迫使模型展示其工作。', '<strong>使用PromptQuorum分派到多个模型：</strong>同时将相同的提示发送给GPT-4o、Claude和Gemini。']},
          {type: 'list', h2: '提示设计之外的系统级策略', intro: '提示本身对于高风险工作是不够的。添加这些工具和工作流。', items: ['<strong>检索增强生成（RAG）。</strong>为模型提供特定的文档、知识库或数据集，并要求其仅使用该内容回答。', '<strong>工具调用和函数使用。</strong>让模型调用外部函数进行计算、数据库查询或事实检查。', '<strong>人工审查和专家验证。</strong>对于关键决定，始终让人类（最好是专家）验证AI生成的答案。', '<strong>自动事实检查工作流程。</strong>在向用户显示模型输出之前，通过自动化系统运行模型输出。']},

          {type: 'list', h2: '幻觉最危险的时候', items: ['<strong>医疗和健康决定</strong> —错误的药物名称、给药或症状解释可能会伤害患者', '<strong>法律和合规</strong> —虚构的判例法、监管要求或先例可能导致昂贵的错误或违规', '<strong>财务建议</strong> —虚假的市场数据、不正确的税务信息或编造的性能指标误导了高风险决定', '<strong>安全关键系统</strong> —代码审查、架构决定或安全分析中的幻觉可能会引入漏洞', '<strong>公众归属</strong> —您的名字或品牌下发布的任何内容都必须进行事实检查']},
          {type: 'numbered', h2: '发送关键提示前的实际清单', items: ['提示是否明确允许"我不知道"？', '提示中是否有真实的上下文或数据？', '约束是否明确？', '输出格式是否结构化？', '你在要求来源吗？', '任务是具体的，不是开放式的？', '您是否要求模型自我检查？', '对于高风险决定，您是否进行交叉检查？']},
          {type: 'faq', h2: '常见问题解答', faqs: [{q: '幻觉能完全消除吗？', a: '否。幻觉本质上是语言模型工作的方式。您可以使用良好的提示设计、RAG等工具和多模型共识来显着减少它们。'}, {q: '当它错误时，模型为什么听起来那么自信？', a: '语言模型被训练为生成流利、连贯的文本。信心是语言连贯性的副产品。'}, {q: '更新更大的模型幻觉更少吗？', a: '由于他们更好地生成看似合理的文本，所以更大的模型对某些任务幻觉更多。'}, {q: '将模型连接到互联网会消除幻觉吗？', a: '部分。实时网络访问有助于当前事件和最近的事实，但它没有解决核心问题。'}]},
          {type: 'list', h2: '关键要点', items: ['<strong>幻觉是什么：</strong>LLM产生的自信虚假声明违反现实—虚假来源、错误事实、编造细节。', '<strong>为什么发生：</strong>LLM预测文本模式而不是检索事实;他们缺乏数据库来验证。', '<strong>如何检测：</strong>使用共识评分，事实检查引文，独立验证索赔。', '<strong>共识评分：</strong>将相同的提示分派给5+个独立模型；仅在一个或两个响应中出现的索赔高度可疑。', '<strong>缓解策略：</strong>使用RAG，设置约束，使用多模型共识，对高风险索赔进行人工审查。']},
          {type: 'cta', h2: '停止猜测。运行共识。', body: 'PromptQuorum同时将您的提示分派给25+个AI模型，并显示他们同意和不同意的地方。', cta: '免费试用PromptQuorum', href: 'https://www.promptquorum.com'}
        ]
      }
    };

    function renderSlide(slide) {
      let html = '';
      switch (slide.type) {
        case 'title':
          html = `<img src="/logo.svg" alt="PromptQuorum" class="logo" /><h1>${slide.h1}</h1><p>${slide.subtitle}</p><p style="margin-top: 40px; font-size: 18px; color: #79747e;"><a href="${slide.link}">${slide.link.replace('https://www.', '')}</a></p>`;
          break;
        case 'list':
          html = `<h2>${slide.h2}</h2>`;
          if (slide.intro) html += `<p>${slide.intro}</p>`;
          html += '<ul style="font-size: 1.1em; margin-top: 16px;">';
          slide.items.forEach(item => { html += `<li>${item}</li>`; });
          html += '</ul>';
          break;
        case 'table':
          html = `<h2>${slide.h2}</h2><table><thead><tr>`;
          slide.columns.forEach(col => { html += `<th>${col}</th>`; });
          html += '</tr></thead><tbody>';
          slide.rows.forEach(row => {
            html += '<tr>';
            slide.columns.forEach(col => { html += `<td>${row[col]}</td>`; });
            html += '</tr>';
          });
          html += '</tbody></table>';
          break;
        case 'numbered':
          html = `<h2>${slide.h2}</h2><ol style="font-size: 1.05em; margin-top: 16px; text-align: left; max-width: 640px;">`;
          slide.items.forEach(item => { html += `<li style="margin-bottom: 10px;">${item}</li>`; });
          html += '</ol>';
          break;
        case 'faq':
          html = `<h2>${slide.h2}</h2>`;
          slide.faqs.forEach(faq => {
            html += `<div style="margin-bottom: 18px; text-align: left; max-width: 680px;"><strong>Q: ${faq.q}</strong><p style="margin-top: 6px; font-size: 0.95em;">A: ${faq.a}</p></div>`;
          });
          break;
        case 'cta':
          html = `<h2>${slide.h2}</h2><p style="max-width: 600px; margin: 20px auto;">${slide.body}</p><a href="${slide.href}" style="display: inline-block; margin-top: 24px; padding: 14px 28px; background: #6750a4; color: white; border-radius: 8px; text-decoration: none; font-size: 18px; font-weight: 700;">${slide.cta}</a>`;
          break;
      }
      return `<div class="slide ${slide.type}" data-lang="${lang}">${html}</div>`;
    }

    const params = new URLSearchParams(window.location.search);
    const lang = params.get('lang') || 'en';
    const isPrint = params.get('print') === '1';
    const content = CONTENT[lang] || CONTENT.en;

    document.getElementById('header-title').textContent = content.title;
    const backLink = document.getElementById('back-link');
    backLink.href += '?lang=' + lang;

    const container = document.getElementById('slides-container');
    content.slides.forEach(slide => { container.innerHTML += renderSlide(slide); });

    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    const totalSlides = slides.length;
    document.getElementById('totalSlides').textContent = totalSlides;

    function showSlide(n) {
      if (n >= totalSlides) currentSlide = totalSlides - 1;
      else if (n < 0) currentSlide = 0;
      else currentSlide = n;
      slides.forEach(slide => slide.classList.remove('active'));
      slides[currentSlide].classList.add('active');
      document.getElementById('currentSlide').textContent = currentSlide + 1;
      document.getElementById('prevBtn').disabled = currentSlide === 0;
      document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
    }

    function changeSlide(n) {
      currentSlide += n;
      showSlide(currentSlide);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') changeSlide(-1);
      if (e.key === 'ArrowRight') changeSlide(1);
    });

    window.addEventListener('beforeprint', () => {
      slides.forEach(slide => { slide.style.display = 'flex'; });
    });
    window.addEventListener('afterprint', () => {
      slides.forEach(slide => { slide.style.removeProperty('display'); });
      showSlide(currentSlide);
    });

    if (isPrint) {
      window.addEventListener('load', () => { window.print(); });
    }

    showSlide(0);
    </script>
