        function renderSlide(slide, lang) {
            let html = '';
            const articleUrl = 'https://www.promptquorum.com/prompt-engineering/best-prompt-engineering-tools-2026?lang=' + lang;
            const footerLink = `<p style="position: absolute; bottom: 16px; right: 16px; font-size: 11px; color: #999;"><a href="${articleUrl}" target="_blank" rel="noopener" style="color: #999; text-decoration: none;">← Article</a></p>`;

            switch (slide.type) {
                case 'title':
                    html = `<img src="/logo.svg" alt="PromptQuorum" class="logo" /><h1>${slide.h1}</h1><p>${slide.subtitle}</p><p style="margin-top: 40px; font-size: 18px;"><a href="${slide.link}" target="_blank" rel="noopener">Read Full Article</a></p>${footerLink}`;
                    break;
                case 'list':
                    html = `<h2>${slide.h2}</h2><ul style="font-size: 1.1em;">`;
                    slide.items.forEach(item => html += `<li>${item}</li>`);
                    html += `</ul>${footerLink}`;
                    break;
                case 'table':
                    html = `<h2>${slide.h2}</h2><table><tr>`;
                    slide.columns.forEach(col => html += `<th>${col}</th>`);
                    html += '</tr>';
                    slide.rows.forEach(row => {
                        html += '<tr>';
                        slide.columns.forEach(col => html += `<td>${row[col]}</td>`);
                        html += '</tr>';
                    });
                    html += `</table>${footerLink}`;
                    break;
                case 'numbered':
                    html = `<h2>${slide.h2}</h2><ol style="font-size: 1em;">`;
                    slide.items.forEach(item => html += `<li>${item}</li>`);
                    html += `</ol>${footerLink}`;
                    break;
                case 'faq':
                    html = `<h2>${slide.h2}</h2>`;
                    slide.faqs.forEach(faq => html += `<div style="margin-bottom: 15px; text-align: left;"><strong>Q: ${faq.q}</strong><p style="margin-top: 8px; font-size: 0.95em;">A: ${faq.a}</p></div>`);
                    html += footerLink;
                    break;
                case 'cta':
                    html = `<h2>${slide.h2}</h2><p style="margin: 20px 0; max-width: 600px;">${slide.body}</p><a href="${slide.href}" target="_blank" rel="noopener" style="display: inline-block; margin-top: 20px; padding: 12px 28px; background: #6750a4; color: white; border-radius: 6px; text-decoration: none; font-weight: 600;">${slide.cta}</a>${footerLink}`;
                    break;
            }
            return `<div class="slide ${slide.type}" data-lang="${lang}">${html}</div>`;
        }

        const params = new URLSearchParams(window.location.search);
        const lang = params.get('lang') || 'en';
        const content = CONTENT[lang] || CONTENT.en;

        document.getElementById('header-title').textContent = content.title;
        const backLink = document.getElementById('back-link');
        backLink.href += `?lang=${lang}`;

        const container = document.getElementById('slides-container');
        content.slides.forEach(slide => {
            container.innerHTML += renderSlide(slide, lang);
        });

        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;
        document.getElementById('totalSlides').textContent = totalSlides;

        function showSlide(n) {
            if (n >= totalSlides) currentSlide = totalSlides - 1;
            else if (n < 0) currentSlide = 0;
            slides.forEach(slide => slide.classList.remove('active'));
            slides[currentSlide].classList.add('active');
            document.getElementById('currentSlide').textContent = currentSlide + 1;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
        }

        function changeSlide(n) {
            currentSlide += n;
            showSlide(currentSlide);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight') changeSlide(1);
        });

        window.addEventListener('beforeprint', () => {
            slides.forEach(slide => slide.style.display = 'flex');
        });
        window.addEventListener('afterprint', () => {
            slides.forEach(slide => slide.style.removeProperty('display'));
            showSlide(currentSlide);
        });

        showSlide(0);
    </script>
