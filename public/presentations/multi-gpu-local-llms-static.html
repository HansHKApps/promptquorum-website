        function renderSlide(slide) {
            let html = '';
            const articleUrl = 'https://www.promptquorum.com/local-llms/multi-gpu-local-llms?lang=' + lang;

            switch (slide.type) {
                case 'title':
                    html = `
                        <img src="/logo.svg" alt="PromptQuorum" class="logo" />
                        <h1>${slide.h1}</h1>
                        <p>${slide.subtitle}</p>
                        <p style="margin-top: 40px; font-size: 18px; color: #6750a4;"><a href="${slide.link}" style="color: inherit; text-decoration: none; border-bottom: 2px solid #6750a4;">${slide.link.split('/').pop().replace(/-/g, ' ')}</a></p>
                    `;
                    break;
                case 'list':
                    html = `<h2>${slide.h2}</h2><ul style="font-size: 1.1em; margin-top: 20px; max-width: 700px;">`;
                    slide.items.forEach(item => {
                        html += `<li>${item}</li>`;
                    });
                    html += '</ul>';
                    break;
                case 'table':
                    html = `<h2>${slide.h2}</h2><table style="margin-top: 20px;"><tr>`;
                    slide.columns.forEach(col => {
                        html += `<th>${col}</th>`;
                    });
                    html += '</tr>';
                    slide.rows.forEach(row => {
                        html += '<tr>';
                        slide.columns.forEach(col => {
                            html += `<td>${row[col]}</td>`;
                        });
                        html += '</tr>';
                    });
                    html += '</table>';
                    break;
                case 'comparison':
                    html = `<h2>${slide.h2}</h2><p style="margin-top: 40px; font-size: 1.3em;">${slide.line1}</p><p style="font-size: 1.3em; margin-bottom: 40px;">${slide.line2}</p><p style="font-size: 1.1em; color: #6750a4;">${slide.tip}</p>`;
                    break;
                case 'numbered':
                    html = `<h2>${slide.h2}</h2><ol style="font-size: 1.05em; margin-top: 20px; max-width: 700px; text-align: left;">`;
                    slide.items.forEach(item => {
                        html += `<li>${item}</li>`;
                    });
                    html += '</ol>';
                    break;
                case 'faq':
                    html = `<h2>${slide.h2}</h2><div style="text-align: left; max-width: 700px; margin: 20px auto;">`;
                    slide.faqs.slice(0, 3).forEach(faq => {
                        html += `<div style="margin-bottom: 20px;"><strong>Q: ${faq.q}</strong><p style="margin-top: 8px; font-size: 0.95em;">A: ${faq.a}</p></div>`;
                    });
                    html += '</div>';
                    break;
                case 'cta':
                    html = `<h2>${slide.h2}</h2><p style="margin-top: 20px; margin-bottom: 20px; max-width: 600px;">${slide.body}</p><a href="${slide.href}" target="_blank" style="display: inline-block; padding: 12px 24px; background: #6750a4; color: white; border-radius: 6px; text-decoration: none; font-weight: 600;">${slide.cta}</a>`;
                    break;
            }

            return `<div class="slide ${slide.type}" data-lang="${lang}">${html}</div>`;
        }

        const params = new URLSearchParams(window.location.search);
        const lang = params.get('lang') || 'en';
        const content = CONTENT[lang] || CONTENT.en;

        document.getElementById('header-title').textContent = content.title;
        document.getElementById('back-link').href += `?lang=${lang}`;

        const container = document.getElementById('slides-container');
        content.slides.forEach(slide => {
            container.innerHTML += renderSlide(slide);
        });

        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;
        document.getElementById('totalSlides').textContent = totalSlides;

        function showSlide(n) {
            if (n >= totalSlides) currentSlide = totalSlides - 1;
            else if (n < 0) currentSlide = 0;

            slides.forEach(slide => slide.classList.remove('active'));
            slides[currentSlide].classList.add('active');

            document.getElementById('currentSlide').textContent = currentSlide + 1;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
        }

        function changeSlide(n) {
            currentSlide += n;
            showSlide(currentSlide);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight') changeSlide(1);
        });

        window.addEventListener('beforeprint', () => {
            slides.forEach(slide => { slide.style.display = 'flex'; });
        });
        window.addEventListener('afterprint', () => {
            slides.forEach(slide => { slide.style.removeProperty('display'); });
            showSlide(currentSlide);
        });

        showSlide(0);
    </script>
