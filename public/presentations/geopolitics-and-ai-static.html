    function renderSlide(slide) {
      let html = '';
      switch (slide.type) {
        case 'title':
          html = `
            <img src="/logo.svg" alt="PromptQuorum" class="logo" />
            <h1>${slide.h1}</h1>
            <p>${slide.subtitle}</p>
            <p style="margin-top: 40px; font-size: 18px; color: #79747e;">
              <a href="${slide.link}">${slide.link.replace('https://www.', '')}</a>
            </p>
          `;
          break;

        case 'list':
          html = `<h2>${slide.h2}</h2>`;
          if (slide.intro) html += `<p>${slide.intro}</p>`;
          html += '<ul style="font-size: 1.1em; margin-top: 16px;">';
          slide.items.forEach(item => { html += `<li>${item}</li>`; });
          html += '</ul>';
          break;

        case 'table':
          html = `<h2>${slide.h2}</h2>`;
          html += '<table><thead><tr>';
          slide.columns.forEach(col => { html += `<th>${col}</th>`; });
          html += '</tr></thead><tbody>';
          slide.rows.forEach(row => {
            html += '<tr>';
            if (Array.isArray(row)) {
              row.forEach(cell => { html += `<td>${cell}</td>`; });
            } else {
              slide.columns.forEach(col => { html += `<td>${row[col]}</td>`; });
            }
            html += '</tr>';
          });
          html += '</tbody></table>';
          break;

        case 'comparison':
          html = `
            <h2>${slide.h2}</h2>
            <p style="margin-top: 40px; font-size: 1.3em; color: #1c1b1f;">${slide.line1}</p>
            <p style="font-size: 1.3em; color: #1c1b1f;">${slide.line2}</p>
            <p style="margin-top: 40px; font-size: 1.15em; color: #6750a4; font-weight: 600;">${slide.tip}</p>
          `;
          break;

        case 'numbered':
          html = `<h2>${slide.h2}</h2>`;
          html += '<ol style="font-size: 1.05em; margin-top: 16px; text-align: left; max-width: 640px;">';
          slide.items.forEach(item => { html += `<li style="margin-bottom: 10px;">${item}</li>`; });
          html += '</ol>';
          break;

        case 'faq':
          html = `<h2>${slide.h2}</h2>`;
          slide.faqs.forEach(faq => {
            html += `<div style="margin-bottom: 18px; text-align: left; max-width: 680px;"><strong>Q: ${faq.q}</strong><p style="margin-top: 6px; font-size: 0.95em;">A: ${faq.a}</p></div>`;
          });
          break;

        case 'cta':
          html = `
            <h2>${slide.h2}</h2>
            <p style="max-width: 600px; margin: 20px auto;">${slide.body}</p>
            <a href="${slide.href}" style="display: inline-block; margin-top: 24px; padding: 14px 28px; background: #6750a4; color: white; border-radius: 8px; text-decoration: none; font-size: 18px; font-weight: 700;">${slide.cta}</a>
          `;
          break;
      }

      return `<div class="slide ${slide.type}" data-lang="${lang}">${html}</div>`;
    }

    const params = new URLSearchParams(window.location.search);
    const lang = params.get('lang') || 'en';
    const isPrint = params.get('print') === '1';
    const content = CONTENT[lang] || CONTENT.en;

    // Update header
    document.getElementById('header-title').textContent = content.title;
    const backLink = document.getElementById('back-link');
    backLink.href += '?lang=' + lang;

    // Render all slides
    const container = document.getElementById('slides-container');
    content.slides.forEach(slide => { container.innerHTML += renderSlide(slide); });

    // Initialize navigation
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    const totalSlides = slides.length;
    document.getElementById('totalSlides').textContent = totalSlides;

    function showSlide(n) {
      if (n >= totalSlides) currentSlide = totalSlides - 1;
      else if (n < 0) currentSlide = 0;
      else currentSlide = n;

      slides.forEach(slide => slide.classList.remove('active'));
      slides[currentSlide].classList.add('active');

      document.getElementById('currentSlide').textContent = currentSlide + 1;
      document.getElementById('prevBtn').disabled = currentSlide === 0;
      document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
    }

    function changeSlide(n) {
      currentSlide += n;
      showSlide(currentSlide);
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') changeSlide(-1);
      if (e.key === 'ArrowRight') changeSlide(1);
    });

    // Print handlers — set display:flex on all slides before browser print layout
    window.addEventListener('beforeprint', () => {
      slides.forEach(slide => { slide.style.display = 'flex'; });
    });
    window.addEventListener('afterprint', () => {
      slides.forEach(slide => { slide.style.removeProperty('display'); });
      showSlide(currentSlide);
    });

    // Print trigger
    if (isPrint) {
      window.addEventListener('load', () => { window.print(); });
    }

    showSlide(0);
    </script>
