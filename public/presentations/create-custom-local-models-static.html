    function renderSlide(slide) {
      let html = '';
      const articleUrl = `https://www.promptquorum.com/local-llms/create-custom-local-models?lang=${lang}`;
      const footerLink = `<p class="footer-link"><a href="${articleUrl}" target="_blank" rel="noopener">← Back to Article</a></p>`;

      switch (slide.type) {
        case 'title':
          html = `
            <img src="/logo.svg" alt="PromptQuorum" class="logo" />
            <h1>${slide.h1}</h1>
            <p style="font-size: clamp(16px, 1.8vw, 20px); margin-top: 20px;">${slide.subtitle}</p>
            <p style="margin-top: 40px; font-size: 16px; color: #999;">
              <a href="${slide.link}" target="_blank" rel="noopener" style="color: #999; text-decoration: none;">promptquorum.com/local-llms/create-custom-local-models</a>
            </p>
            ${footerLink}
          `;
          break;

        case 'list':
          html = `<h2>${slide.h2}</h2>`;
          if (slide.intro) html += `<p style="margin-bottom: 20px; font-size: 16px;">${slide.intro}</p>`;
          html += '<ul style="font-size: 1.1em; margin-top: 16px;">';
          slide.items.forEach(item => {
            html += `<li style="margin-bottom: 10px;">${item}</li>`;
          });
          html += '</ul>';
          html += footerLink;
          break;

        case 'table':
          html = `<h2>${slide.h2}</h2>`;
          html += '<table style="margin-top: 16px; font-size: 0.95em;"><tr>';
          slide.columns.forEach(col => {
            html += `<th>${col}</th>`;
          });
          html += '</tr>';
          slide.rows.forEach(row => {
            html += '<tr>';
            slide.columns.forEach(col => {
              html += `<td>${row[col]}</td>`;
            });
            html += '</tr>';
          });
          html += '</table>';
          html += footerLink;
          break;

        case 'comparison':
          html = `
            <h2>${slide.h2}</h2>
            <p style="margin-top: 40px; font-size: 1.3em; line-height: 1.8;">${slide.line1}</p>
            <p style="font-size: 1.3em; line-height: 1.8;">${slide.line2}</p>
            <p style="margin-top: 40px; font-size: 1em; line-height: 1.6; color: #6750a4;">${slide.tip}</p>
            ${footerLink}
          `;
          break;

        case 'numbered':
          html = `<h2>${slide.h2}</h2>`;
          if (slide.intro) html += `<p style="margin-bottom: 16px;">${slide.intro}</p>`;
          html += '<ol style="font-size: 1em; margin-top: 12px;">';
          slide.items.forEach(item => {
            html += `<li style="margin-bottom: 8px;">${item}</li>`;
          });
          html += '</ol>';
          html += footerLink;
          break;

        case 'faq':
          html = `<h2>${slide.h2}</h2>`;
          html += '<div style="margin-top: 16px; font-size: 0.95em;">';
          slide.faqs.forEach(faq => {
            html += `<div style="margin-bottom: 14px;"><strong>Q: ${faq.q}</strong><p style="margin-top: 6px; margin-bottom: 0;">A: ${faq.a}</p></div>`;
          });
          html += '</div>';
          html += footerLink;
          break;

        case 'cta':
          html = `
            <h2>${slide.h2}</h2>
            <p style="margin-top: 24px; font-size: 16px;">${slide.body}</p>
            <a href="${slide.href}" target="_blank" rel="noopener" style="display: inline-block; margin-top: 24px; padding: 12px 28px; background: #6750a4; color: white; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 16px;">${slide.cta}</a>
            ${footerLink}
          `;
          break;
      }

      return `<div class="slide ${slide.type}">${html}</div>`;
    }

    const params = new URLSearchParams(window.location.search);
    const lang = params.get('lang') || 'en';
    const content = CONTENT[lang] || CONTENT.en;

    document.getElementById('header-title').textContent = content.title;
    const backLink = document.getElementById('back-link');
    backLink.href += `?lang=${lang}`;

    const container = document.getElementById('slides-container');
    content.slides.forEach(slide => {
      container.innerHTML += renderSlide(slide);
    });

    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    const totalSlides = slides.length;
    document.getElementById('totalSlides').textContent = totalSlides;

    function showSlide(n) {
      if (n >= totalSlides) currentSlide = totalSlides - 1;
      else if (n < 0) currentSlide = 0;

      slides.forEach(slide => slide.classList.remove('active'));
      slides[currentSlide].classList.add('active');

      document.getElementById('currentSlide').textContent = currentSlide + 1;
      document.getElementById('prevBtn').disabled = currentSlide === 0;
      document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
    }

    function changeSlide(n) {
      currentSlide += n;
      showSlide(currentSlide);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') changeSlide(-1);
      if (e.key === 'ArrowRight') changeSlide(1);
    });

    window.addEventListener('beforeprint', () => {
      slides.forEach(slide => { slide.style.display = 'flex'; });
    });
    window.addEventListener('afterprint', () => {
      slides.forEach(slide => { slide.style.removeProperty('display'); });
      showSlide(currentSlide);
    });

    showSlide(0);
  </script>
