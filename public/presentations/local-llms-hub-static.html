      });
      html += footerLink;
      break;
    case 'cta':
      html = '<h2>' + slide.h2 + '</h2><p style="margin-top:20px;max-width:540px;">' + slide.body + '</p><a href="' + slide.href + '" style="display:inline-block;margin-top:32px;padding:14px 28px;background:#6750a4;color:white;border-radius:8px;text-decoration:none;font-size:16px;font-weight:700;">' + slide.cta + '</a>' + footerLink;
      break;
  }
  return '<div class="slide ' + slide.type + '">' + html + '</div>';
}

var params = new URLSearchParams(window.location.search);
var lang = params.get('lang') || 'en';
var isPrint = params.get('print') === '1';
var content = CONTENT[lang] || CONTENT.en;

document.getElementById('header-title').textContent = content.title;
document.getElementById('back-link').href = 'https://www.promptquorum.com/local-llms?lang=' + lang;

var container = document.getElementById('slides-container');
content.slides.forEach(function(slide) { container.innerHTML += renderSlide(slide); });

var currentSlide = 0;
var slides = document.querySelectorAll('.slide');
var totalSlides = slides.length;
document.getElementById('totalSlides').textContent = totalSlides;

function showSlide(n) {
  if (n >= totalSlides) n = totalSlides - 1;
  if (n < 0) n = 0;
  currentSlide = n;
  slides.forEach(function(s) { s.classList.remove('active'); });
  slides[currentSlide].classList.add('active');
  document.getElementById('currentSlide').textContent = currentSlide + 1;
  document.getElementById('prevBtn').disabled = currentSlide === 0;
  document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
}

function changeSlide(n) { showSlide(currentSlide + n); }

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') changeSlide(-1);
  if (e.key === 'ArrowRight') changeSlide(1);
});

window.addEventListener('beforeprint', function() { slides.forEach(function(s) { s.style.display = 'flex'; }); });
window.addEventListener('afterprint', function() { slides.forEach(function(s) { s.style.removeProperty('display'); }); showSlide(currentSlide); });

if (isPrint) { window.addEventListener('load', function() { window.print(); }); }

showSlide(0);
</script>
</body>
</html>
