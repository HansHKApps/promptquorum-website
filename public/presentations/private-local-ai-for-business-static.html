    function renderSlide(slide) {
      let html = '';
      const articleUrl = 'https://www.promptquorum.com/local-llms/private-local-ai-for-business?lang=' + lang;
      const footerLink = `<p style="position: absolute; bottom: 16px; right: 16px; font-size: 11px; color: #999;"><a href="${articleUrl}" target="_blank" rel="noopener" style="color: #999; text-decoration: none;">← Article</a></p>`;

      switch (slide.type) {
        case 'title':
          html = `
            <img src="/logo.svg" alt="PromptQuorum" class="logo" style="position: absolute; top: 20px; height: 40px;" />
            <h1>${slide.h1}</h1>
            <p>${slide.subtitle}</p>
            <p style="margin-top: 40px; font-size: 16px; opacity: 0.8;">
              <a href="${slide.link}" target="_blank" rel="noopener" style="color: white; text-decoration: underline;">Read full article on PromptQuorum</a>
            </p>
            ${footerLink}
          `;
          break;

        case 'list':
          html = `<h2>${slide.h2}</h2>`;
          html += '<ul style="margin-top: 16px;">';
          slide.items.forEach(item => {
            html += `<li>${item}</li>`;
          });
          html += '</ul>';
          html += footerLink;
          break;

        case 'table':
          html = `<h2>${slide.h2}</h2>`;
          html += '<table style="margin-top: 16px;"><tr>';
          slide.columns.forEach(col => {
            html += `<th>${col}</th>`;
          });
          html += '</tr>';
          slide.rows.forEach(row => {
            html += '<tr>';
            slide.columns.forEach(col => {
              html += `<td>${row[col]}</td>`;
            });
            html += '</tr>';
          });
          html += '</table>';
          html += footerLink;
          break;

        case 'faq':
          html = `<h2>${slide.h2}</h2>`;
          slide.faqs.forEach(faq => {
            html += `<div class="faq-item"><strong>Q: ${faq.q}</strong><p>A: ${faq.a}</p></div>`;
          });
          html += footerLink;
          break;

        case 'cta':
          html = `
            <h2>${slide.h2}</h2>
            <p style="font-size: 18px; margin: 24px 0; line-height: 1.6;">${slide.body}</p>
            <a href="${slide.href}" target="_blank" rel="noopener" style="display: inline-block; padding: 12px 32px; background: white; color: #6750a4; text-decoration: none; border-radius: 6px; font-weight: 600; margin-top: 16px;">${slide.cta}</a>
            ${footerLink}
          `;
          break;
      }

      return `<div class="slide ${slide.type}">${html}</div>`;
    }

    const params = new URLSearchParams(window.location.search);
    let lang = params.get('lang') || 'en';
    if (!CONTENT[lang]) lang = 'en';

    const content = CONTENT[lang];

    // Update header
    document.getElementById('header-title').textContent = content.title;
    const backLink = document.getElementById('back-link');
    backLink.href += `?lang=${lang}`;

    // Render all slides
    const container = document.getElementById('slides-container');
    content.slides.forEach(slide => {
      container.innerHTML += renderSlide(slide);
    });

    // Initialize navigation
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    const totalSlides = slides.length;
    document.getElementById('totalSlides').textContent = totalSlides;

    function showSlide(n) {
      if (n >= totalSlides) currentSlide = totalSlides - 1;
      else if (n < 0) currentSlide = 0;

      slides.forEach(slide => slide.classList.remove('active'));
      slides[currentSlide].classList.add('active');

      document.getElementById('currentSlide').textContent = currentSlide + 1;
      document.getElementById('prevBtn').disabled = currentSlide === 0;
      document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
    }

    function changeSlide(n) {
      currentSlide += n;
      showSlide(currentSlide);
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') changeSlide(-1);
      if (e.key === 'ArrowRight') changeSlide(1);
    });

    // Print handlers
    window.addEventListener('beforeprint', () => {
      slides.forEach(slide => { slide.style.display = 'flex'; });
    });
    window.addEventListener('afterprint', () => {
      slides.forEach(slide => { slide.style.removeProperty('display'); });
      showSlide(currentSlide);
    });

    showSlide(0);
  </script>
