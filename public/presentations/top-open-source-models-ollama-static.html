            h2: '如何选择模型',
            items: [
              '<strong>检查 RAM:</strong> 3B = 2–3 GB、7B = 5 GB、13B = 10 GB、70B = 40+ GB',
              '<strong>考虑速度:</strong> 较小 = 更快。较大 = 更好的质量。',
              '<strong>匹配用途:</strong> 编码 vs 聊天 vs 推理 vs 视觉',
              '<strong>本地测试:</strong> 下载大型变体前尝试',
              '<strong>使用 ollama show:</strong> 下载前验证 RAM 要求'
            ]
          },
          {
            type: 'faq',
            h2: '关于 Ollama 模型的常见问题',
            faqs: [
              { q: '需要多少内存？', a: '7B：5–6 GB。13B：10–14 GB。70B：量子化后 42–48 GB。使用 `ollama show [model]` 验证。' },
              { q: '可以离线运行吗？', a: '是的。初始下载后，所有推理在本地运行，无需互联网。' },
              { q: '哪个最适合编码？', a: 'Qwen2.5-Coder 7B（72%）或 Llama 3.1 8B（72%）。两者都很出色。' },
              { q: 'Ollama 是免费的吗？', a: '是的。所有模型都是开源的，采用自由许可证。无 API 费用。' }
            ]
          },
          {
            type: 'list',
            h2: '快速参考：模型名称和命令',
            intro: '复制粘贴到终端:',
            items: [
              '`ollama run llama3.2:3b` — 最佳起点',
              '`ollama run qwen2.5-coder:7b` — 用于编码',
              '`ollama run deepseek-r1:7b` — 用于推理和数学',
              '`ollama run llama3.2-vision:11b` — 用于图像分析',
              '`ollama pull qwen2.5:7b` — 多语言、增长最快'
            ]
          },
          {
            type: 'cta',
            h2: '了解更多关于本地 LLM',
            body: '准备好本地运行这些模型了吗？PromptQuorum 帮您比较模型、理解量子化并优化硬件。',
            cta: '阅读完整文章',
            href: 'https://www.promptquorum.com/local-llms/top-open-source-models-ollama?lang=zh'
          }
        ]
      }
    };

    function renderSlide(slide) {
      let html = '';
      const articleUrl = 'https://www.promptquorum.com/local-llms/top-open-source-models-ollama?lang=' + lang;
      const footerLink = `<p style="position: absolute; bottom: 16px; right: 16px; font-size: 11px; color: #999;"><a href="${articleUrl}" style="color: #999; text-decoration: none; border-bottom: 1px solid #ddd;">← Article</a></p>`;

      switch (slide.type) {
        case 'title':
          html = `
            <img src="/logo.svg" alt="PromptQuorum" class="logo" style="height: 48px; width: auto;" />
            <h1>${slide.h1}</h1>
            <p style="font-size: 20px; color: #6750A4; margin-top: 10px;">${slide.subtitle}</p>
            <p style="margin-top: 40px; font-size: 16px; color: #79747E;">
              <a href="${slide.link}" style="color: #79747E; text-decoration: none; border-bottom: 1px solid #ddd;">→ Read full article</a>
            </p>
            ${footerLink}
          `;
          break;

        case 'list':
          html = `<h2>${slide.h2}</h2>`;
          if (slide.intro) html += `<p style="margin-bottom: 16px; font-size: 16px; color: #49454F;">${slide.intro}</p>`;
          html += '<ul style="font-size: 15px; margin-top: 16px;">';
          slide.items.forEach(item => {
            html += `<li>${item}</li>`;
          });
          html += '</ul>';
          html += footerLink;
          break;

        case 'table':
          html = `<h2>${slide.h2}</h2>`;
          html += '<table style="margin-top: 16px; font-size: 13px;"><tr>';
          slide.columns.forEach(col => {
            html += `<th>${col}</th>`;
          });
          html += '</tr>';
          slide.rows.forEach(row => {
            html += '<tr>';
            slide.columns.forEach(col => {
              html += `<td>${row[col]}</td>`;
            });
            html += '</tr>';
          });
          html += '</table>';
          html += footerLink;
          break;

        case 'faq':
          html = `<h2>${slide.h2}</h2>`;
          html += '<div style="margin-top: 16px;">';
          slide.faqs.forEach(faq => {
            html += `<div style="margin-bottom: 16px;"><strong style="color: #6750A4;">Q: ${faq.q}</strong><p style="margin-top: 6px; font-size: 14px; color: #49454F;">A: ${faq.a}</p></div>`;
          });
          html += '</div>';
          html += footerLink;
          break;

        case 'cta':
          html = `
            <h2>${slide.h2}</h2>
            <p style="margin-top: 20px; font-size: 16px; color: #49454F;">${slide.body}</p>
            <a href="${slide.href}" style="display: inline-block; margin-top: 24px; padding: 12px 24px; background: #6750A4; color: white; border-radius: 4px; text-decoration: none; font-weight: 600;">${slide.cta}</a>
            ${footerLink}
          `;
          break;
      }

      return `<div class="slide ${slide.type}">${html}</div>`;
    }

    const params = new URLSearchParams(window.location.search);
    const lang = params.get('lang') || 'en';
    const content = CONTENT[lang] || CONTENT.en;

    // Update header
    document.getElementById('header-title').textContent = content.title;
    const backLink = document.getElementById('back-link');
    backLink.href = backLink.href.split('?')[0] + `?lang=${lang}`;

    // Render all slides
    const container = document.getElementById('slides-container');
    content.slides.forEach(slide => {
      container.innerHTML += renderSlide(slide);
    });

    // Initialize navigation
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    const totalSlides = slides.length;
    document.getElementById('totalSlides').textContent = totalSlides;

    function showSlide(n) {
      if (n >= totalSlides) currentSlide = totalSlides - 1;
      else if (n < 0) currentSlide = 0;

      slides.forEach(slide => slide.classList.remove('active'));
      slides[currentSlide].classList.add('active');

      document.getElementById('currentSlide').textContent = currentSlide + 1;
      document.getElementById('prevBtn').disabled = currentSlide === 0;
      document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
    }

    function changeSlide(n) {
      currentSlide += n;
      showSlide(currentSlide);
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') changeSlide(-1);
      if (e.key === 'ArrowRight') changeSlide(1);
    });

    // Print handlers
    window.addEventListener('beforeprint', () => {
      slides.forEach(slide => { slide.style.display = 'flex'; });
    });
    window.addEventListener('afterprint', () => {
      slides.forEach(slide => { slide.style.removeProperty('display'); });
      showSlide(currentSlide);
    });

    showSlide(0);
  </script>
</body>
</html>
