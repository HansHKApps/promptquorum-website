                    },

                    },

                            '<strong>认为最新版本最好</strong> — 旧版量化有时拥有更好的社区支持',

                            '<strong>只凭单一基准决策</strong> — MMLU、HumanEval和MATH衡量不同能力'
                        ]
                    },
                    {

                        h2: '常见问题',
                        faqs: [
                            { q: '编码最佳选择？', a: 'Qwen2.5在每个大小层级均为最佳。Qwen2.5 72B：87% HumanEval。Llama 3.3 70B：88% — 仅在70B层级略高。' },
                            { q: '三个模型都能在8 GB VRAM上运行？', a: '是的。Q4量化下：Qwen2.5 7B约4.7 GB，Llama 3.1 8B约5.5 GB，Mistral 7B约4.5 GB。' },
                            { q: '70B规模下Qwen2.5和Llama 3.3哪个更好？', a: '总体上几乎相等。Qwen在编码、数学和多语言方面胜出。Llama赢得HumanEval（88% vs 87%）和英语写作风格。' }
                        ]
                    },
                    {

                        h2: '快速决策指南',
                        items: [

                            '<strong>最高质量（40 GB+）</strong> → Qwen2.5 72B或Llama 3.3 70B'

                        h2: '同时比较三个模型的输出',
                        body: 'PromptQuorum让您可以同时在Qwen、Llama和Mistral上运行相同的提示，并排比较输出结果。',

                        href: 'https://www.promptquorum.com'

                ]
            }
        };

        function renderSlide(slide, lang) {
            let html = '';
            const articleUrl = 'https://www.promptquorum.com/local-llms/qwen-vs-llama-vs-mistral?lang=' + lang;
            const footerLink = `<p style="position: absolute; bottom: 16px; right: 16px; font-size: 11px; color: #999;"><a href="${articleUrl}" style="color: #999; text-decoration: none; border-bottom: 1px solid #ddd;">← Article</a></p>`;

            switch (slide.type) {
                case 'title':
                    html = `
                        <img src="/logo.svg" alt="PromptQuorum" class="logo" />
                        <h1>${slide.h1}</h1>
                        <p>${slide.subtitle}</p>
                        <p style="margin-top: 40px; font-size: 18px; color: #79747e;">
                            <a href="${slide.link}">promptquorum.com/local-llms/qwen-vs-llama-vs-mistral</a>
                        </p>
                        ${footerLink}
                    `;
                    break;

                case 'list':
                    html = `<h2>${slide.h2}</h2>`;
                    if (slide.intro) html += `<p>${slide.intro}</p>`;
                    html += '<ul style="font-size: 1.1em; margin-top: 16px;">';
                    slide.items.forEach(item => { html += `<li style="margin-bottom: 8px;">${item}</li>`; });
                    html += '</ul>';
                    html += footerLink;
                    break;

                case 'table':
                    html = `<h2>${slide.h2}</h2>`;
                    html += '<table><tr>';
                    slide.columns.forEach(col => { html += `<th>${col}</th>`; });
                    html += '</tr>';
                    slide.rows.forEach(row => {
                        html += '<tr>';
                        slide.columns.forEach(col => { html += `<td>${row[col]}</td>`; });
                        html += '</tr>';
                    });
                    html += '</table>';
                    html += footerLink;
                    break;

                case 'comparison':
                    html = `
                        <h2>${slide.h2}</h2>
                        <p style="margin-top: 32px; font-size: 1.3em; text-align: left; max-width: 680px;">${slide.line1}</p>
                        <p style="font-size: 1.3em; margin-top: 16px; text-align: left; max-width: 680px;">${slide.line2}</p>
                        <p style="margin-top: 32px; font-size: 1.1em; color: #6750a4; font-style: italic;">${slide.tip}</p>
                        ${footerLink}
                    `;
                    break;

                case 'numbered':
                    html = `<h2>${slide.h2}</h2>`;
                    html += '<ol style="font-size: 1.1em; margin-top: 16px; text-align: left; max-width: 640px;">';
                    slide.items.forEach(item => { html += `<li style="margin-bottom: 8px;">${item}</li>`; });
                    html += '</ol>';
                    html += footerLink;
                    break;

                case 'faq':
                    html = `<h2>${slide.h2}</h2>`;
                    slide.faqs.forEach(faq => {
                        html += `<div style="margin-bottom: 18px; text-align: left; max-width: 700px;"><strong>Q: ${faq.q}</strong><p style="margin-top: 6px; font-size: 0.95em;">A: ${faq.a}</p></div>`;
                    });
                    html += footerLink;
                    break;

                case 'cta':
                    html = `
                        <h2>${slide.h2}</h2>
                        <p style="margin-top: 20px; max-width: 600px;">${slide.body}</p>
                        <a href="${slide.href}" style="display: inline-block; margin-top: 28px; padding: 14px 28px; background: #6750a4; color: white; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 1.1em;">${slide.cta}</a>
                        ${footerLink}
                    `;
                    break;
            }

            return `<div class="slide ${slide.type}" data-lang="${lang}">${html}</div>`;
        }

        const params = new URLSearchParams(window.location.search);
        const lang = params.get('lang') || 'en';
        const isPrint = params.get('print') === '1';
        const content = CONTENT[lang] || CONTENT.en;

        // Update header
        document.getElementById('header-title').textContent = content.title;
        const backLink = document.getElementById('back-link');
        backLink.href = 'https://www.promptquorum.com/local-llms/qwen-vs-llama-vs-mistral?lang=' + lang;

        // Render all slides
        const container = document.getElementById('slides-container');
        content.slides.forEach(slide => {
            container.innerHTML += renderSlide(slide, lang);
        });

        // Initialize navigation
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;
        document.getElementById('totalSlides').textContent = totalSlides;

        function showSlide(n) {
            if (n >= totalSlides) currentSlide = totalSlides - 1;
            else if (n < 0) currentSlide = 0;
            else currentSlide = n;

            slides.forEach(slide => slide.classList.remove('active'));
            slides[currentSlide].classList.add('active');

            document.getElementById('currentSlide').textContent = currentSlide + 1;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
        }

        function changeSlide(n) {
            showSlide(currentSlide + n);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight') changeSlide(1);
        });

        window.addEventListener('beforeprint', () => {
            slides.forEach(slide => { slide.style.display = 'flex'; });
        });
        window.addEventListener('afterprint', () => {
            slides.forEach(slide => { slide.style.removeProperty('display'); });
            showSlide(currentSlide);
        });

        if (isPrint) {
            window.addEventListener('load', () => { window.print(); });
        }

        showSlide(0);
    </script>
</body>
