                        faqs: [
                            { q: 'vLLM OOM怎么办?', a: '使用较小量化（Q4 vs Q8）、降低批大小或减少VRAM。检查nvidia-smi。' },
                            { q: '阶段3是否适合生产?', a: '是的。添加Prometheus、Grafana、Alertmanager。标准基础设施模式。' },
                        ]
                    },
                    {
                        type: 'list',
                        h2: '相关资源',
                        items: [
                            '<strong>OpenAI API:</strong> 真实OpenAI的直接替代品',
                            '<strong>Ollama设置指南:</strong> 安装和模型选择',
                            '<strong>VS Code & Cursor:</strong> IDE集成深度指南',
                            '<strong>LoRA微调:</strong> 训练自定义模型',
                        ]
                    },
                    {
                        type: 'cta',
                        h2: '准备好构建您的堆栈了吗?',
                        body: '比较本地vs云。在25+模型上测试性能。',
                        cta: '免费开始',
                        href: 'https://www.promptquorum.com'
                    }
                ]
            }
        };

        function renderSlide(slide) {
            let html = '';
            const articleUrl = 'https://www.promptquorum.com/local-llms/local-llm-developer-stack?lang=' + lang;
            const footerLink = `<p style="position: absolute; bottom: 16px; right: 16px; font-size: 11px; color: #999;"><a href="${articleUrl}" style="color: #999; text-decoration: none; border-bottom: 1px solid #ddd;">← Article</a></p>`;

            switch (slide.type) {
                case 'title':
                    html = `
                        <img src="/logo.svg" alt="PromptQuorum" class="logo" />
                        <h1>${slide.h1}</h1>
                        <p>${slide.subtitle}</p>
                        <p style="margin-top: 40px; font-size: 18px; color: #79747e;">
                            <a href="${slide.link}">${slide.link.split('/').pop().replace(/-/g, ' ')}</a>
                        </p>
                        ${footerLink}
                    `;
                    break;

                case 'list':
                    html = `<h2>${slide.h2}</h2>`;
                    if (slide.intro) html += `<p>${slide.intro}</p>`;
                    html += '<ul style="font-size: 1.2em; margin-top: 20px;">';
                    slide.items.forEach(item => {
                        html += `<li>${item}</li>`;
                    });
                    html += '</ul>';
                    html += footerLink;
                    break;

                case 'faq':
                    html = `<h2>${slide.h2}</h2>`;
                    slide.faqs.forEach(faq => {
                        html += `<div style="margin-bottom: 20px; text-align: left; max-width: 600px; margin-left: auto; margin-right: auto;"><strong>Q: ${faq.q}</strong><p style="margin-top: 8px; font-size: 1em;">A: ${faq.a}</p></div>`;
                    });
                    html += footerLink;
                    break;

                case 'image':
                    html = `
                        <img src="${slide.src}" alt="${slide.caption}" style="max-width: 90%; max-height: 70vh; object-fit: contain; margin-bottom: 16px;" />
                        <p style="font-size: 0.95em; color: #79747e; margin-top: 16px; max-width: 700px;">${slide.caption}</p>
                        ${footerLink}
                    `;
                    break;

                case 'cta':
                    html = `
                        <h2>${slide.h2}</h2>
                        <p style="margin-top: 20px; font-size: 1.1em;">${slide.body}</p>
                        <a href="${slide.href}" style="display: inline-block; margin-top: 30px; padding: 12px 24px; background: #6750a4; color: white; border-radius: 6px; text-decoration: none; font-weight: 600;">${slide.cta}</a>
                        ${footerLink}
                    `;
                    break;
            }

            return `<div class="slide ${slide.type}" data-lang="${lang}">${html}</div>`;
        }

        const params = new URLSearchParams(window.location.search);
        const lang = params.get('lang') || 'en';
        const content = CONTENT[lang] || CONTENT.en;

        document.getElementById('header-title').textContent = content.title;
        const backLink = document.getElementById('back-link');
        backLink.href += `?lang=${lang}`;

        const container = document.getElementById('slides-container');
        content.slides.forEach(slide => {
            container.innerHTML += renderSlide(slide);
        });

        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;
        document.getElementById('totalSlides').textContent = totalSlides;

        function showSlide(n) {
            if (n >= totalSlides) currentSlide = totalSlides - 1;
            else if (n < 0) currentSlide = 0;

            slides.forEach(slide => slide.classList.remove('active'));
            slides[currentSlide].classList.add('active');

            document.getElementById('currentSlide').textContent = currentSlide + 1;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
        }

        function changeSlide(n) {
            currentSlide += n;
            showSlide(currentSlide);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight') changeSlide(1);
        });

        window.addEventListener('beforeprint', () => {
            slides.forEach(slide => { slide.style.display = 'flex'; });
        });
        window.addEventListener('afterprint', () => {
            slides.forEach(slide => { slide.style.removeProperty('display'); });
            showSlide(currentSlide);
        });

        showSlide(0);
    </script>
</body>
</html>
