                        h2: '如何将TRACE与其他框架结合使用？',
                        columns: ['框架', '最适合', '与TRACE结合使用的时机'],
                        rows: [
                            { '框架': 'CO-STAR', '最适合': '内容生成、草稿', '与TRACE结合使用的时机': '先草稿，后TRACE评估' },
                            { '框架': 'CRAFT', '最适合': '有约束的结构化内容', '与TRACE结合使用的时机': '生成，后TRACE验证' },
                            { '框架': 'RISEN', '最适合': '迭代改进', '与TRACE结合使用的时机': 'TRACE分析，RISEN改进' },
                            { '框架': 'SPECS', '最适合': '严格的输出模式', '与TRACE结合使用的时机': 'TRACE推理，SPECS格式' },
                            { '框架': 'Few-Shot', '最适合': '格式一致性', '与TRACE结合使用的时机': '为TRACE阶段添加示例' }
                        ]
                    },
                    {
                        type: 'numbered',
                        h2: '如何使用TRACE框架',
                        items: [
                            '<strong>Think:</strong> 让模型重述问题并列出关键变量',
                            '<strong>Reason:</strong> 让模型提出2-3种可能方法及其权衡',
                            '<strong>Analyze:</strong> 让模型逐步将所选方法应用于实际数据',
                            '<strong>Conclude:</strong> 让模型在一句话内清楚陈述最终答案',
                            '<strong>Explain:</strong> 让模型为非技术人员解释正当理由'
                        ]
                    },
                    {
                        type: 'table',
                        h2: 'TRACE的常见错误',
                        columns: ['错误', '问题', '修复'],
                        rows: [
                            { '错误': '跳过Think阶段', '问题': '模型误解需求', '修复': '总是要求重述' },
                            { '错误': '没有长度限制', '问题': '非常长的回答', '修复': '每阶段: "1-2句"' },
                            { '错误': '用于日常任务', '问题': '不必要的延迟和成本', '修复': '仅用于决策' },
                            { '错误': '严格遵循5阶段', '问题': '浪费时间和令牌', '修复': '根据任务调整' },
                            { '错误': '不比较模型', '问题': '错过哪个供应商最好', '修复': 'PromptQuorum测试多个' }
                        ]
                    },
                    {
                        type: 'faq',
                        h2: '常见问题',
                        faqs: [
                            { q: 'TRACE代表什么?', a: 'Think, Reason, Analyze, Conclude, Explain — 一个结构化提示词模式，强制AI展示其推理过程。' },
                            { q: '何时应使用TRACE?', a: '推理质量很重要时: 战略决定、架构评审、复杂调试或需要为其辩护的输出。' },
                            { q: 'TRACE与Chain-of-Thought有何不同?', a: 'Chain-of-Thought是通用的。TRACE是特定的5阶段结构，在任务和模型间产生一致推理。' },
                            { q: '我能在单个提示词中使用TRACE吗?', a: '可以。包含所有5阶段的单个提示词更快。多轮允许在每个阶段暂停和重定向。' }
                        ]
                    },
                    {
                        type: 'cta',
                        h2: '开始更聪明的提示词',
                        body: '在PromptQuorum中使用TRACE框架，让AI推理透明、可审计且可重复。',
                        cta: '免费试用PromptQuorum',
                        href: 'https://www.promptquorum.com'
                    }
                ]
            }
        };

        function renderSlide(slide) {
            let html = '';
            const articleUrl = `https://www.promptquorum.com/prompt-engineering/trace-framework?lang=${lang}`;
            const footerLink = `<p style="position: absolute; bottom: 16px; right: 16px; font-size: 11px; color: #999;"><a href="${articleUrl}" target="_blank" rel="noopener" style="color: #999; text-decoration: none;">← Article</a></p>`;

            switch (slide.type) {
                case 'title':
                    html = `
                        <img src="/logo.svg" alt="PromptQuorum" class="logo" />
                        <h1>${slide.h1}</h1>
                        <p>${slide.subtitle}</p>
                        <p style="margin-top: 40px; font-size: 18px; color: #79747e;">
                            <a href="${slide.link}" target="_blank" rel="noopener" style="color: #6750a4; text-decoration: none;">${slide.link.split('/').pop().replace(/-/g, ' ')}</a>
                        </p>
                        ${footerLink}
                    `;
                    break;

                case 'list':
                    html = `<h2>${slide.h2}</h2><ul style="font-size: 1.1em; margin-top: 20px;">`;
                    slide.items.forEach(item => {
                        html += `<li>${item}</li>`;
                    });
                    html += `</ul>${footerLink}`;
                    break;

                case 'table':
                    html = `<h2>${slide.h2}</h2><table style="margin-top: 20px;"><tr>`;
                    slide.columns.forEach(col => {
                        html += `<th>${col}</th>`;
                    });
                    html += '</tr>';
                    slide.rows.forEach(row => {
                        html += '<tr>';
                        slide.columns.forEach(col => {
                            html += `<td>${row[col] || ''}</td>`;
                        });
                        html += '</tr>';
                    });
                    html += `</table>${footerLink}`;
                    break;

                case 'comparison':
                    html = `
                        <h2>${slide.h2}</h2>
                        <p style="margin-top: 30px; font-size: 1.3em; text-align: left; max-width: 700px; margin-left: auto; margin-right: auto;">${slide.line1}</p>
                        <p style="font-size: 1.3em; text-align: left; max-width: 700px; margin-left: auto; margin-right: auto; margin-bottom: 30px;">${slide.line2}</p>
                        <p style="font-size: 1.1em; color: #6750a4;">${slide.tip}</p>
                        ${footerLink}
                    `;
                    break;

                case 'numbered':
                    html = `<h2>${slide.h2}</h2><ol style="font-size: 1.05em; margin-top: 20px; text-align: left; max-width: 700px; margin-left: auto; margin-right: auto;">`;
                    slide.items.forEach((item, i) => {
                        html += `<li style="margin-bottom: 12px;">${item}</li>`;
                    });
                    html += `</ol>${footerLink}`;
                    break;

                case 'faq':
                    html = `<h2>${slide.h2}</h2><div style="text-align: left; max-width: 700px; margin: 20px auto;">`;
                    slide.faqs.slice(0, 4).forEach(faq => {
                        html += `<div style="margin-bottom: 16px;"><strong>Q: ${faq.q}</strong><p style="margin-top: 6px; font-size: 0.95em; color: #49454f;">A: ${faq.a}</p></div>`;
                    });
                    html += `</div>${footerLink}`;
                    break;

                case 'cta':
                    html = `
                        <h2>${slide.h2}</h2>
                        <p style="margin-top: 20px; font-size: 1.1em;">${slide.body}</p>
                        <a href="${slide.href}" target="_blank" rel="noopener" style="display: inline-block; margin-top: 30px; padding: 14px 28px; background: #6750a4; color: white; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 16px; transition: background 0.2s;" onmouseover="this.style.background='#7d5260'" onmouseout="this.style.background='#6750a4'">${slide.cta}</a>
                        ${footerLink}
                    `;
                    break;
            }

            return `<div class="slide ${slide.type}" data-lang="${lang}">${html}</div>`;
        }

        const params = new URLSearchParams(window.location.search);
        const lang = params.get('lang') || 'en';
        const content = CONTENT[lang] || CONTENT.en;

        document.getElementById('header-title').textContent = content.title;
        const backLink = document.getElementById('back-link');
        const langSuffix = lang !== 'en' ? `?lang=${lang}` : '';
        backLink.href = `https://www.promptquorum.com/prompt-engineering/trace-framework${langSuffix}`;

        const container = document.getElementById('slides-container');
        content.slides.forEach(slide => {
            container.innerHTML += renderSlide(slide);
        });

        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;
        document.getElementById('totalSlides').textContent = totalSlides;

        function showSlide(n) {
            if (n >= totalSlides) currentSlide = totalSlides - 1;
            else if (n < 0) currentSlide = 0;

            slides.forEach(slide => slide.classList.remove('active'));
            slides[currentSlide].classList.add('active');

            document.getElementById('currentSlide').textContent = currentSlide + 1;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
        }

        function changeSlide(n) {
            currentSlide += n;
            showSlide(currentSlide);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight') changeSlide(1);
        });

        window.addEventListener('beforeprint', () => {
            slides.forEach(slide => { slide.style.display = 'flex'; });
        });
        window.addEventListener('afterprint', () => {
            slides.forEach(slide => { slide.style.removeProperty('display'); });
            showSlide(currentSlide);
        });

        showSlide(0);
    </script>
</body>
</html>
