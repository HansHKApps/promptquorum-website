        function renderSlide(slide, lang) {
            const articleUrl = ARTICLE_BASE + (lang !== 'en' ? '?lang=' + lang : '');
            const footerLink = `<p style="position: absolute; bottom: 16px; right: 16px; font-size: 11px; color: #999;"><a href="${articleUrl}" target="_blank" rel="noopener" style="color: #999; text-decoration: none; border-bottom: 1px solid #ddd;">← Article</a></p>`;
            let html = '';
            switch (slide.type) {
                case 'title':
                    html = `<img src="/logo.svg" alt="PromptQuorum" class="logo" /><h1>${slide.h1}</h1><p>${slide.subtitle}</p><p style="margin-top: 32px; font-size: 18px; color: #79747e;"><a href="${slide.link}" target="_blank" rel="noopener">${slide.link}</a></p>${footerLink}`;
                    break;
                case 'list':
                    html = `<h2>${slide.h2}</h2>`;
                    if (slide.intro) html += `<p style="max-width:640px;">${slide.intro}</p>`;
                    html += '<ul style="font-size: 1em; margin-top: 16px;">';
                    slide.items.forEach(item => { html += `<li>${item}</li>`; });
                    html += '</ul>' + footerLink;
                    break;
                case 'table':
                    html = `<h2>${slide.h2}</h2><table><tr>`;
                    slide.columns.forEach(col => { html += `<th>${col}</th>`; });
                    html += '</tr>';
                    slide.rows.forEach(row => { html += '<tr>'; slide.columns.forEach(col => { html += `<td>${row[col]}</td>`; }); html += '</tr>'; });
                    html += '</table>' + footerLink;
                    break;
                case 'comparison':
                    html = `<h2>${slide.h2}</h2><p style="margin-top: 36px; font-size: 1.4em;">${slide.line1}</p><p style="font-size: 1.4em;">${slide.line2}</p><p style="margin-top: 36px; font-size: 1.1em; color: #6750a4; max-width: 600px;">${slide.tip}</p>${footerLink}`;
                    break;
                case 'numbered':
                    html = `<h2>${slide.h2}</h2><ol style="font-size: 1em; margin-top: 16px; max-width: 640px;">`;
                    slide.items.forEach(item => { html += `<li style="margin-bottom:10px;">${item}</li>`; });
                    html += '</ol>' + footerLink;
                    break;
                case 'faq':
                    html = `<h2>${slide.h2}</h2>`;
                    slide.faqs.forEach(faq => { html += `<div style="margin-bottom: 16px; text-align: left; max-width: 660px;"><strong>Q: ${faq.q}</strong><p style="margin-top: 6px; font-size: 0.9em;">A: ${faq.a}</p></div>`; });
                    html += footerLink;
                    break;
                case 'cta':
                    html = `<h2>${slide.h2}</h2><p style="max-width: 560px;">${slide.body}</p><a href="${slide.href}" target="_blank" rel="noopener" style="display: inline-block; margin-top: 28px; padding: 14px 28px; background: #6750a4; color: white; border-radius: 8px; text-decoration: none; font-size: 1.1em; font-weight: 600;">${slide.cta}</a>${footerLink}`;
                    break;
            }
            return `<div class="slide ${slide.type}" style="position:relative;">${html}</div>`;
        }

        const params = new URLSearchParams(window.location.search);
        const lang = (['en','de','fr','ja','zh'].includes(params.get('lang'))) ? params.get('lang') : 'en';
        const isPrint = params.get('print') === '1';
        const content = CONTENT[lang] || CONTENT.en;

        document.getElementById('header-title').textContent = content.title;
        const backLink = document.getElementById('back-link');
        backLink.textContent = content.backLabel;
        backLink.target = '_blank';
        backLink.rel = 'noopener';
        if (lang !== 'en') backLink.href = ARTICLE_BASE + '?lang=' + lang;

        const container = document.getElementById('slides-container');
        content.slides.forEach(slide => { container.innerHTML += renderSlide(slide, lang); });

        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;
        document.getElementById('totalSlides').textContent = totalSlides;

        function showSlide(n) {
            if (n >= totalSlides) currentSlide = totalSlides - 1;
            else if (n < 0) currentSlide = 0;
            else currentSlide = n;
            slides.forEach(slide => slide.classList.remove('active'));
            slides[currentSlide].classList.add('active');
            document.getElementById('currentSlide').textContent = currentSlide + 1;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
        }

        function changeSlide(n) { showSlide(currentSlide + n); }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight') changeSlide(1);
        });

        window.addEventListener('beforeprint', () => { slides.forEach(slide => { slide.style.display = 'flex'; }); });
        window.addEventListener('afterprint', () => { slides.forEach(slide => { slide.style.removeProperty('display'); }); showSlide(currentSlide); });
        if (isPrint) { window.addEventListener('load', () => { window.print(); }); }

        showSlide(0);
    </script>
