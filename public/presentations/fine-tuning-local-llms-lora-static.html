        function renderSlide(slide) {
            let html = '';
            const articleUrl = 'https://www.promptquorum.com/local-llms/fine-tuning-local-llms-lora?lang=' + lang;

            switch (slide.type) {
                case 'title':
                    html = `
                        <img src="/logo.svg" alt="PromptQuorum" class="logo" />
                        <h1>${slide.h1}</h1>
                        <p>${slide.subtitle}</p>
                        <p style="margin-top: 40px; font-size: 18px; color: #79747e;">
                            <a href="${slide.link}" target="_blank" rel="noopener" style="color: #6750a4; text-decoration: none;">Read the full article →</a>
                        </p>
                    `;
                    break;

                case 'list':
                    html = `<h2>${slide.h2}</h2>`;
                    if (slide.intro) html += `<p>${slide.intro}</p>`;
                    html += '<ul style="font-size: 1.1em; margin-top: 20px;">';
                    slide.items.forEach(item => {
                        html += `<li>${item}</li>`;
                    });
                    html += '</ul>';
                    break;

                case 'table':
                    html = `<h2>${slide.h2}</h2>`;
                    html += '<table><tr>';
                    slide.columns.forEach(col => {
                        html += `<th>${col}</th>`;
                    });
                    html += '</tr>';
                    slide.rows.forEach(row => {
                        html += '<tr>';
                        slide.columns.forEach(col => {
                            html += `<td>${row[col]}</td>`;
                        });
                        html += '</tr>';
                    });
                    html += '</table>';
                    break;

                case 'comparison':
                    html = `
                        <h2>${slide.h2}</h2>
                        <p style="margin-top: 40px; font-size: 1.5em;">${slide.line1}</p>
                        <p style="font-size: 1.5em;">${slide.line2}</p>
                        <p style="margin-top: 40px; font-size: 1.1em; color: #6750a4;">${slide.tip}</p>
                    `;
                    break;

                case 'numbered':
                    html = `<h2>${slide.h2}</h2>`;
                    html += '<ol style="font-size: 1.1em; margin-top: 20px;">';
                    slide.items.forEach((item, i) => {
                        html += `<li>${item}</li>`;
                    });
                    html += '</ol>';
                    break;

                case 'faq':
                    html = `<h2>${slide.h2}</h2>`;
                    slide.faqs.forEach(faq => {
                        html += `<div style="margin-bottom: 20px; text-align: left; margin-top: 12px;"><strong>Q: ${faq.q}</strong><p style="margin-top: 8px; font-size: 0.95em;">A: ${faq.a}</p></div>`;
                    });
                    break;

                case 'cta':
                    html = `
                        <h2>${slide.h2}</h2>
                        <p style="margin-top: 20px; margin-bottom: 20px;">${slide.body}</p>
                        <a href="${slide.href}" target="_blank" rel="noopener" style="display: inline-block; margin-top: 20px; padding: 12px 24px; background: #6750a4; color: white; border-radius: 6px; text-decoration: none; font-weight: 600;">${slide.cta}</a>
                    `;
                    break;
            }

            return `<div class="slide ${slide.type}" data-lang="${lang}">${html}</div>`;
        }

        const params = new URLSearchParams(window.location.search);
        const lang = params.get('lang') || 'en';
        const content = CONTENT[lang] || CONTENT.en;

        // Update header
        document.getElementById('header-title').textContent = content.title;
        const backLink = document.getElementById('back-link');
        const baseUrl = 'https://www.promptquorum.com/local-llms/fine-tuning-local-llms-lora';
        backLink.href = lang && lang !== 'en' ? `${baseUrl}?lang=${lang}` : baseUrl;

        // Render all slides
        const container = document.getElementById('slides-container');
        content.slides.forEach(slide => {
            container.innerHTML += renderSlide(slide);
        });

        // Initialize navigation
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;
        document.getElementById('totalSlides').textContent = totalSlides;
        document.getElementById('prevBtn').textContent = content.prevBtn;
        document.getElementById('nextBtn').textContent = content.nextBtn;

        function showSlide(n) {
            if (n >= totalSlides) currentSlide = totalSlides - 1;
            else if (n < 0) currentSlide = 0;

            slides.forEach(slide => slide.classList.remove('active'));
            slides[currentSlide].classList.add('active');

            document.getElementById('currentSlide').textContent = currentSlide + 1;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
        }

        function changeSlide(n) {
            currentSlide += n;
            showSlide(currentSlide);
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight') changeSlide(1);
        });

        // Print handlers
        window.addEventListener('beforeprint', () => {
            slides.forEach(slide => { slide.style.display = 'flex'; });
        });
        window.addEventListener('afterprint', () => {
            slides.forEach(slide => { slide.style.removeProperty('display'); });
            showSlide(currentSlide);
        });

        showSlide(0);
    </script>
