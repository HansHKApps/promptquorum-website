            ${footerLink}
          `;
          break;

        case 'list':
          html = `<h2>${slide.h2}</h2>`;
          html += '<ul>';
          slide.items.forEach(item => {
            html += `<li>${item}</li>`;
          });
          html += '</ul>';
          html += footerLink;
          break;

        case 'table':
          html = `<h2>${slide.h2}</h2>`;
          html += '<table><tr>';
          slide.columns.forEach(col => {
            html += `<th>${col}</th>`;
          });
          html += '</tr>';
          slide.rows.forEach(row => {
            html += '<tr>';
            slide.columns.forEach(col => {
              html += `<td>${row[col]}</td>`;
            });
            html += '</tr>';
          });
          html += '</table>';
          html += footerLink;
          break;

        case 'comparison':
          html = `
            <h2>${slide.h2}</h2>
            <p style="margin-top: 40px; font-size: 1.4em;">${slide.line1}</p>
            <p style="font-size: 1.4em;">${slide.line2}</p>
            <p style="margin-top: 40px; font-size: 1.1em; color: #6750a4;">${slide.tip}</p>
            ${footerLink}

          break;

        case 'faq':
          html = `<h2>${slide.h2}</h2>`;
          slide.faqs.forEach(faq => {
            html += `<div style="margin-bottom: 20px; text-align: left;"><strong>Q: ${faq.q}</strong><p style="margin-top: 8px;">A: ${faq.a}</p></div>`;
          });
          html += footerLink;
          break;

        case 'cta':
          html = `
            <h2>${slide.h2}</h2>
            <p>${slide.body}</p>
            <a href="${slide.href}" style="display: inline-block; margin-top: 20px; padding: 12px 24px; background: #6750a4; color: white; border-radius: 6px; text-decoration: none; font-weight: 500;">${slide.cta}</a>
            ${footerLink}
          `;
          break;
      }

      return `<div class="slide">${html}</div>`;
    }

    const params = new URLSearchParams(window.location.search);
    const lang = params.get('lang') || 'en';
    const content = CONTENT[lang] || CONTENT.en;

    // Update header
    document.getElementById('header-title').textContent = content.title;
    const backLink = document.getElementById('back-link');
    backLink.href += (lang !== 'en' ? `?lang=${lang}` : '');

    // Render all slides
    const container = document.getElementById('slides-container');
    const articleUrl = `https://www.promptquorum.com/local-llms/local-llm-limitations${lang !== 'en' ? `?lang=${lang}` : ''}`;

    content.slides.forEach(slide => {
      container.innerHTML += renderSlide(slide, articleUrl);
    });

    // Initialize navigation
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    const totalSlides = slides.length;
    document.getElementById('totalSlides').textContent = totalSlides;

    function showSlide(n) {
      if (n >= totalSlides) currentSlide = totalSlides - 1;
      else if (n < 0) currentSlide = 0;

      slides.forEach(slide => slide.classList.remove('active'));
      slides[currentSlide].classList.add('active');

      document.getElementById('currentSlide').textContent = currentSlide + 1;
      document.getElementById('prevBtn').disabled = currentSlide === 0;
      document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
    }

    function changeSlide(n) {
      currentSlide += n;
      showSlide(currentSlide);
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') changeSlide(-1);
      if (e.key === 'ArrowRight') changeSlide(1);
    });

    // Print handlers
    window.addEventListener('beforeprint', () => {
      slides.forEach(slide => { slide.style.display = 'flex'; });
    });
    window.addEventListener('afterprint', () => {
      slides.forEach(slide => { slide.style.removeProperty('display'); });
      showSlide(currentSlide);
    });

    showSlide(0);
  </script>
</body>
</html>
