                    { type: 'title', h1: '准备好构建了吗?', subtitle: '从电气电路检查开始', p: '这是最容易被忽视的步骤，也是最可能延迟构建的步骤。' }

        let currentSlideIndex = 0;
        const params = new URLSearchParams(window.location.search);
        let currentLanguage = params.get('lang') || 'en';
        if (!CONTENT[currentLanguage]) currentLanguage = 'en';

        function renderSlide(slide) {
            let html = '<div class="slide ';
            if (slide.type === 'title') html += 'title';
            html += '">';

            if (slide.type === 'title') {
                html += `<h1>${slide.h1}</h1><p style="color:#6750a4;margin:12px 0">${slide.subtitle}</p><p>${slide.p}</p>`;
            } else if (slide.type === 'list') {
                html += `<h2>${slide.h2}</h2><ul>`;
                slide.items.forEach(item => html += `<li>${item}</li>`);
                html += '</ul>';
            } else if (slide.type === 'table') {
                html += `<h2>${slide.h2}</h2><table><tr>`;
                slide.columns.forEach(col => html += `<th>${col}</th>`);
                html += '</tr>';
                slide.rows.forEach(row => {
                    html += '<tr>';
                    slide.columns.forEach(col => html += `<td>${row[col]}</td>`);
                    html += '</tr>';
                });
                html += '</table>';
            } else if (slide.type === 'numbered') {
                html += `<h2>${slide.h2}</h2><ol style="text-align:left;display:inline-block;max-width:90%">`;
                slide.items.forEach(item => html += `<li style="margin:12px 0;font-size:clamp(16px,1.8vw,20px)">${item}</li>`);
                html += '</ol>';
            } else if (slide.type === 'faq') {
                html += `<h2>${slide.h2}</h2>`;
                slide.faqs.forEach(faq => {
                    html += `<div style="text-align:left;margin:12px auto;max-width:90%"><strong>${faq.q}</strong><p style="margin-top:8px">${faq.a}</p></div>`;
                });
            }

            html += '</div>';
            return html;
        }

        function updateSlides() {
            const container = document.getElementById('slides-container');
            let slides = CONTENT[currentLanguage]?.slides || CONTENT['en'].slides;
            
            container.innerHTML = slides.map(renderSlide).join('');
            const slideElements = document.querySelectorAll('.slide');
            slideElements.forEach((slide, index) => {
                if (index === currentSlideIndex) slide.classList.add('active');
                else slide.classList.remove('active');
            });

            document.getElementById('currentSlide').textContent = currentSlideIndex + 1;
            document.getElementById('totalSlides').textContent = slides.length;
            document.getElementById('header-title').textContent = CONTENT[currentLanguage]?.title || 'Local LLM Workstation Build 2026';
        }

        function changeSlide(direction) {
            const slides = CONTENT[currentLanguage]?.slides || CONTENT['en'].slides;
            currentSlideIndex = Math.max(0, Math.min(currentSlideIndex + direction, slides.length - 1));
            updateSlides();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') changeSlide(1);
            if (e.key === 'ArrowLeft') changeSlide(-1);
        });

        updateSlides();
    </script>
