          html = `<h2>${slide.h2}</h2>`;
          html += '<ol style="font-size: 1.1em; margin-top: 12px; max-width: 640px; text-align: left;">';
          slide.items.forEach(item => { html += `<li style="margin-bottom: 12px;">${item}</li>`; });
          html += '</ol>';
          html += footerHtml;
          break;

        case 'faq':
          html = `<h2>${slide.h2}</h2>`;
          slide.faqs.forEach(faq => {
            html += `<div style="margin-bottom: 16px; text-align: left; max-width: 640px;">
              <strong>Q: ${faq.q}</strong>
              <p style="margin-top: 6px; font-size: 0.95em;">A: ${faq.a}</p>
            </div>`;
          });
          html += footerHtml;
          break;

        case 'cta':
          html = `
            <h2>${slide.h2}</h2>
            <p style="max-width: 560px; margin-top: 16px;">${slide.body}</p>
            <a href="${slide.href}" style="display: inline-block; margin-top: 28px; padding: 14px 28px; background: #6750a4; color: white; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 1.1em;">${slide.cta}</a>
            ${footerHtml}
          `;
          break;
      }
      return `<div class="slide ${slide.type}" data-lang="${lang}">${html}</div>`;
    }

    // Init
    const params = new URLSearchParams(window.location.search);
    const lang = (params.get('lang') || 'en');
    const validLang = ['en','de','fr','ja','zh'].includes(lang) ? lang : 'en';
    const content = CONTENT[validLang] || CONTENT.en;

    // Update header
    document.getElementById('header-title').textContent = content.title;
    const backLink = document.getElementById('back-link');
    backLink.href = 'https://www.promptquorum.com/local-llms/llm-quantization-explained?lang=' + validLang;
    backLink.textContent = BACK_LABELS[validLang] || '← Article';

    // Render slides
    const container = document.getElementById('slides-container');
    content.slides.forEach(slide => {
      container.innerHTML += renderSlide(slide, validLang);
    });

    // Navigation
    let currentIdx = 0;
    const slides = document.querySelectorAll('.slide');
    const totalSlides = slides.length;
    document.getElementById('totalSlides').textContent = totalSlides;

    function showSlide(n) {
      if (n >= totalSlides) currentIdx = totalSlides - 1;
      else if (n < 0) currentIdx = 0;
      else currentIdx = n;

      slides.forEach(s => s.classList.remove('active'));
      slides[currentIdx].classList.add('active');
      document.getElementById('currentSlide').textContent = currentIdx + 1;
      document.getElementById('prevBtn').disabled = currentIdx === 0;
      document.getElementById('nextBtn').disabled = currentIdx === totalSlides - 1;
    }

    function changeSlide(n) {
      showSlide(currentIdx + n);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') changeSlide(-1);
      if (e.key === 'ArrowRight') changeSlide(1);
    });

    window.addEventListener('beforeprint', () => {
      slides.forEach(s => { s.style.display = 'flex'; });
    });
    window.addEventListener('afterprint', () => {
      slides.forEach(s => { s.style.removeProperty('display'); });
      showSlide(currentIdx);
    });

    showSlide(0);
    </script>
</body>
</html>
