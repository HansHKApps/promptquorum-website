    function renderSlide(slide) {
      let html = '';
      const articleUrl = 'https://www.promptquorum.com/local-llms/best-mini-pcs-local-llm?lang=' + lang;
      const footerLink = `<p style="position: absolute; bottom: 16px; right: 16px; font-size: 11px; color: #999;"><a href="${articleUrl}" target="_blank" rel="noopener" style="color: #999; text-decoration: none; border-bottom: 1px solid #ddd;">← Article</a></p>`;

      switch (slide.type) {
        case 'title':
          html = `<img src="/logo.svg" alt="PromptQuorum" class="logo" /><h1>${slide.h1}</h1><p>${slide.subtitle}</p><p style="margin-top: 40px; font-size: 18px; color: #79747e;"><a href="${slide.link}" target="_blank" rel="noopener" style="color: #79747e; text-decoration: none;">${slide.link.split('/').slice(-1)[0]}</a></p>${footerLink}`;
          break;
        case 'list':
          html = `<h2>${slide.h2}</h2>`;
          if (slide.intro) html += `<p>${slide.intro}</p>`;
          html += '<ul style="text-align: left;">';
          slide.items.forEach(item => html += `<li>${item}</li>`);
          html += '</ul>' + footerLink;
          break;
        case 'table':
          html = `<h2>${slide.h2}</h2><table><tr>`;
          slide.columns.forEach(col => html += `<th>${col}</th>`);
          html += '</tr>';
          slide.rows.forEach(row => {
            html += '<tr>';
            slide.columns.forEach(col => html += `<td>${row[col]}</td>`);
            html += '</tr>';
          });
          html += '</table>' + footerLink;
          break;
        case 'numbered':
          html = `<h2>${slide.h2}</h2><ol style="text-align: left;">`;
          slide.items.forEach(item => html += `<li>${item}</li>`);
          html += '</ol>' + footerLink;
          break;
      }

      return `<div class="slide ${slide.type}">${html}</div>`;
    }

    const params = new URLSearchParams(window.location.search);
    const lang = params.get('lang') || 'en';
    const content = CONTENT[lang] || CONTENT.en;

    document.getElementById('header-title').textContent = content.title;
    const backLink = document.getElementById('back-link');
    backLink.href = 'https://www.promptquorum.com/local-llms/best-mini-pcs-local-llm?lang=' + lang;

    const container = document.getElementById('slides-container');
    content.slides.forEach(slide => container.innerHTML += renderSlide(slide));

    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    const totalSlides = slides.length;
    document.getElementById('totalSlides').textContent = totalSlides;

    function showSlide(n) {
      if (n >= totalSlides) currentSlide = totalSlides - 1;
      else if (n < 0) currentSlide = 0;
      slides.forEach(s => s.classList.remove('active'));
      slides[currentSlide].classList.add('active');
      document.getElementById('currentSlide').textContent = currentSlide + 1;
      document.getElementById('prevBtn').disabled = currentSlide === 0;
      document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
    }

    function changeSlide(n) {
      currentSlide += n;
      showSlide(currentSlide);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') changeSlide(-1);
      if (e.key === 'ArrowRight') changeSlide(1);
    });

    window.addEventListener('beforeprint', () => {
      slides.forEach(s => s.style.display = 'flex');
    });
    window.addEventListener('afterprint', () => {
      slides.forEach(s => s.style.removeProperty('display'));
      showSlide(currentSlide);
    });

    showSlide(0);
  </script>
