    function renderSlide(slide) {
      const articleUrl = 'https://www.promptquorum.com/local-llms/best-local-llm-frontends?lang=' + lang;
      let html = '';
      const footerLink = `<p style="position: absolute; bottom: 16px; right: 16px; font-size: 11px; color: #999;"><a href="${articleUrl}" style="color: #999; text-decoration: none; border-bottom: 1px solid #ddd;">← Article</a></p>`;

      switch (slide.type) {
        case 'title':
          html = `
            <img src="/logo.svg" alt="PromptQuorum" class="logo" />
            <h1>${slide.h1}</h1>
            <p>${slide.subtitle}</p>
            <p style="margin-top: 40px; font-size: 18px; color: #79747e;">
              <a href="${slide.link}">${slide.link.replace('https://www.promptquorum.com/', '')}</a>
            </p>
            ${footerLink}
          `;
          break;

        case 'list':
          html = `<h2>${slide.h2}</h2>`;
          if (slide.intro) html += `<p>${slide.intro}</p>`;
          html += '<ul style="font-size: 1.1em; margin-top: 16px;">';
          slide.items.forEach(item => { html += `<li>${item}</li>`; });
          html += '</ul>';
          html += footerLink;
          break;

        case 'table':
          html = `<h2>${slide.h2}</h2><table><tr>`;
          slide.columns.forEach(col => { html += `<th>${col}</th>`; });
          html += '</tr>';
          slide.rows.forEach(row => {
            html += '<tr>';
            slide.columns.forEach(col => { html += `<td>${row[col] || ''}</td>`; });
            html += '</tr>';
          });
          html += '</table>';
          html += footerLink;
          break;

        case 'comparison':
          html = `
            <h2>${slide.h2}</h2>
            <p style="margin-top: 36px; font-size: 1.4em;">${slide.line1}</p>
            <p style="font-size: 1.4em; margin-top: 12px;">${slide.line2}</p>
            <p style="margin-top: 36px; font-size: 1.1em; color: #6750a4;">${slide.tip}</p>
            ${footerLink}
          `;
          break;

        case 'numbered':
          html = `<h2>${slide.h2}</h2><ol style="font-size: 1.1em; margin-top: 16px; text-align: left; max-width: 640px;">`;
          slide.items.forEach(item => { html += `<li style="margin-bottom: 10px;">${item}</li>`; });
          html += '</ol>';
          html += footerLink;
          break;

        case 'faq':
          html = `<h2>${slide.h2}</h2>`;
          slide.faqs.forEach(faq => {
            html += `<div style="margin-bottom: 16px; text-align: left; max-width: 640px;"><strong>Q: ${faq.q}</strong><p style="margin-top: 6px; font-size: 0.95em;">A: ${faq.a}</p></div>`;
          });
          html += footerLink;
          break;

        case 'cta':
          html = `
            <h2>${slide.h2}</h2>
            <p style="margin-top: 24px; max-width: 600px;">${slide.body}</p>
            <a href="${slide.href}" style="display: inline-block; margin-top: 28px; padding: 14px 28px; background: #6750a4; color: white; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 1.1em;">${slide.cta}</a>
            ${footerLink}
          `;
          break;
      }

      return `<div class="slide ${slide.type}">${html}</div>`;
    }

    const params = new URLSearchParams(window.location.search);
    const lang = params.get('lang') || 'en';
    const isPrint = params.get('print') === '1';
    const content = CONTENT[lang] || CONTENT.en;
    const articleUrl = 'https://www.promptquorum.com/local-llms/best-local-llm-frontends?lang=' + lang;

    document.getElementById('header-title').textContent = content.title;
    const backLink = document.getElementById('back-link');
    backLink.href = 'https://www.promptquorum.com/local-llms/best-local-llm-frontends?lang=' + lang;

    const container = document.getElementById('slides-container');
    content.slides.forEach(slide => {
      container.innerHTML += renderSlide(slide);
    });

    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    const totalSlides = slides.length;
    document.getElementById('totalSlides').textContent = totalSlides;

    function showSlide(n) {
      if (n >= totalSlides) currentSlide = totalSlides - 1;
      else if (n < 0) currentSlide = 0;
      else currentSlide = n;
      slides.forEach(s => s.classList.remove('active'));
      slides[currentSlide].classList.add('active');
      document.getElementById('currentSlide').textContent = currentSlide + 1;
      document.getElementById('prevBtn').disabled = currentSlide === 0;
      document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
    }

    function changeSlide(n) { showSlide(currentSlide + n); }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') changeSlide(-1);
      if (e.key === 'ArrowRight') changeSlide(1);
    });

    window.addEventListener('beforeprint', () => {
      slides.forEach(s => { s.style.display = 'flex'; });
    });
    window.addEventListener('afterprint', () => {
      slides.forEach(s => { s.style.removeProperty('display'); });
      showSlide(currentSlide);
    });

    if (isPrint) {
      window.addEventListener('load', () => { window.print(); });
    }

    showSlide(0);
    </script>
