        function renderSlide(slide, lang) {
            const articleUrl = ARTICLE_BASE + (lang !== 'en' ? '?lang=' + lang : '');
            const footerLink = '<p style="position: absolute; bottom: 16px; right: 16px; font-size: 11px; color: #999;"><a href="' + articleUrl + '" target="_blank" rel="noopener" style="color: #999; text-decoration: none; border-bottom: 1px solid #ddd;">← Article</a></p>';
            let html = '';

            switch (slide.type) {
                case 'title':
                    html = '<img src="/logo.svg" alt="PromptQuorum" class="logo" /><h1>' + slide.h1 + '</h1><p>' + slide.subtitle + '</p><p style="margin-top: 32px; font-size: 18px; color: #79747e;"><a href="' + slide.link + '" target="_blank" rel="noopener">' + slide.link + '</a></p>' + footerLink;
                    break;

                case 'list':
                    html = '<h2>' + slide.h2 + '</h2>';
                    if (slide.intro) html += '<p style="max-width:640px;">' + slide.intro + '</p>';
                    html += '<ul style="font-size: 1em; margin-top: 16px;">';
                    slide.items.forEach(function(item) { html += '<li>' + item + '</li>'; });
                    html += '</ul>';
                    html += footerLink;
                    break;

                case 'table':
                    html = '<h2>' + slide.h2 + '</h2>';
                    html += '<table><tr>';
                    slide.columns.forEach(function(col) { html += '<th>' + col + '</th>'; });
                    html += '</tr>';
                    slide.rows.forEach(function(row) {
                        html += '<tr>';
                        slide.columns.forEach(function(col) { html += '<td>' + (row[col] || '') + '</td>'; });
                        html += '</tr>';
                    });
                    html += '</table>';
                    html += footerLink;
                    break;

                case 'comparison':
                    html = '<h2>' + slide.h2 + '</h2><p style="margin-top: 36px; font-size: 1.4em;">' + slide.line1 + '</p><p style="font-size: 1.4em;">' + slide.line2 + '</p><p style="margin-top: 36px; font-size: 1.1em; color: #6750a4; max-width: 600px;">' + slide.tip + '</p>' + footerLink;
                    break;

                case 'numbered':
                    html = '<h2>' + slide.h2 + '</h2>';
                    html += '<ol style="font-size: 1em; margin-top: 16px; max-width: 640px;">';
                    slide.items.forEach(function(item) { html += '<li style="margin-bottom:10px;">' + item + '</li>'; });
                    html += '</ol>';
                    html += footerLink;
                    break;

                case 'faq':
                    html = '<h2>' + slide.h2 + '</h2>';
                    slide.faqs.forEach(function(faq) {
                        html += '<div style="margin-bottom: 16px; text-align: left; max-width: 660px;"><strong>Q: ' + faq.q + '</strong><p style="margin-top: 6px; font-size: 0.9em;">A: ' + faq.a + '</p></div>';
                    });
                    html += footerLink;
                    break;

                case 'cta':
                    html = '<h2>' + slide.h2 + '</h2><p style="max-width: 560px;">' + slide.body + '</p><a href="' + slide.href + '" target="_blank" rel="noopener" style="display: inline-block; margin-top: 28px; padding: 14px 28px; background: #6750a4; color: white; border-radius: 8px; text-decoration: none; font-size: 1.1em; font-weight: 600;">' + slide.cta + '</a>' + footerLink;
                    break;
            }

            return '<div class="slide ' + slide.type + '" style="position:relative;">' + html + '</div>';
        }

        // Language detection
        var params = new URLSearchParams(window.location.search);
        var lang = (['en','de','fr','ja','zh'].indexOf(params.get('lang')) !== -1) ? params.get('lang') : 'en';
        var isPrint = params.get('print') === '1';
        var content = CONTENT[lang] || CONTENT.en;

        // Update header
        document.getElementById('header-title').textContent = content.title;
        var backLink = document.getElementById('back-link');
        backLink.textContent = content.backLabel;
        if (lang !== 'en') backLink.href = ARTICLE_BASE + '?lang=' + lang;

        // Render all slides
        var container = document.getElementById('slides-container');
        content.slides.forEach(function(slide) {
            container.innerHTML += renderSlide(slide, lang);
        });

        // Navigation
        var currentSlide = 0;
        var slides = document.querySelectorAll('.slide');
        var totalSlides = slides.length;
        document.getElementById('totalSlides').textContent = totalSlides;

        function showSlide(n) {
            if (n >= totalSlides) currentSlide = totalSlides - 1;
            else if (n < 0) currentSlide = 0;
            else currentSlide = n;
            slides.forEach(function(slide) { slide.classList.remove('active'); });
            slides[currentSlide].classList.add('active');
            document.getElementById('currentSlide').textContent = currentSlide + 1;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
        }

        function changeSlide(n) {
            showSlide(currentSlide + n);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight') changeSlide(1);
        });

        window.addEventListener('beforeprint', function() {
            slides.forEach(function(slide) { slide.style.display = 'flex'; });
        });
        window.addEventListener('afterprint', function() {
            slides.forEach(function(slide) { slide.style.removeProperty('display'); });
            showSlide(currentSlide);
        });

        if (isPrint) {
            window.addEventListener('load', function() { window.print(); });
        }

        showSlide(0);
    </script>
