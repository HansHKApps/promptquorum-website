        function renderSlide(slide, lang) {
            const articleUrl = 'https://www.promptquorum.com/local-llms/troubleshooting-local-llm-setup?lang=' + lang;
            const footerHtml = `<div class="slide-footer"><a href="${articleUrl}">← Article</a></div>`;
            let html = '';

            switch (slide.type) {
                case 'title':
                    html = `
                        <img src="/logo.svg" alt="PromptQuorum" class="logo" style="width:56px;height:56px;margin-bottom:20px;" />
                        <h1 style="white-space:pre-line;">${slide.h1}</h1>
                        <p>${slide.subtitle}</p>
                        <p style="margin-top:32px;font-size:16px;">
                            <a href="${slide.link}">${slide.link}</a>
                        </p>
                    `;
                    break;

                case 'list':
                    html = `<h2>${slide.h2}</h2>`;
                    if (slide.intro) html += `<p style="margin-bottom:8px;">${slide.intro}</p>`;
                    html += '<ul style="font-size:clamp(13px,1.4vw,16px);">';
                    slide.items.forEach(item => {
                        html += `<li>${item}</li>`;
                    });
                    html += '</ul>';
                    html += footerHtml;
                    break;

                case 'table':
                    html = `<h2>${slide.h2}</h2>`;
                    html += '<table><tr>';
                    slide.columns.forEach(col => { html += `<th>${col}</th>`; });
                    html += '</tr>';
                    slide.rows.forEach(row => {
                        html += '<tr>';
                        slide.columns.forEach(col => { html += `<td>${row[col]}</td>`; });
                        html += '</tr>';
                    });
                    html += '</table>';
                    html += footerHtml;
                    break;

                case 'comparison':
                    html = `
                        <h2>${slide.h2}</h2>
                        <p style="margin-top:40px;font-size:1.5em;">${slide.line1}</p>
                        <p style="font-size:1.5em;">${slide.line2}</p>
                        <p style="margin-top:40px;font-size:1.1em;color:#6750a4;">${slide.tip}</p>
                        ${footerHtml}
                    `;
                    break;

                case 'numbered':
                    html = `<h2>${slide.h2}</h2>`;
                    html += '<ol style="font-size:clamp(13px,1.4vw,16px);max-width:680px;width:100%;text-align:left;margin:12px auto;">';
                    slide.items.forEach(item => { html += `<li style="margin-bottom:10px;">${item}</li>`; });
                    html += '</ol>';
                    html += footerHtml;
                    break;

                case 'faq':
                    html = `<h2>${slide.h2}</h2>`;
                    slide.faqs.forEach(faq => {
                        html += `<div style="margin-bottom:16px;text-align:left;max-width:680px;width:100%;margin-left:auto;margin-right:auto;">
                            <strong style="font-size:clamp(13px,1.3vw,15px);">Q: ${faq.q}</strong>
                            <p style="margin-top:4px;font-size:clamp(12px,1.2vw,14px);color:#49454f;">A: ${faq.a}</p>
                        </div>`;
                    });
                    html += footerHtml;
                    break;

                case 'cta':
                    html = `
                        <h2>${slide.h2}</h2>
                        <p style="margin-top:20px;max-width:560px;">${slide.body}</p>
                        <a href="${slide.href}" style="display:inline-block;margin-top:28px;padding:14px 28px;background:#6750a4;color:white;border-radius:8px;text-decoration:none;font-weight:700;font-size:18px;">${slide.cta}</a>
                        ${footerHtml}
                    `;
                    break;
            }

            return `<div class="slide ${slide.type}">${html}</div>`;
        }

        const params = new URLSearchParams(window.location.search);
        const lang = params.get('lang') || 'en';
        const isPrint = params.get('print') === '1';
        const content = CONTENT[lang] || CONTENT.en;

        document.getElementById('header-title').textContent = content.title;
        const backLink = document.getElementById('back-link');
        backLink.href = 'https://www.promptquorum.com/local-llms/troubleshooting-local-llm-setup?lang=' + lang;

        const container = document.getElementById('slides-container');
        content.slides.forEach(slide => {
            container.innerHTML += renderSlide(slide, lang);
        });

        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;
        document.getElementById('totalSlides').textContent = totalSlides;

        function showSlide(n) {
            if (n >= totalSlides) currentSlide = totalSlides - 1;
            else if (n < 0) currentSlide = 0;
            slides.forEach(slide => slide.classList.remove('active'));
            slides[currentSlide].classList.add('active');
            document.getElementById('currentSlide').textContent = currentSlide + 1;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
        }

        function changeSlide(n) {
            currentSlide += n;
            showSlide(currentSlide);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight') changeSlide(1);
        });

        window.addEventListener('beforeprint', () => {
            slides.forEach(slide => { slide.style.display = 'flex'; });
        });
        window.addEventListener('afterprint', () => {
            slides.forEach(slide => { slide.style.removeProperty('display'); });
            showSlide(currentSlide);
        });

        if (isPrint) {
            window.addEventListener('load', () => { window.print(); });
        }

        showSlide(0);
    </script>
