        function renderSlide(slide) {
            let html = '';

            switch (slide.type) {
                case 'title':
                    html = `
                        <img src="/logo.svg" alt="PromptQuorum" class="logo" />
                        <h1>${slide.h1}</h1>
                        <p>${slide.subtitle}</p>
                        <p style="margin-top: 40px; font-size: 18px; color: #79747e;">
                            <a href="${slide.link}">${slide.link.split('/').pop().replace(/-/g, ' ')}</a>
                        </p>
                    `;
                    break;

                case 'list':
                    html = `<h2>${slide.h2}</h2>`;
                    if (slide.intro) html += `<p>${slide.intro}</p>`;
                    html += '<ul style="font-size: 1.1em; margin-top: 20px;">';
                    slide.items.forEach(item => {
                        html += `<li>${item}</li>`;
                    });
                    html += '</ul>';
                    break;

                case 'table':
                    html = `<h2>${slide.h2}</h2>`;
                    html += '<table><tr>';
                    slide.columns.forEach(col => {
                        html += `<th>${col}</th>`;
                    });
                    html += '</tr>';
                    slide.rows.forEach(row => {
                        html += '<tr>';
                        slide.columns.forEach(col => {
                            html += `<td>${row[col]}</td>`;
                        });
                        html += '</tr>';
                    });
                    html += '</table>';
                    break;

                case 'comparison':
                    html = `
                        <h2>${slide.h2}</h2>
                        <p style="margin-top: 40px; font-size: 1.4em;">${slide.line1}</p>
                        <p style="font-size: 1.4em;">${slide.line2}</p>
                        <p style="margin-top: 40px; font-size: 1.05em; color: #6750a4;">${slide.tip}</p>
                    `;
                    break;

                case 'faq':
                    html = `<h2>${slide.h2}</h2>`;
                    slide.faqs.forEach(faq => {
                        html += `
                            <p style="margin-top: 20px; text-align: left; max-width: 700px; margin-left: auto; margin-right: auto;">
                                <strong>Q: ${faq.q}</strong><br/>
                                A: ${faq.a}
                            </p>
                        `;
                    });
                    break;

                case 'cta':
                    html = `
                        <h2 style="color: #6750a4;">${slide.h2}</h2>
                        <p style="margin-top: 30px; font-size: 1.1em;">${slide.body}</p>
                        <p style="margin-top: 40px;">
                            <a href="${slide.href}" style="display: inline-block; padding: 16px 40px; background: #6750a4; color: white; text-decoration: none; border-radius: 8px; font-size: 18px; font-weight: 700; transition: background 0.2s;">
                                ${slide.cta}
                            </a>
                        </p>
                    `;
                    break;
            }

            return `<div class="slide ${slide.type}" data-lang="${lang}">${html}</div>`;
        }

        const params = new URLSearchParams(window.location.search);
        const lang = params.get('lang') || 'en';
        const isPrint = params.get('print') === '1';
        const content = CONTENT[lang] || CONTENT.en;

        document.getElementById('header-title').textContent = content.title;
        const backLink = document.getElementById('back-link');
        backLink.href += `?lang=${lang}`;

        const container = document.getElementById('slides-container');
        content.slides.forEach(slide => {
            container.innerHTML += renderSlide(slide);
        });

        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;
        document.getElementById('totalSlides').textContent = totalSlides;

        function showSlide(n) {
            if (n >= totalSlides) currentSlide = totalSlides - 1;
            else if (n < 0) currentSlide = 0;

            slides.forEach(slide => slide.classList.remove('active'));
            slides[currentSlide].classList.add('active');

            document.getElementById('currentSlide').textContent = currentSlide + 1;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
        }

        function changeSlide(n) {
            currentSlide += n;
            showSlide(currentSlide);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight') changeSlide(1);
        });

        window.addEventListener('beforeprint', () => {
            slides.forEach(slide => { slide.style.display = 'flex'; });
        });
        window.addEventListener('afterprint', () => {
            slides.forEach(slide => { slide.style.removeProperty('display'); });
            showSlide(currentSlide);
        });

        if (isPrint) {
            window.addEventListener('load', () => {
                window.print();
            });
        }

        showSlide(0);
    </script>
