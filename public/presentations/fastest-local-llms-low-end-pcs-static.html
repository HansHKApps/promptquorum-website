    function renderSlide(slide, lang) {
      let html = '';
      const articleUrl = BASE + '?lang=' + lang;
      const footerLink = '<p style="position:absolute;bottom:16px;right:16px;font-size:11px;color:#999;"><a href="' + articleUrl + '" target="_blank" rel="noopener" style="color:#999;text-decoration:none;border-bottom:1px solid #ddd;">← Article</a></p>';

      switch (slide.type) {
        case 'title':
          html = '<img src="/logo.svg" alt="PromptQuorum" class="logo" />'
            + '<h1>' + slide.h1 + '</h1>'
            + '<p>' + slide.subtitle + '</p>'
            + '<p style="margin-top:32px;font-size:16px;color:#79747e;"><a href="' + slide.link + '" target="_blank" rel="noopener">promptquorum.com/local-llms/' + SLUG + '</a></p>'
            + footerLink;
          break;

        case 'list':
          html = '<h2>' + slide.h2 + '</h2>';
          if (slide.intro) html += '<p style="margin-bottom:8px;">' + slide.intro + '</p>';
          html += '<ul style="font-size:clamp(13px,1.4vw,17px);margin-top:8px;">';
          slide.items.forEach(function(item) { html += '<li>' + item + '</li>'; });
          html += '</ul>' + footerLink;
          break;

        case 'table':
          html = '<h2>' + slide.h2 + '</h2><table style="margin-top:12px;"><tr>';
          slide.columns.forEach(function(col) { html += '<th>' + col + '</th>'; });
          html += '</tr>';
          slide.rows.forEach(function(row) {
            html += '<tr>';
            slide.columns.forEach(function(col) { html += '<td>' + row[col] + '</td>'; });
            html += '</tr>';
          });
          html += '</table>' + footerLink;
          break;

        case 'comparison':
          html = '<h2>' + slide.h2 + '</h2>'
            + '<p style="margin-top:36px;font-size:clamp(18px,2.2vw,26px);font-weight:600;">' + slide.line1 + '</p>'
            + '<p style="font-size:clamp(18px,2.2vw,26px);font-weight:600;margin-top:16px;">' + slide.line2 + '</p>'
            + '<p style="margin-top:32px;font-size:clamp(14px,1.6vw,18px);color:#6750a4;">' + slide.tip + '</p>'
            + footerLink;
          break;

        case 'numbered':
          html = '<h2>' + slide.h2 + '</h2>'
            + '<ol style="font-size:clamp(13px,1.4vw,17px);margin-top:12px;text-align:left;max-width:640px;margin-left:auto;margin-right:auto;">';
          slide.items.forEach(function(item) { html += '<li style="margin-bottom:10px;">' + item + '</li>'; });
          html += '</ol>' + footerLink;
          break;

        case 'faq':
          html = '<h2>' + slide.h2 + '</h2>';
          slide.faqs.forEach(function(faq) {
            html += '<div style="margin-bottom:16px;text-align:left;max-width:680px;margin-left:auto;margin-right:auto;">'
              + '<strong style="font-size:clamp(13px,1.4vw,16px);">Q: ' + faq.q + '</strong>'
              + '<p style="margin-top:6px;font-size:clamp(12px,1.3vw,15px);">A: ' + faq.a + '</p>'
              + '</div>';
          });
          html += footerLink;
          break;

        case 'cta':
          html = '<h2>' + slide.h2 + '</h2>'
            + '<p style="max-width:600px;margin:16px auto;">' + slide.body + '</p>'
            + '<a href="' + slide.href + '" target="_blank" rel="noopener" style="display:inline-block;margin-top:24px;padding:14px 28px;background:#6750a4;color:white;border-radius:8px;text-decoration:none;font-weight:700;font-size:16px;">' + slide.cta + '</a>'
            + footerLink;
          break;
      }
      return '<div class="slide ' + slide.type + '">' + html + '</div>';
    }

    const params = new URLSearchParams(window.location.search);
    const lang = params.get('lang') || 'en';
    const isPrint = params.get('print') === '1';
    const content = CONTENT[lang] || CONTENT.en;

    document.getElementById('header-title').textContent = content.title;
    const backLink = document.getElementById('back-link');
    backLink.href = BASE + '?lang=' + lang;
    backLink.textContent = content.back || '← Back to Article';

    const container = document.getElementById('slides-container');
    content.slides.forEach(function(slide) {
      container.innerHTML += renderSlide(slide, lang);
    });

    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    const totalSlides = slides.length;
    document.getElementById('totalSlides').textContent = totalSlides;

    function showSlide(n) {
      if (n >= totalSlides) currentSlide = totalSlides - 1;
      else if (n < 0) currentSlide = 0;
      else currentSlide = n;
      slides.forEach(function(s) { s.classList.remove('active'); });
      slides[currentSlide].classList.add('active');
      document.getElementById('currentSlide').textContent = currentSlide + 1;
      document.getElementById('prevBtn').disabled = currentSlide === 0;
      document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
    }

    function changeSlide(n) { showSlide(currentSlide + n); }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowLeft') changeSlide(-1);
      if (e.key === 'ArrowRight') changeSlide(1);
    });

    window.addEventListener('beforeprint', function() {
      slides.forEach(function(s) { s.style.display = 'flex'; });
    });
    window.addEventListener('afterprint', function() {
      slides.forEach(function(s) { s.style.removeProperty('display'); });
      showSlide(currentSlide);
    });

    if (isPrint) { window.addEventListener('load', function() { window.print(); }); }

    showSlide(0);
    </script>
</body>
</html>
