function renderFooter(lang, slideType) {
  if (slideType === 'title') return '';
  const articleUrl = 'https://www.promptquorum.com/local-llms/local-llms-vs-cloud-apis?lang=' + lang;
  return '<div class="slide-footer"><a href="' + articleUrl + '">← Article</a></div>';
}

function renderSlide(slide, lang) {
  let html = '';
  switch (slide.type) {
    case 'title':
      html = '<img src="/logo.svg" alt="PromptQuorum" class="logo" /><h1>' + slide.h1 + '</h1><p>' + slide.subtitle + '</p><p style="margin-top:32px;font-size:16px;"><a href="' + slide.link + '">' + slide.link + '</a></p>';
      break;
    case 'list':
      html = '<h2>' + slide.h2 + '</h2>';
      if (slide.intro) html += '<p>' + slide.intro + '</p>';
      html += '<ul style="margin-top:14px;">';
      slide.items.forEach(function(item) { html += '<li>' + item + '</li>'; });
      html += '</ul>';
      html += renderFooter(lang, slide.type);
      break;
    case 'table':
      html = '<h2>' + slide.h2 + '</h2><table style="margin-top:12px;">';
      html += '<tr>' + slide.columns.map(function(c){return '<th>'+c+'</th>';}).join('') + '</tr>';
      slide.rows.forEach(function(row) {
        html += '<tr>' + slide.columns.map(function(c){return '<td>'+row[c]+'</td>';}).join('') + '</tr>';
      });
      html += '</table>' + renderFooter(lang, slide.type);
      break;
    case 'comparison':
      html = '<h2>' + slide.h2 + '</h2>' +
        '<p style="margin-top:32px;font-size:clamp(16px,1.7vw,20px);color:#1c1b1f;">' + slide.line1 + '</p>' +
        '<p style="margin-top:16px;font-size:clamp(16px,1.7vw,20px);color:#1c1b1f;">' + slide.line2 + '</p>' +
        '<p style="margin-top:28px;font-size:clamp(13px,1.4vw,16px);color:#6750a4;">' + slide.tip + '</p>' +
        renderFooter(lang, slide.type);
      break;
    case 'numbered':
      html = '<h2>' + slide.h2 + '</h2><ol style="margin-top:14px;">';
      slide.items.forEach(function(item) { html += '<li>' + item + '</li>'; });
      html += '</ol>' + renderFooter(lang, slide.type);
      break;
    case 'faq':
      html = '<h2>' + slide.h2 + '</h2>';
      slide.faqs.forEach(function(faq) {
        html += '<div style="margin-bottom:14px;text-align:left;max-width:680px;"><strong>Q: ' + faq.q + '</strong><p style="margin-top:4px;font-size:clamp(13px,1.3vw,16px);">A: ' + faq.a + '</p></div>';
      });
      html += renderFooter(lang, slide.type);
      break;
    case 'cta':
      html = '<h2>' + slide.h2 + '</h2><p style="max-width:580px;margin-top:16px;">' + slide.body + '</p>' +
        '<a href="' + slide.href + '" style="display:inline-block;margin-top:28px;padding:14px 28px;background:#6750a4;color:white;border-radius:8px;text-decoration:none;font-weight:700;font-size:clamp(14px,1.5vw,18px);">' + slide.cta + '</a>';
      break;
  }
  return '<div class="slide ' + slide.type + '" data-lang="' + lang + '">' + html + '</div>';
}

const params = new URLSearchParams(window.location.search);
const lang = params.get('lang') || 'en';
const content = CONTENT[lang] || CONTENT.en;

document.getElementById('header-title').textContent = content.title;
const backLink = document.getElementById('back-link');
backLink.href = 'https://www.promptquorum.com/local-llms/local-llms-vs-cloud-apis?lang=' + lang;

const container = document.getElementById('slides-container');
content.slides.forEach(function(slide) {
  container.innerHTML += renderSlide(slide, lang);
});

document.getElementById('totalSlides').textContent = content.slides.length;

let currentSlide = 0;
const slides = document.querySelectorAll('.slide');

function showSlide(n) {
  if (n >= slides.length) currentSlide = slides.length - 1;
  else if (n < 0) currentSlide = 0;
  else currentSlide = n;
  slides.forEach(function(s) { s.classList.remove('active'); });
  slides[currentSlide].classList.add('active');
  document.getElementById('currentSlide').textContent = currentSlide + 1;
  document.getElementById('prevBtn').disabled = currentSlide === 0;
  document.getElementById('nextBtn').disabled = currentSlide === slides.length - 1;
}

function changeSlide(n) { showSlide(currentSlide + n); }

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') changeSlide(-1);
  if (e.key === 'ArrowRight') changeSlide(1);
});

window.addEventListener('beforeprint', function() {
  slides.forEach(function(s) { s.style.display = 'flex'; });
});
window.addEventListener('afterprint', function() {
  slides.forEach(function(s) { s.style.removeProperty('display'); });
  showSlide(currentSlide);
});

showSlide(0);
</script>
