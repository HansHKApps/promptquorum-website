                                a: '否。微调调整风格和指令遵循，但保留所有 8 个结构性限制。'
                            },
                        ]
                    },
                    {
                        type: 'list',
                        h2: '地区背景：按位置划分的限制',
                        intro: '',
                        items: [
                            '<strong>欧盟：</strong> GDPR 适用 — 需要数据驻留和偏差审计',
                            '<strong>中国：</strong> 内容限制 — 模型无法讨论某些话题',
                            '<strong>日本：</strong> METI 治理 — 受管制用途需要可追溯性和文件',
                            '所有地区都面临相同的 8 个结构性限制；合规增加运营约束。'
                        ]
                    },
                    {
                        type: 'cta',
                        h2: '围绕限制的提示工程',
                        body: '使用 PromptQuorum 测试提示、比较模型和优化解决方案。',
                        cta: '免费尝试',
                        href: 'https://www.promptquorum.com'
                    }
                ]
            }
        };

        function renderSlide(slide) {
            let html = '';
            const articleUrl = 'https://www.promptquorum.com/prompt-engineering/ai-limitations-what-llms-cant-do?lang=' + lang;
            const footerLink = `<p style="position: absolute; bottom: 16px; right: 16px; font-size: 11px; color: #999;"><a href="${articleUrl}" style="color: #999; text-decoration: none; border-bottom: 1px solid #ddd;">← Article</a></p><a href="${articleUrl}" class="slide-print-url">${articleUrl}</a>`;
            
            switch (slide.type) {
                case 'title':
                    html = `<img src="/logo.svg" alt="PromptQuorum" class="logo" style="width: 56px; height: 56px; margin-bottom: 20px;" />
                        <h1>${slide.h1}</h1>
                        <p style="margin-top: 12px; color: #6750a4; font-weight: 500;">${slide.subtitle}</p>
                        <p style="margin-top: 40px; font-size: 18px; color: #79747e;"><a href="${slide.link}" style="color: #6750a4; text-decoration: none; border-bottom: 2px solid #6750a4;">${slide.link.split('/').pop().replace(/-/g, ' ')}</a></p>
                        ${footerLink}`;
                    break;
                case 'list':
                    html = `<h2>${slide.h2}</h2>`;
                    if (slide.intro) html += `<p>${slide.intro}</p>`;
                    html += '<ul style="font-size: 1.1em; margin-top: 20px; max-width: 700px;">';
                    slide.items.forEach(item => {
                        html += `<li>${item}</li>`;
                    });
                    html += '</ul>' + footerLink;
                    break;
                case 'table':
                    html = `<h2>${slide.h2}</h2><table style="margin-top: 20px;"><tr>`;
                    slide.columns.forEach(col => {
                        html += `<th>${col}</th>`;
                    });
                    html += '</tr>';
                    slide.rows.forEach(row => {
                        html += '<tr>';
                        slide.columns.forEach(col => {
                            html += `<td>${row[col] || ''}</td>`;
                        });
                        html += '</tr>';
                    });
                    html += '</table>' + footerLink;
                    break;
                case 'comparison':
                    html = `<h2>${slide.h2}</h2><p style="margin-top: 40px; font-size: 1.4em;">${slide.line1}</p>
                        <p style="font-size: 1.4em;">${slide.line2}</p>
                        <p style="margin-top: 40px; font-size: 1.1em; color: #6750a4;">${slide.tip}</p>
                        ${footerLink}`;
                    break;
                case 'faq':
                    html = `<h2>${slide.h2}</h2>`;
                    slide.faqs.forEach(faq => {
                        html += `<div style="margin-bottom: 20px; text-align: left; max-width: 700px;"><strong>Q: ${faq.q}</strong><p style="margin-top: 8px;">A: ${faq.a}</p></div>`;
                    });
                    html += footerLink;
                    break;
                case 'cta':
                    html = `<h2>${slide.h2}</h2><p>${slide.body}</p>
                        <a href="${slide.href}" style="display: inline-block; margin-top: 20px; padding: 12px 24px; background: #6750a4; color: white; border-radius: 6px; text-decoration: none;">${slide.cta}</a>
                        ${footerLink}`;
                    break;
            }
            return `<div class="slide ${slide.type}" data-lang="${lang}">${html}</div>`;
        }

        const params = new URLSearchParams(window.location.search);
        const lang = params.get('lang') || 'en';
        const content = CONTENT[lang] || CONTENT.en;

        document.getElementById('header-title').textContent = content.title;
        const backLink = document.getElementById('back-link');
        backLink.href += `?lang=${lang}`;

        const container = document.getElementById('slides-container');
        content.slides.forEach(slide => {
            container.innerHTML += renderSlide(slide);
        });

        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;
        document.getElementById('totalSlides').textContent = totalSlides;

        function showSlide(n) {
            if (n >= totalSlides) currentSlide = totalSlides - 1;
            else if (n < 0) currentSlide = 0;

            slides.forEach(slide => slide.classList.remove('active'));
            slides[currentSlide].classList.add('active');

            document.getElementById('currentSlide').textContent = currentSlide + 1;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
        }

        function changeSlide(n) {
            currentSlide += n;
            showSlide(currentSlide);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight') changeSlide(1);
        });

        window.addEventListener('beforeprint', () => {
            slides.forEach(slide => { slide.style.display = 'flex'; });
        });
        window.addEventListener('afterprint', () => {
            slides.forEach(slide => { slide.style.removeProperty('display'); });
            showSlide(currentSlide);
        });

        if (params.get('print') === '1') {
            window.addEventListener('load', () => {
                window.print();
            });
        }

        showSlide(0);
    </script>
</body>
</html>
