                            '<strong>中国：</strong>Qwen2.5（阿里巴巴）将敏感文档完全保留在本地——符合《数据安全法》。',
                            '<strong>日本：</strong>日文文档消耗英文的1.5–2倍标记。Qwen2.5原生分词器节省30–40% RAM。',
                            '德国BSI推荐配置：7B Q4_K_M + 32K上下文（约9–10 GB）用于文档处理。',
                        ]
                    },
                    {
                        type: 'numbered',
                        h2: '常见错误',
                        items: [
                            '<strong>假设128K = 可靠：</strong>7B模型在32K以上质量下降——将长文档分成16K–32K节段处理。',
                            '<strong>未设置num_ctx：</strong>Ollama默认2048标记。在Modelfile中添加PARAMETER num_ctx 32768。',
                            '<strong>128K时RAM不足：</strong>7B模型128K需要14+ GB。总计8 GB时，上下文限制为32K。',
                        ]
                    },
                    {
                        type: 'faq',
                        h2: '常见问题',
                        faqs: [
                            {
                                q: '我可以用本地LLM总结整本书吗？',
                                a: '300页书约120K–160K标记——超出7B模型可靠范围。使用70B模型（64K可靠）或分成20K词章节处理。'
                            },
                            {
                                q: '什么是KV缓存，为什么RAM会增长？',
                                a: 'KV缓存存储所有已处理标记的注意力状态。32K上下文需要4K的8倍KV缓存内存——模型权重保持不变。'
                            },
                            {
                                q: '文档问答用长上下文还是RAG？',
                                a: 'RAG通常更高效：检索3–5个块（4K–8K合计），避免"中间迷失"问题。仅当需要理解整个文档结构时才使用长上下文。'
                            }
                        ]
                    },
                    {
                        type: 'cta',
                        h2: '免费试用PromptQuorum',
                        body: '并排比较本地LLM与云端API输出。在Llama、Qwen和Mistral上测试长上下文任务——一个工具搞定。',
                        cta: '免费开始',
                        href: 'https://www.promptquorum.com'
                    }
                ]
            }
        };

        function renderSlide(slide, lang) {
            let html = '';
            const articleUrl = 'https://www.promptquorum.com/local-llms/long-context-local-llms?lang=' + lang;
            const footerLink = `<p style="position: absolute; bottom: 16px; right: 16px; font-size: 11px; color: #999;"><a href="${articleUrl}" style="color: #999; text-decoration: none; border-bottom: 1px solid #ddd;">← Article</a></p>`;

            switch (slide.type) {
                case 'title':
                    html = `
                        <img src="/logo.svg" alt="PromptQuorum" class="logo" />
                        <h1>${slide.h1}</h1>
                        <p>${slide.subtitle}</p>
                        <p style="margin-top: 32px; font-size: 16px; color: #79747e;">
                            <a href="${slide.link}" style="color:#6750a4; text-decoration:none; border-bottom: 1px solid #6750a4;">${slide.link.replace('https://www.promptquorum.com/', '')}</a>
                        </p>
                        ${footerLink}
                    `;
                    break;

                case 'list':
                    html = `<h2>${slide.h2}</h2>`;
                    if (slide.intro) html += `<p style="margin-top:8px; margin-bottom:4px; font-size:clamp(14px,1.5vw,17px);">${slide.intro}</p>`;
                    html += '<ul style="margin-top: 16px;">';
                    slide.items.forEach(item => { html += `<li>${item}</li>`; });
                    html += '</ul>';
                    html += footerLink;
                    break;

                case 'table':
                    html = `<h2>${slide.h2}</h2>`;
                    html += '<table style="margin-top:16px;"><tr>';
                    slide.columns.forEach(col => { html += `<th>${col}</th>`; });
                    html += '</tr>';
                    slide.rows.forEach(row => {
                        html += '<tr>';
                        slide.columns.forEach(col => { html += `<td>${row[col]}</td>`; });
                        html += '</tr>';
                    });
                    html += '</table>';
                    html += footerLink;
                    break;

                case 'comparison':
                    html = `
                        <h2 style="font-size:clamp(28px,3.2vw,40px);">${slide.h2}</h2>
                        <p style="margin-top: 36px; font-size: clamp(18px,2.2vw,26px); color: #49454f;">${slide.line1}</p>
                        <p style="font-size: clamp(18px,2.2vw,26px); color: #49454f; margin-top:12px;">${slide.line2}</p>
                        <p style="margin-top: 36px; font-size: clamp(14px,1.6vw,18px); color: #6750a4; max-width:580px;">${slide.tip}</p>
                        ${footerLink}
                    `;
                    break;

                case 'numbered':
                    html = `<h2>${slide.h2}</h2>`;
                    html += '<ol style="margin-top: 16px;">';
                    slide.items.forEach(item => { html += `<li>${item}</li>`; });
                    html += '</ol>';
                    html += footerLink;
                    break;

                case 'faq':
                    html = `<h2>${slide.h2}</h2>`;
                    slide.faqs.forEach(faq => {
                        html += `<div style="margin-bottom: 16px; text-align: left; max-width: 640px;">
                            <strong style="font-size:clamp(13px,1.4vw,16px);">Q: ${faq.q}</strong>
                            <p style="margin-top: 6px; font-size:clamp(12px,1.3vw,15px); color:#49454f;">A: ${faq.a}</p>
                        </div>`;
                    });
                    html += footerLink;
                    break;

                case 'cta':
                    html = `
                        <h2 style="font-size:clamp(30px,3.5vw,44px);">${slide.h2}</h2>
                        <p style="margin-top: 20px; max-width: 560px;">${slide.body}</p>
                        <a href="${slide.href}" style="display: inline-block; margin-top: 28px; padding: 14px 28px; background: #6750a4; color: white; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 18px;">${slide.cta}</a>
                        ${footerLink}
                    `;
                    break;
            }

            return `<div class="slide ${slide.type}">${html}</div>`;
        }

        const params = new URLSearchParams(window.location.search);
        const lang = params.get('lang') || 'en';
        const isPrint = params.get('print') === '1';
        const content = CONTENT[lang] || CONTENT.en;

        // Update header
        document.getElementById('header-title').textContent = content.title;
        const backLink = document.getElementById('back-link');
        backLink.href = 'https://www.promptquorum.com/local-llms/long-context-local-llms?lang=' + lang;

        // Render all slides
        const container = document.getElementById('slides-container');
        content.slides.forEach(slide => {
            container.innerHTML += renderSlide(slide, lang);
        });

        // Navigation
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;
        document.getElementById('totalSlides').textContent = totalSlides;

        function showSlide(n) {
            if (n >= totalSlides) currentSlide = totalSlides - 1;
            else if (n < 0) currentSlide = 0;
            slides.forEach(slide => slide.classList.remove('active'));
            slides[currentSlide].classList.add('active');
            document.getElementById('currentSlide').textContent = currentSlide + 1;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
        }

        function changeSlide(n) {
            currentSlide += n;
            showSlide(currentSlide);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight') changeSlide(1);
        });

        // Print handlers — show all slides for PDF
        window.addEventListener('beforeprint', () => {
            slides.forEach(slide => { slide.style.display = 'flex'; });
        });
        window.addEventListener('afterprint', () => {
            slides.forEach(slide => { slide.style.removeProperty('display'); });
            showSlide(currentSlide);
        });

        if (isPrint) {
            window.addEventListener('load', () => { window.print(); });
        }

        showSlide(0);
    </script>
</body>
</html>
