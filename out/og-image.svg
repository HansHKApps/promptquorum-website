<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F0FF"/>
      <stop offset="100%" stop-color="#EDE7F6"/>
    </linearGradient>
    <marker id="h1" viewBox="0 0 14 14" refX="12" refY="7" markerWidth="14" markerHeight="14" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,1 L12,7 L0,13 Z" fill="#21005D"/>
    </marker>
    <marker id="h2" viewBox="0 0 14 14" refX="12" refY="7" markerWidth="14" markerHeight="14" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,1 L12,7 L0,13 Z" fill="#4F378B"/>
    </marker>
    <marker id="h3" viewBox="0 0 14 14" refX="12" refY="7" markerWidth="14" markerHeight="14" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,1 L12,7 L0,13 Z" fill="#6750A4"/>
    </marker>
    <marker id="h4" viewBox="0 0 14 14" refX="12" refY="7" markerWidth="14" markerHeight="14" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,1 L12,7 L0,13 Z" fill="#9A82DB"/>
