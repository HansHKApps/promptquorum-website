  <rect x="695" y="460" width="120" height="36" rx="18" fill="#6750A4" opacity="0.1"/>
  <text x="755" y="484" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#6750A4" text-anchor="middle">25+ AIs</text>

  <rect x="830" y="460" width="180" height="36" rx="18" fill="#6750A4" opacity="0.1"/>
  <text x="920" y="484" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#6750A4" text-anchor="middle">100% Private</text>

  <!-- Bottom bar -->
