  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo arrows (scaled up, positioned left) -->
  <g transform="translate(80, 140) scale(3.5)">
    <path d="M 25,88 C 12,70 30,48 20,15" stroke="#21005D" stroke-width="8.5" stroke-linecap="round" fill="none" marker-end="url(#h1)"/>
    <path d="M 36,88 C 22,66 43,40 38,10" stroke="#4F378B" stroke-width="8.5" stroke-linecap="round" fill="none" marker-end="url(#h2)"/>
    <path d="M 47,88 C 32,60 57,32 61,9" stroke="#6750A4" stroke-width="8.5" stroke-linecap="round" fill="none" marker-end="url(#h3)"/>
    <path d="M 57,88 C 47,55 70,26 84,11" stroke="#9A82DB" stroke-width="8.5" stroke-linecap="round" fill="none" marker-end="url(#h4)"/>
  </g>

  <!-- Text content (right side) -->
  <text x="520" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#1C1B1F">PromptQuorum</text>

  <text x="520" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="30" fill="#49454F">AI Prompt Optimizer &amp;</text>
