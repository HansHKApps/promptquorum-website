<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <title>PromptQuorum OG Image — 1200×630</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #1C1B1F;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .card {
      width: 1200px;
      height: 630px;
      background: #1C1B1F;
      position: relative;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    /* Subtle radial glow behind text */
    .glow {
      position: absolute;
      left: -80px;
      top: 50%;
      transform: translateY(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse at 30% 50%, rgba(103, 80, 164, 0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Left content area */
    .content {
      position: absolute;
      left: 72px;
      top: 0;
      bottom: 0;
      width: 620px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0;
      z-index: 2;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
    }

    .logo-dot {
      width: 38px;
      height: 38px;
      background: #6750A4;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-dot svg {
      width: 22px;
      height: 22px;
    }

    .logo-name {
      font-size: 18px;
      font-weight: 700;
      color: #CAC4D0;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .headline {
      font-size: 72px;
      font-weight: 800;
      color: #6750A4;
      line-height: 1.0;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
    }

    .tagline {
      font-size: 26px;
      font-weight: 600;
      color: #FFFFFF;
      line-height: 1.3;
      margin-bottom: 40px;
      opacity: 0.92;
    }

    .pill-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill {
      background: #211F26;
      border: 1px solid #3C3846;
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #CAC4D0;
      letter-spacing: 0.02em;
    }

    .pill.highlight {
      background: rgba(103, 80, 164, 0.15);
      border-color: #6750A4;
      color: #D0BCFF;
    }

    /* Right: network diagram */
    .diagram {
      position: absolute;
      right: 0;
      top: 0;
      width: 520px;
      height: 630px;
      z-index: 1;
    }

    /* Bottom bar */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #6750A4 0%, #9C89C2 50%, #6750A4 100%);
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>

    <!-- Left content -->
    <div class="content">
      <div class="logo-row">
        <div class="logo-dot">
          <!-- Simple quorum icon: 3 nodes connected -->
          <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="11" cy="4" r="2.5" fill="white"/>
            <circle cx="3.5" cy="17" r="2.5" fill="white"/>
            <circle cx="18.5" cy="17" r="2.5" fill="white"/>
            <line x1="11" y1="6.5" x2="4.5" y2="15" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="11" y1="6.5" x2="17.5" y2="15" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="4.5" y1="17" x2="17.5" y2="17" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="logo-name">PromptQuorum</span>
      </div>

      <div class="headline">One prompt.<br/>Every model.<br/>One verdict.</div>
      <div class="tagline">Send one prompt to 25+ AI models<br/>simultaneously. Get a consensus verdict.</div>

      <div class="pill-row">
        <div class="pill highlight">GPT-4o</div>
        <div class="pill highlight">Claude</div>
        <div class="pill highlight">Gemini</div>
        <div class="pill">Mistral</div>
        <div class="pill">Llama</div>
        <div class="pill">DeepSeek</div>
        <div class="pill">+20 more</div>
      </div>
    </div>

    <!-- Right: SVG network diagram -->
    <div class="diagram">
      <svg width="520" height="630" viewBox="0 0 520 630" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Background gradient -->
        <defs>
          <radialGradient id="bg-glow" cx="50%" cy="50%" r="60%">
            <stop offset="0%" stop-color="#6750A4" stop-opacity="0.08"/>
            <stop offset="100%" stop-color="#1C1B1F" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="node-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#6750A4" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#6750A4" stop-opacity="0"/>
          </radialGradient>
          <filter id="blur-sm">
            <feGaussianBlur stdDeviation="2"/>
          </filter>
          <filter id="glow-filter">
            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>

        <rect width="520" height="630" fill="url(#bg-glow)"/>

        <!-- Central hub node -->
        <!-- Connecting lines from center to outer nodes -->
        <!-- Center: 260, 315 -->
        <!-- Outer ring of 6 model nodes -->

        <!-- Lines (drawn first, behind nodes) -->
        <line x1="260" y1="315" x2="160" y2="140" stroke="#6750A4" stroke-width="1.2" stroke-opacity="0.5" stroke-dasharray="4 4"/>
        <line x1="260" y1="315" x2="360" y2="130" stroke="#6750A4" stroke-width="1.2" stroke-opacity="0.5" stroke-dasharray="4 4"/>
        <line x1="260" y1="315" x2="440" y2="250" stroke="#6750A4" stroke-width="1.2" stroke-opacity="0.4" stroke-dasharray="4 4"/>
        <line x1="260" y1="315" x2="430" y2="400" stroke="#6750A4" stroke-width="1.2" stroke-opacity="0.4" stroke-dasharray="4 4"/>
        <line x1="260" y1="315" x2="340" y2="490" stroke="#6750A4" stroke-width="1.2" stroke-opacity="0.5" stroke-dasharray="4 4"/>
        <line x1="260" y1="315" x2="155" y2="480" stroke="#6750A4" stroke-width="1.2" stroke-opacity="0.4" stroke-dasharray="4 4"/>
        <line x1="260" y1="315" x2="90" y2="370" stroke="#6750A4" stroke-width="1.2" stroke-opacity="0.35" stroke-dasharray="4 4"/>
        <line x1="260" y1="315" x2="100" y2="220" stroke="#6750A4" stroke-width="1.2" stroke-opacity="0.35" stroke-dasharray="4 4"/>

        <!-- Animated pulse dots on lines -->
        <circle r="3" fill="#D0BCFF" opacity="0.7">
          <animateMotion dur="2.5s" repeatCount="indefinite">
            <mpath>
              <path d="M260,315 L160,140"/>
            </mpath>
          </animateMotion>
        </circle>
        <circle r="3" fill="#D0BCFF" opacity="0.7">
          <animateMotion dur="3s" repeatCount="indefinite" begin="0.5s">
            <mpath>
              <path d="M260,315 L440,250"/>
            </mpath>
          </animateMotion>
        </circle>
        <circle r="3" fill="#D0BCFF" opacity="0.7">
          <animateMotion dur="2.8s" repeatCount="indefinite" begin="1s">
            <mpath>
              <path d="M260,315 L340,490"/>
            </mpath>
          </animateMotion>
        </circle>

        <!-- Outer node glow halos -->
        <circle cx="160" cy="140" r="28" fill="#6750A4" opacity="0.12" filter="url(#blur-sm)"/>
        <circle cx="360" cy="130" r="24" fill="#6750A4" opacity="0.12" filter="url(#blur-sm)"/>
        <circle cx="440" cy="250" r="22" fill="#6750A4" opacity="0.10" filter="url(#blur-sm)"/>
        <circle cx="430" cy="400" r="22" fill="#6750A4" opacity="0.10" filter="url(#blur-sm)"/>
        <circle cx="340" cy="490" r="24" fill="#6750A4" opacity="0.12" filter="url(#blur-sm)"/>
        <circle cx="155" cy="480" r="22" fill="#6750A4" opacity="0.10" filter="url(#blur-sm)"/>
        <circle cx="90" cy="370" r="20" fill="#6750A4" opacity="0.08" filter="url(#blur-sm)"/>
        <circle cx="100" cy="220" r="20" fill="#6750A4" opacity="0.08" filter="url(#blur-sm)"/>

        <!-- Outer model nodes -->
        <!-- GPT-4o -->
        <circle cx="160" cy="140" r="36" fill="#211F26" stroke="#6750A4" stroke-width="1.5"/>
        <text x="160" y="135" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="700" fill="#D0BCFF">GPT</text>
        <text x="160" y="148" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#9C89C2">4o</text>

        <!-- Claude -->
        <circle cx="360" cy="130" r="32" fill="#211F26" stroke="#6750A4" stroke-width="1.5"/>
        <text x="360" y="125" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="700" fill="#D0BCFF">Claude</text>
        <text x="360" y="139" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#9C89C2">3.5</text>

        <!-- Gemini -->
        <circle cx="440" cy="250" r="30" fill="#211F26" stroke="#6750A4" stroke-width="1.2"/>
        <text x="440" y="245" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="700" fill="#D0BCFF">Gemini</text>
        <text x="440" y="259" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#9C89C2">2.0</text>

        <!-- Mistral -->
        <circle cx="430" cy="400" r="28" fill="#211F26" stroke="#3C3846" stroke-width="1.2"/>
        <text x="430" y="395" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="600" fill="#CAC4D0">Mistral</text>
        <text x="430" y="408" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#6B6477">7B</text>

        <!-- Llama -->
        <circle cx="340" cy="490" r="30" fill="#211F26" stroke="#3C3846" stroke-width="1.2"/>
        <text x="340" y="485" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="600" fill="#CAC4D0">Llama</text>
        <text x="340" y="498" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#6B6477">3.3</text>

        <!-- DeepSeek -->
        <circle cx="155" cy="480" r="30" fill="#211F26" stroke="#3C3846" stroke-width="1.2"/>
        <text x="155" y="475" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="9" font-weight="600" fill="#CAC4D0">Deep</text>
        <text x="155" y="488" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#6B6477">Seek</text>

        <!-- Grok -->
        <circle cx="90" cy="370" r="26" fill="#211F26" stroke="#3C3846" stroke-width="1"/>
        <text x="90" y="366" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="600" fill="#CAC4D0">Grok</text>
        <text x="90" y="379" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#6B6477">xAI</text>

        <!-- Cohere -->
        <circle cx="100" cy="220" r="26" fill="#211F26" stroke="#3C3846" stroke-width="1"/>
        <text x="100" y="216" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="9" font-weight="600" fill="#CAC4D0">Cohere</text>
        <text x="100" y="229" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#6B6477">R+</text>

        <!-- Central hub -->
        <circle cx="260" cy="315" r="52" fill="#211F26" stroke="#6750A4" stroke-width="2" filter="url(#glow-filter)"/>
        <circle cx="260" cy="315" r="44" fill="#2A2636" stroke="#6750A4" stroke-width="0.5" stroke-opacity="0.4"/>
        <text x="260" y="308" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="11" font-weight="800" fill="#D0BCFF" letter-spacing="0.05em">QUORUM</text>
        <text x="260" y="323" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="10" fill="#9C89C2">consensus</text>
        <text x="260" y="336" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="10" fill="#9C89C2">verdict</text>

        <!-- "+20 more" label -->
        <text x="400" y="570" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="12" fill="#6B6477">+20 more models</text>
      </svg>
    </div>

    <div class="bottom-bar"></div>
  </div>
</body>
</html>
