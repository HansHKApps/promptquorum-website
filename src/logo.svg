<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Arrowhead markers — one per arrow, color-matched -->
    <marker id="h1" viewBox="0 0 14 14" refX="12" refY="7"
            markerWidth="14" markerHeight="14"
            markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,1 L12,7 L0,13 Z" fill="#21005D"/>
    </marker>
    <marker id="h2" viewBox="0 0 14 14" refX="12" refY="7"
            markerWidth="14" markerHeight="14"
            markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,1 L12,7 L0,13 Z" fill="#4F378B"/>
    </marker>
    <marker id="h3" viewBox="0 0 14 14" refX="12" refY="7"
            markerWidth="14" markerHeight="14"
            markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,1 L12,7 L0,13 Z" fill="#6750A4"/>
    </marker>
    <marker id="h4" viewBox="0 0 14 14" refX="12" refY="7"
            markerWidth="14" markerHeight="14"
            markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,1 L12,7 L0,13 Z" fill="#9A82DB"/>
    </marker>
  </defs>

  <!-- Arrow 1: leftmost — darkest violet #21005D, nearly vertical -->
  <path d="M 25,88 C 12,70 30,48 20,15"
        stroke="#21005D" stroke-width="8.5" stroke-linecap="round"
        marker-end="url(#h1)"/>

  <!-- Arrow 2: medium-dark violet #4F378B -->
  <path d="M 36,88 C 22,66 43,40 38,10"
        stroke="#4F378B" stroke-width="8.5" stroke-linecap="round"
        marker-end="url(#h2)"/>

  <!-- Arrow 3: primary violet #6750A4 -->
  <path d="M 47,88 C 32,60 57,32 61,9"
        stroke="#6750A4" stroke-width="8.5" stroke-linecap="round"
        marker-end="url(#h3)"/>

  <!-- Arrow 4: rightmost — medium-light violet #9A82DB, most angled -->
  <path d="M 57,88 C 47,55 70,26 84,11"
        stroke="#9A82DB" stroke-width="8.5" stroke-linecap="round"
        marker-end="url(#h4)"/>
</svg>
